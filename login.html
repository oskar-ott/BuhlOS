<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — sign in</title>
<style>
  :root {
    --bg: #0b0d10;
    --card: #14171c;
    --border: #232830;
    --text: #e8ecf1;
    --muted: #8a94a3;
    --accent: #ffcc00;
    --accent-text: #0b0d10;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .card { width: 100%; max-width: 360px; background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 24px; }
  .logo { text-align: center; margin-bottom: 20px; }
  .logo img { max-width: 120px; height: auto; }
  h1 { margin: 0 0 4px; font-size: 22px; text-align: center; font-weight: 600; }
  .sub { margin: 0 0 24px; color: var(--muted); text-align: center; font-size: 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
  input { width: 100%; padding: 14px; background: #0b0d10; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px; outline: none; }
  input:focus { border-color: var(--accent); }
  button { width: 100%; margin-top: 20px; padding: 14px; background: var(--accent); color: var(--accent-text);
    border: 0; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .err { margin-top: 12px; color: var(--err); font-size: 13px; text-align: center; min-height: 18px; }
  .hint { margin-top: 14px; color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <form class="card" id="f">
    <div class="logo"><img src="/BUHL_LOGO.png" alt="buhl" onerror="this.style.display='none'"></div>
    <h1>Sign in</h1>
    <p class="sub">buhl electrical job management</p>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" autocapitalize="none" autocorrect="off" required>
    <label for="p">Password or PIN</label>
    <input id="p" name="secret" type="password" inputmode="text" autocomplete="current-password" required>
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
    <div class="hint">Tradies: your 4-digit PIN. Admin: your password.</div>
  </form>
</div>
<script>
const f = document.getElementById('f');
const err = document.getElementById('err');
const btn = document.getElementById('btn');
function landingFor(user) {
  if (!user) return '/login';
  if (user.role === 'tradie') return '/my-day';
  return '/jobs';
}
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('u').value.trim(),
        secret: document.getElementById('p').value,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Sign in failed');
    location.href = landingFor(j.user);
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
// If already logged in, redirect based on role
fetch('/api/auth?action=me', { credentials: 'same-origin' })
  .then(r => r.ok ? r.json() : null)
  .then(d => { if (d && d.user) location.href = landingFor(d.user); })
  .catch(() => {});
</script>
</body>
</html>
