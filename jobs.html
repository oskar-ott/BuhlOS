<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — jobs</title>
<link rel="stylesheet" href="/public/theme.css">
<style>
  .app-header { position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding-top: max(0px, env(safe-area-inset-top)); }
  .app-header .spacer { flex: 1; }
  .app-header .me { font-size: var(--fs-sm); opacity: .7; }
  .wrap { padding: 20px 18px; max-width: 720px; margin: 0 auto; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: var(--fs-sm); }
  .job { display: block; border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
         text-decoration: none; color: var(--ink);
         border: 1px solid var(--border); background: var(--card);
         transition: border-color .15s; }
  .job:hover { border-color: var(--accent); }
  .job h2 { margin: 0 0 5px; font-size: var(--fs-lg); font-weight: 600; }
  .job .meta { color: var(--muted); font-size: var(--fs-sm); display: flex; align-items: center; gap: 8px; }
  .admin-bar { margin-bottom: 16px; display: flex; gap: 8px; }
</style>
</head>
<body>
<header class="app-header">
  <img src="/BUHL_LOGO.png" class="logo" alt="buhl electrical" onerror="this.style.display='none'">
  <div class="spacer"></div>
  <span class="me" id="me"></span>
  <button class="btn" id="logout"
    style="color:var(--header-ink);border-color:rgba(255,255,255,.25);background:transparent">
    Sign out
  </button>
</header>
<div class="wrap">
  <div id="adminBar" class="admin-bar" style="display:none">
    <a class="btn primary" href="/admin">Admin panel</a>
  </div>
  <div id="list"></div>
</div>
<script>
async function load() {
  const meRes = await fetch('/api/auth?action=me', { credentials: 'same-origin' });
  if (!meRes.ok) { location.href = '/login'; return; }
  const { user } = await meRes.json();
  document.getElementById('me').textContent = user.username + ' · ' + user.role;
  if (user.role === 'admin') document.getElementById('adminBar').style.display = 'flex';

  const r = await fetch('/api/jobs', { credentials: 'same-origin' });
  const { jobs } = await r.json();
  const list = document.getElementById('list');
  if (!jobs || !jobs.length) {
    list.innerHTML = '<div class="empty">No jobs yet.' +
      (user.role === 'admin' ? ' Create one from the admin panel.' : '') + '</div>';
    return;
  }
  list.innerHTML = jobs.map(j => {
    const st = j.status || 'active';
    return `<a class="job" href="/jobs/${esc(j.id)}">
      <h2>${esc(j.name)}</h2>
      <div class="meta">${esc(j.id)} <span class="badge ${st}">${st}</span></div>
    </a>`;
  }).join('');
}
function esc(s) { return String(s).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/auth?action=logout', { method: 'POST', credentials: 'same-origin' });
  location.href = '/login';
});
load();
</script>
</body>
</html>
