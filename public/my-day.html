<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0d1f35">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<!-- Offline-first write queue. BuhlLogHours uses BuhlQueue.fetch under
     the hood, so submissions persist to IndexedDB when the phone has
     no signal and replay when online. -->
<script type="module" src="/components/queue.js"></script>
<!-- <buhl-mark> renders the sync indicator next to the greeting. It
     subscribes to the same Sync bus BuhlQueue.fetch drives, so a write
     pulse / offline state / failed drain surface visually without this
     page touching anything. -->
<script type="module" src="/components/buhl-mark.js"></script>
<script src="/log-hours-sheet.js" defer></script>
<title>My Day · bühl</title>
<!-- Shared Phil utilities + Me-sheet wiring. Synchronous so window.PhilShell
     is defined by the time the inline body script runs. -->
<script src="/phil-shell.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* Design tokens — lifted from the Phil redesign brief. theme.css is
   intentionally NOT linked; this page is fully self-contained so its
   palette and type can land cleanly without fighting parent themes. */
:root{
  --bg:        #f4f5f7;
  --paper:     #ffffff;
  --paper-2:   #f8f9fb;
  --paper-3:   #eef0f4;
  --ink:       #0d1b34;
  --ink-2:     #36446b;
  --ink-3:     #6a7591;
  --ink-4:     #9aa3bc;
  --rule:      #dde1ea;
  --rule-2:    #c8cee0;
  --yellow:    #f5d020;
  --yellow-ink:#1d1700;
  --red:       #c0312f; --red-bg:#fbeceb; --red-bd:#ecc6c4;
  --amber:     #d18b1c; --amber-bg:#faf2e1; --amber-bd:#ecd5a5;
  --green:     #1f8b5a; --green-bg:#e6f3ec; --green-bd:#b9dec8;
  --header-bg: #0d1f35;
  --safe-t: env(safe-area-inset-top, 0);
  --safe-b: env(safe-area-inset-bottom, 0);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.tabular,.mono{font-variant-numeric:tabular-nums}

.frame{
  max-width:430px;margin:0 auto;min-height:100vh;
  background:var(--bg);position:relative;
  padding-bottom:calc(82px + var(--safe-b));
  display:flex;flex-direction:column;
}

/* ── Header (navy) ─────────────────────────────────────────────── */
.phil-hdr{
  background:var(--header-bg);
  color:#fff;
  padding:calc(54px + var(--safe-t)) 18px 18px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.phil-hdr .ttl{
  font-family:"Inter Tight",sans-serif;
  font-weight:700;font-size:20px;
  letter-spacing:-.018em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.phil-hdr .sub{
  font-family:"JetBrains Mono",monospace;
  font-size:10px;
  color:rgba(255,255,255,.55);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-top:4px;
}
.phil-hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.phil-sync{
  width:34px;height:34px;
  display:inline-flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.7);
}

/* ── Body (cards stack) ────────────────────────────────────────── */
.phil-body{
  padding:14px 14px 24px;
  flex:1;
  display:flex;flex-direction:column;
  gap:12px;
}

/* ── Primary yellow CTA ────────────────────────────────────────── */
.phil-cta{
  background:var(--yellow);
  color:var(--yellow-ink);
  border-radius:12px;
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  font-family:"Inter Tight",sans-serif;
  font-weight:700;
  border:0;
  text-align:left;
  width:100%;
}
.phil-cta:active{transform:scale(.99)}
.phil-cta-l{
  font-family:"JetBrains Mono",monospace;
  font-size:9.5px;font-weight:600;
  opacity:.7;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.phil-cta-t{
  font-size:16px;
  letter-spacing:-.012em;
  margin-top:2px;
}
.phil-cta .arrow{font-size:18px;flex-shrink:0}
.phil-cta.logged{
  background:var(--green-bg);
  color:var(--green);
  border:1px solid var(--green-bd);
}
.phil-cta.logged .phil-cta-l{opacity:.85}

/* ── Cards ─────────────────────────────────────────────────────── */
.phil-card{
  background:var(--paper);
  border:1px solid var(--rule);
  border-radius:12px;
  overflow:hidden;
}
.phil-card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 6px;
  font-family:"JetBrains Mono",monospace;
  font-size:9.5px;font-weight:600;
  color:var(--ink-3);
  letter-spacing:.14em;
  text-transform:uppercase;
}
.phil-card-hdr b{color:var(--ink);font-weight:700}

.phil-row{
  display:flex;align-items:center;
  padding:10px 14px;
  gap:10px;
  border-top:1px solid var(--rule);
  min-height:48px;
  width:100%;text-align:left;
}
.phil-row:first-child{border-top:0}
.phil-row:active{background:var(--paper-2)}
.phil-row-l{flex:1;min-width:0}
.phil-row-title{
  font-family:"Inter Tight",sans-serif;
  font-weight:600;
  font-size:14px;
  color:var(--ink);
  letter-spacing:-.012em;
  line-height:1.25;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.phil-row-meta{
  font-family:"JetBrains Mono",monospace;
  font-size:10px;
  color:var(--ink-3);
  letter-spacing:.04em;
  margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.phil-row-num{
  font-family:"JetBrains Mono",monospace;
  font-size:13px;font-weight:700;
  color:var(--ink);
  flex-shrink:0;
}
.phil-row-num.muted{color:var(--ink-3);font-weight:600}
.phil-row .arrow{color:var(--ink-3);font-size:18px;flex-shrink:0}

/* ── Avatar ────────────────────────────────────────────────────── */
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--paper-3);
  color:var(--ink);
  font-family:"Inter Tight",sans-serif;
  font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;
  letter-spacing:-.02em;
  flex-shrink:0;
}
.avatar.yellow{background:var(--yellow);color:var(--yellow-ink)}
.avatar.navy{background:var(--header-bg);color:#fff}

/* ── Pill ──────────────────────────────────────────────────────── */
.pill{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:3px;
  font-family:"JetBrains Mono",monospace;
  font-size:9.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  white-space:nowrap;
  flex-shrink:0;
}
.pill.yellow{background:var(--yellow);color:var(--yellow-ink)}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.amber{background:var(--amber-bg);color:var(--amber)}
.pill.red  {background:var(--red-bg);  color:var(--red)}
.pill.grey {background:var(--paper-3); color:var(--ink-2)}

/* ── Empty state ───────────────────────────────────────────────── */
.empty{
  padding:24px 18px;text-align:center;
  font-size:13px;color:var(--ink-3);
}
.empty b{display:block;color:var(--ink);font-weight:700;font-size:14px;margin-bottom:4px}

/* ── Bottom tab bar ────────────────────────────────────────────── */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--paper);border-top:1px solid var(--rule);
  padding:6px 6px calc(6px + var(--safe-b));
  max-width:430px;margin:0 auto;
}
.tb{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:8px 4px;
  font-family:"Inter",sans-serif;
  font-size:10.5px;font-weight:500;
  color:var(--ink-3);
  text-decoration:none;
  border-radius:10px;
  position:relative;
}
.tb .ico{
  width:26px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;border-radius:6px;
}
.tb.active{color:var(--ink);font-weight:600}
.tb.active .ico{background:var(--yellow);color:var(--yellow-ink);font-weight:700}

/* ── Me sheet (signout confirmation) ───────────────────────────── */
.me-scrim{
  position:fixed;inset:0;background:rgba(13,27,52,.45);
  z-index:50;display:flex;align-items:flex-end;justify-content:center;
  animation:me-fade .14s ease-out;
}
.me-scrim[hidden]{display:none}
@keyframes me-fade{from{opacity:0}to{opacity:1}}
.me-sheet{
  background:var(--paper);
  border-radius:18px 18px 0 0;
  padding:8px 18px calc(18px + var(--safe-b));
  width:100%;max-width:430px;
  box-shadow:0 -8px 24px rgba(13,27,52,.18);
  animation:me-slide .18s ease-out;
}
@keyframes me-slide{from{transform:translateY(20px);opacity:.6}to{transform:translateY(0);opacity:1}}
.me-handle{width:36px;height:4px;border-radius:2px;background:var(--rule-2);margin:6px auto 16px}
.me-who{display:flex;align-items:center;gap:12px;padding:6px 4px 14px;border-bottom:1px solid var(--rule);margin-bottom:10px}
.me-who-avatar{width:44px;height:44px;border-radius:50%;background:var(--yellow);color:var(--yellow-ink);display:flex;align-items:center;justify-content:center;font-family:"Inter Tight",sans-serif;font-size:17px;font-weight:700;flex-shrink:0}
.me-who-name{font-family:"Inter Tight",sans-serif;font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.2px;line-height:1.2}
.me-who-role{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.me-action{width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:var(--paper-2);border:1px solid var(--rule);font:inherit;font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:8px;text-align:left}
.me-action.danger{color:var(--red)}
.me-action:active{transform:scale(.99)}
.me-action .me-action-meta{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase}
.me-cancel{width:100%;padding:13px;border-radius:12px;background:transparent;border:0;font:inherit;font-size:14.5px;font-weight:600;color:var(--ink-2);cursor:pointer}

.skel{background:var(--paper-3);border-radius:4px;display:inline-block;height:14px;width:80px;animation:skel 1.4s linear infinite}
@keyframes skel{0%{opacity:.55}50%{opacity:.85}100%{opacity:.55}}
</style>
</head>
<body>
<div class="frame">
  <!-- Header — Inter Tight greeting over a mono uppercase secondary
       line. <buhl-mark> pulses on writes; right-side button is the
       Me sheet's open trigger. -->
  <header class="phil-hdr">
    <div style="flex:1;min-width:0">
      <div class="ttl" id="hdr-greet">Morning</div>
      <div class="sub" id="hdr-sub">Loading…</div>
    </div>
    <div class="phil-hdr-right">
      <buhl-mark size="sm" class="phil-sync" aria-label="Sync state"></buhl-mark>
    </div>
  </header>

  <div class="phil-body">
    <!-- 1 · PRIMARY CTA — flips between "log today" (unfilled) and
         "logged today: 8h" (green confirmation). Tap opens the
         BuhlLogHours sheet pre-scoped to the right date + job. -->
    <button type="button" class="phil-cta" id="cta" onclick="openLog()">
      <div>
        <div class="phil-cta-l" id="cta-l">LOG NOW</div>
        <div class="phil-cta-t" id="cta-t">Log today's hours</div>
      </div>
      <div class="arrow" id="cta-arrow">→</div>
    </button>

    <!-- 2 · ON SITE TODAY — most recent active job from MY_TIME_ENTRIES,
         or the only assigned active job. Tap opens /jobs/:id. Hidden
         when there's no obvious target. -->
    <div class="phil-card" id="onsite-card" hidden>
      <div class="phil-card-hdr">
        <span><b id="onsite-label">On site today</b> · <span id="onsite-sub"></span></span>
        <span id="onsite-stage"></span>
      </div>
      <a class="phil-row" id="onsite-row" href="#">
        <div class="avatar yellow" id="onsite-avatar">—</div>
        <div class="phil-row-l">
          <div class="phil-row-title" id="onsite-title">—</div>
          <div class="phil-row-meta" id="onsite-meta">—</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <!-- 3 · THIS WEEK — week total + per-job breakdown. The day-by-day
         strip is intentionally gone: a worker mostly cares about
         "have I logged what I owe?" and "where did the hours go." -->
    <div class="phil-card">
      <div class="phil-card-hdr">
        <span>This week · all jobs</span>
        <span id="wk-total">—</span>
      </div>
      <div id="wk-list">
        <div class="empty"><b>Loading…</b></div>
      </div>
    </div>

    <!-- 4 · MY JOBS — entry points to each assigned job. Tap any row
         to land on the per-job dashboard. -->
    <div class="phil-card">
      <div class="phil-card-hdr">
        <span>My jobs</span>
        <span id="jobs-count">—</span>
      </div>
      <div id="jobs-list">
        <div class="empty"><b>Loading…</b></div>
      </div>
    </div>
  </div>

  <!-- Bottom tab bar — 4 surfaces. "Me" is a sheet, not navigation. -->
  <nav class="tabbar">
    <a href="/my-day" class="tb active">
      <span class="ico">☼</span>
      My day
    </a>
    <a href="/jobs" class="tb">
      <span class="ico">▣</span>
      Jobs
    </a>
    <a href="/my-gear" class="tb">
      <span class="ico">⚙</span>
      My gear
    </a>
    <button class="tb" type="button" id="tab-me">
      <span class="ico">◉</span>
      Me
    </button>
  </nav>
</div>

<!-- Me sheet — signout guarded behind a confirm tap so an edge-of-
     screen thumb doesn't end the session. -->
<div class="me-scrim" id="me-scrim" hidden>
  <div class="me-sheet" role="dialog" aria-modal="true">
    <div class="me-handle"></div>
    <div class="me-who">
      <div class="me-who-avatar" id="me-avatar">?</div>
      <div style="flex:1;min-width:0">
        <div class="me-who-name" id="me-who-name">…</div>
        <div class="me-who-role" id="me-who-role"></div>
      </div>
    </div>
    <a class="me-action" href="/onboarding">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Onboarding &amp; readiness</span>
      <span class="me-action-meta">→</span>
    </a>
    <button type="button" class="me-action danger" id="me-signout">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M16 17l5-5-5-5M21 12H9M13 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/></svg>
      <span>Sign out</span>
    </button>
    <button type="button" class="me-cancel" id="me-cancel">Cancel</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────
let ME = null;
let JOBS = [];                  // [{ id, name, status, ref, areaGroups, ... }]
let MY_TIME_ENTRIES = [];       // sorted newest-first, covers >= current ISO week

// ─── Helpers ─────────────────────────────────────────────────────────────
// esc + initials are shared across all worker pages via /phil-shell.js;
// local aliases keep the call sites short and don't require touching
// every interpolation in this file.
const esc = PhilShell.esc;
const initials = PhilShell.initials;
function _iso(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayIso(){ return _iso(new Date()); }
function yesterdayIso(){ const d = new Date(); d.setDate(d.getDate()-1); return _iso(d); }
function firstName(u){ return (u && u.username) ? u.username.split(/[\s._-]/)[0] : 'there'; }
function greeting(){
  const h = new Date().getHours();
  if (h < 12) return 'Morning';
  if (h < 17) return 'Afternoon';
  return 'Evening';
}
function isoWeekMonday(){
  const d = new Date();
  const day = d.getDay() || 7;
  if (day !== 1) d.setDate(d.getDate() - (day - 1));
  d.setHours(0,0,0,0);
  return d;
}
function fmtHours(h){
  const n = Number(h || 0);
  return (Math.round(n * 10) / 10).toFixed(1);
}
function fmtDay(date){
  return date.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' });
}

// ─── Bootstrap ───────────────────────────────────────────────────────────
async function load(){
  // 1. Auth + role gate. /my-day is the tradie landing; everyone else
  //    gets routed to their role-specific surface.
  const meRes = await fetch('/api/auth?action=me', { credentials:'same-origin' });
  if (!meRes.ok) { location.href = '/login'; return; }
  const { user } = await meRes.json();
  ME = user;
  if (ME.role === 'admin')       { location.href = '/admin/operations'; return; }
  if (ME.role === 'leadingHand') { location.href = '/lh';                return; }
  if (ME.role === 'client')      { location.href = '/client';            return; }

  // 2. Header — "Morning, Kane" / mono date line.
  paintGreeting();

  // 3. Wire Me sheet (identity is now known).
  setupMeSheet();

  // 4. Data — jobs + this week's time entries in parallel.
  const monday = isoWeekMonday();
  // Pull a wider window so "today's entry exists or not" doesn't flip
  // when we wrap into the next week at midnight.
  const fromIso = _iso(new Date(monday.getTime() - 7 * 86400000));

  let jobsOk = false, entriesOk = false;
  try {
    const [jr, ter] = await Promise.all([
      fetch('/api/jobs',                            { credentials:'same-origin' }),
      fetch('/api/time-entries?fromDate=' + encodeURIComponent(fromIso),
                                                    { credentials:'same-origin' }),
    ]);
    if (jr.ok)  { JOBS = (await jr.json()).jobs || []; jobsOk = true; }
    if (ter.ok) { MY_TIME_ENTRIES = (await ter.json()).entries || []; entriesOk = true; }
  } catch (e) {
    // Network flake — fall through to the error-aware render below.
  }

  paintCta();
  paintOnsite();
  paintWeek(entriesOk);
  paintJobs(jobsOk);
}

function paintGreeting(){
  const name = firstName(ME);
  document.getElementById('hdr-greet').textContent = greeting() + ', ' + name;
  const now = new Date();
  const date = now.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('hdr-sub').textContent = date.toUpperCase();
}

// ── CTA ────────────────────────────────────────────────────────────────
// Flips between two states:
//   logged  → green confirmation showing today's total + Edit affordance
//   default → yellow "Log today's hours"
function paintCta(){
  const today = todayIso();
  const entry = MY_TIME_ENTRIES.find(e => e && e.date === today);
  const total = entry ? Number(entry.totalHours || 0) : 0;
  const cta = document.getElementById('cta');
  const l   = document.getElementById('cta-l');
  const t   = document.getElementById('cta-t');
  const arr = document.getElementById('cta-arrow');
  if (total > 0) {
    cta.classList.add('logged');
    l.textContent = 'LOGGED TODAY';
    t.textContent = fmtHours(total) + ' hrs · tap to edit';
    arr.textContent = '✓';
  } else {
    cta.classList.remove('logged');
    l.textContent = 'LOG NOW';
    t.textContent = "Log today's hours";
    arr.textContent = '→';
  }
}

window.openLog = function openLog(){
  if (!window.BuhlLogHours) {
    if (window.showToast) showToast('Log-hours module not loaded — refresh the page.', 'warn');
    return;
  }
  const today = todayIso();
  const existing = MY_TIME_ENTRIES.find(e => e && e.date === today) || null;
  BuhlLogHours.open({
    date: today,
    entry: existing,
    onSaved: async () => {
      // Re-pull fresh time-entries so the CTA + Week card sync.
      const fromIso = _iso(new Date(isoWeekMonday().getTime() - 7 * 86400000));
      let ok = false;
      try {
        const r = await fetch('/api/time-entries?fromDate=' + encodeURIComponent(fromIso),
                              { credentials:'same-origin' });
        if (r.ok) { MY_TIME_ENTRIES = (await r.json()).entries || []; ok = true; }
      } catch (e) {}
      paintCta();
      paintOnsite();
      // Pass `true` if the refresh succeeded so the Week card doesn't
      // flip to the error state after a save; if it failed, the worker
      // sees the same "couldn't load" affordance as on initial boot.
      paintWeek(ok);
    },
  });
};

// ── On site today ──────────────────────────────────────────────────────
// Surfaces the most recent active job the worker has touched. If the
// worker hasn't clocked anywhere yet today, falls back to their single
// active assignment (when unambiguous). Hidden when nothing applies.
function paintOnsite(){
  const today = todayIso();
  const todayEntry = MY_TIME_ENTRIES.find(e => e && e.date === today);
  let jobId = null;

  if (todayEntry && Array.isArray(todayEntry.allocations) && todayEntry.allocations.length) {
    // Pick the allocation with the most hours today.
    const sorted = [...todayEntry.allocations].sort((a,b) => (b.hours||0) - (a.hours||0));
    jobId = sorted[0].jobId;
  } else {
    const activeJobs = JOBS.filter(j => (j.status || 'active') === 'active');
    if (activeJobs.length === 1) jobId = activeJobs[0].id;
  }

  const card = document.getElementById('onsite-card');
  const job  = jobId ? JOBS.find(j => j.id === jobId) : null;
  if (!job) { card.hidden = true; return; }

  card.hidden = false;
  document.getElementById('onsite-label').textContent = todayEntry ? 'On site today' : 'Current job';
  document.getElementById('onsite-sub').textContent = job.name;
  document.getElementById('onsite-stage').textContent = (job.ref || job.id || '').toUpperCase();

  document.getElementById('onsite-row').href = '/jobs/' + encodeURIComponent(job.id);
  document.getElementById('onsite-avatar').textContent = initials(job.name);
  // Phil's vocabulary calls the per-job hub "Workspace" everywhere
  // else (header sub-line, brief, tabbar destination), so the on-site
  // card reads "Open Workspace" not "Open job interface".
  document.getElementById('onsite-title').textContent = 'Open Workspace';

  const todayHrs = todayEntry ? Number(todayEntry.totalHours || 0) : 0;
  const dwCount = (job.areaGroups || []).reduce((s,g) => s + ((g.areas || []).length), 0);
  const metaBits = [
    todayHrs > 0 ? fmtHours(todayHrs) + 'h logged' : null,
    dwCount > 0 ? dwCount + (dwCount === 1 ? ' area' : ' areas') : null,
  ].filter(Boolean);
  document.getElementById('onsite-meta').textContent = metaBits.join(' · ') || 'tap to open';
}

// ── This week ──────────────────────────────────────────────────────────
// Per-job breakdown of the current ISO week. The 7-day day strip is
// gone; what a worker actually scans for is "where did my hours go?".
// `entriesOk` is false when the /api/time-entries fetch failed —
// distinguish "no hours" (real) from "couldn't load" (signal) so the
// worker knows whether to retry.
function paintWeek(entriesOk){
  if (entriesOk === false) {
    document.getElementById('wk-total').textContent = '—';
    document.getElementById('wk-list').innerHTML =
      '<div class="empty"><b>Couldn\'t load this week</b>Pull to refresh, or check your connection.</div>';
    return;
  }
  const monday = isoWeekMonday();
  const totalsByJob = {};   // jobId -> hours
  const jobNameById = Object.fromEntries(JOBS.map(j => [j.id, j.name]));
  let weekTotal = 0;

  for (const e of MY_TIME_ENTRIES) {
    if (!e || !e.date) continue;
    const d = new Date(e.date + 'T00:00:00');
    if (d < monday) continue;
    if (Array.isArray(e.allocations)) {
      for (const a of e.allocations) {
        if (!a || !a.jobId) continue;
        totalsByJob[a.jobId] = (totalsByJob[a.jobId] || 0) + Number(a.hours || 0);
        weekTotal += Number(a.hours || 0);
      }
    } else if (e.totalHours) {
      weekTotal += Number(e.totalHours || 0);
    }
  }

  document.getElementById('wk-total').textContent = fmtHours(weekTotal) + ' hrs';

  const entries = Object.entries(totalsByJob)
    .sort((a,b) => b[1] - a[1])
    .filter(([, h]) => h > 0);

  const list = document.getElementById('wk-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty"><b>No hours yet this week</b>Tap the yellow card to log your day.</div>';
    return;
  }
  list.innerHTML = entries.map(([jobId, hrs]) => {
    const name = jobNameById[jobId] || jobId;
    const job  = JOBS.find(j => j.id === jobId);
    const meta = job ? (job.ref || job.id || '').toUpperCase() : '';
    return `<a class="phil-row" href="/jobs/${esc(jobId)}">
      <div class="phil-row-l">
        <div class="phil-row-title">${esc(name)}</div>
        ${meta ? `<div class="phil-row-meta">${esc(meta)}</div>` : ''}
      </div>
      <div class="phil-row-num">${fmtHours(hrs)}h</div>
    </a>`;
  }).join('');
}

// ── My jobs ────────────────────────────────────────────────────────────
// `jobsOk` is false when /api/jobs failed — surface that explicitly
// instead of pretending the worker has no assigned jobs.
function paintJobs(jobsOk){
  if (jobsOk === false) {
    document.getElementById('jobs-count').textContent = '—';
    document.getElementById('jobs-list').innerHTML =
      '<div class="empty"><b>Couldn\'t load your jobs</b>Pull to refresh, or check your connection.</div>';
    return;
  }
  const active = JOBS.filter(j => (j.status || 'active') === 'active');
  document.getElementById('jobs-count').textContent =
    active.length + (active.length === 1 ? ' job' : ' jobs');

  const list = document.getElementById('jobs-list');
  if (!active.length) {
    list.innerHTML = '<div class="empty"><b>No jobs assigned yet</b>Ask an admin to add you to a job.</div>';
    return;
  }
  // Recently-touched job (from time entries) gets the "today" pill.
  const today = todayIso();
  const todayEntry = MY_TIME_ENTRIES.find(e => e && e.date === today);
  const onTodayJobId = todayEntry && Array.isArray(todayEntry.allocations) && todayEntry.allocations.length
    ? [...todayEntry.allocations].sort((a,b) => (b.hours||0) - (a.hours||0))[0].jobId
    : null;

  list.innerHTML = active.map(j => {
    const ref = (j.ref || j.id || '').toUpperCase();
    const isToday = j.id === onTodayJobId;
    const pill = isToday ? '<span class="pill yellow">today</span>' : '';
    return `<a class="phil-row" href="/jobs/${esc(j.id)}">
      <div class="avatar">${esc(initials(j.name))}</div>
      <div class="phil-row-l">
        <div class="phil-row-title">${esc(j.name)}</div>
        ${ref ? `<div class="phil-row-meta">${esc(ref)}</div>` : ''}
      </div>
      ${pill}
      <span class="arrow">›</span>
    </a>`;
  }).join('');
}

// ── Me sheet ───────────────────────────────────────────────────────────
// Wiring lives in /phil-shell.js so every worker page behaves identically.
function setupMeSheet(){ PhilShell.mountMeSheet(ME); }

// Toast helper — log-hours-sheet expects window.showToast.
window.showToast = window.showToast || function(msg, kind, ms){
  if (!msg) return;
  let stack = document.getElementById('toast-stack');
  if (!stack) {
    stack = document.createElement('div');
    stack.id = 'toast-stack';
    stack.style.cssText = 'position:fixed;left:0;right:0;bottom:96px;z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none';
    document.body.appendChild(stack);
  }
  const el = document.createElement('div');
  el.textContent = String(msg);
  el.style.cssText = 'background:' + (kind === 'error' ? '#c0312f' : '#0d1b34') + ';color:#fff;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;box-shadow:0 6px 16px rgba(13,27,52,.18);pointer-events:auto';
  stack.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .2s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, ms || (kind === 'error' ? 4200 : 2400));
};

load();
