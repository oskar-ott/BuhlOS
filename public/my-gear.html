<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0d1f35">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<!-- Offline-first write queue. Transfer requests on a flaky site
     persist to IndexedDB and replay when online. -->
<script type="module" src="/components/queue.js"></script>
<title>My Gear · bühl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* Design tokens — matches /my-day, lifted from the Phil redesign brief. */
:root{
  --bg:        #f4f5f7;
  --paper:     #ffffff;
  --paper-2:   #f8f9fb;
  --paper-3:   #eef0f4;
  --ink:       #0d1b34;
  --ink-2:     #36446b;
  --ink-3:     #6a7591;
  --ink-4:     #9aa3bc;
  --rule:      #dde1ea;
  --rule-2:    #c8cee0;
  --yellow:    #f5d020;
  --yellow-ink:#1d1700;
  --red:       #c0312f; --red-bg:#fbeceb; --red-bd:#ecc6c4;
  --amber:     #d18b1c; --amber-bg:#faf2e1; --amber-bd:#ecd5a5;
  --green:     #1f8b5a; --green-bg:#e6f3ec; --green-bd:#b9dec8;
  --header-bg: #0d1f35;
  --safe-t: env(safe-area-inset-top, 0);
  --safe-b: env(safe-area-inset-bottom, 0);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.4;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.tabular{font-variant-numeric:tabular-nums}
.frame{
  max-width:430px;margin:0 auto;min-height:100vh;
  background:var(--bg);position:relative;
  padding-bottom:calc(82px + var(--safe-b));
  display:flex;flex-direction:column;
}

/* Header */
.phil-hdr{
  background:var(--header-bg);color:#fff;
  padding:calc(54px + var(--safe-t)) 18px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.phil-hdr .ttl{font-family:"Inter Tight",sans-serif;font-weight:700;font-size:20px;letter-spacing:-.018em}
.phil-hdr .sub{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}

/* Body */
.phil-body{padding:14px 14px 24px;flex:1;display:flex;flex-direction:column;gap:12px}

/* CTA — for /my-gear this is the "Scan check in / out" navy slab.
   Different from /my-day's yellow CTA because the gear page's primary
   action is a scan, and a yellow chip on yellow brand color reads as
   muddy. Navy with a yellow chevron lifts it. */
.phil-cta{
  background:var(--header-bg);color:#fff;
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  font-family:"Inter Tight",sans-serif;font-weight:700;border:0;
  text-align:left;width:100%;
}
.phil-cta:active{transform:scale(.99)}
.phil-cta-l{font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:600;opacity:.7;letter-spacing:.14em;text-transform:uppercase;color:var(--yellow)}
.phil-cta-t{font-size:16px;letter-spacing:-.012em;margin-top:2px}
.phil-cta .arrow{font-size:22px;flex-shrink:0;color:var(--yellow)}

/* Cards */
.phil-card{
  background:var(--paper);border:1px solid var(--rule);
  border-radius:12px;overflow:hidden;
}
.phil-card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 6px;
  font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:600;
  color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase;
}
.phil-card-hdr b{color:var(--ink);font-weight:700}

.phil-row{
  display:flex;align-items:center;
  padding:10px 14px;gap:10px;
  border-top:1px solid var(--rule);min-height:48px;
  width:100%;text-align:left;
}
.phil-row:first-child{border-top:0}
.phil-row-l{flex:1;min-width:0}
.phil-row-title{
  font-family:"Inter Tight",sans-serif;font-weight:600;font-size:14px;
  color:var(--ink);letter-spacing:-.012em;line-height:1.25;
}
.phil-row-meta{
  font-family:"JetBrains Mono",monospace;font-size:10px;
  color:var(--ink-3);letter-spacing:.04em;margin-top:3px;
}
.phil-row-actions{display:flex;gap:6px;margin-top:8px;padding:0 14px 12px}
.phil-row-actions .btn{
  flex:1;padding:9px 12px;border-radius:8px;
  background:var(--paper-2);border:1px solid var(--rule);
  font-family:"Inter Tight",sans-serif;font-size:13px;font-weight:600;
  color:var(--ink);cursor:pointer;
}
.phil-row-actions .btn.primary{background:var(--yellow);border-color:var(--yellow);color:var(--yellow-ink);font-weight:700}
.phil-row-actions .btn:active{transform:scale(.98)}
.phil-row-actions .btn[disabled]{opacity:.4;cursor:not-allowed}

/* Avatar */
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--paper-3);color:var(--ink);
  font-family:"Inter Tight",sans-serif;font-size:11px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;
  letter-spacing:-.02em;flex-shrink:0;
}
.avatar.yellow{background:var(--yellow);color:var(--yellow-ink)}

/* Pill */
.pill{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:3px;
  font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;flex-shrink:0;
}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.amber{background:var(--amber-bg);color:var(--amber)}
.pill.red  {background:var(--red-bg);color:var(--red)}
.pill.grey {background:var(--paper-3);color:var(--ink-2)}

/* Empty state */
.empty{padding:24px 18px;text-align:center;font-size:13px;color:var(--ink-3)}
.empty b{display:block;color:var(--ink);font-weight:700;font-size:14px;margin-bottom:4px}

/* Tab bar — matches /my-day. */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--paper);border-top:1px solid var(--rule);
  padding:6px 6px calc(6px + var(--safe-b));
  max-width:430px;margin:0 auto;
}
.tb{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:8px 4px;
  font-family:"Inter",sans-serif;font-size:10.5px;font-weight:500;
  color:var(--ink-3);text-decoration:none;border-radius:10px;position:relative;
}
.tb .ico{width:26px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:6px}
.tb.active{color:var(--ink);font-weight:600}
.tb.active .ico{background:var(--yellow);color:var(--yellow-ink);font-weight:700}

/* Me sheet (guarded signout) */
.me-scrim{position:fixed;inset:0;background:rgba(13,27,52,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:me-fade .14s ease-out}
.me-scrim[hidden]{display:none}
@keyframes me-fade{from{opacity:0}to{opacity:1}}
.me-sheet{background:var(--paper);border-radius:18px 18px 0 0;padding:8px 18px calc(18px + var(--safe-b));width:100%;max-width:430px;box-shadow:0 -8px 24px rgba(13,27,52,.18);animation:me-slide .18s ease-out}
@keyframes me-slide{from{transform:translateY(20px);opacity:.6}to{transform:translateY(0);opacity:1}}
.me-handle{width:36px;height:4px;border-radius:2px;background:var(--rule-2);margin:6px auto 16px}
.me-who{display:flex;align-items:center;gap:12px;padding:6px 4px 14px;border-bottom:1px solid var(--rule);margin-bottom:10px}
.me-who-avatar{width:44px;height:44px;border-radius:50%;background:var(--yellow);color:var(--yellow-ink);display:flex;align-items:center;justify-content:center;font-family:"Inter Tight",sans-serif;font-size:17px;font-weight:700;flex-shrink:0}
.me-who-name{font-family:"Inter Tight",sans-serif;font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.2px;line-height:1.2}
.me-who-role{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.me-action{width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:var(--paper-2);border:1px solid var(--rule);font:inherit;font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:8px;text-align:left}
.me-action.danger{color:var(--red)}
.me-action:active{transform:scale(.99)}
.me-action .me-action-meta{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase}
.me-cancel{width:100%;padding:13px;border-radius:12px;background:transparent;border:0;font:inherit;font-size:14.5px;font-weight:600;color:var(--ink-2);cursor:pointer}

/* Transfer sheet */
.scrim{position:fixed;inset:0;background:rgba(13,27,52,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.scrim.open{display:flex}
.sheet{background:#fff;width:100%;max-width:430px;max-height:90vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden}
.sheet-h{padding:14px 18px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:10px}
.sheet-h h2{flex:1;font-family:"Inter Tight",sans-serif;font-size:15px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.012em}
.sheet-h button{font-size:22px;color:var(--ink-3);padding:4px 8px}
.sheet-body{padding:14px 18px;overflow-y:auto;flex:1}
.sheet-field{margin-bottom:14px}
.sheet-field label{display:block;font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}
.sheet-field select,.sheet-field input,.sheet-field textarea{width:100%;padding:11px 12px;border:1px solid var(--rule-2);border-radius:8px;font:inherit;font-size:14px;background:#fff;color:var(--ink);outline:none}
.sheet-foot{padding:12px 18px calc(12px + var(--safe-b));border-top:1px solid var(--rule);background:var(--paper-2);display:flex;gap:8px}
.sheet-foot button{flex:1;padding:12px 14px;border-radius:8px;font-family:"Inter Tight",sans-serif;font-weight:700;font-size:14px}
.sheet-foot button.primary{background:var(--yellow);color:var(--yellow-ink)}
.sheet-foot button.cancel{background:#fff;border:1px solid var(--rule-2)}
.sheet-err{margin-top:8px;padding:8px 12px;background:var(--red-bg);color:var(--red);border-radius:6px;font-size:12.5px;display:none;font-family:"JetBrains Mono",monospace;letter-spacing:.04em}
.sheet-err.show{display:block}
</style>
</head>
<body>
<div class="frame">
  <header class="phil-hdr">
    <div style="flex:1;min-width:0">
      <div class="ttl">My Gear</div>
      <div class="sub" id="top-sub">Loading…</div>
    </div>
  </header>

  <div class="phil-body">
    <div id="gear-content">
      <div class="phil-card"><div class="empty"><b>Loading…</b></div></div>
    </div>
  </div>

  <nav class="tabbar">
    <a href="/my-day" class="tb">
      <span class="ico">☼</span>
      My day
    </a>
    <a href="/jobs" class="tb">
      <span class="ico">▣</span>
      Jobs
    </a>
    <a href="/my-gear" class="tb active">
      <span class="ico">⚙</span>
      My gear
    </a>
    <button class="tb" type="button" id="tab-me">
      <span class="ico">◉</span>
      Me
    </button>
  </nav>
</div>

<!-- Me sheet -->
<div class="me-scrim" id="me-scrim" hidden>
  <div class="me-sheet" role="dialog" aria-modal="true">
    <div class="me-handle"></div>
    <div class="me-who">
      <div class="me-who-avatar" id="me-avatar">?</div>
      <div style="flex:1;min-width:0">
        <div class="me-who-name" id="me-who-name">…</div>
        <div class="me-who-role" id="me-who-role"></div>
      </div>
    </div>
    <a class="me-action" href="/onboarding">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Onboarding &amp; readiness</span>
      <span class="me-action-meta">→</span>
    </a>
    <button type="button" class="me-action danger" id="me-signout">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M16 17l5-5-5-5M21 12H9M13 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/></svg>
      <span>Sign out</span>
    </button>
    <button type="button" class="me-cancel" id="me-cancel">Cancel</button>
  </div>
</div>

<!-- Transfer sheet -->
<div class="scrim" id="tx-scrim" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-h">
      <h2 id="tx-title">Transfer</h2>
      <button type="button" id="tx-close" aria-label="Close">×</button>
    </div>
    <div class="sheet-body">
      <p style="font-size:13px;color:var(--ink-2);margin:0 0 14px;line-height:1.45">Hand this gear over to another tradie, or return it to storage. Admin sees the change in the asset register.</p>
      <div class="sheet-field">
        <label for="tx-to">Who's taking it</label>
        <select id="tx-to">
          <option value="">— Return to storage —</option>
        </select>
      </div>
      <div class="sheet-field">
        <label for="tx-return">Expected back (optional)</label>
        <input type="date" id="tx-return">
      </div>
      <div class="sheet-field">
        <label for="tx-note">Note (optional)</label>
        <input type="text" id="tx-note" placeholder="e.g. for Birdwood next week">
      </div>
      <div class="sheet-err" id="tx-err"></div>
    </div>
    <div class="sheet-foot">
      <button class="cancel" type="button" id="tx-cancel">Cancel</button>
      <button class="primary" type="button" id="tx-do">Transfer</button>
    </div>
  </div>
</div>

<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtAgo(iso){
  if (!iso) return '—';
  const d = new Date(iso); if (isNaN(d)) return '—';
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  if (s < 86400) return Math.floor(s/3600) + ' hr ago';
  const days = Math.floor(s/86400);
  if (days < 14) return days + ' days ago';
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
}
function initials(name){
  return String(name||'?').split(/[\s._-]+/).filter(Boolean).slice(0,2).map(w => w[0]).join('').toUpperCase() || '?';
}

const TYPE_LABELS = { vehicle:'Vehicle', key:'Key', tool:'Tool', accessory:'Accessory', ppe:'PPE', other:'Other' };

let ME = null;
let CREW = [];   // tradies + LHs we can transfer to
let ASSETS = []; // mine

async function load() {
  try {
    const r = await fetch('/api/auth?action=me', { credentials:'same-origin' });
    if (!r.ok) { location.href = '/login'; return; }
    ME = (await r.json()).user;
    if (ME.role === 'client') { location.href = '/client'; return; }
    if (ME.role === 'admin')  { location.href = '/admin/assets'; return; }

    setupMeSheet();

    const [aRes, cRes] = await Promise.all([
      fetch('/api/assets', { credentials:'same-origin' }),
      fetch('/api/users?action=listTradies', { credentials:'same-origin' }).catch(() => null),
    ]);
    if (aRes.ok) ASSETS = (await aRes.json()).assets || [];
    if (cRes && cRes.ok) CREW = ((await cRes.json()).users || []).filter(u => u.id !== ME.id && (u.role === 'tradie' || u.role === 'leadingHand'));
    render();
  } catch (e) {
    document.getElementById('gear-content').innerHTML = '<div class="phil-card"><div class="empty"><b>Couldn\'t load</b>' + esc(e.message) + '</div></div>';
  }
}

function render() {
  const today = new Date().toISOString().slice(0,10);
  const list = ASSETS.slice().sort((a, b) => {
    // Overdue first, then assigned-recent.
    const aOverdue = a.expectedReturn && a.expectedReturn < today;
    const bOverdue = b.expectedReturn && b.expectedReturn < today;
    if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
    return (b.assignedAt || '').localeCompare(a.assignedAt || '');
  });

  const dueSoon = list.filter(a => {
    if (!a.expectedReturn) return false;
    const days = (new Date(a.expectedReturn) - new Date()) / 86400000;
    return days >= 0 && days <= 14;
  }).length;
  const overdue = list.filter(a => a.expectedReturn && a.expectedReturn < today).length;

  // Header sub-line — "5 items out · 1 due soon" / "2 OVERDUE"
  const parts = [];
  if (list.length) parts.push(list.length + (list.length === 1 ? ' item out' : ' items out'));
  if (overdue) parts.push(overdue + ' OVERDUE');
  else if (dueSoon) parts.push(dueSoon + ' DUE SOON');
  document.getElementById('top-sub').textContent = parts.join(' · ') || 'Nothing in your name right now';

  const content = document.getElementById('gear-content');
  if (!list.length) {
    content.innerHTML = `<div class="phil-card"><div class="empty"><b>No gear assigned to you</b>When admin or a leading hand transfers something to you, it'll show here.</div></div>`;
    return;
  }

  content.innerHTML = `
    <div class="phil-card">
      <div class="phil-card-hdr">
        <span><b>On me</b> · ${list.length} ${list.length === 1 ? 'item' : 'items'}</span>
      </div>
      ${list.map((a,i) => assetHtml(a, i)).join('')}
    </div>`;

  list.forEach(a => {
    const btn = document.querySelector('button[data-tx="' + a.id + '"]');
    if (btn) btn.addEventListener('click', () => openTransfer(a));
  });
}

function assetHtml(a, idx) {
  const today = new Date().toISOString().slice(0,10);
  const overdue = a.expectedReturn && a.expectedReturn < today;
  const dueSoon = a.expectedReturn && !overdue &&
                  (new Date(a.expectedReturn) - new Date()) / 86400000 <= 14;
  const pill = overdue
    ? '<span class="pill red">overdue</span>'
    : dueSoon
      ? '<span class="pill amber">due soon</span>'
      : '<span class="pill green">ok</span>';

  const ident = a.identifier ? ` · ${esc(a.identifier)}` : '';
  const due = a.expectedReturn
    ? `${overdue ? 'was due ' : 'back '}${esc(a.expectedReturn)}`
    : `since ${esc(fmtAgo(a.assignedAt))}`;

  return `<div class="phil-row" style="flex-wrap:wrap">
      <div class="avatar yellow">${esc(initials(a.name))}</div>
      <div class="phil-row-l">
        <div class="phil-row-title">${esc(a.name)}</div>
        <div class="phil-row-meta">${esc(TYPE_LABELS[a.type] || a.type)}${ident} · ${due}</div>
      </div>
      ${pill}
    </div>
    <div class="phil-row-actions">
      <button class="btn primary" data-tx="${esc(a.id)}">Transfer / return</button>
    </div>`;
}

// ── Transfer sheet ─────────────────────────────────────────────────────
let TX_ASSET = null;
function openTransfer(asset) {
  TX_ASSET = asset;
  document.getElementById('tx-title').textContent = 'Transfer ' + asset.name;
  const sel = document.getElementById('tx-to');
  sel.innerHTML = '<option value="">— Return to storage —</option>' +
    CREW.map(u => `<option value="${esc(u.id)}">${esc(u.username)}${u.role === 'leadingHand' ? ' (LH)' : ''}</option>`).join('');
  document.getElementById('tx-return').value = asset.expectedReturn || '';
  document.getElementById('tx-note').value = '';
  document.getElementById('tx-err').classList.remove('show');
  document.getElementById('tx-scrim').classList.add('open');
}
function closeTransfer() {
  document.getElementById('tx-scrim').classList.remove('open');
  TX_ASSET = null;
}
document.getElementById('tx-close').addEventListener('click', closeTransfer);
document.getElementById('tx-cancel').addEventListener('click', closeTransfer);
document.getElementById('tx-scrim').addEventListener('click', e => {
  if (e.target.id === 'tx-scrim') closeTransfer();
});
document.getElementById('tx-do').addEventListener('click', async () => {
  if (!TX_ASSET) return;
  const toUserId = document.getElementById('tx-to').value || null;
  const expectedReturn = document.getElementById('tx-return').value || null;
  const note = document.getElementById('tx-note').value.trim() || null;
  const err = document.getElementById('tx-err');
  err.classList.remove('show');
  const btn = document.getElementById('tx-do');
  btn.disabled = true; btn.textContent = 'Transferring…';
  try {
    // Offline-first: a transfer on a flaky site connection persists to
    // IndexedDB and replays when online.
    const fetcher = (window.BuhlQueue && window.BuhlQueue.fetch) || window.fetch.bind(window);
    const r = await fetcher('/api/assets?action=transfer', {
      method:'POST', credentials:'same-origin',
      headers:{ 'Content-Type':'application/json' },
      replaceKey:'asset-transfer:' + TX_ASSET.id,
      body: JSON.stringify({ assetId: TX_ASSET.id, toUserId, expectedReturn, note }),
    });
    if (r && r.status === 202) {
      err.textContent = 'Queued offline · will transfer when online.';
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Transfer';
      setTimeout(closeTransfer, 1200);
      return;
    }
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
    closeTransfer();
    await load();
  } catch (e) {
    err.textContent = "Couldn't transfer — " + e.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Transfer';
  }
});

async function logout() {
  await fetch('/api/auth?action=logout', { method:'POST', credentials:'same-origin' });
  location.href = '/login';
}

// Tap "Me" → bottom sheet shows identity + a guarded Sign out + Cancel.
// Mirrors /my-day; the previous instant-logout on tap was easy to
// mis-fire when reaching for "My gear" with a thumb at the right edge.
function setupMeSheet() {
  const tab = document.getElementById('tab-me');
  const scrim = document.getElementById('me-scrim');
  const cancel = document.getElementById('me-cancel');
  const signOut = document.getElementById('me-signout');
  const nameEl = document.getElementById('me-who-name');
  const roleEl = document.getElementById('me-who-role');
  const avEl = document.getElementById('me-avatar');
  if (!tab || !scrim) return;
  const name = (ME && ME.username) || 'You';
  const roleLabel = ME && ME.role === 'leadingHand' ? 'Leading hand'
                  : ME && ME.role === 'tradie' ? 'Tradie' : '';
  nameEl.textContent = name;
  roleEl.textContent = roleLabel;
  avEl.textContent = initials(name);
  const open  = () => { scrim.hidden = false; document.body.style.overflow = 'hidden'; };
  const close = () => { scrim.hidden = true;  document.body.style.overflow = ''; };
  tab.addEventListener('click', open);
  cancel.addEventListener('click', close);
  scrim.addEventListener('click', e => { if (e.target === scrim) close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && !scrim.hidden) close(); });
  signOut.addEventListener('click', logout);
}

load();
</script>
