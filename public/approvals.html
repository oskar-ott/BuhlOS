<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — approvals</title>
<link rel="stylesheet" href="/theme.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<meta name="theme-color" content="#0d1b34">
<script src="/mobile-nav.js" defer></script>
<script src="/lib/approvals-badge.js" defer></script>
<style>
  .app-header {
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding-top: max(0px, env(safe-area-inset-top));
    justify-content: space-between;
  }
  .app-header .hdr-left  { display: flex; align-items: center; gap: 10px; }
  .app-header .hdr-right { display: flex; align-items: center; gap: 10px; }
  .me { font-size: var(--fs-sm); color: rgba(255,255,255,.65); }

  .nav-pill {
    display: inline-flex; align-items: center; height: 34px;
    padding: 0 12px; border-radius: 999px;
    font-size: var(--fs-xs); font-weight: 600;
    color: rgba(255,255,255,.65);
    border: 1px solid rgba(255,255,255,.12);
    background: transparent; text-decoration: none;
    transition: background .15s, color .15s;
  }
  .nav-pill:hover { color: #fff; background: rgba(255,255,255,.08); }
  .nav-pill.active { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }

  .ap-page { max-width: 720px; margin: 0 auto; padding: 18px 16px 60px; }
  .ap-hdr { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .ap-hdr h1 { margin: 0; font-size: 22px; font-weight: 700; color: var(--header); letter-spacing: -.3px; }
  .ap-hdr .sub { font-size: var(--fs-sm); color: var(--muted); margin-top: 3px; }

  .ap-empty {
    background: var(--card); border: 1px dashed var(--border);
    border-radius: 14px; padding: 36px 20px; text-align: center;
    color: var(--muted); font-size: var(--fs-sm);
  }

  /* Top summary strip — at-a-glance pending counts */
  .ap-summary {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  @media (max-width: 480px) { .ap-summary { grid-template-columns: 1fr 1fr; } }
  .ap-summary-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px;
  }
  .ap-summary-label {
    font-size: 10px; font-weight: 800; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
  }
  .ap-summary-value {
    font-size: 22px; font-weight: 800; color: var(--header);
    letter-spacing: -.5px; line-height: 1;
  }
  .ap-summary-value.green { color: var(--green); }
  .ap-summary-value.amber { color: var(--amber); }
  .ap-summary-value.red   { color: var(--red); }

  .ap-group { margin-bottom: 22px; }
  .ap-group-hdr {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 8px;
  }
  .ap-group-hdr-name {
    display: flex; align-items: center; gap: 8px;
    font-size: var(--fs-xs); font-weight: 700;
    color: var(--header); text-transform: uppercase; letter-spacing: .8px;
  }
  .ap-group-hdr-name b { font-size: 14px; letter-spacing: -.1px; text-transform: none; color: var(--header); }
  .ap-group-hdr-meta { color: var(--muted); font-weight: 600; text-transform: none; letter-spacing: 0; font-size: 11px; }
  .ap-btn-approve-all {
    appearance: none; background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: 8px;
    padding: 6px 12px; font-size: 11px; font-weight: 800;
    cursor: pointer; font-family: inherit;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .ap-btn-approve-all:hover { filter: brightness(.96); }
  .ap-btn-approve-all:disabled { opacity: .4; cursor: not-allowed; }
  .ap-lh-pill {
    background: #dbeafe; color: #1e40af;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
    text-transform: none; letter-spacing: 0;
  }

  .ap-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .ap-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 12px;
  }
  .ap-date { font-size: var(--fs-base); font-weight: 700; color: var(--header); line-height: 1.2; }
  .ap-totals { font-size: var(--fs-xs); color: var(--muted); margin-top: 3px; }
  /* Stale-submission badge — reminds admin to clear old approvals */
  .ap-stale {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 800; letter-spacing: .3px;
    padding: 1px 7px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle;
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  .ap-stale.amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
  .ap-stale.red   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
  .ap-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .ap-btn-approve {
    background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: 9px;
    padding: 8px 14px; font-size: 12px; font-weight: 800;
    cursor: pointer; min-height: 36px; letter-spacing: .2px;
  }
  .ap-btn-approve:hover { filter: brightness(.96); }
  .ap-btn-approve:disabled { opacity: .45; cursor: not-allowed; }
  .ap-btn-reject {
    background: #fff; color: var(--red);
    border: 1px solid var(--red-bd); border-radius: 9px;
    padding: 8px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; min-height: 36px;
  }
  .ap-btn-reject:hover { background: var(--red-bg); }

  .ap-allocs { font-size: var(--fs-xs); color: var(--ink); }
  .ap-alloc-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-top: 1px solid var(--border);
  }
  .ap-alloc-row:first-child { border-top: none; }
  .ap-alloc-job b { color: var(--header); font-weight: 700; }
  .ap-alloc-job em { color: var(--muted); font-style: italic; }
  .ap-alloc-blocked { color: var(--red); font-size: 10px; font-weight: 700; margin-left: 6px; }
  .ap-alloc-hours { font-weight: 700; color: var(--header); font-variant-numeric: tabular-nums; }

  .ap-notes {
    margin-top: 10px; padding: 8px 10px;
    background: var(--bg); border-radius: 8px;
    font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.45;
  }

  .ap-reject-form { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
  .ap-reject-form textarea {
    width: 100%; box-sizing: border-box;
    border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 10px; font-size: var(--fs-sm);
    font-family: inherit; resize: vertical; min-height: 60px;
    color: var(--ink); background: var(--card); outline: none;
  }
  .ap-reject-form textarea:focus { border-color: var(--header); }
  .ap-reject-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .ap-btn-cancel { background: none; border: none; color: var(--muted); font-size: 12px; padding: 8px 10px; cursor: pointer; font-family: inherit; }
  .ap-btn-confirm-reject {
    background: var(--red); color: #fff;
    border: none; border-radius: 9px;
    padding: 8px 14px; font-size: 12px; font-weight: 700;
    cursor: pointer; min-height: 36px;
  }
  .ap-btn-confirm-reject:disabled { opacity: .5; cursor: not-allowed; }
</style>
</head>
<body>
<header class="app-header">
  <div class="hdr-left">
    <a href="/approvals" class="wordmark hdr-mark" aria-label="BuhlOS — approvals">b&uuml;hl<span class="os">OS</span></a>
    <a class="nav-pill" id="ovLink" href="/overview" style="display:none">Operations</a>
    <a class="nav-pill" href="/jobs">Jobs</a>
    <a class="nav-pill active" href="/approvals">Approvals</a>
    <a class="nav-pill" id="adminLink" href="/admin" style="display:none">Admin</a>
  </div>
  <div class="hdr-right">
    <span class="me" id="me"></span>
    <button class="btn ghost" id="logout">Sign out</button>
  </div>
</header>

<div class="ap-page">
  <div class="ap-hdr">
    <div>
      <h1>Approvals</h1>
      <div class="sub" id="subtitle">Loading…</div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
let ME = null;

(async function () {
  const meRes = await fetch('/api/auth?action=me', { credentials: 'same-origin' });
  if (!meRes.ok) { location.href = '/login'; return; }
  const { user } = await meRes.json();
  ME = user;

  if (!['admin', 'leadingHand'].includes(user.role)) {
    location.href = user.role === 'tradie' ? '/my-day' : '/jobs';
    return;
  }

  const roleLabel = { admin: 'Admin', leadingHand: 'Leading Hand' }[user.role] || user.role;
  document.getElementById('me').textContent = user.username + ' · ' + roleLabel;
  document.getElementById('ovLink').style.display = 'inline-flex';
  const al = document.getElementById('adminLink');
  al.style.display = 'inline-flex';
  if (user.role === 'leadingHand') al.textContent = 'Job Setup';

  await loadApprovals();
})();

document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/auth?action=logout', { method: 'POST', credentials: 'same-origin' });
  location.href = '/login';
});

async function loadApprovals() {
  // Keep the nav-pill badge in sync after approve/reject actions on this page.
  if (typeof window.refreshApprovalsBadge === 'function') {
    setTimeout(window.refreshApprovalsBadge, 100);
  }
  const subtitle = document.getElementById('subtitle');
  const content  = document.getElementById('content');

  let entries = [];
  try {
    const res = await fetch('/api/time-entries?status=submitted&scope=approver', { credentials: 'same-origin' });
    if (!res.ok) {
      subtitle.textContent = 'Failed to load approvals.';
      return;
    }
    entries = (await res.json()).entries || [];
  } catch (e) {
    subtitle.textContent = 'Failed to load approvals.';
    return;
  }

  subtitle.textContent =
    entries.length + ' submitted ' + (entries.length === 1 ? 'entry' : 'entries') + ' pending';

  if (!entries.length) {
    content.innerHTML = '<div class="ap-empty">Nothing to approve right now.</div>';
    return;
  }

  // Per-entry "can I approve this?" gate, mirroring the server-side rules.
  function canApprove(e) {
    if (ME.role === 'admin') return true;
    if (ME.role !== 'leadingHand') return false;
    if (e.userRole === 'leadingHand') return false;          // LH-on-LH is admin-only
    return (e.allocations || []).every(a => a._jobLedByMe);  // all on jobs I run
  }

  // Group by submitter
  const byUser = {};
  for (const e of entries) {
    if (!byUser[e.userId]) {
      byUser[e.userId] = { userId: e.userId, userName: e.userName || e.userId, role: e.userRole, entries: [] };
    }
    byUser[e.userId].entries.push(e);
  }

  // Top summary
  const totalHours = entries.reduce((s, e) => s + (Number(e.totalHours) || 0), 0);
  const approvable = entries.filter(canApprove).length;
  // Staleness counts — anything submitted ≥24h ago is shown as "waiting".
  const now = Date.now();
  const staleCount = entries.filter(e => {
    const ms = e.submittedAt ? Date.parse(e.submittedAt) : NaN;
    return Number.isFinite(ms) && (now - ms) >= 24 * 60 * 60 * 1000;
  }).length;
  const staleTone = staleCount === 0 ? 'green' : staleCount >= 5 ? 'red' : 'amber';

  content.innerHTML =
      '<div class="ap-summary">'
    +   '<div class="ap-summary-card"><div class="ap-summary-label">Pending</div><div class="ap-summary-value">' + entries.length + '</div></div>'
    +   '<div class="ap-summary-card"><div class="ap-summary-label">Total hours</div><div class="ap-summary-value">' + totalHours.toFixed(1) + '</div></div>'
    +   '<div class="ap-summary-card"><div class="ap-summary-label">You can approve</div><div class="ap-summary-value ' + (approvable === entries.length ? 'green' : 'amber') + '">' + approvable + '</div></div>'
    +   '<div class="ap-summary-card"><div class="ap-summary-label">Waiting &gt; 24h</div><div class="ap-summary-value ' + staleTone + '">' + staleCount + '</div></div>'
    + '</div>';

  for (const group of Object.values(byUser)) {
    const wrap = document.createElement('div');
    wrap.className = 'ap-group';
    const groupApprovable = group.entries.filter(canApprove).length;
    const groupHours = group.entries.reduce((s, e) => s + (Number(e.totalHours) || 0), 0);

    // Approve-all button only when there are 2+ entries this viewer can approve.
    const approveAllHtml = groupApprovable >= 2
      ? `<button class="ap-btn-approve-all" data-approve-all="${esc(group.userId)}">Approve all ${groupApprovable}</button>`
      : '';

    wrap.innerHTML =
        '<div class="ap-group-hdr">'
      +   '<div class="ap-group-hdr-name">'
      +     '<b>' + esc(group.userName) + '</b>'
      +     (group.role === 'leadingHand' ? '<span class="ap-lh-pill">Leading hand</span>' : '')
      +     '<span class="ap-group-hdr-meta">' + group.entries.length + ' ' + (group.entries.length === 1 ? 'entry' : 'entries') + ' · ' + groupHours.toFixed(1) + ' hrs</span>'
      +   '</div>'
      +   approveAllHtml
      + '</div>';

    if (groupApprovable >= 2) {
      // Hook up bulk approve. Sequential to keep stable progress feedback +
      // avoid hammering the blob writes. Refreshes the whole list at the end.
      wrap.querySelector('[data-approve-all]').addEventListener('click', async (ev) => {
        const approvable = group.entries.filter(canApprove);
        if (!confirm('Approve ' + approvable.length + ' submitted ' + (approvable.length === 1 ? 'entry' : 'entries') + ' from ' + group.userName + '?')) return;
        const btn = ev.currentTarget;
        btn.disabled = true;
        let done = 0, failed = 0;
        for (const e of approvable) {
          btn.textContent = 'Approving ' + (done + 1) + '/' + approvable.length + '…';
          try {
            const r = await fetch('/api/time-entries-approve', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({ userId: e.userId, date: e.date }),
            });
            if (r.ok) done++; else failed++;
          } catch { failed++; }
        }
        btn.textContent = 'Done';
        if (failed > 0) alert('Approved ' + done + ', failed ' + failed + '.');
        await loadApprovals();
      });
    }

    group.entries.forEach(e => wrap.appendChild(renderCard(e)));
    content.appendChild(wrap);
  }
}

function renderCard(entry) {
  const card = document.createElement('div');
  card.className = 'ap-card';

  // LH-specific blocks: every allocation must be on their job, and submitter cannot be another LH.
  const lhBlocked = ME.role === 'leadingHand' && (
    entry.userRole === 'leadingHand' ||
    (entry.allocations || []).some(a => a._jobLedByMe === false)
  );
  const blockReason = ME.role === 'leadingHand'
    ? (entry.userRole === 'leadingHand'
        ? 'LH-on-LH approval is admin-only'
        : 'Includes work outside your jobs — admin only')
    : '';

  // Staleness — flag entries that have been waiting > 24h so admins can
  // prioritise older submissions. Tradies don't get paid until approved, so
  // sitting submissions are a real cost.
  const submittedMs = entry.submittedAt ? Date.parse(entry.submittedAt) : NaN;
  let staleBadge = '';
  if (Number.isFinite(submittedMs)) {
    const ageHrs = Math.floor((Date.now() - submittedMs) / (1000 * 60 * 60));
    if (ageHrs >= 48)      staleBadge = '<span class="ap-stale red"   title="Submitted ' + ageHrs + ' hours ago">' + Math.floor(ageHrs / 24) + 'd waiting</span>';
    else if (ageHrs >= 24) staleBadge = '<span class="ap-stale amber" title="Submitted ' + ageHrs + ' hours ago">' + ageHrs + 'h waiting</span>';
  }

  card.innerHTML =
      '<div class="ap-card-top">'
    +   '<div>'
    +     '<div class="ap-date">' + esc(formatDate(entry.date)) + ' ' + staleBadge + '</div>'
    +     '<div class="ap-totals">'
    +       Number(entry.totalHours).toFixed(2) + ' hrs'
    +       ' · ord ' + Number(entry.ordinaryHours).toFixed(2)
    +       ' · OT '  + Number(entry.overtimeHours).toFixed(2)
    +     '</div>'
    +   '</div>'
    +   '<div class="ap-actions">'
    +     '<button class="ap-btn-reject" data-action="reject">Reject</button>'
    +     '<button class="ap-btn-approve" data-action="approve"'
    +       (lhBlocked ? ' disabled title="' + esc(blockReason) + '"' : '')
    +       '>Approve</button>'
    +   '</div>'
    + '</div>'
    + '<div class="ap-allocs">'
    +   (entry.allocations || []).map(a => (
          '<div class="ap-alloc-row">'
        +   '<div class="ap-alloc-job">'
        +     (a.jobId
                ? '<b>' + esc(a.jobName || a.jobId) + '</b>'
                  + (ME.role === 'leadingHand' && a._jobLedByMe === false
                      ? '<span class="ap-alloc-blocked">not your job</span>'
                      : '')
                : '<em>Internal — no job</em>'
                  + (ME.role === 'leadingHand'
                      ? '<span class="ap-alloc-blocked">admin-only</span>'
                      : ''))
        +   '</div>'
        +   '<div class="ap-alloc-hours">' + Number(a.hours).toFixed(2) + ' hrs</div>'
        + '</div>'
        )).join('')
    + '</div>'
    + (entry.notes ? '<div class="ap-notes">"' + esc(entry.notes) + '"</div>' : '')
    + '<div data-region="reject"></div>';

  card.querySelector('[data-action="approve"]').addEventListener('click', async (ev) => {
    const btn = ev.currentTarget;
    btn.disabled = true; btn.textContent = 'Approving…';
    try {
      const r = await fetch('/api/time-entries-approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ userId: entry.userId, date: entry.date }),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error((j && j.error) || ('Failed (' + r.status + ')'));
      await loadApprovals();
    } catch (e) {
      alert('Approve failed: ' + e.message);
      btn.disabled = false; btn.textContent = 'Approve';
    }
  });

  card.querySelector('[data-action="reject"]').addEventListener('click', () => {
    const region = card.querySelector('[data-region="reject"]');
    region.innerHTML =
        '<div class="ap-reject-form">'
      +   '<textarea rows="2" placeholder="Reason for rejection (e.g. wrong job, hours don’t match site sign-in)"></textarea>'
      +   '<div class="ap-reject-actions">'
      +     '<button class="ap-btn-cancel" data-action="cancel-reject">Cancel</button>'
      +     '<button class="ap-btn-confirm-reject" data-action="confirm-reject">Confirm reject</button>'
      +   '</div>'
      + '</div>';
    region.querySelector('[data-action="cancel-reject"]').addEventListener('click', () => { region.innerHTML = ''; });
    region.querySelector('[data-action="confirm-reject"]').addEventListener('click', async (ev) => {
      const reason = region.querySelector('textarea').value.trim();
      if (!reason) return;
      const btn = ev.currentTarget;
      btn.disabled = true; btn.textContent = 'Rejecting…';
      try {
        const r = await fetch('/api/time-entries-reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ userId: entry.userId, date: entry.date, reason }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error((j && j.error) || ('Failed (' + r.status + ')'));
        await loadApprovals();
      } catch (e) {
        alert('Reject failed: ' + e.message);
        btn.disabled = false; btn.textContent = 'Confirm reject';
      }
    });
  });

  return card;
}

function formatDate(iso) {
  try {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  } catch { return iso; }
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
</script>
</body>
</html>
