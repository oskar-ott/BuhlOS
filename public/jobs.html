<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0d1f35">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Phil">
<title>Jobs · Phil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ee; --surface:#fff; --surface-2:#faf8f3; --surface-3:#efece4;
  --shell:#0d1f35; --ink:#0d1f35; --ink-2:#2a3a52; --muted:#6b7689;
  --line:#ece7da; --line-2:#dcd5c4;
  --accent:#ffcc00; --accent-ink:#2a1a05;
  --ok:#1f8a4c; --bad:#b3261e; --warn:#b76b00; --info:#1c5fb8;
  --safe-t:env(safe-area-inset-top,0); --safe-b:env(safe-area-inset-bottom,0);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}.tabular{font-variant-numeric:tabular-nums}
.frame{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:calc(86px + var(--safe-b))}
.top{display:flex;align-items:center;gap:12px;padding:calc(14px + var(--safe-t)) 18px 12px}.top h1{font-size:22px;font-weight:700;letter-spacing:-.4px}.top-sub{font-size:12px;font-weight:500;color:var(--muted);margin-top:3px}
.summary{margin:0 14px 14px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px}.summary-k{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.summary-v{font-size:28px;font-weight:800;letter-spacing:-.8px;color:var(--ink);line-height:1}.summary-note{font-size:12px;color:var(--muted);margin-top:2px}.summary-pill{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent);border-radius:999px;padding:5px 10px;white-space:nowrap}
.search{padding:0 14px 12px}.search input{width:100%;min-height:44px;border:1px solid var(--line-2);border-radius:12px;background:var(--surface);padding:11px 13px;font:inherit;font-size:14px;color:var(--ink);outline:none}.search input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(13,31,53,.08)}
.list{padding:0 14px}.empty{margin:0 14px;padding:28px 18px;border-radius:14px;background:var(--surface);border:1px dashed var(--line-2);text-align:center;font-size:13px;color:var(--muted)}.empty b{display:block;color:var(--ink);font-weight:700;margin-bottom:5px;font-size:15px}
.job{display:block;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:9px}.job:active{transform:scale(.99)}.job-top{display:flex;align-items:flex-start;gap:12px}.job-icon{width:40px;height:40px;border-radius:11px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink)}.job-icon svg{width:20px;height:20px}.job-main{flex:1;min-width:0}.job-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.job-meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}.job-ref{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;background:var(--surface-3);padding:1px 5px;border-radius:4px;color:var(--ink-2)}.job-chevron{font-size:22px;color:var(--muted);line-height:1}.job-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}.stat{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:8px 7px}.stat b{display:block;font-size:14px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}.stat span{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:1px}.stat.warn b{color:var(--bad)}.bar{height:5px;background:var(--surface-3);border-radius:999px;overflow:hidden;margin-top:10px}.bar i{display:block;height:100%;background:var(--accent);border-radius:999px;width:0%}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:10;display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.94);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--line);padding:6px 6px calc(6px + var(--safe-b));max-width:430px;margin:0 auto}.tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;font-size:10.5px;font-weight:600;color:var(--muted);text-decoration:none;border-radius:10px;position:relative}.tb.active{color:var(--ink);background:var(--surface-2)}.tb svg{width:22px;height:22px}
.me-scrim{position:fixed;inset:0;background:rgba(13,31,53,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:me-fade .14s ease-out}.me-scrim[hidden]{display:none}@keyframes me-fade{from{opacity:0}to{opacity:1}}.me-sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:8px 18px calc(18px + var(--safe-b));width:100%;max-width:430px;box-shadow:0 -8px 24px rgba(13,31,53,.18);animation:me-slide .18s ease-out}@keyframes me-slide{from{transform:translateY(20px);opacity:.6}to{transform:translateY(0);opacity:1}}.me-handle{width:36px;height:4px;border-radius:2px;background:var(--line-2);margin:6px auto 16px}.me-who{display:flex;align-items:center;gap:12px;padding:6px 4px 14px;border-bottom:1px solid var(--line);margin-bottom:10px}.me-who-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}.me-who-name{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.2px;line-height:1.2}.me-who-role{font-size:12px;color:var(--muted);margin-top:2px}.me-action{width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);font:inherit;font-size:14.5px;font-weight:600;color:var(--bad);cursor:pointer;margin-bottom:8px;text-align:left}.me-cancel{width:100%;padding:13px;border-radius:12px;background:transparent;border:0;font:inherit;font-size:14.5px;font-weight:600;color:var(--ink-2);cursor:pointer}
</style>
</head>
<body>
<div class="frame">
  <div class="top"><div><h1>Jobs</h1><div class="top-sub" id="top-sub">Loading assigned jobs…</div></div></div>
  <div class="summary"><div><div class="summary-k">Workspace access</div><div class="summary-v" id="job-total">0</div><div class="summary-note">Open the job Workspace for plans, photos, contacts and site info.</div></div><div class="summary-pill">Field view</div></div>
  <div class="search"><input id="q" type="search" autocomplete="off" placeholder="Search jobs, refs, addresses…"></div>
  <div class="list" id="jobs-list"></div>
  <nav class="tabbar">
    <a href="/my-day" class="tb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>My day</a>
    <a href="/jobs" class="tb active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18M5 7v12h14V7"/><path d="M8 11h8M8 15h5"/></svg>Jobs</a>
    <a href="/my-gear" class="tb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg>My gear</a>
    <button class="tb" type="button" id="tab-me"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>Me</button>
  </nav>
</div>
<div class="me-scrim" id="me-scrim" hidden><div class="me-sheet" role="dialog" aria-modal="true"><div class="me-handle"></div><div class="me-who"><div class="me-who-avatar" id="me-avatar">?</div><div style="flex:1;min-width:0"><div class="me-who-name" id="me-who-name">…</div><div class="me-who-role" id="me-who-role"></div></div></div><button type="button" class="me-action" id="me-signout"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M16 17l5-5-5-5M21 12H9M13 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/></svg><span>Sign out</span></button><button type="button" class="me-cancel" id="me-cancel">Cancel</button></div></div>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
let ME=null,JOBS=[];
async function load(){
  try{
    const meRes=await fetch('/api/auth?action=me',{credentials:'same-origin'});
    if(!meRes.ok){location.href='/login';return}
    ME=(await meRes.json()).user;
    if(ME.role==='client'){location.href='/client';return}
    if(ME.role==='admin'){location.href='/admin/jobs';return}
    setupMeSheet();
    const r=await fetch('/api/jobs?withStats=1',{credentials:'same-origin'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    JOBS=(await r.json()).jobs||[];
    render();
  }catch(e){document.getElementById('jobs-list').innerHTML='<div class="empty"><b>Couldn\'t load jobs</b>'+esc(e.message)+'</div>';document.getElementById('top-sub').textContent='Check connection and refresh.'}
}
function jobRef(j){return j.ref||j.serviceM8JobId||j.id||''}
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  const list=JOBS.filter(j=>!q||[j.name,jobRef(j),j.siteAddress,j.typeName].some(v=>String(v||'').toLowerCase().includes(q)));
  document.getElementById('job-total').textContent=String(JOBS.length);
  document.getElementById('top-sub').textContent=JOBS.length?(JOBS.length+(JOBS.length===1?' assigned job':' assigned jobs')):'No assigned jobs';
  if(!list.length){document.getElementById('jobs-list').innerHTML='<div class="empty"><b>No jobs found</b>Assigned jobs will appear here when admin adds you to them.</div>';return}
  document.getElementById('jobs-list').innerHTML=list.map(j=>{
    const pct=Number.isFinite(j.statsPct)?j.statsPct:null;
    const snags=Number(j.statsOpenSnags||0);
    const tags=Number(j.statsExpiredTags||0)+Number(j.statsExpiringTags||0);
    const ref=jobRef(j);
    return `<a class="job" href="/jobs/${encodeURIComponent(j.id)}" aria-label="Open ${esc(j.name)} Workspace"><div class="job-top"><div class="job-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M14 3v6h6"/></svg></div><div class="job-main"><div class="job-name">${esc(j.name||j.id)}</div><div class="job-meta">${ref?`<span class="job-ref">${esc(ref)}</span>`:''}${j.siteAddress?`<span>${esc(j.siteAddress)}</span>`:''}</div></div><div class="job-chevron">›</div></div><div class="job-stats"><div class="stat"><b>${pct==null?'—':pct+'%'}</b><span>Progress</span></div><div class="stat ${snags?'warn':''}"><b>${snags}</b><span>Snags</span></div><div class="stat ${tags?'warn':''}"><b>${tags}</b><span>Tags</span></div></div><div class="bar"><i style="width:${pct==null?0:Math.max(0,Math.min(100,pct))}%"></i></div></a>`;
  }).join('');
}
document.getElementById('q').addEventListener('input',render);
async function logout(){await fetch('/api/auth?action=logout',{method:'POST',credentials:'same-origin'});location.href='/login'}
function setupMeSheet(){const tab=document.getElementById('tab-me'),scrim=document.getElementById('me-scrim'),cancel=document.getElementById('me-cancel'),signOut=document.getElementById('me-signout'),nameEl=document.getElementById('me-who-name'),roleEl=document.getElementById('me-who-role'),avEl=document.getElementById('me-avatar');if(!tab||!scrim)return;const name=(ME&&ME.username)||'You';const roleLabel=ME&&ME.role==='leadingHand'?'Leading hand':ME&&ME.role==='tradie'?'Tradie':'';nameEl.textContent=name;roleEl.textContent=roleLabel;avEl.textContent=String(name).split(/[\s._-]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';function open(){scrim.hidden=false;document.body.style.overflow='hidden'}function close(){scrim.hidden=true;document.body.style.overflow=''}tab.addEventListener('click',open);cancel.addEventListener('click',close);scrim.addEventListener('click',e=>{if(e.target===scrim)close()});document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!scrim.hidden)close()});signOut.addEventListener('click',logout)}
load();
</script>
</body>
</html>
