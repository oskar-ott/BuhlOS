<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — jobs</title>
<link rel="stylesheet" href="/theme.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<meta name="theme-color" content="#0d1f35">
<script src="/mobile-nav.js" defer></script>
<script src="/install-prompt.js" defer></script>
<script src="/lib/approvals-badge.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* App-header (kept from theme.css for cross-page consistency) */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding-top: max(0px, env(safe-area-inset-top));
    justify-content: space-between;
  }
  .app-header .hdr-left  { display: flex; align-items: center; gap: 10px; }
  .app-header .hdr-right { display: flex; align-items: center; gap: 10px; }
  .me { font-size: var(--fs-sm); color: rgba(255,255,255,.65); }
  .nav-pill {
    display: inline-flex; align-items: center; height: 34px;
    padding: 0 12px; border-radius: 999px;
    font-size: var(--fs-xs); font-weight: 600;
    color: rgba(255,255,255,.65);
    border: 1px solid rgba(255,255,255,.12);
    background: transparent; text-decoration: none;
    transition: background .15s, color .15s;
  }
  .nav-pill:hover { color: #fff; background: rgba(255,255,255,.08); }
  .nav-pill.active { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }

  /* ── Page body ──────────────────────────────────────── */
  .jobs-page {
    --bg:        #f5f3ee;
    --surface:   #fdfcf9;
    --surface-2: #efece4;
    --ink:       #0d1f35;
    --ink-2:     #4a5568;
    --muted:     #8a8678;
    --line:      #e2dfd5;
    --line-2:    #d8d2c1;
    --ok:        #1f8a4c;
    --warn:      #b76b00;
    --bad:       #b3261e;
    --accent:    #e08a1a;

    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: calc(100vh - 60px);
    max-width: 960px; margin: 0 auto;
    padding: 20px clamp(16px, 4vw, 28px) 32px;
  }

  /* Heading */
  .jobs-page .head {
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 16px; flex-wrap: wrap;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .jobs-page .head h1 {
    font-size: clamp(22px, 3.6vw, 30px);
    font-weight: 700; letter-spacing: -.4px;
    margin: 0 0 4px;
  }
  .jobs-page .head .sub {
    font-size: 13px; color: var(--muted);
  }
  .jobs-page .head .sub b { color: var(--ink); font-weight: 600; }

  /* Controls row */
  .jobs-page .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 14px;
  }
  .jobs-page .filter-bar {
    display: flex; gap: 4px; padding: 3px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .jobs-page .filter-pill {
    appearance: none; -webkit-appearance: none;
    background: transparent; border: none;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    cursor: pointer; white-space: nowrap;
    font-family: inherit;
  }
  .jobs-page .filter-pill:hover { color: var(--ink); }
  .jobs-page .filter-pill.active {
    background: var(--surface); color: var(--ink); font-weight: 600;
    box-shadow: 0 1px 2px rgba(13,31,53,.08);
  }
  .jobs-page .filter-count {
    margin-left: 5px; font-size: 11px; opacity: .7;
    font-variant-numeric: tabular-nums;
  }
  .jobs-page .filter-pill.active .filter-count { opacity: .9; }

  .jobs-page .search {
    flex: 1; min-width: 220px; max-width: 360px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0 12px;
  }
  .jobs-page .search:focus-within { border-color: var(--ink); }
  .jobs-page .search svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
  .jobs-page .search input {
    flex: 1; background: transparent; border: 0; outline: none;
    height: 36px; padding: 0;
    font-family: inherit; font-size: 14px; color: var(--ink);
  }
  .jobs-page .search input::placeholder { color: var(--muted); }

  .jobs-page .visible-count {
    font-size: 12px; color: var(--muted);
    margin-left: auto;
  }

  /* Jobs list */
  .jobs-page .jobs-list {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .jobs-page .job-row {
    display: grid;
    grid-template-columns: 1fr 56px;
    grid-template-areas:
      "ref   pct"
      "name  pct"
      "pbar  pbar"
      "stats stats";
    column-gap: 16px; row-gap: 4px;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    text-decoration: none; color: inherit;
    transition: background .12s;
  }
  .jobs-page .job-row:last-child { border-bottom: 0; }
  .jobs-page .job-row:hover  { background: var(--surface-2); }
  .jobs-page .job-row:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; }
  .jobs-page .job-row.cur {
    background: var(--surface-2);
    border-left: 3px solid var(--accent);
    padding-left: 15px;
  }
  .jobs-page .job-row .ref {
    grid-area: ref;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; color: var(--muted);
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
  }
  .jobs-page .job-row .ref b { color: var(--ink-2); font-weight: 600; }
  .jobs-page .job-row .nm {
    grid-area: name;
    font-size: 16px; font-weight: 600;
    line-height: 1.25; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .jobs-page .job-row .pct {
    grid-area: pct;
    align-self: start;
    font-size: 22px; font-weight: 700;
    letter-spacing: -.4px; line-height: 1;
    color: var(--ink); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .jobs-page .job-row .pct.muted { color: var(--muted); }
  .jobs-page .job-row .pbar {
    grid-area: pbar;
    height: 4px; background: var(--surface-2);
    border-radius: 999px; overflow: hidden;
    margin-top: 8px;
  }
  .jobs-page .job-row .pbar i {
    display: block; height: 100%; background: var(--ink);
    border-radius: 999px;
  }
  .jobs-page .job-row.cur .pbar i { background: var(--accent); }
  .jobs-page .job-row .stats {
    grid-area: stats;
    display: flex; flex-wrap: wrap; gap: 14px;
    font-size: 12px; color: var(--muted);
    margin-top: 6px;
  }
  .jobs-page .job-row .stats span { display: inline-flex; align-items: baseline; gap: 4px; }
  .jobs-page .job-row .stats b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
  .jobs-page .job-row .stats .red,
  .jobs-page .job-row .stats .red b { color: var(--bad); }
  .jobs-page .job-row .stats .green,
  .jobs-page .job-row .stats .green b { color: var(--ok); }
  .jobs-page .job-row .stats .pill {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 999px;
    background: var(--surface-2); color: var(--ink-2);
  }
  .jobs-page .job-row .stats .pill.cur { background: var(--accent); color: #2a1a05; }
  .jobs-page .job-row .stats .pill.complete { background: rgba(31,138,76,.12); color: var(--ok); }
  .jobs-page .job-row .stats .pill.archived { background: var(--surface-2); color: var(--muted); }
  .jobs-page .job-row .stats .pill.bad { background: rgba(179,38,30,.12); color: var(--bad); }

  .jobs-page .job-row .stats a {
    color: inherit; text-decoration: none;
    border-bottom: 1px dashed currentColor;
  }

  /* Empty state */
  .jobs-page .empty-state {
    background: var(--surface);
    border: 1px dashed var(--line-2);
    border-radius: 10px;
    padding: 36px 20px; text-align: center;
    font-size: 14px; color: var(--muted);
  }
  .jobs-page .empty-state b { color: var(--ink); font-weight: 600; }
  .jobs-page .empty-state a {
    color: var(--ink); font-weight: 600;
    text-decoration: underline;
  }

  @media (max-width: 540px) {
    .jobs-page { padding: 16px 14px 24px; }
    .jobs-page .head h1 { font-size: 22px; }
    .jobs-page .job-row { padding: 12px 14px 10px; }
    .jobs-page .job-row.cur { padding-left: 11px; }
    .jobs-page .job-row .nm { font-size: 15px; }
    .jobs-page .job-row .pct { font-size: 20px; }
    .jobs-page .job-row .stats { font-size: 11.5px; gap: 10px; }
  }
</style>
</head>
<body>
<header class="app-header">
  <div class="hdr-left">
    <a href="/jobs" class="wordmark hdr-mark" aria-label="BuhlOS — jobs">b&uuml;hl<span class="os">OS</span></a>
    <a class="nav-pill" id="myDayLink" href="/my-day" style="display:none">My Day</a>
    <a class="nav-pill" id="ovLink" href="/admin/operations" style="display:none">Operations</a>
    <a class="nav-pill active" href="/jobs">Jobs</a>
    <a class="nav-pill" id="approvalsLink" href="/admin/approvals" style="display:none">Approvals</a>
    <a class="nav-pill" id="adminLink" href="/admin" style="display:none">Admin</a>
  </div>
  <div class="hdr-right">
    <span class="me" id="me"></span>
    <button class="btn ghost" id="logout">Sign out</button>
  </div>
</header>

<div class="jobs-page">
  <div class="head">
    <div>
      <h1>Your jobs</h1>
      <div class="sub"><b id="jobs-active-count">0</b> active · <b id="jobs-snags-count">0</b> open snags · tap any row to open</div>
    </div>
  </div>

  <div class="controls">
    <div class="filter-bar" id="jobs-filter-bar"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input type="search" placeholder="Search by name or ref" id="job-search" autocomplete="off">
    </div>
    <span class="visible-count"><b id="job-count">…</b> visible</span>
  </div>

  <div id="list"></div>
</div>

<script>
let allJobs = [];
let jobTypes = {};       // id -> { name }
let currentUser = null;
let jobStatusFilter = 'active'; // active | all | complete | archived
let jobSearchQuery  = '';

async function load() {
  const meRes = await fetch('/api/auth?action=me', { credentials: 'same-origin' });
  if (!meRes.ok) { location.href = '/login'; return; }
  const { user } = await meRes.json();
  currentUser = user;

  const roleLabel = { admin: 'Admin', leadingHand: 'Leading Hand', tradie: 'Tradie' }[user.role] || '';
  document.getElementById('me').textContent = roleLabel ? (user.username + ' · ' + roleLabel) : user.username;

  if (user.role === 'admin' || user.role === 'leadingHand') {
    document.getElementById('ovLink').style.display = 'inline-flex';
    document.getElementById('approvalsLink').style.display = 'inline-flex';
    const al = document.getElementById('adminLink');
    al.style.display = 'inline-flex';
    if (user.role === 'leadingHand') al.textContent = 'Job Setup';
  } else if (user.role === 'tradie') {
    document.getElementById('myDayLink').style.display = 'inline-flex';
  }

  const [jobsRes, typesRes] = await Promise.all([
    fetch('/api/jobs?withStats=1', { credentials: 'same-origin' }),
    fetch('/api/job-types', { credentials: 'same-origin' }).catch(() => null),
  ]);
  const { jobs } = await jobsRes.json();
  allJobs = jobs || [];
  if (typesRes && typesRes.ok) {
    try {
      const td = await typesRes.json();
      (td.jobTypes || td.types || []).forEach(t => { jobTypes[t.id] = t; });
    } catch (e) { /* tolerate missing endpoint */ }
  }

  // Clients always land on the dedicated client portal.
  if (user.role === 'client') {
    location.replace('/client');
    return;
  }

  // For 1-job tradies, default the filter to "all" so a complete/archived
  // single job still shows.
  if (allJobs.length <= 1) jobStatusFilter = 'all';

  renderFilters();
  applyView();
}

function renderFilters() {
  const bar = document.getElementById('jobs-filter-bar');
  if (!bar) return;
  if (allJobs.length <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = '';
  const counts = {
    active:    allJobs.filter(j => (j.status || 'active') === 'active').length,
    complete:  allJobs.filter(j => j.status === 'complete').length,
    archived:  allJobs.filter(j => j.status === 'archived').length,
    all:       allJobs.length,
  };
  const opts = [
    { id: 'active',   label: 'Active',   c: counts.active   },
    { id: 'all',      label: 'All',      c: counts.all      },
    { id: 'complete', label: 'Complete', c: counts.complete },
    { id: 'archived', label: 'Archived', c: counts.archived },
  ].filter(o => o.id === 'active' || o.id === 'all' || o.c > 0);
  bar.innerHTML = opts.map(o =>
    `<button class="filter-pill${o.id === jobStatusFilter ? ' active' : ''}" data-st="${o.id}">${o.label}<span class="filter-count">${o.c}</span></button>`
  ).join('');
  bar.querySelectorAll('[data-st]').forEach(btn => {
    btn.onclick = () => { jobStatusFilter = btn.dataset.st; renderFilters(); applyView(); };
  });
}

function applyView() {
  const q = jobSearchQuery.trim().toLowerCase();
  const filtered = allJobs.filter(j => {
    const status = j.status || 'active';
    if (jobStatusFilter !== 'all' && status !== jobStatusFilter) return false;
    if (!q) return true;
    return (j.name || '').toLowerCase().includes(q) || (j.id || '').toLowerCase().includes(q);
  });
  renderJobs(filtered, currentUser);
}

function resolveTypeName(j) {
  if (j.typeName) return j.typeName;
  if (j.type && jobTypes[j.type]) return jobTypes[j.type].name;
  return '';
}

function shortRef(j) {
  return (j.ref || j.shortRef || j.id || '').toUpperCase();
}

function renderJobs(jobs, user) {
  const count = jobs.length;
  document.getElementById('job-count').textContent = count === 1 ? '1' : count;

  const totalActive = allJobs.filter(j => (j.status||'active')==='active').length;
  const totalSnags  = allJobs.reduce((s,j) => s + Number(j.statsOpenSnags || 0), 0);
  document.getElementById('jobs-active-count').textContent = totalActive;
  document.getElementById('jobs-snags-count').textContent  = totalSnags;

  const list = document.getElementById('list');
  if (!jobs.length) {
    const role = (user && user.role) || (currentUser && currentUser.role);
    const msg = role === 'admin'       ? 'No jobs yet.'
              : role === 'leadingHand' ? 'No jobs assigned yet.'
              : role === 'client'      ? 'No jobs visible to your account yet.'
              : 'No jobs assigned to you yet.';
    const hint = role === 'admin'
      ? ' <a href="/admin/jobs">Create one →</a>'
      : role === 'leadingHand'
      ? ' Ask an admin to assign you.'
      : '';
    list.innerHTML = `<div class="empty-state">${msg}${hint}</div>`;
    return;
  }

  // Rank: active first, then % desc, then stale.
  jobs = jobs.slice().sort((a,b) => {
    const sa = (a.status||'active') === 'active' ? 0 : 1;
    const sb = (b.status||'active') === 'active' ? 0 : 1;
    if (sa !== sb) return sa - sb;
    const pa = typeof a.statsPct === 'number' ? a.statsPct : -1;
    const pb = typeof b.statsPct === 'number' ? b.statsPct : -1;
    return pb - pa;
  });

  const isAdminLH = currentUser && (currentUser.role === 'admin' || currentUser.role === 'leadingHand');
  let html = `<div class="jobs-list">`;
  jobs.forEach(j => {
    const st = j.status || 'active';
    const typeName = resolveTypeName(j);
    const ref      = shortRef(j);
    const pct      = (typeof j.statsPct === 'number') ? j.statsPct : null;
    const sn       = Number(j.statsOpenSnags || 0);
    const dw       = Number(j.statsDwellingCount || (Array.isArray(j.dwellings) ? j.dwellings.length : 0));
    const crew     = Number(j.statsCrewCount || 0);
    const expired  = Number(j.statsExpiredTags  || 0);
    const expiring = Number(j.statsExpiringTags || 0);

    const statusLabel = { active: 'Active', complete: 'Complete', archived: 'Archived' }[st] || st;
    const pillCls = (j.isCurrent ? 'cur' : (st === 'complete' ? 'complete' : st === 'archived' ? 'archived' : ''));

    const stats = [
      dw > 0 ? `<span><b>${dw}</b> dwelling${dw === 1 ? '' : 's'}</span>` : '',
      sn > 0
        ? `<span class="red"><b>${sn}</b> open snag${sn === 1 ? '' : 's'}</span>`
        : `<span><b>0</b> snags</span>`,
      isAdminLH && crew > 0 ? `<span><b>${crew}</b> crew</span>` : '',
      expired > 0
        ? `<span class="red"><b>${expired}</b> tag${expired === 1 ? '' : 's'} expired</span>`
        : (expiring > 0 ? `<span><b>${expiring}</b> tag${expiring === 1 ? '' : 's'} due</span>` : ''),
      typeName ? `<span>${esc(typeName)}</span>` : '',
      `<span class="pill ${pillCls}">${j.isCurrent ? 'Current' : statusLabel}</span>`,
    ].filter(Boolean).join('');

    const goJob = `location.href='/jobs/${esc(j.id)}'`;
    html += `<div class="job-row${j.isCurrent ? ' cur' : ''}" role="link" tabindex="0"
        onclick="${goJob}" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${goJob}}">
      <div class="ref"><b>${esc(ref)}</b>${j.location ? ' · ' + esc(j.location) : ''}</div>
      <div class="nm">${esc(j.name)}</div>
      <div class="pct${pct === null ? ' muted' : ''}">${pct === null ? '—' : pct + '%'}</div>
      <div class="pbar"><i style="width:${Math.max(0, Math.min(100, pct||0))}%"></i></div>
      <div class="stats">${stats}</div>
    </div>`;
  });
  html += `</div>`;
  list.innerHTML = html;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/auth?action=logout', { method: 'POST', credentials: 'same-origin' });
  location.href = '/login';
});

document.getElementById('job-search').addEventListener('input', function () {
  jobSearchQuery = this.value;
  applyView();
});

load();
</script>
</body>
</html>
