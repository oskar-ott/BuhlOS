<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — jobs</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<meta name="theme-color" content="#0d1f35">
<script src="/mobile-nav.js" defer></script>
<script src="/install-prompt.js" defer></script>
<script src="/lib/approvals-badge.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* /jobs picker — rebuilt to match the mobile UX brief's system rules:
       - Backgrounds stay near-white (#fafaf7); tinting comes from status
       - Navy only for chrome; yellow only for the single primary action
       - Inter for UI; IBM Plex Mono only for tabular numbers
       - Status colours: green (done), amber (in progress), red (snagged), grey (not started)
       - Min 44pt tap targets; 56pt for primary
     The decorative "Sheet 03" drafting chrome (FIG. 05 / SHEET / serif
     italics / project-screen-user-sync footer) is intentionally gone —
     this is a worker entry point, not a printable cover. */
  :root {
    --bg:        #fafaf7;
    --surface:   #ffffff;
    --surface-2: #f4f4ef;
    --ink:       #0c1623;
    --ink-2:     #33425a;
    --muted:     #6a778b;
    --line:      #e3e5dc;
    --line-2:    #d8dad0;
    --navy:      #0d1f35;
    --yellow:    #f5c518;
    --yellow-ink:#2a1a05;
    --ok:        #16a34a;
    --warn:      #f59e0b;
    --bad:       #dc2626;
    --info:      #21507a;
    --r:         10px;
    --r-sm:      6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11"}
  a{color:inherit;text-decoration:none}
  button,input,select{font:inherit;color:inherit}
  .mono{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}

  /* ── Topbar — compact navy strip with the wordmark + sign-out ────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 12px;
    padding: max(env(safe-area-inset-top), 10px) 18px 10px;
    background: var(--navy); color: #fff;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .brand { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: -.2px; font-size: 16px; line-height: 1; }
  .brand-mark {
    width: 24px; height: 24px; display: grid; place-items: center;
    background: var(--yellow); color: var(--navy);
    font-weight: 800; font-size: 15px; border-radius: 5px;
    font-family: Georgia, "Times New Roman", serif; letter-spacing: -1px;
  }
  .brand small { font-weight: 400; opacity: .55; font-size: 10px; letter-spacing: .4px; text-transform: uppercase; margin-left: 6px; }
  .top-spacer { flex: 1; }
  .nav-pill {
    display: inline-flex; align-items: center; height: 32px;
    padding: 0 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,.7);
    border: 1px solid rgba(255,255,255,.14);
    background: transparent;
    transition: background .12s, color .12s;
  }
  .nav-pill:hover { color: #fff; background: rgba(255,255,255,.08); }
  .nav-pill.active { color: var(--yellow-ink); background: var(--yellow); border-color: var(--yellow); }
  .top-me { font-size: 12px; color: rgba(255,255,255,.65); white-space: nowrap; }
  .top-out {
    appearance: none; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14);
    color: #fff; border-radius: 8px; padding: 6px 10px;
    font-size: 12px; font-weight: 600; cursor: pointer; min-height: 32px;
  }
  .top-out:hover { background: rgba(255,255,255,.14); }
  @media (max-width: 480px) {
    .topbar { padding-left: 14px; padding-right: 14px; gap: 8px; }
    .top-me { display: none; }
    .nav-pill { padding: 0 10px; font-size: 11px; height: 28px; }
  }

  /* ── Page body ───────────────────────────────────────────────────── */
  .page { max-width: 720px; margin: 0 auto; padding: 18px clamp(14px, 4vw, 24px) 60px; }

  .head { margin-bottom: 16px; }
  .h1 { font-size: clamp(22px, 4.4vw, 26px); font-weight: 700; letter-spacing: -.3px; line-height: 1.15; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--muted); }
  .sub b { color: var(--ink); font-weight: 600; }

  /* Controls row — search + filter chips */
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 14px;
  }
  .search {
    flex: 1; min-width: 220px; max-width: 360px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--r);
    padding: 0 12px; height: 40px;
  }
  .search:focus-within { border-color: var(--ink); }
  .search svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
  .search input { flex: 1; border: 0; outline: none; background: transparent; height: 100%; font-size: 14px; }
  .search input::placeholder { color: var(--muted); }
  .filter-bar {
    display: inline-flex; gap: 4px; padding: 3px;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r);
  }
  .filter-pill {
    appearance: none; background: transparent; border: 0;
    padding: 6px 12px; min-height: 34px;
    border-radius: var(--r-sm);
    font-size: 12px; font-weight: 500; color: var(--muted);
    white-space: nowrap; cursor: pointer;
  }
  .filter-pill:hover { color: var(--ink); }
  .filter-pill.active {
    background: var(--surface); color: var(--ink); font-weight: 600;
    box-shadow: 0 1px 2px rgba(13,31,53,.06);
  }
  .filter-count {
    margin-left: 5px; font-size: 11px; opacity: .7;
    font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums;
  }
  .filter-pill.active .filter-count { opacity: .85; }
  .visible-count { margin-left: auto; font-size: 12px; color: var(--muted); }

  /* ── Jobs list ──────────────────────────────────────────────────── */
  .jobs-list {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
  }
  .job-row {
    display: grid;
    grid-template-columns: 4px 1fr auto;
    grid-template-areas:
      "stripe ref     pct"
      "stripe name    pct"
      "stripe meta    chev";
    column-gap: 12px; row-gap: 2px;
    padding: 14px 16px 12px 12px;
    border-bottom: 1px solid var(--line);
    cursor: pointer; text-decoration: none; color: inherit;
    min-height: 76px;
    transition: background .12s;
  }
  .job-row:last-child { border-bottom: 0; }
  .job-row:hover { background: var(--surface-2); }
  .job-row:focus-visible { outline: 2px solid var(--navy); outline-offset: -2px; }
  .job-row.cur { background: var(--surface-2); }

  /* State colour stripe — design brief moves[2]: "row colour stripe per
     state" (red snagged / amber in-progress / green done / grey other) */
  .stripe { grid-area: stripe; align-self: stretch; border-radius: 3px; background: var(--line-2); width: 4px; }
  .stripe.red    { background: var(--bad); }
  .stripe.amber  { background: var(--warn); }
  .stripe.green  { background: var(--ok); }
  .stripe.cur    { background: var(--yellow); }

  .ref {
    grid-area: ref;
    font-family: "IBM Plex Mono", monospace; font-size: 11px;
    color: var(--muted); letter-spacing: .04em;
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
  }
  .ref b { color: var(--ink-2); font-weight: 600; }
  .name {
    grid-area: name;
    font-size: 16px; font-weight: 600; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pct {
    grid-area: pct;
    align-self: start; padding-top: 2px;
    font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums;
    font-size: 22px; font-weight: 700; letter-spacing: -.4px; line-height: 1;
    text-align: right; min-width: 56px;
  }
  .pct.muted { color: var(--muted); }
  .meta {
    grid-area: meta;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--muted);
  }
  .meta span { display: inline-flex; align-items: center; gap: 4px; }
  .meta b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
  .meta .red, .meta .red b { color: var(--bad); }
  .meta .green, .meta .green b { color: var(--ok); }

  /* Status pill (right-aligned in meta row) */
  .status-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: var(--surface-2); color: var(--ink-2);
  }
  .status-pill.cur      { background: var(--yellow); color: var(--yellow-ink); }
  .status-pill.complete { background: rgba(22,163,74,.12); color: var(--ok); }
  .status-pill.archived { color: var(--muted); }

  .chev {
    grid-area: chev;
    align-self: end; color: var(--muted);
    font-size: 18px; line-height: 1;
  }

  /* Empty state */
  .empty {
    background: var(--surface);
    border: 1px dashed var(--line-2);
    border-radius: var(--r);
    padding: 32px 20px; text-align: center;
    font-size: 14px; color: var(--muted);
  }
  .empty b { color: var(--ink); font-weight: 600; }
  .empty a { color: var(--ink); font-weight: 600; text-decoration: underline; }

  @media (max-width: 480px) {
    .page { padding-bottom: 40px; }
    .controls { gap: 8px; }
    .visible-count { width: 100%; text-align: right; }
    .name { font-size: 15px; }
    .pct { font-size: 20px; min-width: 50px; }
    .meta { font-size: 12px; gap: 10px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="brand" href="/jobs" aria-label="BuhlOS — jobs">
    <span class="brand-mark">b</span>
    <span>bühl<small>electrical</small></span>
  </a>
  <a class="nav-pill" id="myDayLink" href="/my-day" style="display:none">My Day</a>
  <a class="nav-pill" id="ovLink" href="/admin/operations" style="display:none">Operations</a>
  <a class="nav-pill active" href="/jobs">Jobs</a>
  <a class="nav-pill" id="approvalsLink" href="/admin/approvals" style="display:none">Approvals</a>
  <a class="nav-pill" id="adminLink" href="/admin" style="display:none">Admin</a>
  <span class="top-spacer"></span>
  <span class="top-me" id="me"></span>
  <button class="top-out" id="logout">Sign out</button>
</header>

<div class="page">
  <div class="head">
    <h1 class="h1">Your jobs</h1>
    <div class="sub"><b id="jobs-active-count">0</b> active · <b id="jobs-snags-count">0</b> open snags · tap any row to open</div>
  </div>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input type="search" id="job-search" placeholder="Search by name or ref" autocomplete="off">
    </div>
    <div class="filter-bar" id="jobs-filter-bar"></div>
    <span class="visible-count"><b id="job-count" class="mono">…</b> visible</span>
  </div>

  <div id="list"></div>
</div>

<script>
let allJobs = [];
let jobTypes = {};
let currentUser = null;
let jobStatusFilter = 'active';
let jobSearchQuery = '';

async function load() {
  const meRes = await fetch('/api/auth?action=me', { credentials: 'same-origin' });
  if (!meRes.ok) { location.href = '/login'; return; }
  const { user } = await meRes.json();
  currentUser = user;

  const roleLabel = { admin: 'Admin', leadingHand: 'Leading hand', tradie: 'Tradie' }[user.role] || '';
  document.getElementById('me').textContent = roleLabel ? (user.username + ' · ' + roleLabel) : user.username;

  if (user.role === 'admin' || user.role === 'leadingHand') {
    document.getElementById('ovLink').style.display = 'inline-flex';
    document.getElementById('approvalsLink').style.display = 'inline-flex';
    const al = document.getElementById('adminLink');
    al.style.display = 'inline-flex';
    if (user.role === 'leadingHand') al.textContent = 'Job Setup';
  } else if (user.role === 'tradie') {
    document.getElementById('myDayLink').style.display = 'inline-flex';
  }

  const [jobsRes, typesRes] = await Promise.all([
    fetch('/api/jobs?withStats=1', { credentials: 'same-origin' }),
    fetch('/api/job-types', { credentials: 'same-origin' }).catch(() => null),
  ]);
  const { jobs } = await jobsRes.json();
  allJobs = jobs || [];
  if (typesRes && typesRes.ok) {
    try {
      const td = await typesRes.json();
      (td.jobTypes || td.types || []).forEach(t => { jobTypes[t.id] = t; });
    } catch {}
  }

  if (user.role === 'client') { location.replace('/client'); return; }

  if (allJobs.length <= 1) jobStatusFilter = 'all';

  renderFilters();
  applyView();
}

function renderFilters() {
  const bar = document.getElementById('jobs-filter-bar');
  if (!bar) return;
  if (allJobs.length <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = '';
  const counts = {
    active:    allJobs.filter(j => (j.status || 'active') === 'active').length,
    complete:  allJobs.filter(j => j.status === 'complete').length,
    archived:  allJobs.filter(j => j.status === 'archived').length,
    all:       allJobs.length,
  };
  const opts = [
    { id: 'active',   label: 'Active',   c: counts.active   },
    { id: 'all',      label: 'All',      c: counts.all      },
    { id: 'complete', label: 'Complete', c: counts.complete },
    { id: 'archived', label: 'Archived', c: counts.archived },
  ].filter(o => o.id === 'active' || o.id === 'all' || o.c > 0);
  bar.innerHTML = opts.map(o =>
    `<button class="filter-pill${o.id === jobStatusFilter ? ' active' : ''}" data-st="${o.id}">${o.label}<span class="filter-count">${o.c}</span></button>`
  ).join('');
  bar.querySelectorAll('[data-st]').forEach(btn => {
    btn.onclick = () => { jobStatusFilter = btn.dataset.st; renderFilters(); applyView(); };
  });
}

function applyView() {
  const q = jobSearchQuery.trim().toLowerCase();
  const filtered = allJobs.filter(j => {
    const status = j.status || 'active';
    if (jobStatusFilter !== 'all' && status !== jobStatusFilter) return false;
    if (!q) return true;
    return (j.name || '').toLowerCase().includes(q) || (j.id || '').toLowerCase().includes(q);
  });
  renderJobs(filtered, currentUser);
}

function resolveTypeName(j) {
  if (j.typeName) return j.typeName;
  if (j.type && jobTypes[j.type]) return jobTypes[j.type].name;
  return '';
}
function shortRef(j) { return (j.ref || j.shortRef || j.id || '').toUpperCase(); }
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function stripeClass(j, isAdminLH) {
  if (j.isCurrent) return 'cur';
  const sn = Number(j.statsOpenSnags || 0);
  if (sn > 0 && isAdminLH) return 'red';
  const pct = Number(j.statsPct);
  if (Number.isFinite(pct) && pct >= 100) return 'green';
  if (Number.isFinite(pct) && pct > 0) return 'amber';
  return '';
}

function renderJobs(jobs, user) {
  const count = jobs.length;
  document.getElementById('job-count').textContent = count;

  const totalActive = allJobs.filter(j => (j.status||'active')==='active').length;
  const totalSnags  = allJobs.reduce((s,j) => s + Number(j.statsOpenSnags || 0), 0);
  document.getElementById('jobs-active-count').textContent = totalActive;
  document.getElementById('jobs-snags-count').textContent  = totalSnags;

  const list = document.getElementById('list');
  if (!jobs.length) {
    const role = (user && user.role) || (currentUser && currentUser.role);
    const msg = role === 'admin'       ? 'No jobs yet.'
              : role === 'leadingHand' ? 'No jobs assigned yet.'
              : role === 'client'      ? 'No jobs visible to your account yet.'
              : 'No jobs assigned to you yet.';
    const hint = role === 'admin'
      ? ' <a href="/admin/jobs">Create one →</a>'
      : role === 'leadingHand'
      ? ' Ask an admin to assign you.'
      : '';
    list.innerHTML = `<div class="empty">${msg}${hint}</div>`;
    return;
  }

  // Rank: active first, then current job hoisted to top, then % desc.
  jobs = jobs.slice().sort((a, b) => {
    const sa = (a.status || 'active') === 'active' ? 0 : 1;
    const sb = (b.status || 'active') === 'active' ? 0 : 1;
    if (sa !== sb) return sa - sb;
    if (a.isCurrent && !b.isCurrent) return -1;
    if (b.isCurrent && !a.isCurrent) return 1;
    const pa = typeof a.statsPct === 'number' ? a.statsPct : -1;
    const pb = typeof b.statsPct === 'number' ? b.statsPct : -1;
    return pb - pa;
  });

  const isAdminLH = currentUser && (currentUser.role === 'admin' || currentUser.role === 'leadingHand');
  let html = `<div class="jobs-list">`;
  jobs.forEach(j => {
    const st = j.status || 'active';
    const typeName = resolveTypeName(j);
    const ref = shortRef(j);
    const pct = (typeof j.statsPct === 'number') ? j.statsPct : null;
    const sn  = Number(j.statsOpenSnags || 0);
    const dw  = Number(j.statsDwellingCount || (Array.isArray(j.dwellings) ? j.dwellings.length : 0));
    const crew = Number(j.statsCrewCount || 0);
    const expired  = Number(j.statsExpiredTags  || 0);
    const expiring = Number(j.statsExpiringTags || 0);
    const stCls = stripeClass(j, isAdminLH);
    const statusLabel = j.isCurrent ? 'Current' : ({ active: 'Active', complete: 'Complete', archived: 'Archived' }[st] || st);
    const pillCls = j.isCurrent ? 'cur' : (st === 'complete' ? 'complete' : st === 'archived' ? 'archived' : '');

    const meta = [
      dw > 0 ? `<span><b>${dw}</b> ${dw === 1 ? 'dwelling' : 'dwellings'}</span>` : '',
      sn > 0
        ? `<span class="red"><b>${sn}</b> open ${sn === 1 ? 'snag' : 'snags'}</span>`
        : `<span><b class="mono">0</b> snags</span>`,
      isAdminLH && crew > 0 ? `<span><b>${crew}</b> crew</span>` : '',
      expired > 0
        ? `<span class="red"><b>${expired}</b> ${expired === 1 ? 'tag' : 'tags'} expired</span>`
        : (expiring > 0 ? `<span><b>${expiring}</b> ${expiring === 1 ? 'tag' : 'tags'} due</span>` : ''),
      typeName ? `<span>${esc(typeName)}</span>` : '',
      `<span class="status-pill ${pillCls}">${statusLabel}</span>`,
    ].filter(Boolean).join('');

    const goJob = `location.href='/jobs/${esc(j.id)}'`;
    html += `<div class="job-row${j.isCurrent ? ' cur' : ''}" role="link" tabindex="0"
        onclick="${goJob}" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${goJob}}">
      <div class="stripe ${stCls}"></div>
      <div class="ref"><b class="mono">${esc(ref)}</b>${j.location ? ' · ' + esc(j.location) : ''}</div>
      <div class="name">${esc(j.name)}</div>
      <div class="pct mono${pct === null ? ' muted' : ''}">${pct === null ? '—' : pct + '%'}</div>
      <div class="meta">${meta}</div>
      <div class="chev">›</div>
    </div>`;
  });
  html += `</div>`;
  list.innerHTML = html;
}

document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/auth?action=logout', { method: 'POST', credentials: 'same-origin' });
  location.href = '/login';
});

document.getElementById('job-search').addEventListener('input', function () {
  jobSearchQuery = this.value;
  applyView();
});

load();
</script>
</body>
</html>
