<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — sign in</title>
<link rel="stylesheet" href="/theme.css">
<style>
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  .wrap { flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .login-card { width: 100%; max-width: 360px; }
  .logo-block { text-align: center; margin-bottom: 20px; }
  .logo-block img { max-width: 120px; height: auto; }
  h1 { margin: 0 0 4px; font-size: var(--fs-xl); font-weight: 700; text-align: center; }
  .sub { margin: 0 0 24px; color: var(--muted); text-align: center; font-size: var(--fs-sm); }
  .field { margin-bottom: 4px; }
  .login-btn { width: 100%; margin-top: 20px; }
  .err { margin-top: 12px; color: var(--danger); font-size: var(--fs-sm);
         text-align: center; min-height: 18px; }
  .hint { margin-top: 14px; color: var(--muted); font-size: var(--fs-xs); text-align: center; }
</style>
</head>
<body>
<div class="page">
  <header class="app-header">
    <img src="/BUHL_LOGO.png" class="logo" alt="buhl electrical" onerror="this.style.display='none'">
  </header>
  <div class="wrap">
    <form class="card login-card" id="f">
      <div class="logo-block">
        <img src="/BUHL_LOGO.png" alt="buhl" onerror="this.style.display='none'">
      </div>
      <h1>Sign in</h1>
      <p class="sub">buhl electrical job management</p>
      <div class="field">
        <label for="u">Username</label>
        <input id="u" name="username" autocomplete="username"
               autocapitalize="none" autocorrect="off" required>
      </div>
      <div class="field">
        <label for="p">Password or PIN</label>
        <input id="p" name="secret" type="password"
               inputmode="numeric" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn primary login-btn" id="btn">Sign in</button>
      <div class="err" id="err"></div>
      <div class="hint">Enter your PIN or password.</div>
    </form>
  </div>
</div>
<script>
const f = document.getElementById('f');
const err = document.getElementById('err');
const btn = document.getElementById('btn');
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('u').value.trim(),
        secret: document.getElementById('p').value,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Sign in failed');
    location.href = '/jobs';
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
fetch('/api/auth?action=me', { credentials: 'same-origin' })
  .then(r => r.ok ? r.json() : null)
  .then(d => { if (d && d.user) location.href = '/jobs'; })
  .catch(() => {});
</script>
</body>
</html>
