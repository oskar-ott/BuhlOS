<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — sign in</title>
<link rel="stylesheet" href="/theme.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<meta name="theme-color" content="#0d1b34">
<style>
  body { background: var(--paper-2); }
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  .wrap { flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px 16px; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .login-card {
    width: 100%; max-width: 400px;
    padding: 32px 28px 28px;
    border: 1px solid var(--rule);
    background: var(--paper);
  }
  .login-mark {
    display: flex; align-items: baseline; gap: .04em;
    font-family: var(--display); font-weight: 800;
    font-size: 56px; line-height: 1; letter-spacing: -.034em;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .login-mark .os { font-size: .35em; font-weight: 600; color: var(--ink-2); letter-spacing: -.014em; }
  .login-mark .dot { width: 7px; height: 7px; border-radius: 50%;
    background: var(--yellow); margin-left: .15em; align-self: end; margin-bottom: .2em;
    box-shadow: 0 0 0 3px rgba(245,208,32,.18); }
  .login-strap {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 28px;
  }
  .login-card label {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
    margin-bottom: 6px;
  }
  .login-card input { min-height: 44px; font-size: 16px;
    border-radius: var(--radius); border: 1px solid var(--rule-2); }
  .login-card input:focus { border-color: var(--navy); outline: 2px solid var(--yellow); outline-offset: -1px; }
  .login-btn { width: 100%; min-height: 48px; margin-top: 16px;
    font-family: var(--display); font-size: 14px; font-weight: 700;
    letter-spacing: -.012em; }
  .err { margin-top: 12px; color: var(--red); font-size: var(--fs-sm);
         text-align: center; min-height: 18px; }
  .login-foot {
    margin-top: 22px; padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3); text-align: center;
  }
</style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <form class="card login-card" id="f">
      <div class="login-mark">b&uuml;hl<span class="os">OS</span><span class="dot"></span></div>
      <div class="login-strap">field-ready · sign in</div>
      <div class="field">
        <label for="u">Username</label>
        <input id="u" name="username" autocomplete="username"
               autocapitalize="none" autocorrect="off" required>
      </div>
      <div class="field">
        <label for="p">Password or PIN</label>
        <input id="p" name="secret" type="password"
               inputmode="numeric" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn primary login-btn" id="btn">Sign in</button>
      <div class="err" id="err"></div>
      <div class="login-foot">b&uuml;hl electrical · internal</div>
    </form>
  </div>
</div>
<script>
const f = document.getElementById('f');
const err = document.getElementById('err');
const btn = document.getElementById('btn');
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('u').value.trim(),
        secret: document.getElementById('p').value,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Sign in failed');
    const role = j.user && j.user.role;
    location.href = landingFor(role);
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
function landingFor(role) {
  if (role === 'admin' || role === 'leadingHand') return '/overview';
  if (role === 'tradie') return '/my-day';
  return '/jobs';
}
fetch('/api/auth?action=me', { credentials: 'same-origin' })
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    if (d && d.user) {
      location.href = landingFor(d.user.role);
    }
  })
  .catch(() => {});
</script>
</body>
</html>
