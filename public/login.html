<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — sign in</title>
<link rel="stylesheet" href="/theme.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<meta name="theme-color" content="#0d1f35">
<style>
  .page { min-height: 100vh; display: flex; flex-direction: column; }
  .wrap { flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px 16px; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .login-card { width: 100%; max-width: 400px; }
  .login-logo { display: block; margin: 0 auto 24px; max-width: 160px; height: auto; }
  .login-card input { min-height: 44px; font-size: 16px; }
  .login-btn { width: 100%; min-height: 44px; margin-top: 8px; }
  .err { margin-top: 12px; color: var(--danger); font-size: var(--fs-sm);
         text-align: center; min-height: 18px; }
</style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <form class="card login-card" id="f">
      <img src="/BUHL_LOGO.png" class="login-logo" alt="buhl electrical" onerror="this.style.display='none'">
      <div class="field">
        <label for="u">Username</label>
        <input id="u" name="username" autocomplete="username"
               autocapitalize="none" autocorrect="off" required>
      </div>
      <div class="field">
        <label for="p">Password or PIN</label>
        <input id="p" name="secret" type="password"
               inputmode="numeric" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn primary login-btn" id="btn">Sign in</button>
      <div class="err" id="err"></div>
    </form>
  </div>
</div>
<script>
const f = document.getElementById('f');
const err = document.getElementById('err');
const btn = document.getElementById('btn');
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('u').value.trim(),
        secret: document.getElementById('p').value,
      }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Sign in failed');
    const role = j.user && j.user.role;
    location.href = landingFor(role);
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
function landingFor(role) {
  if (role === 'admin' || role === 'leadingHand') return '/overview';
  if (role === 'tradie') return '/my-day';
  return '/jobs';
}
fetch('/api/auth?action=me', { credentials: 'same-origin' })
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    if (d && d.user) {
      location.href = landingFor(d.user.role);
    }
  })
  .catch(() => {});
</script>
</body>
</html>
