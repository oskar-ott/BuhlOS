<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · today</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
window.PAGE = {
  id: 'today',
  title: 'Today',
  crumb: 'Today',

  async render() {
    const me = SHELL.ME;
    const C  = SHELL.COUNTS || {};
    const jobs = SHELL.JOBS || [];
    const pending = SHELL.PENDING_ENTRIES || [];
    const snags = SHELL.OPEN_SNAGS || [];

    // Week chart + leaderboard need the time-entries-overview rollup.
    const monday = SHELL.isoWeekMonday();
    const today = new Date();
    const fromIso = SHELL._iso(monday);
    const toIso   = SHELL._iso(today);
    let weekChart = [], userTotals = {}, totalWeekHours = 0;
    try {
      const r = await SHELL.api(`/api/time-entries-overview?fromDate=${fromIso}&toDate=${toIso}`);
      const entries = r.entries || [];
      const dayTotals = {};
      for (const e of entries) {
        if (!e.date) continue;
        dayTotals[e.date] = (dayTotals[e.date] || 0) + Number(e.totalHours || 0);
        userTotals[e.userId] = (userTotals[e.userId] || 0) + Number(e.totalHours || 0);
        totalWeekHours += Number(e.totalHours || 0);
      }
      const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday); d.setDate(monday.getDate() + i);
        weekChart.push({ day: dayLabels[i], hours: Math.round((dayTotals[SHELL._iso(d)] || 0) * 10) / 10 });
      }
    } catch {}

    // Quote metrics for the pipeline pulse
    let quoteMetrics = null;
    try {
      const r = await SHELL.api('/api/quotes?action=metrics');
      quoteMetrics = r.metrics;
    } catch {}

    // Setup gaps — jobs missing crew/areas/contacts/tasks (lifted from the
    // legacy admin "Needs attention" panel logic, kept lean).
    const setupGaps = [];
    for (const j of jobs.filter(j => (j.status || 'active') === 'active')) {
      const missing = [];
      if (!(j.areaGroups && j.areaGroups.length))   missing.push('areas');
      if (!(j.roughInTasks && j.roughInTasks.length)) missing.push('rough-in tasks');
      if (!(j.fitOffTasks && j.fitOffTasks.length))   missing.push('fit-off tasks');
      const crewN = (SHELL.USERS || []).filter(u => (u.assignedJobIds || []).includes(j.id) && (u.role === 'tradie' || u.role === 'leadingHand')).length;
      if (!crewN) missing.push('crew');
      if (!j.clientUserId) missing.push('client');
      if (missing.length) setupGaps.push({ job: j, missing });
    }

    const activeJobsList = jobs.filter(j => (j.status || 'active') === 'active');
    const totalDw    = jobs.reduce((a, j) => a + (Number(j.statsDwellingCount) || 0), 0);
    const totalDone  = jobs.reduce((a, j) => a + (Number(j.statsDwellingsDone) || 0), 0);
    const tradies    = (SHELL.USERS || []).filter(u => u.role === 'tradie' || u.role === 'leadingHand').length;
    const activeTrd  = (SHELL.USERS || []).filter(u => (u.role === 'tradie' || u.role === 'leadingHand') && (userTotals[u.id] || 0) > 0).length;
    const maxDay     = Math.max(...weekChart.map(d => d.hours), 1);
    const todayLabel = new Date().toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    const unassignedSnags = snags.filter(s => !s.assignedTo);

    SHELL.$('#page').innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-h1">Good ${greetingPart()}, ${SHELL.escapeHtml(firstName(me.username))}.</div>
          <div class="page-sub">${todayLabel} · what needs you right now.</div>
        </div>
      </div>

      <!-- Hero with the headline number for the week + key state. -->
      <div class="hero">
        <div class="hero-row">
          <div>
            <div class="hero-eyebrow">This week</div>
            <div class="hero-title tabular">${totalWeekHours.toFixed(1)} hours logged</div>
            <div class="hero-sub">${activeTrd} of ${tradies} crew active across ${activeJobsList.length} live jobs</div>
          </div>
          <div class="hero-stats">
            <div><div class="hero-stat-l">Pending approvals</div><div class="hero-stat-v">${C.pendingHours || 0}</div></div>
            <div><div class="hero-stat-l">Open snags</div><div class="hero-stat-v">${snags.length}</div></div>
            <div><div class="hero-stat-l">Unassigned snags</div><div class="hero-stat-v" style="${unassignedSnags.length ? 'color:#f4a93b' : ''}">${unassignedSnags.length}</div></div>
            <div><div class="hero-stat-l">Dwellings</div><div class="hero-stat-v">${totalDone}<span style="color:#6b7689">/${totalDw}</span></div></div>
          </div>
        </div>
      </div>

      <!-- "Needs me now" — the three urgency rails. -->
      <div class="three-col">
        ${needsRail(
          'Approvals',
          C.pendingHours || 0,
          C.pendingHours ? `${pending.reduce((s,e) => s + (e.totalHours||0), 0).toFixed(1)} hours from ${new Set(pending.map(e => e.userId)).size} crew` : 'All caught up.',
          C.pendingHours ? '/admin/approvals' : null,
          C.pendingHours > 0 ? 'warn' : 'ok'
        )}
        ${needsRail(
          'Snags to assign',
          unassignedSnags.length,
          unassignedSnags.length ? `${unassignedSnags.length} open snag${unassignedSnags.length === 1 ? '' : 's'} with no owner` : 'Every snag has an owner.',
          unassignedSnags.length ? '/admin/snags?asgn=unassigned' : null,
          unassignedSnags.length > 0 ? 'bad' : 'ok'
        )}
        ${needsRail(
          'Job setup gaps',
          setupGaps.length,
          setupGaps.length ? `${setupGaps.length} active job${setupGaps.length === 1 ? '' : 's'} missing crew, areas or tasks` : 'Every active job is set up.',
          setupGaps.length ? '/admin/jobs?filter=setup-gaps' : null,
          setupGaps.length > 0 ? 'warn' : 'ok'
        )}
      </div>

      <!-- Two-col: jobs + week chart with leaderboard -->
      <div class="two-col">
        <div class="card" style="padding:0">
          <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
            <div>
              <div class="card-title">Jobs at a glance</div>
              <div class="card-sub">${SHELL.pluralize(activeJobsList.length, 'active job')} · sorted by recent activity</div>
            </div>
            <a class="btn btn-sm btn-ghost" href="/admin/jobs">View all ${SHELL.ICONS.arrow}</a>
          </div>
          <div>
            ${activeJobsList
              .sort((a,b) => (b.lastActivityIso || '').localeCompare(a.lastActivityIso || ''))
              .slice(0, 5)
              .map(j => `
                <a href="/admin/jobs/${SHELL.escapeHtml(j.id)}" class="job-mini">
                  <div class="job-mini-top">
                    <div class="job-mini-name">${SHELL.escapeHtml(j.name)}</div>
                    <div class="job-mini-ref">${SHELL.escapeHtml((j.ref || j.id || '').toUpperCase())}</div>
                    ${SHELL.jobStatusPill(j.status || 'active')}
                  </div>
                  ${SHELL.bar(j.statsPct || 0)}
                  <div class="job-mini-meta">
                    <span><b>${j.statsPct || 0}%</b> complete</span>
                    ${j.statsDwellingCount ? `<span><b>${j.statsDwellingsDone || 0}/${j.statsDwellingCount}</b> dwellings</span>` : ''}
                    ${j.statsWeekHours ? `<span><b>${Number(j.statsWeekHours).toFixed(1)}h</b> this week</span>` : ''}
                    ${(j.statsOpenSnags || 0) > 0
                      ? `<span style="color:var(--bad)"><b>${j.statsOpenSnags}</b> open snag${j.statsOpenSnags > 1 ? 's' : ''}</span>`
                      : `<span style="color:var(--ok)">No snags</span>`}
                  </div>
                </a>
              `).join('') || '<div class="empty" style="border:0">No active jobs.</div>'}
          </div>
        </div>

        <div class="card" style="padding:0">
          <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
            <div class="card-title">Hours this week</div>
            <div class="card-sub">${totalWeekHours.toFixed(1)}h org-wide</div>
          </div>
          <div style="padding:14px 18px">
            <div class="chart">
              ${weekChart.map((d, i) => {
                const h = Math.max(2, Math.round(d.hours / maxDay * 80));
                return `<div class="chart-col">
                  <div class="chart-val">${d.hours || ''}</div>
                  <div class="chart-bar ${i >= 5 ? 'weekend' : ''}" style="height:${h}px"></div>
                  <div class="chart-day">${d.day}</div>
                </div>`;
              }).join('')}
            </div>
          </div>
          <div style="padding:14px 18px;border-top:1px solid var(--line)">
            <div class="card-title" style="margin-bottom:10px">Most hours this week</div>
            ${(SHELL.USERS || [])
              .filter(u => (userTotals[u.id] || 0) > 0)
              .sort((a, b) => (userTotals[b.id] || 0) - (userTotals[a.id] || 0))
              .slice(0, 5)
              .map(u => `
                <div style="display:flex;align-items:center;gap:10px;padding:6px 0">
                  <div class="avatar ${u.role}">${SHELL.initials(u.username)}</div>
                  <div style="flex:1;font-size:13px;font-weight:500">${SHELL.escapeHtml(u.username)}</div>
                  <div class="tabular" style="font-weight:600">${(userTotals[u.id] || 0).toFixed(1)}h</div>
                </div>
              `).join('') || '<div style="color:var(--muted);font-size:12px">No hours logged this week yet.</div>'}
          </div>
        </div>
      </div>

      <!-- Quote pipeline pulse -->
      ${quoteMetrics ? `
        <div class="card" style="padding:0;margin-bottom:20px">
          <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
            <div>
              <div class="card-title">Quote pipeline</div>
              <div class="card-sub">${quoteMetrics.total} total · ${quoteMetrics.recent30Count} created in last 30d</div>
            </div>
            <a class="btn btn-sm btn-ghost" href="/admin/quotes">Open pipeline ${SHELL.ICONS.arrow}</a>
          </div>
          <div class="kgrid" style="margin:14px 18px">
            <div class="kpi"><div class="kpi-l">Win rate</div><div class="kpi-v ${quoteMetrics.winRatePct == null ? '' : (quoteMetrics.winRatePct >= 50 ? 'green' : quoteMetrics.winRatePct >= 30 ? 'amber' : 'red')}">${quoteMetrics.winRatePct == null ? '—' : quoteMetrics.winRatePct.toFixed(1)}<sup>%</sup></div><div class="kpi-d">${quoteMetrics.winCount} of ${quoteMetrics.conclusiveCount} conclusive</div></div>
            <div class="kpi"><div class="kpi-l">Avg cycle</div><div class="kpi-v">${quoteMetrics.avgCycleDays == null ? '—' : quoteMetrics.avgCycleDays}<sup>d</sup></div><div class="kpi-d">create → accept</div></div>
            <div class="kpi"><div class="kpi-l">90d won</div><div class="kpi-v green">${quoteMetrics.recent90Count}</div><div class="kpi-d">accepted/converted</div></div>
            <div class="kpi"><div class="kpi-l">90d won (value)</div><div class="kpi-v">${quoteMetrics.recent90Value > 0 ? SHELL.fmtMoney(quoteMetrics.recent90Value) : '—'}</div><div class="kpi-d">ex-GST sum</div></div>
          </div>
        </div>
      ` : ''}
    `;
  }
};

function greetingPart() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}
function firstName(u) {
  if (!u) return 'admin';
  return String(u).split(/[\s._-]+/).filter(Boolean)[0] || u;
}
function needsRail(label, n, sub, href, tone) {
  const colour = tone === 'bad' ? 'var(--bad)' : tone === 'warn' ? 'var(--warn)' : 'var(--ok)';
  return `
    <a class="card" href="${href || '#'}" style="display:flex;flex-direction:column;gap:8px;cursor:${href ? 'pointer' : 'default'};border-left:3px solid ${colour}" ${href ? '' : 'onclick="event.preventDefault()"'}>
      <div class="kpi-l">${SHELL.escapeHtml(label)}</div>
      <div class="kpi-v" style="color:${colour}">${n}</div>
      <div class="kpi-d">${SHELL.escapeHtml(sub)}${href ? ' &nbsp;→' : ''}</div>
    </a>
  `;
}

SHELL.boot();
</script>
</body>
</html>
