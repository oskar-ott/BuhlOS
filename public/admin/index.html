<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin</title>
<meta name="theme-color" content="#0d1f35">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<!-- /admin entry — role-aware redirect. Admin/LH rebuild: leading hand
     users no longer share the command centre; they land on the field-
     control surface at /lh. /api/auth?action=me decides which surface
     to send them to. The script falls back to /admin/operations if the
     check fails so an unauthenticated visitor still hits the auth gate
     on the sidebar. -->
<script>
(async function () {
  try {
    const r = await fetch('/api/auth?action=me', { credentials: 'same-origin' });
    if (!r.ok) { location.replace('/login'); return; }
    const { user } = await r.json();
    const role = user && user.role;
    if (role === 'leadingHand') location.replace('/lh');
    else if (role === 'tradie') location.replace('/my-day');
    else if (role === 'client') location.replace('/client');
    else location.replace('/admin/operations');
  } catch (e) {
    location.replace('/admin/operations');
  }
})();
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f3ee; color: #0d1f35; margin: 0; padding: 40px;
         text-align: center; line-height: 1.5; }
  a { color: inherit; }
</style>
</head>
<body>
  <p>Redirecting to <a href="/admin/operations">/admin/operations</a>…</p>
</body>
</html>
