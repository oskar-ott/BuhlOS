<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin</title>
<meta name="theme-color" content="#0d1f35">
<link rel="manifest" href="/manifest.json">
<!-- Admin landing consolidation: there used to be two competing landings
     (/admin/ "Today" and /admin/operations "Operations"). They had ~70%
     overlap but different layouts, and the sidebar listed both side-by-side
     so admins flip-flopped between them. The new single command centre
     lives at /admin/operations — this page just redirects there.

     Keeping the file (rather than deleting it) means any external
     bookmarks, push-notification URLs, or hardcoded `/admin/` references
     in older code paths still land somewhere useful. -->
<meta http-equiv="refresh" content="0; url=/admin/operations">
<script>location.replace('/admin/operations');</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f3ee; color: #0d1f35; margin: 0; padding: 40px;
         text-align: center; line-height: 1.5; }
  a { color: inherit; }
</style>
</head>
<body>
  <p>Redirecting to <a href="/admin/operations">/admin/operations</a>…</p>
</body>
</html>
