<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · job builder</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1b34">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>

<!--
  /admin/job-builder  · Pass-1 working version
  ────────────────────────────────────────────
  Backed by:
    - /api/jobs           (list, basic edit)
    - /api/job-draft      (stage draft → publish)
    - /api/job-itps       (per-job ITP attach state)
    - /api/itp-templates  (template picker)
    - /api/users          (assigned workers picker)
  Stage-rules editor + workflow-preview tabs are wired to job-draft so
  changes are sandboxed until publish. Parts that need future work
  (Phil-side workflow render preview, materials picker per stage) are
  tagged FEATURE UNDER CONSTRUCTION on the page itself, not hidden.
-->

<style>
  .jb-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 18px;
    align-items: start;
    margin-top: 8px;
  }
  .jb-side {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r, 10px);
    padding: 12px;
    position: sticky;
    top: 76px;
    max-height: calc(100vh - 96px);
    overflow: auto;
  }
  .jb-side h3 {
    font-family: var(--ff-display, 'Inter Tight', sans-serif);
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted);
    margin: 0 0 8px 4px;
  }
  .jb-job {
    display: block;
    padding: 8px 10px;
    border-radius: 6px;
    color: var(--ink-2); font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
  }
  .jb-job:hover { background: var(--surface-2); }
  .jb-job.on   { background: var(--ink); color: var(--surface); }
  .jb-job .jb-job-n {
    font-family: var(--ff-mono, monospace); font-size: 10.5px;
    color: var(--muted); margin-top: 2px; letter-spacing: .02em;
  }
  .jb-job.on .jb-job-n { color: rgba(255,255,255,.55); }

  .jb-main {
    display: flex; flex-direction: column; gap: 14px;
  }
  .jb-tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--line);
  }
  .jb-tab {
    padding: 9px 16px;
    font-family: var(--ff-display, 'Inter Tight', sans-serif);
    font-weight: 600; font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .12s, border-color .12s;
  }
  .jb-tab:hover { color: var(--ink-2); }
  .jb-tab.on { color: var(--ink); border-bottom-color: var(--accent); }
  .jb-tab .ct {
    background: var(--surface-2); color: var(--muted);
    font-family: var(--ff-mono, monospace);
    font-size: 10.5px; padding: 1px 6px;
    border-radius: 999px; margin-left: 6px;
  }

  .jb-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r, 10px);
    padding: 18px 20px;
  }
  .jb-card h3 {
    font-family: var(--ff-display, 'Inter Tight', sans-serif);
    font-size: 15px; font-weight: 700;
    margin: 0 0 10px;
    color: var(--ink);
  }
  .jb-form-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
  }
  .jb-form-row:last-child { border-bottom: 0; }
  .jb-form-row label {
    font-size: 13px; color: var(--muted);
    font-weight: 500;
  }
  .jb-form-row input,
  .jb-form-row select,
  .jb-form-row textarea {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--surface);
    font-family: inherit; font-size: 13px;
    color: var(--ink);
  }
  .jb-form-row textarea { resize: vertical; min-height: 60px; }
  .jb-form-row input:focus,
  .jb-form-row select:focus,
  .jb-form-row textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
  }

  .jb-area {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r, 10px);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .jb-area-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
  }
  .jb-area-name {
    flex: 1;
    font-family: var(--ff-display, 'Inter Tight', sans-serif);
    font-size: 14px; font-weight: 700;
    color: var(--ink);
  }
  .jb-area-name input {
    width: 100%;
    border: 0; background: transparent;
    font: inherit; padding: 0;
  }
  .jb-area-name input:focus { outline: 2px solid var(--accent); }
  .jb-area-body { padding: 12px 16px; }
  .jb-stage {
    display: grid;
    grid-template-columns: 1fr repeat(4, auto) auto;
    gap: 10px;
    padding: 8px 0;
    border-top: 1px solid var(--line);
    align-items: center;
    font-size: 13px;
  }
  .jb-stage:first-child { border-top: 0; }
  .jb-stage input[type="text"] {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 5px 8px;
    background: var(--surface);
    font: inherit;
  }
  .jb-stage label {
    color: var(--muted);
    font-size: 11.5px;
    display: inline-flex; align-items: center; gap: 5px;
    cursor: pointer; user-select: none;
  }
  .jb-stage input[type="number"] {
    width: 56px; padding: 4px 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font: inherit;
    text-align: center;
  }
  .jb-del {
    color: var(--bad, #c0312f);
    font-size: 12px;
    background: transparent;
    border: 0; cursor: pointer;
    padding: 4px 8px;
  }
  .jb-del:hover { background: rgba(192,49,47,.08); border-radius: 4px; }

  .jb-warn-strip {
    background: rgba(245,208,32,.16);
    border: 1px solid rgba(245,208,32,.5);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--ink-2);
    margin-bottom: 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .jb-warn-strip strong { color: var(--ink); }
  .jb-warn-uc {
    background: var(--accent);
    color: var(--accent-ink);
    font-family: var(--ff-mono, monospace);
    font-size: 9.5px; letter-spacing: .16em;
    text-transform: uppercase; font-weight: 700;
    padding: 3px 7px; border-radius: 2px;
    flex-shrink: 0;
  }

  .jb-actions {
    display: flex; gap: 10px; align-items: center;
    padding-top: 16px; border-top: 1px solid var(--line); margin-top: 14px;
  }
  .jb-dirty {
    color: var(--accent-ink);
    background: var(--accent);
    font-family: var(--ff-mono, monospace);
    font-size: 10.5px; letter-spacing: .12em;
    text-transform: uppercase; font-weight: 700;
    padding: 4px 8px; border-radius: 2px;
  }
</style>
</head>
<body>
<script>
'use strict';

const STATE = {
  jobs: [],
  jobId: null,        // currently selected
  job: null,          // full job record
  draft: null,        // { base, pending, summary }
  itps: null,         // { instances }
  tab: 'basics',
  dirty: false,
};

window.PAGE = {
  id: 'job-builder',
  title: 'Job Builder',
  crumb: 'Job Builder',
  async render() {
    SHELL.$('#page').innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-h1">Job Builder</div>
          <div class="page-sub">Configure what Phil sees per job — basics, areas + stages, ITPs, evidence rules. Changes are sandboxed in a draft until you publish.</div>
        </div>
      </div>
      <div id="jb-shell">
        <div class="empty"><div class="empty-title">Loading jobs…</div></div>
      </div>
    `;
    await loadJobsList();
    const params = new URLSearchParams(location.search);
    const wanted = params.get('jobId');
    if (wanted && STATE.jobs.find(j => j.id === wanted)) {
      STATE.jobId = wanted;
    } else if (STATE.jobs.length) {
      STATE.jobId = STATE.jobs[0].id;
    }
    if (STATE.jobId) await loadJob(STATE.jobId);
    paint();
  }
};

async function loadJobsList() {
  try {
    const r = await SHELL.api('/api/jobs?withStats=1');
    STATE.jobs = (r.jobs || [])
      .filter(j => j.status !== 'archived')
      .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  } catch (e) {
    STATE.jobs = [];
    SHELL.toast('Couldn’t load jobs — ' + e.message, 'bad');
  }
}

async function loadJob(jobId) {
  STATE.jobId = jobId;
  STATE.job = null;
  STATE.draft = null;
  STATE.itps = null;
  STATE.dirty = false;
  try {
    const [j, d, itps] = await Promise.all([
      SHELL.api('/api/jobs?id=' + encodeURIComponent(jobId)),
      SHELL.api('/api/job-draft?jobId=' + encodeURIComponent(jobId)).catch(() => ({ draft: null })),
      SHELL.api('/api/job-itps?jobId=' + encodeURIComponent(jobId)).catch(() => ({ instances: [] })),
    ]);
    STATE.job   = j.job;
    STATE.draft = (d && d.draft) || null;
    STATE.itps  = itps;
  } catch (e) {
    SHELL.toast('Couldn’t load job — ' + e.message, 'bad');
  }
  const u = new URL(location.href);
  u.searchParams.set('jobId', jobId);
  history.replaceState(null, '', u);
}

function paint() {
  if (!STATE.jobs.length) {
    SHELL.$('#jb-shell').innerHTML = `
      <div class="empty">
        <div class="empty-title">No jobs yet</div>
        <div class="empty-sub">Create one from <a href="/admin/jobs" style="color:var(--ink)">/admin/jobs</a> first — Job Builder picks up from there.</div>
      </div>`;
    return;
  }
  if (!STATE.job) {
    SHELL.$('#jb-shell').innerHTML = `<div class="empty"><div class="empty-title">Pick a job…</div></div>`;
    return;
  }

  const j = STATE.job;
  const draft = STATE.draft;
  const tabs = [
    { id: 'basics',  label: 'Basics' },
    { id: 'areas',   label: 'Areas + stages', ct: countAreas(j) },
    { id: 'itps',    label: 'ITPs',           ct: (STATE.itps && STATE.itps.instances && STATE.itps.instances.length) || 0 },
    { id: 'rules',   label: 'Stage rules' },
    { id: 'preview', label: 'Phil preview' },
  ];

  SHELL.$('#jb-shell').innerHTML = `
    <div class="jb-grid">
      <aside class="jb-side">
        <h3>Jobs · ${STATE.jobs.length}</h3>
        ${STATE.jobs.map(j2 => `
          <a class="jb-job ${j2.id === STATE.jobId ? 'on' : ''}" data-id="${SHELL.escapeHtml(j2.id)}" href="#">
            <div>${SHELL.escapeHtml(j2.name || j2.id)}</div>
            <div class="jb-job-n">${SHELL.escapeHtml(j2.code || j2.ref || j2.id)} · ${SHELL.escapeHtml(j2.status || 'active')}</div>
          </a>
        `).join('')}
      </aside>
      <section class="jb-main">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="flex:1">
            <div style="font-family:var(--ff-display,'Inter Tight',sans-serif);font-size:20px;font-weight:700;color:var(--ink)">${SHELL.escapeHtml(j.name || j.id)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">
              ${SHELL.escapeHtml(j.code || j.ref || j.id)}
              · ${SHELL.escapeHtml(j.siteAddress || 'no address')}
              · ${SHELL.escapeHtml(j.status || 'active')}
            </div>
          </div>
          ${STATE.dirty || (draft && draft.pending && Object.keys(draft.pending).length) ? `<span class="jb-dirty">Unpublished draft</span>` : ''}
          <a class="btn" href="/admin/jobs/${encodeURIComponent(j.id)}" style="border:1px solid var(--line);padding:7px 12px;border-radius:6px;color:var(--ink);text-decoration:none;font-size:12px">Open job →</a>
        </div>

        <div class="jb-tabs">
          ${tabs.map(t => `<div class="jb-tab ${STATE.tab === t.id ? 'on' : ''}" data-tab="${t.id}">${t.label}${t.ct !== undefined ? ` <span class="ct">${t.ct}</span>` : ''}</div>`).join('')}
        </div>

        <div id="jb-tab-body">${renderTab()}</div>
      </section>
    </div>
  `;

  SHELL.$$('[data-id]', SHELL.$('#jb-shell')).forEach(el => {
    el.addEventListener('click', async (e) => {
      e.preventDefault();
      const id = el.dataset.id;
      if (id === STATE.jobId) return;
      if (STATE.dirty && !confirm('Discard unsaved changes?')) return;
      await loadJob(id);
      paint();
    });
  });
  SHELL.$$('.jb-tab').forEach(el => el.addEventListener('click', () => {
    STATE.tab = el.dataset.tab;
    paint();
  }));
  wireTab();
}

function countAreas(j) {
  return (j.areaGroups || []).reduce((sum, g) => sum + ((g.areas || []).length), 0);
}

function renderTab() {
  if (STATE.tab === 'basics')  return renderBasics();
  if (STATE.tab === 'areas')   return renderAreas();
  if (STATE.tab === 'itps')    return renderITPs();
  if (STATE.tab === 'rules')   return renderRules();
  if (STATE.tab === 'preview') return renderPreview();
  return '';
}

function renderBasics() {
  const j = STATE.job;
  const draft = (STATE.draft && STATE.draft.pending) || {};
  const v = (k) => draft[k] !== undefined ? draft[k] : (j[k] || '');
  return `
    <div class="jb-card">
      <h3>Basics</h3>
      <div class="jb-form-row"><label>Job name</label><input id="b-name" value="${SHELL.escapeHtml(v('name'))}"></div>
      <div class="jb-form-row"><label>Job code</label><input id="b-code" value="${SHELL.escapeHtml(v('code'))}" placeholder="e.g. IV3232"></div>
      <div class="jb-form-row"><label>Status</label>
        <select id="b-status">
          ${['draft','active','paused','complete','archived'].map(s => `<option value="${s}"${(j.status||'active')===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="jb-form-row"><label>Site address</label><input id="b-addr" value="${SHELL.escapeHtml(v('siteAddress'))}"></div>
      <div class="jb-form-row"><label>Site contact</label><input id="b-contact" value="${SHELL.escapeHtml(v('siteContactName'))}" placeholder="Name on site"></div>
      <div class="jb-form-row"><label>Contact phone</label><input id="b-phone" value="${SHELL.escapeHtml(v('siteContactPhone'))}" placeholder="0400 000 000"></div>
      <div class="jb-form-row"><label>Start date</label><input id="b-start" type="date" value="${SHELL.escapeHtml(v('startDate'))}"></div>
      <div class="jb-form-row"><label>Due date</label><input id="b-due" type="date" value="${SHELL.escapeHtml(v('dueDate'))}"></div>
      <div class="jb-form-row"><label>Access notes</label><textarea id="b-access">${SHELL.escapeHtml(v('accessNotes'))}</textarea></div>
      <div class="jb-form-row"><label>Safety notes</label><textarea id="b-safety">${SHELL.escapeHtml(v('safetyNotes'))}</textarea></div>
      <div class="jb-actions">
        <button class="btn btn-primary" id="b-save" style="background:var(--ink);color:var(--surface);padding:8px 16px;border-radius:6px;border:0;font-weight:600;font-size:13px;cursor:pointer">Save basics</button>
        ${(STATE.draft && STATE.draft.pending) ? `
          <button class="btn" id="b-discard" style="border:1px solid var(--line);padding:7px 12px;border-radius:6px;background:transparent;cursor:pointer;font-size:13px">Discard draft</button>
          <button class="btn btn-primary" id="b-publish" style="background:var(--accent);color:var(--accent-ink);padding:8px 16px;border-radius:6px;border:0;font-weight:700;font-size:13px;cursor:pointer">Publish draft</button>
        ` : ''}
        <span style="flex:1"></span>
        <span style="font-size:11.5px;color:var(--muted)">Updated ${SHELL._ago ? SHELL._ago(j.updatedAt) : ''}</span>
      </div>
    </div>
  `;
}

function renderAreas() {
  const j = STATE.job;
  const groups = j.areaGroups || [];
  const warnings = areaWarnings(j);
  return `
    ${warnings.length ? `<div class="jb-warn-strip"><strong>Warnings:</strong> ${warnings.join('. ')}.</div>` : ''}

    <div style="display:flex;align-items:center;gap:10px">
      <h3 style="margin:0;font-family:var(--ff-display,'Inter Tight',sans-serif);font-size:15px">Area groups</h3>
      <button id="a-new-group" class="btn" style="border:1px solid var(--line);padding:6px 12px;border-radius:6px;background:transparent;cursor:pointer;font-size:12px">+ New group</button>
    </div>

    ${groups.length ? groups.map((g, gi) => `
      <div class="jb-area" data-gi="${gi}">
        <div class="jb-area-head">
          <div class="jb-area-name"><input data-grp="${gi}" value="${SHELL.escapeHtml(g.name || '')}" placeholder="Group name (e.g. Level 1, Switchroom, Banquet bar)"></div>
          <button class="jb-del" data-del-grp="${gi}">Remove group</button>
        </div>
        <div class="jb-area-body">
          ${(g.areas || []).map((a, ai) => `
            <div class="jb-stage" data-area="${gi}.${ai}">
              <input type="text" data-area-name="${gi}.${ai}" value="${SHELL.escapeHtml(a.name || '')}" placeholder="Area name (e.g. Unit 12, Bar, Pokies room)">
              <label><input type="number" min="0" max="20" data-area-photos="${gi}.${ai}" value="${a.requiredPhotos || 0}"> photos</label>
              <label><input type="checkbox" data-area-notes="${gi}.${ai}" ${a.requiredNotes ? 'checked' : ''}> notes</label>
              <label><input type="checkbox" data-area-itp="${gi}.${ai}" ${a.itpRequired ? 'checked' : ''}> ITP</label>
              <label><input type="checkbox" data-area-witness="${gi}.${ai}" ${a.independentReview ? 'checked' : ''}> indep. review</label>
              <button class="jb-del" data-del-area="${gi}.${ai}">×</button>
            </div>
          `).join('')}
          <div style="margin-top:8px"><button class="btn" data-add-area="${gi}" style="border:1px solid var(--line);padding:5px 11px;border-radius:6px;background:transparent;cursor:pointer;font-size:12px">+ Add area</button></div>
        </div>
      </div>
    `).join('') : `<div class="empty"><div class="empty-title">No areas yet</div><div class="empty-sub">Add a group above to start mapping the job.</div></div>`}

    <div class="jb-actions">
      <button class="btn btn-primary" id="a-save" style="background:var(--ink);color:var(--surface);padding:8px 16px;border-radius:6px;border:0;font-weight:600;font-size:13px;cursor:pointer">Save area structure</button>
      <span style="flex:1"></span>
      <span style="font-size:11.5px;color:var(--muted)">${countAreas(j)} areas across ${groups.length} group${groups.length===1?'':'s'}</span>
    </div>
  `;
}

function areaWarnings(j) {
  const w = [];
  const groups = j.areaGroups || [];
  if (!groups.length) w.push('Job has no areas — Phil will see an empty workspace');
  let allArea = [];
  groups.forEach(g => (g.areas || []).forEach(a => allArea.push(a)));
  if (allArea.length && allArea.every(a => !a.requiredPhotos && !a.requiredNotes && !a.itpRequired)) {
    w.push('No area has evidence requirements set — handover packs will be empty');
  }
  if ((j.status === 'active') && !(j.crewIds && j.crewIds.length) && !j.leadingHandId) {
    w.push('Active job has no assigned workers');
  }
  return w;
}

function renderITPs() {
  const j = STATE.job;
  const instances = (STATE.itps && STATE.itps.instances) || [];
  return `
    <div class="jb-card">
      <h3>ITP instances attached to this job</h3>
      ${instances.length ? `
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="text-align:left;color:var(--muted);border-bottom:1px solid var(--line)">
            <th style="padding:8px 4px">Template</th>
            <th style="padding:8px 4px">Scope</th>
            <th style="padding:8px 4px">Status</th>
            <th style="padding:8px 4px">Updated</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${instances.map(i => `
              <tr style="border-bottom:1px solid var(--line)">
                <td style="padding:10px 4px;font-weight:600">${SHELL.escapeHtml((i.templateSnapshot && i.templateSnapshot.name) || i.templateId)}</td>
                <td style="padding:10px 4px;color:var(--muted)">${SHELL.escapeHtml(i.scope)}${i.scopeId ? ' · ' + SHELL.escapeHtml(i.scopeId) : ''}</td>
                <td style="padding:10px 4px"><span class="pill pill-${i.status === 'signed-off' ? 'ok' : 'info'}"><span class="pill-dot"></span>${SHELL.escapeHtml(i.status)}</span></td>
                <td style="padding:10px 4px;color:var(--muted);font-family:var(--ff-mono,monospace);font-size:11.5px">${SHELL._ago ? SHELL._ago(i.updatedAt || i.createdAt) : ''}</td>
                <td style="padding:10px 4px;text-align:right"><a class="btn" href="/admin/itp?jobId=${encodeURIComponent(STATE.jobId)}&instanceId=${encodeURIComponent(i.id)}" style="border:1px solid var(--line);padding:5px 10px;border-radius:5px;color:var(--ink);text-decoration:none;font-size:12px">Open →</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : `<div class="empty"><div class="empty-title">No ITPs attached</div><div class="empty-sub">Pick a template and scope it to this job below.</div></div>`}
    </div>

    <div class="jb-card">
      <h3>Attach an ITP template</h3>
      <div class="jb-warn-strip">
        <span class="jb-warn-uc">Feature under construction</span>
        <span>Template picker is wired but the inline attach action is being added on the ITP page. Use <a href="/admin/itp" style="color:var(--ink)">/admin/itp</a> to attach and review for now.</span>
      </div>
    </div>
  `;
}

function renderRules() {
  return `
    <div class="jb-card">
      <h3>Stage rules</h3>
      <div class="jb-warn-strip">
        <span class="jb-warn-uc">Feature under construction</span>
        <span>Per-stage evidence rules (rough-in / fit-off / test / defects / handover) read from <code>areaGroups[].areas[]</code> today (photos count, notes, ITP, indep. review). The cross-stage matrix editor lands next — see <strong>Areas + stages</strong> tab for the per-area version that works now.</span>
      </div>
      <ul style="margin:14px 0 0 18px;color:var(--ink-2);line-height:1.85;font-size:13.5px">
        <li>Required photos per stage (currently per-area only)</li>
        <li>Required notes per stage</li>
        <li>ITP gates that block stage completion until witnessed</li>
        <li>Independent-review requirement (reviewer ≠ submitter)</li>
        <li>Field instructions surfaced inline in Phil</li>
        <li>Materials/tools references per stage</li>
      </ul>
    </div>
  `;
}

function renderPreview() {
  const j = STATE.job;
  const groups = j.areaGroups || [];
  return `
    <div class="jb-card">
      <h3>What Phil will see</h3>
      <div style="background:var(--shell,#0d1b34);color:#fff;border-radius:8px;padding:16px 18px;margin-top:6px">
        <div style="font-family:var(--ff-display,'Inter Tight',sans-serif);font-weight:700;font-size:15px">${SHELL.escapeHtml(j.name || j.id)}</div>
        <div style="font-size:11.5px;opacity:.7;margin-top:2px">${SHELL.escapeHtml(j.siteAddress || 'no address')}</div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)">
          ${groups.length ? groups.map(g => `
            <div style="font-family:var(--ff-mono,monospace);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:8px 0 4px">${SHELL.escapeHtml(g.name || 'group')}</div>
            ${(g.areas || []).map(a => `
              <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)">
                <span style="flex:1;font-size:13.5px">${SHELL.escapeHtml(a.name || '—')}</span>
                ${a.requiredPhotos ? `<span style="font-family:var(--ff-mono,monospace);font-size:10.5px;color:#94a3b8">📷 ${a.requiredPhotos}</span>` : ''}
                ${a.itpRequired ? `<span style="font-family:var(--ff-mono,monospace);font-size:10.5px;color:var(--accent)">ITP</span>` : ''}
              </div>
            `).join('')}
          `).join('') : `<div style="opacity:.55;font-size:13px">No areas — Phil sees an empty workspace</div>`}
        </div>
      </div>
      <div class="jb-warn-strip" style="margin-top:14px">
        <span class="jb-warn-uc">Preview only</span>
        <span>This is a rough sketch of what Phil renders. The live Phil app reads from <code>/api/job-areas</code>; the full pixel-perfect preview is FEATURE UNDER CONSTRUCTION.</span>
      </div>
    </div>
  `;
}

function wireTab() {
  if (STATE.tab === 'basics')  wireBasics();
  if (STATE.tab === 'areas')   wireAreas();
}

function wireBasics() {
  ['name','code','addr','contact','phone','start','due','access','safety'].forEach(k => {
    const el = SHELL.$('#b-' + k);
    if (el) el.addEventListener('input', () => { STATE.dirty = true; });
  });
  const status = SHELL.$('#b-status');
  if (status) status.addEventListener('change', () => { STATE.dirty = true; });

  const save = SHELL.$('#b-save');
  if (save) save.addEventListener('click', async () => {
    const j = STATE.job;
    const patch = {
      name:             SHELL.$('#b-name').value.trim(),
      code:             SHELL.$('#b-code').value.trim(),
      status:           SHELL.$('#b-status').value,
      siteAddress:      SHELL.$('#b-addr').value.trim(),
      siteContactName:  SHELL.$('#b-contact').value.trim(),
      siteContactPhone: SHELL.$('#b-phone').value.trim(),
      startDate:        SHELL.$('#b-start').value,
      dueDate:          SHELL.$('#b-due').value,
      accessNotes:      SHELL.$('#b-access').value,
      safetyNotes:      SHELL.$('#b-safety').value,
    };
    if (!patch.name) { SHELL.toast('Job name is required', 'bad'); return; }
    save.disabled = true; save.textContent = 'Saving…';
    try {
      await SHELL.api('/api/jobs?id=' + encodeURIComponent(j.id), { method: 'PUT', body: patch });
      STATE.dirty = false;
      SHELL.toast('Saved · live now', 'ok');
      await loadJob(j.id);
      paint();
    } catch (e) {
      SHELL.toast('Save failed — ' + e.message, 'bad');
      save.disabled = false; save.textContent = 'Save basics';
    }
  });

  const discard = SHELL.$('#b-discard');
  if (discard) discard.addEventListener('click', async () => {
    if (!confirm('Discard the unpublished draft?')) return;
    await SHELL.api('/api/job-draft?jobId=' + encodeURIComponent(STATE.jobId) + '&action=discard', { method: 'POST' });
    SHELL.toast('Draft discarded', 'ok');
    await loadJob(STATE.jobId); paint();
  });

  const publish = SHELL.$('#b-publish');
  if (publish) publish.addEventListener('click', async () => {
    if (!confirm('Publish the draft? Phil will see the new structure immediately.')) return;
    try {
      await SHELL.api('/api/job-draft?jobId=' + encodeURIComponent(STATE.jobId) + '&action=publish', { method: 'POST' });
      SHELL.toast('Published · Phil now sees the new structure', 'ok');
      await loadJob(STATE.jobId); paint();
    } catch (e) { SHELL.toast('Publish failed — ' + e.message, 'bad'); }
  });
}

function wireAreas() {
  const root = SHELL.$('#jb-tab-body');
  if (!root) return;

  root.addEventListener('input', () => { STATE.dirty = true; });
  root.addEventListener('change', () => { STATE.dirty = true; });

  const newGroup = SHELL.$('#a-new-group');
  if (newGroup) newGroup.addEventListener('click', () => {
    if (!STATE.job.areaGroups) STATE.job.areaGroups = [];
    STATE.job.areaGroups.push({ id: 'g_' + Math.random().toString(36).slice(2, 7), name: '', areas: [] });
    STATE.dirty = true;
    paint();
  });

  SHELL.$$('[data-del-grp]').forEach(b => b.addEventListener('click', () => {
    const gi = +b.dataset.delGrp;
    if (!confirm('Remove this group and all its areas?')) return;
    STATE.job.areaGroups.splice(gi, 1);
    STATE.dirty = true; paint();
  }));

  SHELL.$$('[data-add-area]').forEach(b => b.addEventListener('click', () => {
    const gi = +b.dataset.addArea;
    if (!STATE.job.areaGroups[gi].areas) STATE.job.areaGroups[gi].areas = [];
    STATE.job.areaGroups[gi].areas.push({
      id: 'a_' + Math.random().toString(36).slice(2, 7),
      name: '',
      requiredPhotos: 0,
      requiredNotes: false,
      itpRequired: false,
      independentReview: false,
    });
    STATE.dirty = true; paint();
  }));

  SHELL.$$('[data-del-area]').forEach(b => b.addEventListener('click', () => {
    const [gi, ai] = b.dataset.delArea.split('.').map(Number);
    if (!confirm('Remove this area?')) return;
    STATE.job.areaGroups[gi].areas.splice(ai, 1);
    STATE.dirty = true; paint();
  }));

  const save = SHELL.$('#a-save');
  if (save) save.addEventListener('click', async () => {
    // collect form values
    const groups = STATE.job.areaGroups || [];
    SHELL.$$('[data-grp]').forEach(el => { groups[+el.dataset.grp].name = el.value.trim(); });
    SHELL.$$('[data-area-name]').forEach(el => {
      const [gi, ai] = el.dataset.areaName.split('.').map(Number);
      groups[gi].areas[ai].name = el.value.trim();
    });
    SHELL.$$('[data-area-photos]').forEach(el => {
      const [gi, ai] = el.dataset.areaPhotos.split('.').map(Number);
      groups[gi].areas[ai].requiredPhotos = Math.max(0, parseInt(el.value, 10) || 0);
    });
    SHELL.$$('[data-area-notes]').forEach(el => {
      const [gi, ai] = el.dataset.areaNotes.split('.').map(Number);
      groups[gi].areas[ai].requiredNotes = el.checked;
    });
    SHELL.$$('[data-area-itp]').forEach(el => {
      const [gi, ai] = el.dataset.areaItp.split('.').map(Number);
      groups[gi].areas[ai].itpRequired = el.checked;
    });
    SHELL.$$('[data-area-witness]').forEach(el => {
      const [gi, ai] = el.dataset.areaWitness.split('.').map(Number);
      groups[gi].areas[ai].independentReview = el.checked;
    });

    // validation
    const seen = new Set();
    for (const g of groups) {
      const k = g.id || g.name;
      if (seen.has(k)) { SHELL.toast('Duplicate group "' + g.name + '"', 'bad'); return; }
      seen.add(k);
      const seenA = new Set();
      for (const a of (g.areas || [])) {
        const ak = a.id || (g.id + ':' + a.name);
        if (seenA.has(ak)) { SHELL.toast('Duplicate area "' + a.name + '" in "' + g.name + '"', 'bad'); return; }
        seenA.add(ak);
      }
    }

    save.disabled = true; save.textContent = 'Saving…';
    try {
      await SHELL.api('/api/jobs?id=' + encodeURIComponent(STATE.jobId), { method: 'PUT', body: { areaGroups: groups } });
      STATE.dirty = false;
      SHELL.toast('Areas saved · live now', 'ok');
      await loadJob(STATE.jobId); paint();
    } catch (e) {
      SHELL.toast('Save failed — ' + e.message, 'bad');
      save.disabled = false; save.textContent = 'Save area structure';
    }
  });
}

SHELL.boot();
</script>
</body>
</html>
