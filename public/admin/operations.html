<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl · overview</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1b34">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="/admin/_shell.js"></script>

<!--
  /admin/operations · Overview (phase 03 of the site-office rebuild)
  ───────────────────────────────────────────────────────────────

  Per brief §03: "Exception dashboard. NOT a list of numbers."

  The page answers ONE question: what is not as it should be? Passive
  metrics ("12 jobs", "8 users") are demoted from cards to the pulse
  strip — a single row of four numbers, equal weight, each clickable
  to its queue.

  Below the pulse, three inbox stacks (§04) — hours, snags, setup.
  Each is a queue with a drain-it button. Below those, a list of
  exception cards — verb cards, not stat cards, sorted by business
  cost.  Beside it, a scoped activity column (§14): the last 12
  events that touched the org.

  No "Welcome back, Daniel". No hero. The page opens cold and goes
  straight to what's wrong.
-->

<style>
  .ov-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 1080px) {
    .ov-grid { grid-template-columns: 1fr; }
  }

  .ov-main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .ov-inboxes { display: grid; gap: 10px; }

  .ov-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
  }
  .ov-card.empty { background: transparent; border-style: dashed; }

  .ov-section-head {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--ff-mono);
    font-size: 10.5px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface-2);
  }
  .ov-section-head b { color: var(--ink-2); font-weight: 600; letter-spacing: .04em; }
  .ov-section-head a { color: var(--ink-2); }

  .ov-empty {
    padding: 22px 18px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }
  .ov-empty b { color: var(--ink); font-family: var(--ff-display); font-weight: 600; }

  .ov-pulse { margin-bottom: 16px; }

  /* Inline metric/action styling that the list-row consumes via slots. */
  list-row .lr-action a.btn-sm {
    background: var(--surface-2);
    border-color: var(--line);
    color: var(--ink);
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: 12.5px;
  }
  list-row .lr-action a.btn-sm:hover { background: var(--surface-3); }

  /* Page-head date — kept calm. No greeting, no hero. */
  .ov-head {
    margin-bottom: 18px;
    display: flex; align-items: baseline; gap: 12px;
    flex-wrap: wrap;
  }
  .ov-head h1 {
    font-family: var(--ff-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -.012em;
    color: var(--ink);
    margin: 0;
  }
  .ov-head .sub { color: var(--muted); font-size: 13.5px; }
  .ov-head .ov-head-spacer { flex: 1; }
  /* Admin-only preview link to the leading-hand surface so admin can
     spot-check what their LHs see without re-logging. Hidden for any
     other role via JS. */
  .ov-head-link {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-2);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(13,27,52,.25);
    transition: text-decoration-color .15s, color .15s;
  }
  .ov-head-link:hover { color: var(--ink); text-decoration-color: var(--ink); }
</style>
</head>
<body>

<script>
'use strict';

/* ── State ─────────────────────────────────────────────────────────
   Loaded once on render; SHELL.boot already pre-fetched jobs,
   pending hours, snags, users, quotes. We only need to top up with
   the week's hours + yesterday's submitters. ─────────────────── */

window.PAGE = {
  id: 'operations',
  title: 'Overview',
  crumb: 'Overview',
  async render() {
    SHELL.$('#page').innerHTML = `<div class="ov-empty"><b>Loading…</b></div>`;
    const data = await loadOverview();
    paintOverview(data);
  }
};

async function loadOverview() {
  const now = new Date();
  const todayIso = SHELL._iso(now);
  const yest = new Date(now); yest.setDate(yest.getDate() - 1);
  const yestIso = SHELL._iso(yest);
  const weekMon = SHELL.isoWeekMonday();
  const weekFrom = SHELL._iso(weekMon);
  const weekToD = new Date(weekMon); weekToD.setDate(weekToD.getDate() + 7);
  const weekTo = SHELL._iso(weekToD);

  const jobs    = SHELL.JOBS || [];
  const users   = SHELL.USERS || [];
  const snags   = SHELL.OPEN_SNAGS || [];
  const pending = SHELL.PENDING_ENTRIES || [];
  const quotes  = SHELL.QUOTES || [];

  let weekHoursTotal = 0;
  let yesterdaySubmitters = new Set();
  let recentEntries = [];
  try {
    const r = await SHELL.api(`/api/time-entries-overview?fromDate=${encodeURIComponent(weekFrom)}&toDate=${encodeURIComponent(weekTo)}`);
    const entries = r.entries || [];
    recentEntries = entries;
    for (const e of entries) {
      if (!e.date) continue;
      weekHoursTotal += Number(e.totalHours) || 0;
      if (e.date === yestIso && e.userId) yesterdaySubmitters.add(e.userId);
    }
  } catch (e) {
    // Soft-fail — the rest of the page still renders.
    console.warn('overview: failed to fetch week hours', e);
  }

  return {
    jobs, users, snags, pending, quotes,
    weekHoursTotal, yesterdaySubmitters, recentEntries,
    todayIso, yestIso,
  };
}

/* ── Render ────────────────────────────────────────────────────────
   Top: date + sub. Then pulse strip. Then a two-column grid:
   inboxes + exceptions left, activity right. ────────────────── */

function paintOverview(d) {
  const activeJobs   = d.jobs.filter(j => (j.status || 'active') === 'active');
  const setupGaps    = computeSetupGaps(activeJobs);
  const oldSnags     = (d.snags || []).filter(s => ageDays(s.createdAt || s.date) > 7);
  const activeTrad   = (d.users || []).filter(u => u.role === 'tradie' && !u.archived);
  const ydayIsWorkday = (() => {
    const dow = new Date(d.yestIso).getDay();
    return dow >= 1 && dow <= 5;
  })();
  const missingHrs   = ydayIsWorkday
    ? activeTrad.filter(u => !d.yesterdaySubmitters.has(u.id))
    : [];
  const dueSoonQ     = (d.quotes || []).filter(q => isQuoteDueSoon(q));
  const noRateTrad   = activeTrad.filter(u => !Number(u.hourlyRate));

  const page = SHELL.$('#page');
  page.innerHTML = `
    <div class="ov-head">
      <h1>${SHELL.escapeHtml(headlineDate())}</h1>
      <span class="sub">${activeJobs.length} active ${activeJobs.length === 1 ? 'job' : 'jobs'} · ${(d.users || []).length} on the books</span>
      <span class="ov-head-spacer"></span>
      ${(SHELL.ME && SHELL.ME.role === 'admin') ? `<a class="ov-head-link" href="/lh" title="Preview the leading-hand surface">Field control →</a>` : ''}
    </div>

    <div class="ov-pulse" id="ov-pulse"></div>

    <div class="ov-grid">
      <div class="ov-main">
        <div class="ov-inboxes" id="ov-inboxes"></div>

        <div class="ov-card" id="ov-exceptions-card">
          <div class="ov-section-head"><span><b>Exceptions</b> · what's not as it should be</span></div>
          <div id="ov-exceptions-list"></div>
        </div>
      </div>

      <div>
        <div class="ov-card" id="ov-activity-card">
          <div class="ov-section-head"><span><b>Activity</b> · last 12</span></div>
          <div id="ov-activity-list"></div>
        </div>
      </div>
    </div>
  `;

  /* ── Pulse strip ──
     setItems must run AFTER the element is connected. The component's
     connectedCallback calls _renderFromChildren → setItems([]) since
     there are no light-DOM children, which would wipe an earlier
     setItems call. Append first, then set. */
  const pulseEl = document.createElement('pulse-strip');
  document.getElementById('ov-pulse').appendChild(pulseEl);
  pulseEl.setItems([
    { label: 'Hours',   value: d.weekHoursTotal.toFixed(1), sub: 'this week',  href: '/admin/hours' },
    { label: 'Pending', value: String((d.pending || []).length), sub: 'approvals', href: '/admin/approvals' },
    { label: 'Snags',   value: String((d.snags || []).length),  sub: 'open',     href: '/admin/snags' },
    { label: 'Jobs',    value: String(activeJobs.length),       sub: 'active',   href: '/admin/jobs' },
  ]);

  /* ── Three primary inboxes (§04) ── */
  const inboxesEl = document.getElementById('ov-inboxes');
  inboxesEl.innerHTML = '';

  if ((d.pending || []).length) {
    const oldestAge = oldestAgeDays(d.pending);
    const sev = oldestAge > 3 ? 'bad' : oldestAge > 1 ? 'warn' : 'ok';
    inboxesEl.appendChild(mkInbox({
      label: 'Hours pending',
      count: d.pending.length,
      severity: sev,
      summary: summarisePending(d.pending),
      actionLabel: 'Review →',
      actionHref: '/admin/approvals',
    }));
  }
  if ((d.snags || []).length) {
    const priority = d.snags.filter(s => (s.priority || '').toLowerCase() === 'high').length;
    const sev = priority > 0 ? 'bad' : oldSnags.length ? 'warn' : 'ok';
    inboxesEl.appendChild(mkInbox({
      label: 'Snags open',
      count: d.snags.length,
      severity: sev,
      summary: `${priority} priority · oldest ${oldestAgeDaysSnag(d.snags)} day${oldestAgeDaysSnag(d.snags) === 1 ? '' : 's'}`,
      actionLabel: 'Triage →',
      actionHref: '/admin/snags',
    }));
  }
  if (setupGaps.length) {
    // Compute the dominant gap category across all setup-gaps so the
    // inbox-summary can name the actual missing piece ("3 jobs · client
    // missing") rather than a generic catch-all. Falls back to a
    // mixed-list label when the gaps span multiple categories.
    const tally = {};
    for (const sg of setupGaps) {
      for (const m of sg.missing) tally[m] = (tally[m] || 0) + 1;
    }
    const topGaps = Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 2);
    const summary = topGaps.length
      ? `${setupGaps.length} ${setupGaps.length === 1 ? 'job' : 'jobs'} · ` + topGaps.map(([k, n]) => `${n} ${k}`).join(' · ')
      : `${setupGaps.length} ${setupGaps.length === 1 ? 'job' : 'jobs'} · template / areas / crew missing`;
    inboxesEl.appendChild(mkInbox({
      label: 'Awaiting setup',
      count: setupGaps.length,
      severity: 'warn',
      summary,
      actionLabel: 'Set up →',
      actionHref: '/admin/jobs?filter=setup-gaps',
    }));
  }
  if (!inboxesEl.children.length) {
    inboxesEl.innerHTML = `
      <div class="ov-card empty" style="padding: 28px 22px; text-align: center">
        <div style="font-family: var(--ff-display); font-weight: 700; font-size: 17px; color: var(--ink);">All inboxes at zero.</div>
        <div style="color: var(--muted); font-size: 13px; margin-top: 6px;">Hours · Snags · Setup — nothing pending.</div>
      </div>
    `;
  }

  /* ── Exception cards — verb cards, sorted by business cost ── */
  const exList = document.getElementById('ov-exceptions-list');
  const exceptions = [];

  // Blocks payment first (oldest snags → reputation, payment hold risk).
  if (oldSnags.length) {
    exceptions.push({
      status: 'red',
      label: `${oldSnags.length} snag${oldSnags.length === 1 ? '' : 's'} older than 7 days`,
      sub: 'risking payment hold',
      action: { href: '/admin/snags?age=7', label: 'Triage →' },
    });
  }
  // Costs money next.
  if (missingHrs.length) {
    exceptions.push({
      status: 'yellow',
      label: `${missingHrs.length} worker${missingHrs.length === 1 ? '' : 's'} missing hours yesterday`,
      sub: missingHrs.slice(0, 3).map(u => firstName(u)).join(' · ') + (missingHrs.length > 3 ? ` · +${missingHrs.length - 3}` : ''),
      action: { href: '/admin/hours', label: 'Chase →' },
    });
  }
  // Note: setup-gaps are already shown above as an inbox stack — we
  // leave them off the exception list to avoid double-surfacing. A
  // later phase can promote critical gaps (job starts within a week
  // and has no crew) as exception rows.
  // Affects future quoting.
  if (dueSoonQ.length) {
    exceptions.push({
      status: 'yellow',
      label: `${dueSoonQ.length} quote${dueSoonQ.length === 1 ? '' : 's'} due today or tomorrow`,
      sub: dueSoonQ.slice(0, 2).map(q => q.builder || q.address || q.id).join(' · '),
      action: { href: '/admin/quotes', label: 'Price →' },
    });
  }
  // Breaks accountability.
  if (noRateTrad.length && SHELL.ME && SHELL.ME.role === 'admin') {
    exceptions.push({
      status: 'yellow',
      label: `${noRateTrad.length} tradie${noRateTrad.length === 1 ? '' : 's'} with no rate set`,
      sub: noRateTrad.slice(0, 3).map(u => firstName(u)).join(' · ') + (noRateTrad.length > 3 ? ` · +${noRateTrad.length - 3}` : ''),
      action: { href: '/admin/crew?filter=no-rate', label: 'Set rates →' },
    });
  }

  if (!exceptions.length) {
    exList.innerHTML = `
      <div class="ov-empty">
        <b>Nothing exceptional.</b><br>
        No old snags, no missing hours, no quotes due, no rate gaps.
      </div>
    `;
  } else {
    exList.innerHTML = '';
    for (const ex of exceptions) {
      const row = document.createElement('list-row');
      row.setAttribute('status', ex.status);
      row.setAttribute('name', ex.label);
      if (ex.sub) row.setAttribute('sub', ex.sub);
      const action = document.createElement('div');
      action.setAttribute('slot', 'action');
      action.innerHTML = `<a class="btn btn-sm" href="${ex.action.href}">${ex.action.label}</a>`;
      row.appendChild(action);
      exList.appendChild(row);
    }
  }

  /* ── Activity column (last 12) ── */
  paintActivity(d, document.getElementById('ov-activity-list'));
}

/* ── Inbox factory ─────────────────────────────────────────────── */
function mkInbox({ label, count, severity, summary, actionLabel, actionHref }) {
  const el = document.createElement('inbox-stack');
  el.setAttribute('label', label);
  el.setAttribute('count', String(count));
  el.setAttribute('severity', severity);
  el.setAttribute('summary', summary);
  el.setAttribute('action-label', actionLabel);
  el.setAttribute('action-href', actionHref);
  return el;
}

/* ── Activity ─────────────────────────────────────────────────────
   Until §14's append-only server log lands (phase 09), we synthesise
   the activity stream from the data already in memory: recent snag
   updates, recent hours submissions. Sorted newest-first. ────── */

function paintActivity(d, container) {
  const events = [];
  for (const s of (d.snags || [])) {
    const t = s.createdAt || s.date;
    if (!t) continue;
    events.push({
      ts: new Date(t).getTime(),
      status: (s.priority || '').toLowerCase() === 'high' ? 'red' : 'yellow',
      name: s.title || s.description || 'Snag raised',
      sub: `${SHELL.escapeHtml(s.location || s.jobName || '')}${s.location && s.jobName ? ' · ' : ''}${SHELL.escapeHtml(s.userName || '')}${(s.location || s.jobName) && s.userName ? ' · ' : ''}${SHELL._ago(t)}`,
      href: `/admin/snags?id=${encodeURIComponent(s.id || '')}`,
    });
  }
  for (const p of (d.pending || [])) {
    const t = p.submittedAt || p.date;
    if (!t) continue;
    events.push({
      ts: new Date(t).getTime(),
      status: 'yellow',
      name: `Hours · ${Number(p.totalHours || 0).toFixed(1)}h`,
      sub: `${SHELL.escapeHtml(p.userName || p.userId || '')} · ${SHELL._ago(t)}`,
      href: '/admin/approvals',
    });
  }
  for (const e of (d.recentEntries || [])) {
    if (!e.date || (e.status && e.status !== 'approved')) continue;
    const t = e.approvedAt || e.submittedAt || e.date;
    if (!t) continue;
    events.push({
      ts: new Date(t).getTime(),
      status: 'green',
      name: `Approved · ${Number(e.totalHours || 0).toFixed(1)}h`,
      sub: `${SHELL.escapeHtml(e.userName || e.userId || '')} · ${SHELL._ago(t)}`,
    });
  }
  events.sort((a, b) => b.ts - a.ts);

  if (!events.length) {
    container.innerHTML = `<div class="ov-empty">No recent activity.</div>`;
    return;
  }
  container.innerHTML = '';
  for (const ev of events.slice(0, 12)) {
    const row = document.createElement('list-row');
    row.setAttribute('status', ev.status || 'none');
    row.setAttribute('name', ev.name);
    if (ev.sub) row.setAttribute('sub', ev.sub);
    if (ev.href) row.setAttribute('href', ev.href);
    container.appendChild(row);
  }
}

/* ── Helpers ──────────────────────────────────────────────────── */

function computeSetupGaps(activeJobs) {
  const out = [];
  const tradies = (SHELL.USERS || []).filter(u => u.role === 'tradie' || u.role === 'leadingHand');
  const clients = (SHELL.USERS || []).filter(u => u.role === 'client' && !u.archived);
  for (const j of activeJobs) {
    const missing = [];
    if (!(j.areaGroups || []).length)     missing.push('areas');
    if (!(j.roughInTasks || []).length)   missing.push('rough-in');
    if (!(j.fitOffTasks || []).length)    missing.push('fit-off');
    const crewN = tradies.filter(u => (u.assignedJobIds || []).includes(j.id)).length;
    if (!crewN) missing.push('crew');
    // Client + contacts + site address aren't strictly "rigidity" gaps —
    // the job can run without them — but they're the business gaps
    // admin needs to chase before invoicing or scheduling. Surfacing
    // them as part of setup-gaps means the admin's queue includes
    // "Birdwood has no client" alongside "Birdwood has no areas".
    const hasClient = j.clientUserId && clients.some(c => c.id === j.clientUserId);
    if (!hasClient) missing.push('client');
    if (!j.siteAddress) missing.push('address');
    if (!j.siteContactName && !j.siteContactPhone) missing.push('contacts');
    if (missing.length) out.push({ job: j, missing });
  }
  return out;
}

function ageDays(iso) {
  if (!iso) return 0;
  const t = new Date(iso).getTime();
  if (!isFinite(t)) return 0;
  return Math.max(0, Math.floor((Date.now() - t) / 86400000));
}

function oldestAgeDays(entries) {
  let oldest = Infinity;
  for (const e of entries) {
    const t = new Date(e.submittedAt || e.date).getTime();
    if (isFinite(t) && t < oldest) oldest = t;
  }
  return isFinite(oldest) ? Math.max(0, Math.floor((Date.now() - oldest) / 86400000)) : 0;
}

function oldestAgeDaysSnag(snags) {
  let oldest = Infinity;
  for (const s of snags) {
    const t = new Date(s.createdAt || s.date).getTime();
    if (isFinite(t) && t < oldest) oldest = t;
  }
  return isFinite(oldest) ? Math.max(0, Math.floor((Date.now() - oldest) / 86400000)) : 0;
}

function summarisePending(pending) {
  const users = new Set();
  for (const p of pending) if (p.userId) users.add(p.userId);
  const oldest = oldestAgeDays(pending);
  return `${users.size} ${users.size === 1 ? 'tradie' : 'tradies'} · oldest ${oldest} day${oldest === 1 ? '' : 's'}`;
}

function isQuoteDueSoon(q) {
  if (!q || !q.dueDate) return false;
  if (['lost', 'declined', 'archived', 'converted_to_job'].includes(q.status)) return false;
  const due = new Date(q.dueDate).getTime();
  if (!isFinite(due)) return false;
  const tomorrowEnd = Date.now() + 2 * 86400000;
  return due <= tomorrowEnd;
}

function firstName(u) {
  if (!u) return '';
  const s = u.firstName || u.username || u.name || '';
  return s.split(/[\s._-]+/).filter(Boolean)[0] || s;
}

function headlineDate() {
  const now = new Date();
  return now.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
}
</script>
</body>
</html>
