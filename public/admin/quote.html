<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · quote</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
const QUOTE_STATUSES = [
  { v:'draft',            l:'Draft',           tone:'navy' },
  { v:'reviewing',        l:'Reviewing',       tone:'warn' },
  { v:'estimating',       l:'Estimating',      tone:'warn' },
  { v:'submitted',        l:'Submitted',       tone:'navy' },
  { v:'accepted',         l:'Accepted',        tone:'ok' },
  { v:'won',              l:'Won',             tone:'ok' },
  { v:'lost',             l:'Lost',            tone:'bad' },
  { v:'declined',         l:'Declined',        tone:'bad' },
  { v:'converted_to_job', l:'Converted',       tone:'ok' },
  { v:'archived',         l:'Archived',        tone:'navy' },
];
const SECTIONS = [
  { id:'overview',    label:'Overview' },
  { id:'documents',   label:'Documents' },
  { id:'ai',          label:'AI Review' },
  { id:'structure',   label:'Structure' },
  { id:'materials',   label:'Materials' },
  { id:'sourcing',    label:'Sourcing' },
  { id:'labour',      label:'Labour' },
  { id:'provisional', label:'Provisional' },
  { id:'pricing',     label:'Pricing & totals' },
  { id:'risks',       label:'Risks & assumptions' },
  { id:'summary',     label:'Summary' },
];

let STATE = {
  quoteId: null,
  open: null,            // full bundle
  section: 'overview',
  wholesalersCache: null,
};

window.PAGE = {
  id: 'quotes',
  title: 'Quote',
  crumb: 'Quotes',
  async render() {
    // URL: /admin/quotes/<id>?sec=overview
    const path = location.pathname.replace(/\/+$/, '');
    const id = decodeURIComponent(path.split('/').pop() || '');
    if (!id || id === 'quotes') { location.href = '/admin/quotes'; return; }
    STATE.quoteId = id;
    const params = new URLSearchParams(location.search);
    if (params.get('sec') && SECTIONS.find(s => s.id === params.get('sec'))) STATE.section = params.get('sec');

    SHELL.$('#page').innerHTML = `<div class="empty"><div class="empty-title">Loading quote…</div></div>`;
    await loadOpen();
    paint();
  },
};

async function loadOpen() {
  try {
    STATE.open = await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId));
  } catch (e) {
    SHELL.$('#page').innerHTML = `<div class="empty"><div class="empty-title">Failed to load quote</div><div class="empty-sub">${SHELL.escapeHtml(e.message)}</div></div>`;
    throw e;
  }
}

async function reloadAndPaint() {
  await loadOpen();
  paint();
}

function paint() {
  if (!STATE.open) return;
  const q = STATE.open.quote || {};
  const st = QUOTE_STATUSES.find(s => s.v === q.status) || { l: q.status, tone: 'navy' };

  SHELL.$('#page').innerHTML = `
    <div class="ws-head">
      <div>
        <div class="ws-crumb"><a href="/admin/quotes">Quotes</a> · ${SHELL.escapeHtml(q.id || '')}${q.version > 1 ? ' · Rev ' + q.version : ''}</div>
        <div class="ws-h1">${SHELL.escapeHtml(q.name || '(unnamed)')}</div>
        <div class="ws-meta">
          <span class="pill pill-${st.tone}"><span class="pill-dot"></span>${st.l}</span>
          ${q.builder ? `<span>Builder: <b>${SHELL.escapeHtml(q.builder)}</b></span>` : ''}
          ${q.dueDate ? `<span>Due <b>${SHELL.escapeHtml(q.dueDate)}</b></span>` : ''}
          ${q.siteAddress ? `<span>${SHELL.escapeHtml(q.siteAddress)}</span>` : ''}
          ${q.convertedJobId ? `<span>· <a href="/admin/jobs/${SHELL.escapeHtml(q.convertedJobId)}">Live job ${SHELL.escapeHtml(q.convertedJobId)} ↗</a></span>` : ''}
        </div>
      </div>
      <div class="ws-actions">
        ${(q.status !== 'converted_to_job') ? `<button class="btn" id="dup-quote">Duplicate</button>
          <button class="btn" id="rev-quote">+ Revision</button>` : ''}
      </div>
    </div>

    <div class="tabs">
      ${SECTIONS.map(s => `<a class="tab ${STATE.section === s.id ? 'active' : ''}" href="#" data-sec="${s.id}">${s.label}</a>`).join('')}
    </div>

    <div id="qsec"></div>
  `;

  SHELL.$$('a[data-sec]').forEach(t => t.addEventListener('click', e => {
    e.preventDefault();
    STATE.section = t.dataset.sec;
    const url = new URL(location.href);
    url.searchParams.set('sec', STATE.section);
    history.replaceState(null, '', url);
    paint();
  }));
  const dup = SHELL.$('#dup-quote'); if (dup) dup.addEventListener('click', duplicateQuote);
  const rev = SHELL.$('#rev-quote'); if (rev) rev.addEventListener('click', reviseQuote);

  renderSection();
}

function renderSection() {
  const host = SHELL.$('#qsec');
  switch (STATE.section) {
    case 'overview':    return renderOverview(host);
    case 'documents':   return renderDocuments(host);
    case 'ai':          return renderAi(host);
    case 'structure':   return renderStructure(host);
    case 'materials':   return renderMaterials(host);
    case 'sourcing':    return renderSourcing(host);
    case 'labour':      return renderLabour(host);
    case 'provisional': return renderProvisional(host);
    case 'pricing':     return renderPricing(host);
    case 'risks':       return renderRisks(host);
    case 'summary':     return renderSummary(host);
  }
}

// ───────────────────────── Top-level ops ─────────────────────────
async function duplicateQuote() {
  if (!confirm('Duplicate this quote as a new draft? Documents are not copied.')) return;
  try {
    const r = await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=duplicate', { method: 'POST', body: {} });
    SHELL.toast('Duplicated', 'ok');
    if (r.quote && r.quote.id) location.href = '/admin/quotes/' + r.quote.id;
  } catch (e) { SHELL.toast('Duplicate failed — ' + e.message, 'bad'); }
}
async function reviseQuote() {
  if (!confirm('Create a new revision? Estimate carries forward; documents do not.')) return;
  try {
    const r = await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=revise', { method: 'POST', body: {} });
    SHELL.toast('Revision created', 'ok');
    if (r.quote && r.quote.id) location.href = '/admin/quotes/' + r.quote.id;
  } catch (e) { SHELL.toast('Revise failed — ' + e.message, 'bad'); }
}

// ───────────────────────── Overview ─────────────────────────
function renderOverview(host) {
  const q = STATE.open.quote;
  const statusOpts = QUOTE_STATUSES.map(s => `<option value="${s.v}"${q.status === s.v ? ' selected' : ''}>${s.l}</option>`).join('');
  host.innerHTML = `
    <div class="card">
      <div class="card-hdr"><div><div class="card-title">Quote details</div><div class="card-sub">Edit basics. Status drives the lifecycle.</div></div>
        <button class="btn btn-primary" id="qo-save">Save changes</button></div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Name</label><input class="input" id="qo-name" value="${SHELL.escapeHtml(q.name || '')}"></div>
        <div class="field"><label class="field-lbl">Status</label><select class="select" id="qo-status">${statusOpts}</select></div>
      </div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Builder</label><input class="input" id="qo-builder" value="${SHELL.escapeHtml(q.builder || '')}"></div>
        <div class="field"><label class="field-lbl">Due date</label><input class="input" id="qo-due" type="date" value="${SHELL.escapeHtml(q.dueDate || '')}"></div>
      </div>
      <div class="field"><label class="field-lbl">Site address</label><input class="input" id="qo-addr" value="${SHELL.escapeHtml(q.siteAddress || '')}"></div>
      <div class="three-col">
        <div class="field"><label class="field-lbl">Contact name</label><input class="input" id="qo-cname" value="${SHELL.escapeHtml(q.contactName || '')}"></div>
        <div class="field"><label class="field-lbl">Contact email</label><input class="input" id="qo-cemail" type="email" value="${SHELL.escapeHtml(q.contactEmail || '')}"></div>
        <div class="field"><label class="field-lbl">Contact phone</label><input class="input" id="qo-cphone" value="${SHELL.escapeHtml(q.contactPhone || '')}"></div>
      </div>
      <div class="field"><label class="field-lbl">Description / scope summary</label><textarea class="textarea" id="qo-desc" rows="4">${SHELL.escapeHtml(q.description || '')}</textarea></div>
    </div>
    ${activityTimeline()}
  `;
  SHELL.$('#qo-save').addEventListener('click', saveOverview);
}
async function saveOverview() {
  const body = {
    name: SHELL.$('#qo-name').value.trim(),
    status: SHELL.$('#qo-status').value,
    builder: SHELL.$('#qo-builder').value.trim(),
    dueDate: SHELL.$('#qo-due').value,
    siteAddress: SHELL.$('#qo-addr').value.trim(),
    contactName: SHELL.$('#qo-cname').value.trim(),
    contactEmail: SHELL.$('#qo-cemail').value.trim(),
    contactPhone: SHELL.$('#qo-cphone').value.trim(),
    description: SHELL.$('#qo-desc').value.trim(),
  };
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId), { method: 'PATCH', body });
    SHELL.toast('Saved', 'ok');
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
}

function activityTimeline() {
  const open = STATE.open || {};
  const q = open.quote || {};
  const events = [];
  const push = (when, kind, label, meta) => { if (when) events.push({ when, kind, label, meta }); };
  push(q.createdAt, 'created', 'Created', q.createdBy ? 'by ' + q.createdBy : '');
  ((open.documents && open.documents.documents) || []).forEach(d => {
    if (d.status === 'archived') return;
    push(d.uploadedAt, 'doc', 'Document — ' + (d.title || d.fileName || 'untitled'),
         (d.documentType || '') + (d.uploadedBy ? ' · ' + d.uploadedBy : ''));
  });
  ((open.ai && open.ai.reviews) || []).forEach(r => push(r.createdAt, 'ai', 'AI review run', r.modelOrSource || ''));
  ((open.pricingRequests && open.pricingRequests.requests) || []).forEach(r => {
    push(r.createdAt, 'preq', 'Price request — ' + ((r.wholesaler && r.wholesaler.name) || '?'), r.itemCount + ' items');
    push(r.sentAt, 'psent', 'Sent — ' + ((r.wholesaler && r.wholesaler.name) || '?'), '');
    push(r.replyAt, 'preply', 'Replied — ' + ((r.wholesaler && r.wholesaler.name) || '?'),
         r.replyTotalExGst != null ? SHELL.fmtMoney2(r.replyTotalExGst) + ' ex-GST' : '');
  });
  if (q.acceptance && q.acceptance.acceptedAt) {
    push(q.acceptance.acceptedAt, 'accept', 'Accepted by client', (q.acceptance.clientName || '') + (q.acceptance.method ? ' · ' + q.acceptance.method : ''));
  }
  if (q.convertedJobId) push(q.updatedAt, 'convert', 'Converted to live job', q.convertedJobId);
  if (q.updatedAt && q.updatedAt !== q.createdAt && !q.convertedJobId) push(q.updatedAt, 'edit', 'Last edited', '');
  if (events.length <= 1) return '';
  events.sort((a, b) => (b.when || '').localeCompare(a.when || ''));
  const dot = k => ({ created:'var(--ok)', doc:'var(--muted)', ai:'var(--accent)', preq:'var(--muted)', psent:'var(--ink)', preply:'var(--ok)', accept:'var(--ok)', convert:'var(--ok)', edit:'var(--muted)' })[k] || 'var(--muted)';
  const rows = events.slice(0, 12).map(ev => {
    const dt = new Date(ev.when);
    const dStr = isNaN(dt) ? '—' : dt.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
    const tStr = isNaN(dt) ? '' : dt.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
    return `<div style="display:grid;grid-template-columns:80px 14px 1fr;gap:10px;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--rule)">
      <div style="font-family:var(--mono);font-size:10.5px;color:var(--muted)">${dStr}<br><span style="opacity:.7">${tStr}</span></div>
      <div style="width:7px;height:7px;border-radius:50%;background:${dot(ev.kind)};margin-top:5px"></div>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--ink)">${SHELL.escapeHtml(ev.label)}</div>
        ${ev.meta ? `<div style="font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px">${SHELL.escapeHtml(ev.meta)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="card" style="margin-top:14px">
    <div class="card-hdr"><div><div class="card-title">Activity timeline</div>
      <div class="card-sub">Derived from existing data. ${events.length > 12 ? events.length + ' events total · showing latest 12.' : ''}</div></div></div>
    <div>${rows}</div></div>`;
}

// ───────────────────────── Documents ─────────────────────────
function renderDocuments(host) {
  const docs = ((STATE.open.documents && STATE.open.documents.documents) || []).filter(d => d.status !== 'archived');
  host.innerHTML = `
    <div class="card">
      <div class="card-hdr">
        <div><div class="card-title">Documents <span class="card-count">${docs.length}</span></div>
          <div class="card-sub">Plans, scope, specs, addendums. Carried across to the live job on conversion.</div></div>
        <label class="btn btn-primary" style="cursor:pointer">+ Upload
          <input type="file" id="qd-file" accept="application/pdf,image/*,.docx,.xlsx" style="display:none" multiple></label>
      </div>
      <div id="qd-progress" style="display:none;margin-bottom:8px;padding:8px 12px;background:var(--surface-2);border-radius:6px;font-size:13px;color:var(--muted)"></div>
      <div id="qd-list">${docsListHtml(docs)}</div>
    </div>
  `;
  SHELL.$('#qd-file').onchange = e => uploadDocs(e.target.files);
}
function docsListHtml(docs) {
  if (!docs.length) return '<div class="empty"><div class="empty-title">No documents yet</div><div class="empty-sub">Upload PDFs or images of the tender plans / spec.</div></div>';
  return docs.sort((a, b) => (a.documentType || '').localeCompare(b.documentType || '')).map(d => {
    const sizeKb = d.sizeBytes ? Math.round(d.sizeBytes / 1024) + ' KB' : '';
    const stTone = d.status === 'current' ? 'ok' : d.status === 'superseded' ? 'warn' : 'navy';
    const stLbl = d.status === 'current' ? 'Current' : d.status === 'superseded' ? 'Superseded' : 'Archived';
    return `<div class="row" style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--rule);border-radius:8px;background:var(--surface);margin-bottom:6px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:var(--ink)">
          ${d.drawingNumber ? SHELL.escapeHtml(d.drawingNumber) : '<span style="color:var(--muted);font-weight:500">No drawing no.</span>'}
          ${d.revision ? `<span style="color:var(--muted);font-weight:500"> · Rev ${SHELL.escapeHtml(d.revision)}</span>` : ''}
          <span class="pill pill-${stTone}" style="margin-left:6px"><span class="pill-dot"></span>${stLbl}</span>
        </div>
        <div style="font-size:13px;color:var(--ink-2);margin-top:2px">${SHELL.escapeHtml(d.title || d.fileName)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${SHELL.escapeHtml(d.documentType || '')} · ${SHELL.escapeHtml(d.fileName)} ${sizeKb ? '· ' + sizeKb : ''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
        <a class="btn" href="${SHELL.escapeHtml(d.url || '#')}" target="_blank" rel="noopener">Open</a>
        ${d.status === 'current' ? `<button class="btn" data-doc-status="${SHELL.escapeHtml(d.id)}" data-set="superseded">Mark superseded</button>` : `<button class="btn" data-doc-status="${SHELL.escapeHtml(d.id)}" data-set="current">Mark current</button>`}
        <button class="btn btn-danger" data-doc-archive="${SHELL.escapeHtml(d.id)}">Archive</button>
      </div>
    </div>`;
  }).join('') + bindDocActions();
}
function bindDocActions() {
  // Insert a tiny delegated-listener bootstrap (idempotent re-bind on re-render).
  setTimeout(() => {
    SHELL.$$('button[data-doc-status]').forEach(b => b.onclick = () => setDocStatus(b.dataset.docStatus, b.dataset.set));
    SHELL.$$('button[data-doc-archive]').forEach(b => b.onclick = () => archiveDoc(b.dataset.docArchive));
  }, 0);
  return '';
}
async function uploadDocs(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  const prog = SHELL.$('#qd-progress');
  let done = 0, failed = 0;
  prog.style.display = 'block';
  for (const file of files) {
    prog.textContent = `Uploading ${done + 1}/${files.length}: ${file.name}…`;
    try {
      const dataUrl = await new Promise((res, rej) => {
        const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(file);
      });
      const r = await fetch('/api/quote-documents?quoteId=' + encodeURIComponent(STATE.quoteId), {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin',
        body: JSON.stringify({ fileName: file.name, mimeType: file.type, dataUrl, title: file.name.replace(/\.[^.]+$/, '') }),
      });
      if (!r.ok) failed++; else done++;
    } catch { failed++; }
  }
  SHELL.$('#qd-file').value = '';
  prog.textContent = `${done} uploaded${failed ? ' · ' + failed + ' failed' : ''}`;
  setTimeout(() => prog.style.display = 'none', 2500);
  await reloadAndPaint();
}
async function setDocStatus(docId, status) {
  try {
    await fetch('/api/quote-documents?quoteId=' + encodeURIComponent(STATE.quoteId) + '&id=' + encodeURIComponent(docId), {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin',
      body: JSON.stringify({ status }),
    }).then(r => { if (!r.ok) throw new Error('Failed'); });
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Update failed — ' + e.message, 'bad'); }
}
async function archiveDoc(docId) {
  if (!confirm('Archive this document?')) return;
  try {
    await fetch('/api/quote-documents?quoteId=' + encodeURIComponent(STATE.quoteId) + '&id=' + encodeURIComponent(docId), {
      method: 'DELETE', credentials: 'same-origin',
    }).then(r => { if (!r.ok) throw new Error('Failed'); });
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Archive failed — ' + e.message, 'bad'); }
}

// ───────────────────────── AI Review ─────────────────────────
function renderAi(host) {
  const reviews = ((STATE.open.ai && STATE.open.ai.reviews) || []).slice().reverse();
  host.innerHTML = `
    <div class="card">
      <div class="card-hdr"><div><div class="card-title">AI-assisted review</div>
        <div class="card-sub">Paste scope text from the tender. Output is saved as <b>suggestions only</b> — review and apply selectively.</div></div></div>
      <div class="field"><label class="field-lbl">Paste scope / spec text</label>
        <textarea id="qa-text" class="textarea" rows="8" style="font-family:var(--mono)" placeholder="Paste relevant tender scope, spec extract, or notes…"></textarea></div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <button class="btn btn-accent" id="qa-run">Run review</button>
        <span style="font-size:11px;color:var(--muted)">Anthropic-API-backed when ANTHROPIC_API_KEY is set; otherwise the paste is preserved for manual review.</span>
      </div>
      <div id="qa-list">
        ${reviews.length ? reviews.map(reviewHtml).join('') : '<div class="empty"><div class="empty-title">No AI reviews yet</div></div>'}
      </div>
    </div>
  `;
  SHELL.$('#qa-run').addEventListener('click', runAi);
  SHELL.$$('button[data-apply-review]').forEach(b => b.addEventListener('click', () => applyReview(b.dataset.applyReview)));
}
function reviewHtml(r) {
  const dt = r.createdAt ? new Date(r.createdAt).toLocaleString('en-AU') : '';
  const list = arr => Array.isArray(arr) && arr.length
    ? `<ul style="margin:4px 0 8px 18px;padding:0">${arr.map(x => `<li style="font-size:12px;color:var(--ink)">${SHELL.escapeHtml(typeof x === 'string' ? x : (x.name || JSON.stringify(x)))}</li>`).join('')}</ul>`
    : '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">— none —</div>';
  return `<div style="border:1px solid var(--rule);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--surface)">
    <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Review ${SHELL.escapeHtml(dt)} · ${SHELL.escapeHtml(r.createdBy || '')}</div>
    ${r.summary ? `<div style="font-size:13px;margin-top:6px">${SHELL.escapeHtml(r.summary)}</div>` : ''}
    ${r.rawModelNotes ? `<div style="font-size:11px;color:var(--accent);margin-top:6px;font-style:italic">${SHELL.escapeHtml(r.rawModelNotes)}</div>` : ''}
    <div class="two-col" style="margin-top:10px">
      <div>
        <div class="card-sub" style="margin-bottom:2px">Suggested area groups</div>
        ${list((r.suggestedAreaGroups || []).map(g => g.name + (Array.isArray(g.areas) && g.areas.length ? ' (' + g.areas.join(', ') + ')' : '')))}
        <div class="card-sub" style="margin-bottom:2px">Systems</div>${list(r.suggestedSystems)}
        <div class="card-sub" style="margin-bottom:2px">Risks</div>${list(r.risks)}
      </div>
      <div>
        <div class="card-sub" style="margin-bottom:2px">Rough-in tasks</div>${list(r.suggestedTasks && r.suggestedTasks.roughIn)}
        <div class="card-sub" style="margin-bottom:2px">Fit-off tasks</div>${list(r.suggestedTasks && r.suggestedTasks.fitOff)}
        <div class="card-sub" style="margin-bottom:2px">Assumptions</div>${list(r.assumptions)}
      </div>
    </div>
    <div style="margin-top:10px">
      <button class="btn" data-apply-review='${SHELL.escapeHtml(JSON.stringify(r))}'>Apply selected suggestions</button>
    </div>
  </div>`;
}
async function runAi() {
  const text = SHELL.$('#qa-text').value.trim();
  if (!text) { SHELL.toast('Paste scope text first', 'warn'); return; }
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=ai-review', { method: 'POST', body: { sourceText: text } });
    SHELL.toast('Review saved', 'ok');
    await reloadAndPaint();
  } catch (e) { SHELL.toast('AI review failed — ' + e.message, 'bad'); }
}
async function applyReview(reviewJson) {
  let r; try { r = JSON.parse(reviewJson); } catch { return; }
  if (!confirm('Apply suggestions to structure / risks / assumptions / materials? Existing data preserved.')) return;
  try {
    const cur = STATE.open.structure || { areaGroups: [] };
    const newAreaGroups = [...(cur.areaGroups || [])];
    for (const g of (r.suggestedAreaGroups || [])) {
      if (!g.name) continue;
      if (!newAreaGroups.find(x => x.name === g.name)) {
        newAreaGroups.push({ name: g.name, areas: (g.areas || []).map(name => ({ name })), workPackages: [] });
      }
    }
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=structure', { method: 'PATCH', body: { areaGroups: newAreaGroups } });
    const curNotes = STATE.open.notes || {};
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=notes', {
      method: 'PATCH', body: {
        assumptions: [...(curNotes.assumptions || []), ...(r.assumptions || [])],
        exclusions: curNotes.exclusions || [],
        risks: [...(curNotes.risks || []), ...(r.risks || [])],
        clarifications: curNotes.clarifications || [],
      }
    });
    for (const m of (r.suggestedMaterials || [])) {
      if (!m.name) continue;
      await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=materials', {
        method: 'POST', body: { name: m.name, category: m.category || 'Other', quantity: m.quantity != null ? Number(m.quantity) : null, confidence: m.confidence || 'low', notes: m.notes || '', source: 'ai_suggested', status: 'needs_review' },
      });
    }
    SHELL.toast('Suggestions applied', 'ok');
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Apply failed — ' + e.message, 'bad'); }
}

function structureHtml(groups) {

          return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap">

}
function bindStructure(groups) {
  SHELL.$$('input[data-group-name]').forEach(el => el.oninput = () => { groups[Number(el.dataset.groupName)].name = el.value; });
  SHELL.$$('input[data-area-name]').forEach(el => el.oninput = () => {

    groups[gi].areas = groups[gi].areas || [];

function bulkAddAreas(gi, groups) {
  const panel = SHELL.openPanel({

  });
  panel.querySelector('#qba-add').addEventListener('click', () => {
    const linesText = panel.querySelector('#qba-lines').value;
    const prefix = panel.querySelector('#qba-prefix').value.trim();
    const from = parseInt(panel.querySelector('#qba-from').value, 10);
    const to = parseInt(panel.querySelector('#qba-to').value, 10);
    const names = [];
    if (linesText.trim()) {
      linesText.split(/\r?\n/).forEach(l => { const t = l.trim(); if (t) names.push(t); });
    } else if (prefix && Number.isFinite(from) && Number.isFinite(to) && from > 0 && to >= from && (to - from) <= 500) {
      for (let n = from; n <= to; n++) names.push(prefix + ' ' + n);

    groups[gi].areas = groups[gi].areas || [];

async function psAdd(kind) {
  const name = prompt('Name (e.g. "Light fittings — client supplied")');
  if (!name || !name.trim()) return;
  const amtRaw = prompt('Amount (ex-GST, $)');
  if (amtRaw == null) return;
  const amount = Number(amtRaw);
  if (!isFinite(amount) || amount < 0) { SHELL.toast('Amount must be ≥ 0', 'bad'); return; }
  const desc = prompt('Description (optional)') || '';
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=provisional', {
      method: 'POST', body: { kind, name: name.trim(), amountExGst: amount, description: desc.trim() }
    });
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Add failed — ' + e.message, 'bad'); }
}
async function psEdit(itemId) {
  const it = ((STATE.open.provisional && STATE.open.provisional.items) || []).find(x => x.id === itemId);
  if (!it) return;

  const amount = Number(amtRaw);

  const desc = prompt('Description', it.description || '');
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=provisional&itemId=' + encodeURIComponent(itemId), {
      method: 'PATCH', body: { name: name.trim(), amountExGst: amount, description: (desc || '').trim() }
    });
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Update failed — ' + e.message, 'bad'); }
}
async function psDel(itemId) {
  if (!confirm('Remove this item?')) return;

async function prNew() {
  const wholesalers = await loadWholesalers();
  let wholesalerId = null, inline = null;
  if (wholesalers.length) {
    const opts = wholesalers.map((w, i) => (i + 1) + '. ' + w.name + (w.branch ? ' (' + w.branch + ')' : '') + (w.email ? ' — ' + w.email : '')).join('\n');
    const pickRaw = prompt('Pick a wholesaler by number (or "new" to enter inline):\n\n' + opts + '\n\nNumber:');
    if (pickRaw == null) return;
    if (/^new$/i.test(pickRaw.trim())) {
      const name = prompt('Wholesaler name'); if (!name) return;
      const email = prompt('Wholesaler email (optional)') || '';
      inline = { name: name.trim(), email: email.trim(), branch: '' };
    } else {
      const i = Number(pickRaw) - 1;
      if (!isFinite(i) || !wholesalers[i]) { SHELL.toast('No wholesaler at that number', 'bad'); return; }
      wholesalerId = wholesalers[i].id;
    }
  } else {
    const name = prompt('No saved wholesalers yet.\nWholesaler name:'); if (!name) return;
    const email = prompt('Wholesaler email (optional)') || '';
    inline = { name: name.trim(), email: email.trim(), branch: '' };
  }
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=pricing-requests', {
      method: 'POST', body: wholesalerId ? { wholesalerId } : { wholesaler: inline }
    });
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Could not create — ' + e.message, 'bad'); }
}

      method: 'PATCH', body: { status: 'replied', replyTotalExGst: total, replyNotes: notes.trim() }

async function prDel(reqId) {
  if (!confirm('Remove this price request? Captured reply data will be lost.')) return;
  try {
    await fetch('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=pricing-requests&reqId=' + encodeURIComponent(reqId), { method: 'DELETE', credentials: 'same-origin' })

    await reloadAndPaint();

}
async function prCopy(reqId) {
  const reqs = ((STATE.open.pricingRequests && STATE.open.pricingRequests.requests) || []);
  const it = reqs.find(r => r.id === reqId);
  if (!it) return;
  try { await navigator.clipboard.writeText(it.body); SHELL.toast('Copied', 'ok'); }
  catch {
    const ta = document.createElement('textarea'); ta.value = it.body; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    SHELL.toast('Copied', 'ok');
  }
}

async function pricingSave() {
  const markupTbl = {};
  const def = Number(SHELL.$('#qpr-mu-default').value);
  if (isFinite(def)) markupTbl.default = def;
  SHELL.$$('.qpr-mu-cat').forEach(inp => {
    const cat = inp.getAttribute('data-cat'); const v = Number(inp.value);
    if (cat && isFinite(v)) markupTbl[cat] = v;
  });
  const ovRaw = SHELL.$('#qpr-override').value;
  const body = {
    materialMarkupPct: markupTbl,
    labourSellRate: Number(SHELL.$('#qpr-labour-sell').value),
    labourCostMode: SHELL.$('#qpr-labour-mode').value,
    labourCostRate: Number(SHELL.$('#qpr-labour-cost').value),
    contingencyPct: Number(SHELL.$('#qpr-cont').value),
    gstPct: Number(SHELL.$('#qpr-gst').value),
    validityDays: Number(SHELL.$('#qpr-val').value),
    overrideTotalExGst: ovRaw === '' ? null : Number(ovRaw),
  };
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=pricing', { method: 'PATCH', body });
    SHELL.toast('Saved', 'ok');
    await reloadAndPaint();

}
async function pricingAddCat() {
  const name = prompt('Category name (e.g. "Switchgear")'); if (!name || !name.trim()) return;
  const pct = prompt('Markup % for ' + name.trim(), '25'); if (pct == null) return;
  const v = Number(pct); if (!isFinite(v)) { SHELL.toast('Markup must be a number', 'bad'); return; }
  const cur = (STATE.open && STATE.open.pricing && STATE.open.pricing.materialMarkupPct) || { default: 25 };
  const next = Object.assign({}, cur); next[name.trim()] = v;
  try {
    await SHELL.api('/api/quotes?id=' + encodeURIComponent(STATE.quoteId) + '&action=pricing', { method: 'PATCH', body: { materialMarkupPct: next } });
    await reloadAndPaint();
  } catch (e) { SHELL.toast('Add failed — ' + e.message, 'bad'); }
}
async function pricingDelCat(cat) {
  const cur = (STATE.open && STATE.open.pricing && STATE.open.pricing.materialMarkupPct) || { default: 25 };

async function pricingClearOverride() {

  }</tbody></table>` : '<p class="muted">No materials captured.</p>';

    labour.map(l => `<tr><td>${esc(l.areaGroup || '')}</td><td>${esc(l.area || '')}</td><td>${esc(l.system || '')}</td><td>${esc(l.stage || '')}</td><td>${esc(l.task || '')}</td><td class="r">${(Number(l.estimatedHours) || 0).toFixed(1)}</td><td class="r">${l.hourlyRate ? '$' + l.hourlyRate : '—'}</td></tr>`).join('')
  }</tbody></table>` : '<p class="muted">No labour lines captured.</p>';
  const noteList = (arr, lbl) => Array.isArray(arr) && arr.length ? `<h3>${lbl}</h3><ul>${arr.map(n => '<li>' + esc(n) + '</li>').join('')}</ul>` : '';

  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${esc(quote.name || 'Quote')} — Estimate</title>
    <style>
      body{font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#0f172a;max-width:880px;margin:30px auto;padding:0 24px}
      h1{font-size:22px;margin:0 0 4px;color:#0d1f35}
      h2{font-size:15px;margin:24px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px;color:#0d1f35;text-transform:uppercase;letter-spacing:.4px}
      h3{font-size:13px;margin:14px 0 4px;color:#0d1f35}
      .muted{color:#64748b;font-style:italic}
      .meta{color:#475569;font-size:12px;margin-bottom:14px}
      .total{background:#fef3c7;border:1px solid #fde68a;padding:10px 14px;border-radius:8px;font-size:14px;margin:8px 0 14px}
      table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0 12px}
      th{background:#f1f5f9;text-align:left;padding:6px 8px;border-bottom:1px solid #cbd5e1;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
      td{padding:5px 8px;border-bottom:1px solid #f1f5f9}
      td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
      ul.areas{margin:4px 0 12px 18px;padding:0}
      ul.wp{margin:4px 0 8px 16px;padding:0;font-size:12px;color:#475569}
      ul{margin:4px 0 8px 18px}
      @media print{body{margin:0;padding:0 16px}}
    </style></head><body>
    <h1>${esc(quote.name || '(unnamed)')}</h1>
    <div class="meta">${[quote.builder ? 'Builder: <b>' + esc(quote.builder) + '</b>' : '', quote.siteAddress ? esc(quote.siteAddress) : '', quote.dueDate ? 'Due ' + esc(quote.dueDate) : '', 'Quote ID: ' + esc(quote.id), 'Generated ' + today].filter(Boolean).join(' · ')}</div>
    ${quote.description ? '<h2>Scope summary</h2><p>' + esc(quote.description).replace(/\n/g, '<br>') + '</p>' : ''}
    ${(t.totalIncGst > 0) ? `<div class="total"><div style="display:grid;grid-template-columns:1fr auto;gap:4px 18px;font-size:13px;color:#475569">
      <span>Materials sell</span><span style="text-align:right">${fmt$(t.materials.sell)}</span>
      <span>Labour sell (${labH.toFixed(1)} h)</span><span style="text-align:right">${fmt$(t.labour.sell)}</span>
      <span>Provisional sums (${t.provisional.count})</span><span style="text-align:right">${fmt$(t.provisional.total)}</span>
      ${t.contingency.amount ? `<span>Contingency (${t.contingency.pct}%)</span><span style="text-align:right">${fmt$(t.contingency.amount)}</span>` : ''}
      <span style="font-weight:700;color:#0d1f35">Subtotal (ex-GST)</span><span style="text-align:right;font-weight:700">${fmt$(t.subtotalExGst)}</span>
      <span>GST (${(t.gstPct || 0).toFixed(1)}%)</span><span style="text-align:right">${fmt$(t.gst)}</span>
      <span style="font-size:15px;font-weight:800;color:#0d1f35">Total (inc-GST)</span><span style="text-align:right;font-size:15px;font-weight:800">${fmt$(t.totalIncGst)}</span>
    </div></div>` : '<p class="muted">Pricing not captured yet.</p>'}
    <h2>Structure</h2>${groupsHtml}
    <h2>Materials estimate</h2>${matsHtml}
    <h2>Labour estimate</h2>${labHtml}
    ${psItems.length ? `<h2>Provisional sums &amp; allowances</h2><table><thead><tr><th>Type</th><th>Item</th><th>Description</th><th class="r">Amount</th></tr></thead><tbody>${psItems.map(i => `<tr><td>${i.kind === 'allowance' ? 'Allowance' : 'PS'}</td><td>${esc(i.name || '')}</td><td>${esc(i.description || '')}</td><td class="r">${fmt$(Number(i.amountExGst) || 0)}</td></tr>`).join('')}</tbody></table>` : ''}
    ${noteList(notes.assumptions, 'Assumptions')}
    ${noteList(notes.exclusions, 'Exclusions')}
    ${noteList(notes.risks, 'Risks')}
    ${noteList(notes.clarifications, 'Clarifications needed')}
    ${docs.length ? `<h2>Documents on file</h2><ul>${docs.map(d => `<li>${esc(d.drawingNumber || '')}${d.revision ? ' Rev ' + esc(d.revision) : ''} — ${esc(d.title || d.fileName)}</li>`).join('')}</ul>` : ''}
    <script>setTimeout(function(){window.print()},250);<\/script>
  </body></html>`);
  w.document.close();
}
function printClient() {
  const q = STATE.open; if (!q) return;
  const quote = q.quote;
  const groups = (q.structure && q.structure.areaGroups) || [];
  const notes = q.notes || {};
  const psItems = (q.provisional && q.provisional.items) || [];
  const t = q.totals || {};
  const p = q.pricing || {};
  const fmt$ = n => '$' + (Number(n) || 0).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const today = new Date().toLocaleDateString('en-AU');
  const validityDays = Number(p.validityDays || 30);
  const validUntil = (() => { const d = new Date(); d.setDate(d.getDate() + validityDays); return d.toLocaleDateString('en-AU'); })();
  const w = window.open('', '_blank');
  if (!w) { SHELL.toast('Popup blocked', 'warn'); return; }
  const esc = SHELL.escapeHtml;
  const structureHtml = groups.length ? groups.map(g => `<h3>${esc(g.name || '(unnamed)')}</h3><ul>${(g.areas || []).map(a => `<li>${esc(a.name || '')}</li>`).join('') || '<li>—</li>'}</ul>`).join('') : '';
  const noteList = (arr, lbl) => Array.isArray(arr) && arr.length ? `<h3>${lbl}</h3><ul>${arr.map(n => '<li>' + esc(n) + '</li>').join('')}</ul>` : '';
  const totalBlock = (t.totalIncGst > 0) ? `<div class="quote-total">
    <div style="display:grid;grid-template-columns:1fr auto;gap:6px 24px;font-size:14px;color:#475569">
      <span>Subtotal (ex-GST)</span><span style="text-align:right">${fmt$(t.subtotalExGst)}</span>
      <span>GST (${(t.gstPct || 0).toFixed(1)}%)</span><span style="text-align:right">${fmt$(t.gst)}</span>
      <span style="font-size:18px;font-weight:800;color:#0d1f35;border-top:2px solid #0d1f35;padding-top:8px;margin-top:4px">Total (inc-GST)</span>
      <span style="text-align:right;font-size:18px;font-weight:800;color:#0d1f35;border-top:2px solid #0d1f35;padding-top:8px;margin-top:4px">${fmt$(t.totalIncGst)}</span>
    </div>
    <div class="quote-total-sub">Quotation valid for ${validityDays} days · expires ${validUntil}</div>
  </div>` : `<div class="quote-total quote-total-tba">Pricing on request<div class="quote-total-sub">A detailed quotation will follow once scope is confirmed.</div></div>`;
  const psBlock = psItems.length ? `<h3>Provisional sums &amp; allowances</h3>
    <p style="font-size:12px;color:#475569;margin:0 0 6px">Provisional / allowed-for amounts; final cost based on actual selection or scope at time of order.</p>
    <table><thead><tr><th>Item</th><th>Description</th><th style="text-align:right">Amount (ex-GST)</th></tr></thead><tbody>${psItems.map(i => `<tr><td>${esc(i.name || '')}</td><td>${esc(i.description || '')}</td><td style="text-align:right">${fmt$(Number(i.amountExGst) || 0)}</td></tr>`).join('')}</tbody></table>` : '';

  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${esc(quote.name || 'Quote')}</title>
    <style>
      body{font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#0f172a;max-width:760px;margin:30px auto;padding:0 32px}
      header{border-bottom:2px solid #0d1f35;padding-bottom:14px;margin-bottom:20px}
      h1{font-size:24px;margin:0 0 6px;color:#0d1f35}
      h2{font-size:14px;margin:24px 0 8px;color:#0d1f35;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #cbd5e1;padding-bottom:4px}
      h3{font-size:13px;margin:14px 0 4px;color:#0d1f35}
      .meta{color:#475569;font-size:12px}
      .quote-total{background:#fef3c7;border:1px solid #fde68a;padding:14px 18px;border-radius:10px;margin:16px 0 24px}
      .quote-total-sub{font-size:12px;color:#64748b;margin-top:2px}
      .quote-total-tba{font-size:16px;font-weight:800;color:#0d1f35}
      table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0 12px}
      th{background:#f1f5f9;padding:6px 8px;text-transform:uppercase;letter-spacing:.4px;font-size:11px}
      td{padding:5px 8px;border-bottom:1px solid #f1f5f9}
      .signoff{margin-top:36px;padding-top:14px;border-top:1px solid #cbd5e1;font-size:12px;color:#475569}
      footer{margin-top:36px;padding-top:14px;border-top:1px solid #cbd5e1;font-size:11px;color:#94a3b8;text-align:center}
      @media print{body{margin:0;padding:0 16px}}
    </style></head><body>
    <header><h1>${esc(quote.name || 'Quote')}</h1>
      <div class="meta">${quote.builder ? '<b>For:</b> ' + esc(quote.builder) + ' · ' : ''}${quote.siteAddress ? esc(quote.siteAddress) + ' · ' : ''}Quote date <b>${today}</b>${(t.totalIncGst > 0) ? ' · Valid until <b>' + esc(validUntil) + '</b>' : ''}</div>
    </header>
    ${quote.description ? '<h2>Project</h2><p>' + esc(quote.description).replace(/\n/g, '<br>') + '</p>' : ''}
    ${totalBlock}
    ${structureHtml ? '<h2>Scope of work</h2>' + structureHtml : ''}
    ${psBlock}
    ${noteList(notes.assumptions, 'Assumptions')}
    ${noteList(notes.exclusions, 'Exclusions')}
    ${noteList(notes.clarifications, 'Clarifications required')}
    <div class="signoff">Prepared by <b>bühl electrical</b><br>${quote.contactName ? esc(quote.contactName) + (quote.contactEmail ? ' · ' + esc(quote.contactEmail) : '') + '<br>' : ''}Quote ref: ${esc(quote.id)}${quote.version ? ' (rev ' + quote.version + ')' : ''}</div>
    <footer>This document does not include internal labour breakdowns or per-item cost detail.</footer>
    <script>setTimeout(function(){window.print()},250);<\/script>
  </body></html>`);
  w.document.close();
}
