<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · variations</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
// Variations — register of changes raised in the field, priced, and
// submitted to the builder/client. Crews flag from Phil; office prices
// and submits; status tracked through to approval/rejection.
window.PAGE = {
  id: 'variations',
  title: 'Variations',
  crumb: 'Variations',
  async render() {
    SHELL.$('#page').innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-h1">Variations</div>
          <div class="page-sub">Changes raised from the field, priced and submitted. Status from draft → priced → submitted → approved/rejected.</div>
        </div>
      </div>

      <div class="empty" style="text-align:left;padding:28px 32px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
          <span style="font-family:var(--mono,monospace);font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--accent-ink);background:var(--accent);padding:4px 10px;border-radius:2px">Feature under construction</span>
          <span style="color:var(--muted);font-size:13px">Field-raise flow lands first (Phil); office register lands alongside.</span>
        </div>
        <div class="empty-title" style="font-size:18px;text-align:left">When live, this register will show:</div>
        <ul style="margin:14px 0 0 18px;color:var(--ink-2);line-height:1.85;font-size:14px">
          <li>Every variation, with the photo + description + extra hours captured from Phil</li>
          <li>Status: draft / priced / submitted / approved / rejected</li>
          <li>Office price action — labour, materials, margin</li>
          <li>Submit-to-builder action with audit trail</li>
          <li>Recovery dashboard: hours raised vs hours approved per job</li>
        </ul>
        <div style="margin-top:20px;color:var(--muted);font-size:13px">
          Today: scope-change notes live in the job's Activity feed. Crews still record extras via Snag triage where the work is reactive.
        </div>
      </div>
    `;
  }
};

SHELL.boot();
</script>
</body>
</html>
