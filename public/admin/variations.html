<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · variations</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1b34">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>

<!--
  /admin/variations · Register (pass-1)
  ─────────────────────────────────────
  No server-side variations API exists yet. The register here works
  fully — create, edit, transition status, filter — but persistence is
  **local-browser only** via localStorage (key: buhlos.variations.v1).
  Other admin sessions won't see your entries until the /api/variations
  endpoint lands. This is called out in the page (yellow strip) so
  no one is misled. Once the API ships, the readVariations / writeVariations
  helpers below swap to SHELL.api with no UI change.
  Builder / accounting handoff (e.g. Xero export) is explicitly
  FEATURE UNDER CONSTRUCTION — no fake integration.
-->

<style>
  .vr-kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .vr-kpi {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r, 10px);
    padding: 12px 14px;
  }
  .vr-kpi-l { font-family: var(--ff-mono, monospace); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .vr-kpi-v { font-family: var(--ff-display, 'Inter Tight', sans-serif); font-size: 26px; font-weight: 700; line-height: 1; margin-top: 6px; }
  .vr-kpi-v.amber { color: var(--amber, #d68a1a); }
  .vr-kpi-v.green { color: var(--ok, #1f8b5a); }
  .vr-kpi-v.red   { color: var(--bad, #c0312f); }
  .vr-kpi-d { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

  .vr-tools {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .vr-chip {
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    font-size: 12px; color: var(--ink-2);
    cursor: pointer; user-select: none;
  }
  .vr-chip.on {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .vr-tools input, .vr-tools select {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 6px;
    padding: 7px 10px;
    font: inherit; font-size: 13px;
  }

  .vr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .vr-table thead th {
    text-align: left; padding: 8px 6px;
    border-bottom: 1px solid var(--line);
    font-family: var(--ff-display, 'Inter Tight', sans-serif);
    font-weight: 600; color: var(--muted); font-size: 12px;
  }
  .vr-table tbody tr { border-bottom: 1px solid var(--line); cursor: pointer; }
  .vr-table tbody tr:hover { background: var(--surface-2); }
  .vr-table td { padding: 10px 6px; vertical-align: top; }
  .vr-num { font-family: var(--ff-mono, monospace); font-size: 12px; color: var(--muted); }
  .vr-title { font-weight: 600; color: var(--ink); }
  .vr-money { font-family: var(--ff-mono, monospace); font-variant-numeric: tabular-nums; }

  .vr-warn-uc {
    background: rgba(245,208,32,.16);
    border: 1px solid rgba(245,208,32,.5);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12.5px; color: var(--ink-2);
    margin-bottom: 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .vr-warn-uc-tag {
    background: var(--accent); color: var(--accent-ink);
    font-family: var(--ff-mono, monospace);
    font-size: 9.5px; letter-spacing: .14em;
    text-transform: uppercase; font-weight: 700;
    padding: 3px 7px; border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<script>
'use strict';

/* ── Storage (local-only pass-1) ─────────────────────────────── */
const LS_KEY = 'buhlos.variations.v1';
function readVariations() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function writeVariations(arr) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch (e) {
    SHELL.toast('Couldn’t save locally — ' + e.message, 'bad');
  }
}
function nextVariationNumber(existing) {
  let max = 0;
  existing.forEach(v => {
    const n = parseInt(String(v.number || '').replace(/^V/, ''), 10);
    if (Number.isFinite(n) && n > max) max = n;
  });
  return 'V' + String(max + 1).padStart(4, '0');
}

const STATUSES = ['draft', 'submitted', 'approved', 'rejected', 'invoiced'];
const SOURCES  = ['field', 'admin', 'builder', 'plan-change'];

const STATE = {
  jobs: [],
  variations: [],
  filter: 'all',
  jobFilter: 'all',
  search: '',
};

window.PAGE = {
  id: 'variations',
  title: 'Variations',
  crumb: 'Variations',
  async render() {
    SHELL.$('#page').innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-h1">Variations</div>
          <div class="page-sub">Scope changes from the field, priced and submitted. Draft → Submitted → Approved/Rejected → Invoiced.</div>
        </div>
        <div>
          <button id="vr-new" class="btn btn-primary" style="background:var(--ink);color:var(--surface);padding:8px 14px;border-radius:6px;border:0;font-weight:600;font-size:13px;cursor:pointer">+ New variation</button>
        </div>
      </div>
      <div id="vr-shell"><div class="empty"><div class="empty-title">Loading…</div></div></div>
    `;
    await loadJobs();
    STATE.variations = readVariations();
    paint();
    SHELL.$('#vr-new').addEventListener('click', () => openEditor(null));
  }
};

async function loadJobs() {
  try {
    const r = await SHELL.api('/api/jobs?withStats=1');
    STATE.jobs = (r.jobs || []).filter(j => j.status !== 'archived');
  } catch (e) { STATE.jobs = []; }
}

function paint() {
  const total      = STATE.variations.length;
  const draft      = STATE.variations.filter(v => v.status === 'draft').length;
  const submitted  = STATE.variations.filter(v => v.status === 'submitted').length;
  const approved   = STATE.variations.filter(v => v.status === 'approved').length;
  const rejected   = STATE.variations.filter(v => v.status === 'rejected').length;
  const invoiced   = STATE.variations.filter(v => v.status === 'invoiced').length;
  const valueOpen  = STATE.variations.filter(v => v.status === 'submitted' || v.status === 'approved').reduce((s, v) => s + (Number(v.estimatedValue) || 0), 0);
  const valueLost  = STATE.variations.filter(v => v.status === 'rejected').reduce((s, v) => s + (Number(v.estimatedValue) || 0), 0);

  const filtered = STATE.variations.filter(v => {
    if (STATE.filter !== 'all' && v.status !== STATE.filter) return false;
    if (STATE.jobFilter !== 'all' && v.jobId !== STATE.jobFilter) return false;
    if (STATE.search) {
      const q = STATE.search.toLowerCase();
      const hay = (v.title + ' ' + (v.description || '') + ' ' + (v.number || '') + ' ' + (v.builderRef || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

  SHELL.$('#vr-shell').innerHTML = `
    <div class="vr-warn-uc">
      <span class="vr-warn-uc-tag">Pass 1</span>
      <span>
        <strong style="color:var(--ink)">Persistence is local-browser only</strong> until <code>/api/variations</code> lands — other admin sessions won't see entries you create here yet.
        <strong style="color:var(--ink)">Builder + Xero handoff is FEATURE UNDER CONSTRUCTION</strong> — the "Submit to builder" / "Mark invoiced" actions move the status only; no email or accounting export is sent.
      </span>
    </div>

    <div class="vr-kpi-row">
      <div class="vr-kpi"><div class="vr-kpi-l">Total</div><div class="vr-kpi-v">${total}</div><div class="vr-kpi-d">${SHELL.pluralize(draft,'draft')}</div></div>
      <div class="vr-kpi"><div class="vr-kpi-l">Submitted</div><div class="vr-kpi-v ${submitted ? 'amber' : ''}">${submitted}</div><div class="vr-kpi-d">awaiting builder</div></div>
      <div class="vr-kpi"><div class="vr-kpi-l">Approved</div><div class="vr-kpi-v ${approved ? 'green' : ''}">${approved}</div><div class="vr-kpi-d">to invoice</div></div>
      <div class="vr-kpi"><div class="vr-kpi-l">Invoiced</div><div class="vr-kpi-v">${invoiced}</div><div class="vr-kpi-d">closed</div></div>
      <div class="vr-kpi"><div class="vr-kpi-l">Open value</div><div class="vr-kpi-v">${SHELL.fmtMoney ? SHELL.fmtMoney(valueOpen) : '$'+valueOpen}</div><div class="vr-kpi-d">submitted + approved</div></div>
      <div class="vr-kpi"><div class="vr-kpi-l">Lost value</div><div class="vr-kpi-v ${valueLost ? 'red' : ''}">${SHELL.fmtMoney ? SHELL.fmtMoney(valueLost) : '$'+valueLost}</div><div class="vr-kpi-d">rejected</div></div>
    </div>

    <div class="vr-tools">
      ${['all', ...STATUSES].map(s =>
        `<span class="vr-chip ${STATE.filter===s?'on':''}" data-status="${s}">${s[0].toUpperCase()+s.slice(1)}</span>`
      ).join('')}
      <select id="vr-job">
        <option value="all">All jobs</option>
        ${STATE.jobs.map(j => `<option value="${SHELL.escapeHtml(j.id)}"${STATE.jobFilter===j.id?' selected':''}>${SHELL.escapeHtml(j.name||j.id)}</option>`).join('')}
      </select>
      <input id="vr-q" placeholder="Search title, description, V-number…" value="${SHELL.escapeHtml(STATE.search)}" style="flex:1;min-width:200px;max-width:360px">
      <span style="color:var(--muted);font-size:12px;margin-left:auto">${SHELL.pluralize(filtered.length,'variation')}</span>
    </div>

    ${filtered.length ? `
      <div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r,10px);padding:8px 12px">
        <table class="vr-table">
          <thead><tr>
            <th>No.</th><th>Variation</th><th>Job</th><th>Source</th><th>Status</th><th style="text-align:right">Est. value</th><th>Created</th>
          </tr></thead>
          <tbody>
            ${filtered.map(v => `
              <tr data-id="${SHELL.escapeHtml(v.id)}">
                <td><span class="vr-num">${SHELL.escapeHtml(v.number || '—')}</span></td>
                <td>
                  <div class="vr-title">${SHELL.escapeHtml(v.title || '(untitled)')}</div>
                  ${v.builderRef ? `<div style="font-size:11.5px;color:var(--muted);margin-top:2px">Builder ref: ${SHELL.escapeHtml(v.builderRef)}</div>` : ''}
                </td>
                <td>${SHELL.escapeHtml(jobName(v.jobId))}</td>
                <td><span style="font-family:var(--ff-mono,monospace);font-size:11px;color:var(--muted)">${SHELL.escapeHtml(v.source || '—')}</span></td>
                <td>${statusPill(v.status)}</td>
                <td style="text-align:right"><span class="vr-money">${v.estimatedValue ? (SHELL.fmtMoney ? SHELL.fmtMoney(v.estimatedValue) : '$'+v.estimatedValue) : '—'}</span></td>
                <td style="color:var(--muted);font-size:11.5px;font-family:var(--ff-mono,monospace)">${SHELL._ago ? SHELL._ago(v.createdAt) : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : `<div class="empty"><div class="empty-title">No variations yet</div><div class="empty-sub">Hit "+ New variation" to start the register.</div></div>`}
  `;

  SHELL.$$('.vr-chip').forEach(c => c.addEventListener('click', () => { STATE.filter = c.dataset.status; paint(); }));
  SHELL.$('#vr-job').addEventListener('change', e => { STATE.jobFilter = e.target.value; paint(); });
  const q = SHELL.$('#vr-q');
  q.addEventListener('input', () => { STATE.search = q.value; paint(); SHELL.$('#vr-q').focus(); });

  SHELL.$$('.vr-table tbody tr').forEach(tr => tr.addEventListener('click', () => {
    const v = STATE.variations.find(x => x.id === tr.dataset.id);
    if (v) openEditor(v);
  }));
}

function jobName(id) {
  if (!id) return '—';
  const j = STATE.jobs.find(x => x.id === id);
  return j ? (j.name || j.id) : id;
}
function statusPill(s) {
  if (s === 'approved') return `<span class="pill pill-ok"><span class="pill-dot"></span>Approved</span>`;
  if (s === 'submitted') return `<span class="pill pill-info"><span class="pill-dot"></span>Submitted</span>`;
  if (s === 'rejected') return `<span class="pill pill-warn"><span class="pill-dot"></span>Rejected</span>`;
  if (s === 'invoiced') return `<span class="pill pill-ok"><span class="pill-dot"></span>Invoiced</span>`;
  return `<span class="pill"><span class="pill-dot"></span>Draft</span>`;
}

function openEditor(existing) {
  const isNew = !existing;
  const v = existing || {
    id: 'v_' + Math.random().toString(36).slice(2, 9),
    number: nextVariationNumber(STATE.variations),
    jobId: '',
    title: '',
    description: '',
    reason: '',
    source: 'field',
    status: 'draft',
    areaRef: '',
    stageRef: '',
    builderRef: '',
    labourHours: '',
    materialCost: '',
    estimatedValue: '',
    createdAt: new Date().toISOString(),
  };

  const panel = SHELL.openPanel({
    title: isNew ? 'New variation' : 'Edit variation ' + v.number,
    body: `
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <label><span style="font-size:12px;color:var(--muted)">Variation #</span>
            <input id="v-num" value="${SHELL.escapeHtml(v.number || '')}" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
          <label><span style="font-size:12px;color:var(--muted)">Builder ref</span>
            <input id="v-bref" value="${SHELL.escapeHtml(v.builderRef || '')}" placeholder="VO-12" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
        </div>
        <label><span style="font-size:12px;color:var(--muted)">Job</span>
          <select id="v-job" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px">
            <option value="">— pick a job —</option>
            ${STATE.jobs.map(j => `<option value="${SHELL.escapeHtml(j.id)}"${v.jobId===j.id?' selected':''}>${SHELL.escapeHtml(j.name||j.id)}</option>`).join('')}
          </select>
        </label>
        <label><span style="font-size:12px;color:var(--muted)">Title</span>
          <input id="v-title" value="${SHELL.escapeHtml(v.title || '')}" placeholder="e.g. Extra GPOs in banquet bar" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
        <label><span style="font-size:12px;color:var(--muted)">Description</span>
          <textarea id="v-desc" rows="3" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px;resize:vertical">${SHELL.escapeHtml(v.description || '')}</textarea></label>
        <label><span style="font-size:12px;color:var(--muted)">Reason / scope-change driver</span>
          <textarea id="v-reason" rows="2" placeholder="Client request, plan revision, on-site discovery…" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px;resize:vertical">${SHELL.escapeHtml(v.reason || '')}</textarea></label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <label><span style="font-size:12px;color:var(--muted)">Source</span>
            <select id="v-src" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px">
              ${SOURCES.map(s => `<option value="${s}"${v.source===s?' selected':''}>${s}</option>`).join('')}
            </select>
          </label>
          <label><span style="font-size:12px;color:var(--muted)">Status</span>
            <select id="v-status" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px">
              ${STATUSES.map(s => `<option value="${s}"${v.status===s?' selected':''}>${s}</option>`).join('')}
            </select>
          </label>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <label><span style="font-size:12px;color:var(--muted)">Area / stage ref</span>
            <input id="v-area" value="${SHELL.escapeHtml(v.areaRef || '')}" placeholder="Banquet bar / fit-off" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
          <label><span style="font-size:12px;color:var(--muted)">Labour estimate (hrs)</span>
            <input id="v-hrs" type="number" min="0" step="0.5" value="${SHELL.escapeHtml(String(v.labourHours||''))}" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <label><span style="font-size:12px;color:var(--muted)">Material cost ($)</span>
            <input id="v-mat" type="number" min="0" step="1" value="${SHELL.escapeHtml(String(v.materialCost||''))}" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
          <label><span style="font-size:12px;color:var(--muted)">Estimated total ($)</span>
            <input id="v-val" type="number" min="0" step="1" value="${SHELL.escapeHtml(String(v.estimatedValue||''))}" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:var(--surface);font:inherit;margin-top:4px"></label>
        </div>
        ${isNew ? '' : `
          <div style="background:var(--surface-2);padding:8px 10px;border-radius:6px;font-size:11.5px;color:var(--muted);font-family:var(--ff-mono,monospace)">
            ID ${SHELL.escapeHtml(v.id)} · created ${SHELL._ago ? SHELL._ago(v.createdAt) : ''}
          </div>
        `}
      </div>
    `,
    footer: `
      ${isNew ? '' : `<button id="v-delete" class="btn" style="border:1px solid var(--bad,#c0312f);color:var(--bad,#c0312f);background:transparent;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px">Delete</button>`}
      <button class="btn" onclick="SHELL.closePanel()" style="border:1px solid var(--line);padding:7px 12px;border-radius:6px;background:transparent;cursor:pointer;font-size:13px">Cancel</button>
      <button id="v-save" class="btn btn-primary" style="background:var(--ink);color:var(--surface);padding:8px 14px;border-radius:6px;border:0;font-weight:600;font-size:13px;cursor:pointer">${isNew?'Create':'Save'}</button>
    `,
  });
  panel.querySelector('#v-save').addEventListener('click', () => {
    const next = {
      ...v,
      number:         panel.querySelector('#v-num').value.trim() || v.number,
      jobId:          panel.querySelector('#v-job').value,
      title:          panel.querySelector('#v-title').value.trim(),
      description:    panel.querySelector('#v-desc').value.trim(),
      reason:         panel.querySelector('#v-reason').value.trim(),
      source:         panel.querySelector('#v-src').value,
      status:         panel.querySelector('#v-status').value,
      areaRef:        panel.querySelector('#v-area').value.trim(),
      builderRef:     panel.querySelector('#v-bref').value.trim(),
      labourHours:    Number(panel.querySelector('#v-hrs').value) || '',
      materialCost:   Number(panel.querySelector('#v-mat').value) || '',
      estimatedValue: Number(panel.querySelector('#v-val').value) || '',
      updatedAt:      new Date().toISOString(),
    };
    if (!next.title) { SHELL.toast('Title required', 'bad'); return; }
    if (!next.jobId) { SHELL.toast('Pick a job', 'bad'); return; }

    if (isNew) STATE.variations.push(next);
    else STATE.variations = STATE.variations.map(x => x.id === next.id ? next : x);
    writeVariations(STATE.variations);
    SHELL.toast(isNew ? 'Variation created (local-only)' : 'Saved (local-only)', 'ok');
    SHELL.closePanel();
    paint();
  });

  const del = panel.querySelector('#v-delete');
  if (del) del.addEventListener('click', () => {
    if (!confirm('Delete variation ' + v.number + '?')) return;
    STATE.variations = STATE.variations.filter(x => x.id !== v.id);
    writeVariations(STATE.variations);
    SHELL.toast('Deleted', 'ok');
    SHELL.closePanel();
    paint();
  });
}

SHELL.boot();
</script>
</body>
</html>
