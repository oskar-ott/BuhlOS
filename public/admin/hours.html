<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · hours</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
let STATE = {
  view: 'entries',          // entries | weekly | cost
  // Entries view
  entryStatus: 'all',       // all | submitted | approved | rejected | draft
  entryJob: 'all',
  entrySearch: '',
  entriesAll: [],
  // Weekly grid view
  weeklyAnchor: '',         // ISO Monday of the week being shown
  weeklyData: null,         // { entries, missing, jobs, users }
  weeklyJob: 'all',
  // Cost view
  costRange: 'thisMonth',   // thisMonth | lastMonth | last30 | last90 | all | custom
  costFrom: '',
  costTo: '',
  costData: null,
};

window.PAGE = {
  id: 'hours',
  title: 'Hours',
  crumb: 'Hours',
  async render() {
    const params = new URLSearchParams(location.search);
    if (params.get('view') === 'cost')   STATE.view = 'cost';
    if (params.get('view') === 'weekly') STATE.view = 'weekly';
    if (params.get('job')) STATE.entryJob = params.get('job');
    if (params.get('week')) STATE.weeklyAnchor = params.get('week');
    if (!STATE.weeklyAnchor) STATE.weeklyAnchor = SHELL._iso(SHELL.isoWeekMonday());
    paint();
    await loadActive();
  }
};

async function loadActive() {
  if (STATE.view === 'entries') return loadEntries();
  if (STATE.view === 'weekly')  return loadWeekly();
  return loadCost();
}

async function loadEntries() {
  try {
    const [submitted, approved, rejected, drafts] = await Promise.all([
      SHELL.api('/api/time-entries?scope=approver&status=submitted'),
      SHELL.api('/api/time-entries?scope=approver&status=approved').catch(() => ({ entries: [] })),
      SHELL.api('/api/time-entries?scope=approver&status=rejected').catch(() => ({ entries: [] })),
      SHELL.api('/api/time-entries?scope=approver&status=draft').catch(() => ({ entries: [] })),
    ]);
    const tag = (e, status) => ({ ...e, _statusTag: status });
    STATE.entriesAll = [
      ...(submitted.entries || []).map(e => tag(e, 'submitted')),
      ...(approved.entries  || []).map(e => tag(e, 'approved')),
      ...(rejected.entries  || []).map(e => tag(e, 'rejected')),
      ...(drafts.entries    || []).map(e => tag(e, 'draft')),
    ];
  } catch (e) { SHELL.toast('Failed to load entries — ' + e.message, 'bad'); }
  paint();
}

async function loadWeekly() {
  const monday = STATE.weeklyAnchor;
  const sunday = addDays(monday, 6);
  try {
    const qs = new URLSearchParams({ fromDate: monday, toDate: sunday });
    if (STATE.weeklyJob !== 'all') qs.set('jobId', STATE.weeklyJob);
    STATE.weeklyData = await SHELL.api('/api/time-entries-overview?' + qs.toString());
  } catch (e) { SHELL.toast('Failed to load weekly grid — ' + e.message, 'bad'); }
  paint();
}

async function loadCost() {
  const range = computeRange();
  const qs = new URLSearchParams();
  if (range.from) qs.set('fromDate', range.from);
  if (range.to)   qs.set('toDate',   range.to);
  try {
    STATE.costData = await SHELL.api('/api/costs' + (qs.toString() ? '?' + qs : ''));
  } catch (e) { SHELL.toast('Failed to load costs — ' + e.message, 'bad'); }
  paint();
}

function computeRange() {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0, 10);
  if (STATE.costRange === 'thisMonth') {
    const f = new Date(today.getFullYear(), today.getMonth(), 1);
    return { from: fmt(f), to: fmt(today) };
  }
  if (STATE.costRange === 'lastMonth') {
    const f = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const t = new Date(today.getFullYear(), today.getMonth(), 0);
    return { from: fmt(f), to: fmt(t) };
  }
  if (STATE.costRange === 'last30') {
    const f = new Date(today); f.setDate(today.getDate() - 30);
    return { from: fmt(f), to: fmt(today) };
  }
  if (STATE.costRange === 'last90') {
    const f = new Date(today); f.setDate(today.getDate() - 90);
    return { from: fmt(f), to: fmt(today) };
  }
  if (STATE.costRange === 'all') return { from: '', to: '' };
  if (STATE.costRange === 'custom') return { from: STATE.costFrom, to: STATE.costTo };
  return { from: '', to: '' };
}

function paint() {
  SHELL.$('#page').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-h1">Hours</div>
        <div class="page-sub">Time-entries from the field, weekly grid, approvals, labour cost roll-up, and payroll export.</div>
      </div>
      <div class="page-actions">
        <a class="btn" href="/admin-legacy#tab-hours" title="Field tools page — batch entry of hours on behalf of crew">+ Log for crew →</a>
        <a class="btn btn-accent" href="/admin/approvals">Approvals queue →</a>
      </div>
    </div>

    <div class="tabs">
      <a class="tab ${STATE.view === 'entries' ? 'active' : ''}" href="#" data-view="entries">Entries</a>
      <a class="tab ${STATE.view === 'weekly' ? 'active' : ''}"  href="#" data-view="weekly">Weekly grid</a>
      <a class="tab ${STATE.view === 'cost' ? 'active' : ''}"    href="#" data-view="cost">Cost roll-up</a>
    </div>

    <div id="hours-body"></div>
  `;
  SHELL.$$('a[data-view]').forEach(t => t.addEventListener('click', e => {
    e.preventDefault();
    STATE.view = t.dataset.view;
    const url = new URL(location.href); url.searchParams.set('view', STATE.view); history.replaceState(null, '', url);
    paint();
    loadActive();
  }));
  if (STATE.view === 'entries') paintEntries();
  else if (STATE.view === 'weekly') paintWeekly();
  else paintCost();
}

// ── Entries view ──────────────────────────────────────────────────────
function paintEntries() {
  const body = SHELL.$('#hours-body');
  if (!STATE.entriesAll.length) {
    body.innerHTML = '<div class="empty"><div class="empty-title">Loading…</div></div>';
    return;
  }
  // Build job dropdown options
  const jobIds = new Set();
  STATE.entriesAll.forEach(e => (e.allocations || []).forEach(a => { if (a.jobId) jobIds.add(a.jobId); }));
  const jobsById = {};
  (SHELL.JOBS || []).forEach(j => jobsById[j.id] = j);

  // Filter
  const q = STATE.entrySearch.toLowerCase();
  const filtered = STATE.entriesAll.filter(e => {
    if (STATE.entryStatus !== 'all' && e._statusTag !== STATE.entryStatus) return false;
    if (STATE.entryJob !== 'all' && !(e.allocations || []).some(a => a.jobId === STATE.entryJob)) return false;
    if (q) {
      const blob = `${e.userName || ''} ${e.notes || ''} ${(e.allocations || []).map(a => (jobsById[a.jobId] || {}).name || '').join(' ')}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const totalHours = filtered.reduce((s, e) => s + ((e.allocations || []).reduce((ss, a) => ss + (Number(a.hours) || 0), 0)), 0);
  const submittedCount = filtered.filter(e => e._statusTag === 'submitted').length;

  body.innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-l">Filtered entries</div><div class="kpi-v">${filtered.length}</div><div class="kpi-d">${STATE.entryStatus === 'all' ? 'across all statuses' : STATE.entryStatus}</div></div>
      <div class="kpi"><div class="kpi-l">Total hours</div><div class="kpi-v">${totalHours.toFixed(1)}<sup>h</sup></div></div>
      <div class="kpi"><div class="kpi-l">Submitted (waiting)</div><div class="kpi-v ${submittedCount ? 'amber' : 'green'}">${submittedCount}</div><div class="kpi-d">${submittedCount ? 'go to approvals queue' : 'all clear'}</div></div>
      <div class="kpi"><div class="kpi-l">Distinct submitters</div><div class="kpi-v">${new Set(filtered.map(e => e.userId)).size}</div></div>
    </div>

    <div class="toolbar">
      <div class="search">${SHELL.ICONS.search}<input id="se-i" placeholder="Search by user, notes, job…" value="${SHELL.escapeHtml(STATE.entrySearch)}"></div>
      <select class="select" id="se-status" style="max-width:160px">
        <option value="all"${STATE.entryStatus === 'all' ? ' selected' : ''}>All statuses</option>
        <option value="draft"${STATE.entryStatus === 'draft' ? ' selected' : ''}>Draft</option>
        <option value="submitted"${STATE.entryStatus === 'submitted' ? ' selected' : ''}>Submitted</option>
        <option value="approved"${STATE.entryStatus === 'approved' ? ' selected' : ''}>Approved</option>
        <option value="rejected"${STATE.entryStatus === 'rejected' ? ' selected' : ''}>Rejected</option>
      </select>
      <select class="select" id="se-job" style="max-width:200px">
        <option value="all"${STATE.entryJob === 'all' ? ' selected' : ''}>All jobs</option>
        ${[...jobIds].map(id => `<option value="${SHELL.escapeHtml(id)}"${STATE.entryJob === id ? ' selected' : ''}>${SHELL.escapeHtml((jobsById[id] || {}).name || id)}</option>`).join('')}
      </select>
      <div class="toolbar-spacer"></div>
      <span style="color:var(--muted);font-size:12px">${SHELL.pluralize(filtered.length, 'entry', 'entries')}</span>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead><tr>
          <th>Date</th><th>Submitter</th><th>Allocations</th><th class="table-num">Hours</th><th>Status</th><th></th>
        </tr></thead>
        <tbody>${filtered.length ? filtered.map(e => entryRow(e, jobsById)).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">No entries match the filters.</td></tr>'}</tbody>
      </table>
    </div>
  `;
  SHELL.$('#se-i').addEventListener('input', e => { STATE.entrySearch = e.target.value; paintEntries(); });
  SHELL.$('#se-status').addEventListener('change', e => { STATE.entryStatus = e.target.value; paintEntries(); });
  SHELL.$('#se-job').addEventListener('change', e => { STATE.entryJob = e.target.value; paintEntries(); });
  SHELL.$$('button[data-reopen]').forEach(b => b.addEventListener('click', () => reopenEntry(b.dataset.reopen, b.dataset.date)));
}

function entryRow(e, jobsById) {
  const totalH = (e.allocations || []).reduce((s, a) => s + (Number(a.hours) || 0), 0);
  const allocStr = (e.allocations || []).map(a => {
    const name = (jobsById[a.jobId] || {}).name || a.jobId || 'Internal';
    return `${SHELL.escapeHtml(name)} (${(Number(a.hours) || 0).toFixed(1)}h)`;
  }).join(' · ');
  const tone = e._statusTag === 'approved' ? 'ok' : e._statusTag === 'rejected' ? 'bad' : e._statusTag === 'draft' ? 'navy' : 'warn';
  const exportedTag = e.exportId ? `<div style="font-size:10px;color:var(--muted);font-family:var(--ff-mono);margin-top:2px">${SHELL.escapeHtml(e.exportId)}</div>` : '';
  const canReopen = e._statusTag === 'approved' || e._statusTag === 'rejected';
  return `<tr>
    <td><b>${SHELL.escapeHtml(e.date || '')}</b></td>
    <td>${SHELL.escapeHtml(e.userName || e.userId)}</td>
    <td style="font-size:12px;color:var(--ink-2)">${allocStr}${e.notes ? `<br><span style="color:var(--muted);font-size:11px;font-style:italic">"${SHELL.escapeHtml(e.notes)}"</span>` : ''}</td>
    <td class="table-num">${totalH.toFixed(1)}h</td>
    <td><span class="pill pill-${tone}"><span class="pill-dot"></span>${e._statusTag}</span>${exportedTag}</td>
    <td style="text-align:right">${canReopen ? `<button class="btn btn-sm" data-reopen="${SHELL.escapeHtml(e.userId)}" data-date="${SHELL.escapeHtml(e.date)}" title="Send back to the worker for editing">Reopen</button>` : ''}</td>
  </tr>`;
}

async function reopenEntry(userId, date) {
  const reason = prompt('Why are you reopening this entry? (optional, shown to the worker)');
  if (reason === null) return; // cancelled
  try {
    await SHELL.api('/api/time-entries-reopen', {
      method: 'POST',
      body: { userId, date, toStatus: 'submitted', reason: reason || null },
    });
    SHELL.toast('Reopened — worker can edit again', 'ok');
    await loadEntries();
  } catch (e) {
    // Special-case the export-guard 409 with a confirm prompt.
    const msg = String(e.message || '');
    if (msg.includes('exported')) {
      if (!confirm('This entry was already exported to payroll. Reopen anyway? You\'ll need to re-export this week.')) return;
      try {
        await SHELL.api('/api/time-entries-reopen', {
          method: 'POST',
          body: { userId, date, toStatus: 'submitted', reason: reason || null, force: true },
        });
        SHELL.toast('Reopened — re-export required', 'ok');
        await loadEntries();
      } catch (e2) { SHELL.toast('Reopen failed — ' + e2.message, 'bad'); }
    } else {
      SHELL.toast('Reopen failed — ' + msg, 'bad');
    }
  }
}

// ── Weekly grid view ───────────────────────────────────────────────────
function paintWeekly() {
  const body = SHELL.$('#hours-body');
  if (!STATE.weeklyData) {
    body.innerHTML = '<div class="empty"><div class="empty-title">Loading week…</div></div>';
    return;
  }
  const monday = STATE.weeklyAnchor;
  const sunday = addDays(monday, 6);
  const data = STATE.weeklyData;
  const jobsById = {}; (SHELL.JOBS || []).forEach(j => jobsById[j.id] = j);
  const usersById = {}; (SHELL.USERS || []).forEach(u => usersById[u.id] = u);

  // Build worker × day matrix.
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(monday, i);
    const dt = new Date(d + 'T00:00:00');
    days.push({ iso: d, label: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i], num: dt.getDate(), isWeekend: dt.getDay() === 0 || dt.getDay() === 6 });
  }

  // Active crew = anyone with an entry this week, plus anyone in data.users.
  const cellsByUser = {};
  for (const e of (data.entries || [])) {
    const totalH = (e.allocations || []).reduce((s, a) => s + (Number(a.hours) || 0), 0);
    if (!cellsByUser[e.userId]) cellsByUser[e.userId] = { name: e.userName || e.userId, role: e.userRole, days: {} };
    cellsByUser[e.userId].days[e.date] = { hours: totalH, status: e.status, exportId: e.exportId, allocations: e.allocations };
  }
  // Add zero-row for any user assigned but with no entries this week (shows missing days)
  for (const u of (data.users || [])) {
    if (!cellsByUser[u.id]) cellsByUser[u.id] = { name: u.username, role: u.role, days: {} };
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const todayIso = SHELL._iso(today);

  // Per-user totals + per-day totals
  const userTotals = {};
  const dayTotals = {};
  for (const uid of Object.keys(cellsByUser)) {
    let t = 0;
    for (const d of days) {
      const cell = cellsByUser[uid].days[d.iso];
      if (cell) {
        t += cell.hours;
        dayTotals[d.iso] = (dayTotals[d.iso] || 0) + cell.hours;
      }
    }
    userTotals[uid] = t;
  }
  const grandTotal = Object.values(userTotals).reduce((s, v) => s + v, 0);

  // Sort workers: admins/LH bottom, by hours desc, then name
  const workerRows = Object.entries(cellsByUser)
    .map(([uid, w]) => ({ uid, ...w, total: userTotals[uid] || 0 }))
    .sort((a, b) => (b.total - a.total) || a.name.localeCompare(b.name));

  // Job filter dropdown
  const jobOpts = (data.jobs || []).map(j => `<option value="${SHELL.escapeHtml(j.id)}"${STATE.weeklyJob === j.id ? ' selected' : ''}>${SHELL.escapeHtml(j.name)}</option>`).join('');

  body.innerHTML = `
    <div class="toolbar">
      <button class="btn" id="wk-prev">← Prev week</button>
      <div style="font-weight:600;font-size:14px">Week of ${monday}</div>
      <button class="btn" id="wk-next">Next week →</button>
      <button class="btn btn-sm" id="wk-today">This week</button>
      <select class="select" id="wk-job" style="max-width:200px">
        <option value="all"${STATE.weeklyJob === 'all' ? ' selected' : ''}>All jobs</option>
        ${jobOpts}
      </select>
      <div class="toolbar-spacer"></div>
      <button class="btn btn-accent" id="wk-export">${SHELL.ICONS.download || '⬇'} Export payroll CSV</button>
      <button class="btn" id="wk-past-runs" title="Past payroll runs · hashes for audit">Past runs ▾</button>
    </div>

    <!-- Phase 08 (brief §08): collapsed past-runs panel. Opens to a
         table of every payroll run with its hash + actor + range. -->
    <div id="wk-runs-panel" hidden style="margin-bottom:18px"></div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-l">Crew with entries</div><div class="kpi-v">${workerRows.filter(w => w.total > 0).length}</div></div>
      <div class="kpi"><div class="kpi-l">Total hours</div><div class="kpi-v">${grandTotal.toFixed(1)}<sup>h</sup></div></div>
      <div class="kpi"><div class="kpi-l">Missing weekday logs</div><div class="kpi-v ${(data.missing || []).length ? 'red' : 'green'}">${(data.missing || []).length}</div></div>
      <div class="kpi"><div class="kpi-l">Pending approval</div><div class="kpi-v ${data.totals.byStatus.submitted ? 'amber' : 'green'}">${data.totals.byStatus.submitted || 0}</div></div>
    </div>

    <div class="table-wrap">
      <table class="table" style="font-size:12px">
        <thead>
          <tr>
            <th style="text-align:left">Crew</th>
            ${days.map(d => `<th class="table-num" style="width:64px;${d.isWeekend ? 'background:rgba(0,0,0,.03)' : ''}">${d.label}<div style="font-size:10px;color:var(--muted);font-weight:400">${d.num}</div></th>`).join('')}
            <th class="table-num" style="width:80px;background:rgba(13,31,53,.04)">Total</th>
          </tr>
        </thead>
        <tbody>
          ${workerRows.length ? workerRows.map(w => `
            <tr>
              <td><b>${SHELL.escapeHtml(w.name)}</b>${w.role === 'leadingHand' ? ' <span style="font-size:10px;color:var(--muted)">LH</span>' : ''}</td>
              ${days.map(d => {
                const cell = w.days[d.iso];
                if (cell) {
                  const tone = cell.status === 'approved' ? 'ok' : cell.status === 'submitted' ? 'warn' : cell.status === 'rejected' ? 'bad' : 'navy';
                  const exp = cell.exportId ? '<span title="Exported to payroll" style="font-size:9px;margin-left:2px">⊡</span>' : '';
                  return `<td class="table-num" style="cursor:pointer;${d.isWeekend ? 'background:rgba(0,0,0,.03)' : ''}" data-cell="${SHELL.escapeHtml(w.uid)}|${d.iso}" title="${cell.status} · click for details">
                    <span class="pill pill-${tone}" style="font-size:10px;padding:1px 5px">${cell.hours.toFixed(1)}h${exp}</span>
                  </td>`;
                }
                // Missing weekday past today is a red flag; weekend or future is OK
                const isFuture = d.iso > todayIso;
                const isMissed = !d.isWeekend && d.iso <= todayIso;
                return `<td class="table-num" style="${d.isWeekend ? 'background:rgba(0,0,0,.03);' : ''}${isMissed ? 'color:var(--bad);font-weight:600' : 'color:var(--muted)'}">${isMissed ? '·' : '—'}</td>`;
              }).join('')}
              <td class="table-num" style="background:rgba(13,31,53,.04);font-weight:600">${w.total.toFixed(1)}h</td>
            </tr>
          `).join('') : '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:24px">No crew assigned to visible jobs.</td></tr>'}
          <tr style="background:rgba(13,31,53,.04);font-weight:600">
            <td>Day totals</td>
            ${days.map(d => `<td class="table-num">${(dayTotals[d.iso] || 0).toFixed(1)}h</td>`).join('')}
            <td class="table-num">${grandTotal.toFixed(1)}h</td>
          </tr>
        </tbody>
      </table>
    </div>

    ${(data.missing || []).length ? `
      <div class="card" style="border-color:var(--warn);background:rgba(255,193,7,.06);padding:12px 14px;margin-top:14px">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="font-size:18px">⚠️</div>
          <div style="flex:1;font-size:13px">
            <b>${SHELL.pluralize((data.missing || []).length, 'missing weekday log')}</b>
            <div style="color:var(--ink-2);font-size:12px;margin-top:4px">
              ${(data.missing || []).slice(0, 12).map(m => `<span style="display:inline-block;margin-right:10px">${SHELL.escapeHtml(m.userName)} · ${m.date}</span>`).join('')}
              ${(data.missing || []).length > 12 ? `<span style="color:var(--muted)">… and ${(data.missing || []).length - 12} more</span>` : ''}
            </div>
          </div>
        </div>
      </div>
    ` : ''}

    <p style="color:var(--muted);font-size:11px;margin-top:14px">
      Cell colours: green = approved · amber = submitted · navy = draft · red dot = missing weekday log. ⊡ = exported to payroll.
    </p>
  `;

  SHELL.$('#wk-prev').addEventListener('click',  () => { STATE.weeklyAnchor = addDays(STATE.weeklyAnchor, -7); STATE.weeklyData = null; updateUrl(); paint(); loadWeekly(); });
  SHELL.$('#wk-next').addEventListener('click',  () => { STATE.weeklyAnchor = addDays(STATE.weeklyAnchor,  7); STATE.weeklyData = null; updateUrl(); paint(); loadWeekly(); });
  SHELL.$('#wk-today').addEventListener('click', () => { STATE.weeklyAnchor = SHELL._iso(SHELL.isoWeekMonday()); STATE.weeklyData = null; updateUrl(); paint(); loadWeekly(); });
  SHELL.$('#wk-job').addEventListener('change',  e => { STATE.weeklyJob = e.target.value; STATE.weeklyData = null; paint(); loadWeekly(); });
  SHELL.$('#wk-export').addEventListener('click', () => exportPayrollCsv(monday, sunday));
  SHELL.$('#wk-past-runs').addEventListener('click', togglePastRunsPanel);
  SHELL.$$('td[data-cell]').forEach(td => td.addEventListener('click', () => {
    const [uid, date] = td.dataset.cell.split('|');
    openCellDetails(uid, date);
  }));
}

function openCellDetails(userId, date) {
  // Find the cell entry from the current weekly snapshot.
  const e = (STATE.weeklyData.entries || []).find(x => x.userId === userId && x.date === date);
  if (!e) return;
  const jobsById = {}; (SHELL.JOBS || []).forEach(j => jobsById[j.id] = j);
  const allocStr = (e.allocations || []).map(a => {
    const name = (jobsById[a.jobId] || {}).name || a.jobId || 'Internal';
    return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px">
      <span>${SHELL.escapeHtml(name)}${a.notes ? `<div style="font-size:11px;color:var(--muted);font-style:italic">${SHELL.escapeHtml(a.notes)}</div>` : ''}</span>
      <b>${(Number(a.hours) || 0).toFixed(2)}h</b>
    </div>`;
  }).join('');
  const tone = e.status === 'approved' ? 'ok' : e.status === 'submitted' ? 'warn' : e.status === 'rejected' ? 'bad' : 'navy';
  const canReopen = e.status === 'approved' || e.status === 'rejected';
  const panel = SHELL.openPanel({
    title: `${e.userName || e.userId} · ${e.date}`,
    body: `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
        <span class="pill pill-${tone}">${SHELL.escapeHtml(e.status)}</span>
        ${e.exportId ? `<span class="pill pill-navy" title="Exported in payroll run ${SHELL.escapeHtml(e.exportId)}">Exported</span>` : ''}
        <div style="flex:1"></div>
        <span style="color:var(--muted);font-size:12px"><b>${(Number(e.totalHours) || 0).toFixed(1)}h</b> total</span>
      </div>
      <div class="card-title" style="font-size:13px;margin-bottom:6px">Allocations</div>
      ${allocStr || '<div style="color:var(--muted);font-size:12px">No allocations</div>'}
      ${e.notes ? `<div style="margin-top:14px"><div class="card-title" style="font-size:13px;margin-bottom:6px">Notes</div><div style="font-size:13px;color:var(--ink-2)">${SHELL.escapeHtml(e.notes)}</div></div>` : ''}
      ${e.approvedAt ? `<div style="margin-top:14px;font-size:12px;color:var(--muted)">Approved ${SHELL._ago(e.approvedAt)}</div>` : ''}
      ${e.exportId ? `<div style="font-size:12px;color:var(--muted)">Export ID: <span class="mono">${SHELL.escapeHtml(e.exportId)}</span></div>` : ''}
    `,
    footer: `
      <button class="btn" onclick="SHELL.closePanel()">Close</button>
      ${canReopen ? `<button class="btn btn-primary" id="cell-reopen">Reopen</button>` : ''}
      ${e.status === 'submitted' ? `<a class="btn btn-accent" href="/admin/approvals">Approvals queue →</a>` : ''}
    `,
  });
  if (canReopen) {
    panel.querySelector('#cell-reopen').addEventListener('click', async () => {
      SHELL.closePanel();
      await reopenEntry(userId, date);
      STATE.weeklyData = null;
      await loadWeekly();
    });
  }
}

// Phase 08 (brief §08): past payroll runs — hash-indexed audit trail.
// Opens the collapsed #wk-runs-panel. Each row shows the actor, range,
// hash (first 12 chars + copy), row count, total hours, and a "View"
// button that triggers a non-stamping CSV preview of the same range.
let _runsLoaded = false;
async function togglePastRunsPanel() {
  const panel = SHELL.$('#wk-runs-panel');
  if (!panel) return;
  if (panel.hidden === false) { panel.hidden = true; return; }
  panel.hidden = false;
  if (!_runsLoaded) {
    panel.innerHTML = `<div class="empty">Loading past runs…</div>`;
    try {
      const r = await SHELL.api('/api/payroll-runs?limit=50');
      _runsLoaded = true;
      renderPastRuns(panel, r.runs || [], r.total || 0);
    } catch (e) {
      panel.innerHTML = `<div class="empty"><div class="empty-title">Couldn't load past runs</div><div class="empty-sub">${SHELL.escapeHtml(e.message)}</div></div>`;
    }
  }
}
function renderPastRuns(panel, runs, total) {
  if (!runs.length) {
    panel.innerHTML = `
      <div class="card" style="padding:18px 22px">
        <div class="card-title">No payroll runs yet</div>
        <div class="card-sub">Hashes appear here after the first real CSV export.</div>
      </div>`;
    return;
  }
  const rows = runs.map(r => {
    const range = `${r.range.fromDate} → ${r.range.toDate}`;
    const hashShort = (r.hash || '').slice(0, 12);
    const sum = r.summary || {};
    return `<tr>
      <td class="tabular">${SHELL.escapeHtml(r.at ? new Date(r.at).toLocaleString('en-AU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—')}</td>
      <td><b>${SHELL.escapeHtml(r.actorName || r.actor || '—')}</b></td>
      <td class="tabular">${SHELL.escapeHtml(range)}<div style="font-size:10px;color:var(--muted)">${SHELL.escapeHtml(r.range.status || 'approved')}</div></td>
      <td class="tabular table-num">${r.rowCount}</td>
      <td class="tabular table-num">${(sum.totalHours || 0).toFixed(1)}h</td>
      <td><code style="font-family:var(--ff-mono);font-size:10.5px;letter-spacing:.04em;background:var(--surface-2);padding:2px 6px;border-radius:3px;cursor:pointer" data-hash="${SHELL.escapeHtml(r.hash || '')}" title="Click to copy">${SHELL.escapeHtml(hashShort)}…</code></td>
    </tr>`;
  }).join('');
  panel.innerHTML = `
    <div class="card" style="padding:0">
      <div style="padding:12px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline">
        <div>
          <div class="card-title">Past payroll runs</div>
          <div class="card-sub">${runs.length} of ${total} · newest first · hash detects silent re-runs</div>
        </div>
        <button class="btn btn-sm" id="wk-runs-close">Close</button>
      </div>
      <div class="table-wrap" style="border:0">
        <table class="table" style="font-size:12.5px">
          <thead><tr>
            <th>When</th><th>Actor</th><th>Range</th>
            <th class="table-num">Rows</th><th class="table-num">Hours</th><th>Hash</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  panel.querySelector('#wk-runs-close').addEventListener('click', () => { panel.hidden = true; });
  panel.querySelectorAll('[data-hash]').forEach(el => el.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(el.dataset.hash); SHELL.toast('Hash copied', 'ok'); }
    catch { /* fall through */ }
  }));
}

async function exportPayrollCsv(fromDate, toDate) {
  const status = prompt('Export which status? (approved | all | submitted)', 'approved');
  if (!status) return;
  if (!['approved', 'all', 'submitted', 'draft', 'rejected'].includes(status)) {
    SHELL.toast('Invalid status — must be approved, all, submitted, draft, or rejected', 'bad');
    return;
  }
  // Preview row count first via JSON+dryRun, then trigger the real CSV download.
  try {
    const preview = await SHELL.api(`/api/time-entries-export?fromDate=${fromDate}&toDate=${toDate}&status=${encodeURIComponent(status)}&dryRun=1&format=json`);
    const rows = preview.rows || [];
    if (!rows.length) { SHELL.toast('No rows to export for that range', 'warn'); return; }
    const totalH = (preview.summary || {}).totalHours || 0;
    const totalC = (preview.summary || {}).totalCostExGst || 0;
    const ok = confirm(
      `Export ${rows.length} row${rows.length === 1 ? '' : 's'} (${totalH.toFixed(1)}h, $${totalC.toFixed(2)}) for ${fromDate} → ${toDate}?\n\n` +
      `Each entry will be stamped with an export ID so this payroll run isn't accidentally double-exported. ` +
      `Already-exported entries will be re-exported with a new ID (use the dry-run URL if you want to peek without stamping).`
    );
    if (!ok) return;
    // Trigger download by setting window location (it'll save as .csv)
    const url = `/api/time-entries-export?fromDate=${fromDate}&toDate=${toDate}&status=${encodeURIComponent(status)}`;
    window.location.href = url;
    SHELL.toast(`Exported ${rows.length} rows`, 'ok');
    // Refresh the weekly grid so the export-stamp tags show up.
    setTimeout(() => { STATE.weeklyData = null; loadWeekly(); }, 1200);
  } catch (e) { SHELL.toast('Export failed — ' + e.message, 'bad'); }
}

function updateUrl() {
  const url = new URL(location.href);
  url.searchParams.set('view', STATE.view);
  if (STATE.weeklyAnchor) url.searchParams.set('week', STATE.weeklyAnchor);
  history.replaceState(null, '', url);
}

// ── Cost view ─────────────────────────────────────────────────────────
function paintCost() {
  const d = STATE.costData;
  const body = SHELL.$('#hours-body');
  if (!d) {
    body.innerHTML = '<div class="empty"><div class="empty-title">Loading cost data…</div></div>';
    return;
  }
  const totals = d.totals || { hours: 0, cost: 0 };
  const jobs = (d.jobs || []).filter(j => j.hours > 0).sort((a, b) => b.cost - a.cost);
  const users = d.users || [];

  const range = computeRange();
  const rangeLabel = range.from || range.to ? `${range.from || '—'} → ${range.to || '—'}` : 'All time';

  // Workers without rate but with hours = labour cost is undercounted.
  const unrated = users.filter(u => u.hours > 0 && (!u.rate || u.rate === 0));

  body.innerHTML = `
    <div class="toolbar">
      <select class="select" id="cr-range" style="max-width:200px">
        <option value="thisMonth"${STATE.costRange === 'thisMonth' ? ' selected' : ''}>This month</option>
        <option value="lastMonth"${STATE.costRange === 'lastMonth' ? ' selected' : ''}>Last month</option>
        <option value="last30"${STATE.costRange === 'last30' ? ' selected' : ''}>Last 30 days</option>
        <option value="last90"${STATE.costRange === 'last90' ? ' selected' : ''}>Last 90 days</option>
        <option value="all"${STATE.costRange === 'all' ? ' selected' : ''}>All time</option>
        <option value="custom"${STATE.costRange === 'custom' ? ' selected' : ''}>Custom…</option>
      </select>
      ${STATE.costRange === 'custom' ? `
        <input class="input" type="date" id="cr-from" value="${SHELL.escapeHtml(STATE.costFrom)}" style="max-width:160px">
        <span style="color:var(--muted)">→</span>
        <input class="input" type="date" id="cr-to" value="${SHELL.escapeHtml(STATE.costTo)}" style="max-width:160px">
        <button class="btn btn-primary" id="cr-apply">Apply</button>
      ` : ''}
      <div class="toolbar-spacer"></div>
      <span style="color:var(--muted);font-size:12px">${rangeLabel}</span>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-l">Total hours</div><div class="kpi-v">${totals.hours.toFixed(1)}<sup>h</sup></div><div class="kpi-d">across all entries</div></div>
      <div class="kpi"><div class="kpi-l">Total labour cost</div><div class="kpi-v">${SHELL.fmtMoney(totals.cost)}</div><div class="kpi-d">hours × user.hourlyRate</div></div>
      <div class="kpi"><div class="kpi-l">Active jobs (with hours)</div><div class="kpi-v">${jobs.length}</div></div>
      <div class="kpi"><div class="kpi-l">Crew contributing</div><div class="kpi-v">${users.length}</div></div>
    </div>

    ${unrated.length ? `
      <div class="card" style="border-color:var(--warn);background:rgba(255,193,7,.06);padding:12px 14px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:18px">⚠️</div>
          <div style="flex:1;font-size:13px">
            <b>${unrated.length} crew without an hourly rate</b> have ${unrated.reduce((s, u) => s + u.hours, 0).toFixed(1)}h logged — labour cost above is undercounted.<br>
            <span style="color:var(--ink-2)">Set rates on <a href="/admin/crew" style="color:inherit;text-decoration:underline">/admin/crew</a>: ${unrated.map(u => SHELL.escapeHtml(u.name)).join(', ')}</span>
          </div>
        </div>
      </div>
    ` : ''}

    <div class="two-col">
      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">Cost by job</div>
          <div class="card-sub">Sorted by cost; rolls up all allocations.</div>
        </div>
        <div class="table-wrap" style="border:none;box-shadow:none;border-radius:0">
          <table class="table">
            <thead><tr><th>Job</th><th class="table-num">Hours</th><th class="table-num">Cost</th></tr></thead>
            <tbody>${jobs.length ? jobs.map(j => `<tr>
              <td>${j.id ? `<a href="/admin/jobs/${SHELL.escapeHtml(j.id)}?s=hours" style="font-weight:600">${SHELL.escapeHtml(j.name)}</a>` : `<span style="color:var(--muted);font-style:italic">${SHELL.escapeHtml(j.name)}</span>`}</td>
              <td class="table-num">${j.hours.toFixed(1)}h</td>
              <td class="table-num"><b>${SHELL.fmtMoney(j.cost)}</b></td>
            </tr>`).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:18px">No jobs in this range.</td></tr>'}</tbody>
          </table>
        </div>
      </div>

      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">Cost by crew member</div>
          <div class="card-sub">Sorted by cost; rate × hours.</div>
        </div>
        <div class="table-wrap" style="border:none;box-shadow:none;border-radius:0">
          <table class="table">
            <thead><tr><th>Crew</th><th class="table-num">Rate</th><th class="table-num">Hours</th><th class="table-num">Cost</th></tr></thead>
            <tbody>${users.length ? users.map(u => `<tr>
              <td><b>${SHELL.escapeHtml(u.name)}</b></td>
              <td class="table-num">${u.rate ? '$' + u.rate + '/h' : '<span style="color:var(--warn)">—</span>'}</td>
              <td class="table-num">${u.hours.toFixed(1)}h</td>
              <td class="table-num"><b>${SHELL.fmtMoney(u.cost)}</b></td>
            </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:18px">No crew with hours in this range.</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  SHELL.$('#cr-range').addEventListener('change', e => {
    STATE.costRange = e.target.value;
    if (STATE.costRange !== 'custom') loadCost();
    else paint();
  });
  if (STATE.costRange === 'custom') {
    SHELL.$('#cr-from').addEventListener('change', e => { STATE.costFrom = e.target.value; });
    SHELL.$('#cr-to').addEventListener('change',   e => { STATE.costTo   = e.target.value; });
    SHELL.$('#cr-apply').addEventListener('click', loadCost);
  }
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

SHELL.boot();
</script>
