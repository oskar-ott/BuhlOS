<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · job</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
<!-- Site-office completion: <open-in-field> is the brief §02 topbar
     action for every detail page. The component lazy-renders a deep
     link to /jobs/:id (the field surface) for the current record. -->
<script type="module" src="/components/open-in-field.js"></script>
</head>
<body>
<script>
let STATE = {
  jobId: null,
  job: null,
  data: { dwellings: {}, snags: [] },
  jobTypes: [],
  hoursThisWeek: [],
  crew: [],
  section: 'overview',
  // Phase 9 — plan takeoff
  plans: [],         // /api/plans?jobId result
  takeoff: null,     // /api/plans?jobId&action=takeoff result
  pdfjsReady: false,
  // Phase 10 — materials list + cost rollup
  materials: { items: [], emailRequests: [] },
  costRollup: { itemsCount: 0, pricedCount: 0, unpricedCount: 0, totalCostExGst: 0, unpricedQty: 0 },
  // Hours tab — full per-job breakdown (last 12 weeks). Loaded lazily on tab open.
  jobHours: { loaded: false, loading: false, range: 84, entries: [] },
};

window.PAGE = {
  id: 'jobs',  // sidebar highlight stays on Jobs
  title: 'Job',
  crumb: 'Job',

  async render() {
    // Job ID from URL: /admin/jobs/<id>
    const m = location.pathname.match(/^\/admin\/jobs\/([^\/]+)/);
    STATE.jobId = m ? decodeURIComponent(m[1]) : null;
    if (!STATE.jobId) { location.href = '/admin/jobs'; return; }
    STATE.section = (new URLSearchParams(location.search).get('s')) || 'overview';
    await loadAll();
    paint();
    mountOpenInField();
  }
};

// Brief §02 + §17 (S-08): every detail page gets an "Open in field ↗"
// in the topbar, contextual to the current record. Mounted once after
// the shell has rendered; the component reads job + falls through to
// /my-day?job=… in a new tab.
function mountOpenInField() {
  if (!STATE.jobId) return;
  const topbar = document.getElementById('topbar');
  if (!topbar) return;
  let oif = topbar.querySelector('open-in-field');
  if (!oif) {
    oif = document.createElement('open-in-field');
    oif.setAttribute('label', 'Open in field');
    // Place it as the right-hand action — after the density toggle.
    topbar.appendChild(oif);
  }
  oif.setAttribute('job', STATE.jobId);
}

async function loadAll() {
  // Job from /api/jobs (already in shell cache)
  STATE.job = (SHELL.JOBS || []).find(j => j.id === STATE.jobId) || null;
  if (!STATE.job) {
    // Fallback: fetch fresh.
    try {
      const r = await SHELL.api('/api/jobs?withStats=1');
      STATE.job = (r.jobs || []).find(j => j.id === STATE.jobId);
    } catch {}
  }
  if (!STATE.job) {
    SHELL.$('#page').innerHTML = '<div class="empty"><div class="empty-title">Job not found</div><div class="empty-sub">It may have been archived. <a href="/admin/jobs" style="color:inherit;text-decoration:underline">Back to Jobs.</a></div></div>';
    return;
  }
  // Per-job blob (snags + dwellings)
  try {
    const r = await fetch('/api/data?jobId=' + encodeURIComponent(STATE.jobId), { credentials: 'same-origin' });
    if (r.ok) STATE.data = await r.json();
  } catch {}
  // Job types
  try {
    const r = await SHELL.api('/api/job-types');
    STATE.jobTypes = r.jobTypes || r.types || [];
  } catch {}
  // Hours this week filtered to this job — for Overview KPI
  try {
    const monday = SHELL.isoWeekMonday();
    const r = await SHELL.api(`/api/time-entries-overview?fromDate=${SHELL._iso(monday)}&toDate=${SHELL._iso(new Date())}`);
    STATE.hoursThisWeek = (r.entries || []).filter(e =>
      (e.allocations || []).some(a => a.jobId === STATE.jobId));
  } catch { STATE.hoursThisWeek = []; }
  // Crew assigned to this job
  STATE.crew = (SHELL.USERS || []).filter(u => (u.assignedJobIds || []).includes(STATE.jobId));
  // Plans + AI takeoff (Phase 9)
  try {
    const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId));
    STATE.plans = (r.plans || []).filter(p => p.status !== 'archived');
  } catch { STATE.plans = []; }
  try {
    STATE.takeoff = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=takeoff');
  } catch { STATE.takeoff = null; }
  // Materials list + cost rollup (Phase 10)
  try {
    STATE.materials = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId));
  } catch { STATE.materials = { items: [], emailRequests: [] }; }
  try {
    STATE.costRollup = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=cost-rollup');
  } catch { STATE.costRollup = { itemsCount: 0, pricedCount: 0, unpricedCount: 0, totalCostExGst: 0, unpricedQty: 0 }; }
}

function paint() {
  if (!STATE.job) return;
  const j = STATE.job;
  const ref = (j.ref || j.id || '').toUpperCase();

  const pendingDwellings = STATE.takeoff && STATE.takeoff.dwellings
    ? Object.values(STATE.takeoff.dwellings).filter(d => d.status === 'pending').length : 0;
  const matsCount = (STATE.materials && STATE.materials.items) ? STATE.materials.items.length : 0;
  const openSnagCount = (STATE.data.snags || []).filter(s => s.status === 'Open').length;
  // Setup incomplete badge — counts critical setup items still missing,
  // so the admin sees at a glance whether they need to pop into Setup.
  // Uses the same setupChecks list the Overview Setup-completeness card
  // uses, so the number always agrees with the card.
  const setupMissing = setupChecks(j).filter(c => !c.ok).length;
  // Tab order matches the workflow recommended in the Site Office Admin
  // brief: see the job → fix setup → assign crew → triage problems →
  // review labour → see drawings → check materials. Setup gets an early
  // amber badge when incomplete so a half-built job demands attention.
  const sections = [
    { id: 'overview',  label: 'Overview' },
    { id: 'setup',     label: 'Setup', count: setupMissing || null, countTone: setupMissing ? 'warn' : null },
    { id: 'crew',      label: 'Crew & client' },
    { id: 'contacts',  label: 'Contacts' },
    { id: 'snags',     label: 'Snags', count: openSnagCount, countTone: openSnagCount ? 'bad' : null },
    { id: 'hours',     label: 'Hours' },
    { id: 'plans',     label: 'Plans & takeoff', count: pendingDwellings || null },
    { id: 'materials', label: 'Materials', count: matsCount || null },
  ];

  SHELL.$('#page').innerHTML = `
    <div class="ws-head">
      <div class="ws-crumb"><a href="/admin/jobs">← All jobs</a></div>
      <div class="ws-name">
        <h1>${SHELL.escapeHtml(j.name)}</h1>
        ${SHELL.jobStatusPill(j.status || 'active')}
        <span class="user-handle">${SHELL.escapeHtml(ref)}</span>
        <button class="btn btn-sm" id="edit-basics" title="Edit job name, status, type, and client link">${SHELL.ICONS.edit} Edit job</button>
        <a class="btn btn-sm btn-ghost" href="/jobs/${SHELL.escapeHtml(j.id)}" target="_blank" rel="noopener" title="Open the field/worker view of this job in a new tab">${SHELL.ICONS.external} Open worker view</a>
      </div>
    </div>

    <div class="tabs">
      ${sections.map(s => {
        const badgeStyle = s.countTone === 'bad'
          ? 'background:var(--bad-bg, #fbeae8);color:var(--bad);border:1px solid var(--bad-bd, #f0c4be)'
          : s.countTone === 'warn'
          ? 'background:var(--warn-bg, #fbf1de);color:var(--warn);border:1px solid var(--warn-bd, #f3dca1)'
          : '';
        return `
        <a class="tab ${STATE.section === s.id ? 'active' : ''}" href="#" data-section="${s.id}">
          ${SHELL.escapeHtml(s.label)}${s.count != null ? `<span class="badge" style="${badgeStyle}">${s.count}</span>` : ''}
        </a>
      `;
      }).join('')}
    </div>

    <div id="ws-body"></div>
  `;

  SHELL.$$('a[data-section]').forEach(a => a.addEventListener('click', e => {
    e.preventDefault();
    STATE.section = a.dataset.section;
    history.replaceState(null, '', `/admin/jobs/${STATE.jobId}?s=${STATE.section}`);
    paint();
  }));
  SHELL.$('#edit-basics').addEventListener('click', openEditBasics);

  const body = SHELL.$('#ws-body');
  if      (STATE.section === 'overview')  { body.innerHTML = renderOverview(); wireContractClaimsCard(); }
  else if (STATE.section === 'snags')     body.innerHTML = renderSnags();
  else if (STATE.section === 'hours')     renderHoursTab(body);
  else if (STATE.section === 'plans')     renderPlans(body);
  else if (STATE.section === 'materials') renderMaterials(body);
  else if (STATE.section === 'crew')      renderCrew(body);
  else if (STATE.section === 'contacts')  renderContactsTab(body);
  else if (STATE.section === 'setup')     renderSetup(body);

  // Wire snags-tab inline triage (same handlers as /admin/snags)
  if (STATE.section === 'snags') {
    SHELL.$$('select[data-field="assignee"]').forEach(sel =>
      sel.addEventListener('change', () => assignSnag(sel.dataset.snagid, sel.value, sel.options[sel.selectedIndex].text)));
    SHELL.$$('button[data-action="close-snag"]').forEach(b =>
      b.addEventListener('click', () => closeSnag(b.dataset.snagid)));
    SHELL.$$('button[data-action="reopen-snag"]').forEach(b =>
      b.addEventListener('click', () => reopenSnag(b.dataset.snagid)));
  }
}

function renderOverview() {
  const j = STATE.job;
  const open = (STATE.data.snags || []).filter(s => s.status === 'Open');
  const unassignedSnags = open.filter(s => !s.assignedToUserId).length;
  const weekHrs = STATE.hoursThisWeek.reduce((a, e) => {
    const onJob = (e.allocations || []).filter(x => x.jobId === STATE.jobId);
    return a + onJob.reduce((aa, x) => aa + Number(x.hours || 0), 0);
  }, 0);
  const weekSubmitters = new Set();
  for (const e of STATE.hoursThisWeek) {
    if ((e.allocations || []).some(x => x.jobId === STATE.jobId)) weekSubmitters.add(e.userId);
  }

  // ── Real area-progress numbers (the source of the old "0/0 dwellings"
  //    bug — the API returns statsAreaCount, NOT statsDwellingCount, so
  //    `j.statsDwellingsDone || 0` and `j.statsDwellingCount || 0` were
  //    both always 0 and the card said "0/0 dwellings" forever).
  //
  // We compute the real done/total from the data blob using the same
  // effective-tasks helper the per-job dashboard uses, so the metric
  // matches exactly what tradies see.
  const allAreas = (j.areaGroups || []).flatMap(g => g.areas || []);
  const totalAreas = allAreas.length;
  const dwellings = (STATE.data && STATE.data.dwellings) || {};
  const jobR = j.roughInTasks || [];
  const jobF = j.fitOffTasks  || [];
  const effRough = (a) => (Array.isArray(a.roughInTasks) && a.roughInTasks.length) ? a.roughInTasks : jobR;
  const effFit   = (a) => (Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length)  ? a.fitOffTasks  : jobF;
  const areaPct = (a) => {
    const r = effRough(a), f = effFit(a);
    if (!r.length && !f.length) return null; // no checklist
    const dw = dwellings[a.id] || {};
    const rMap = ((dw.roughIn || {}).tasks) || {};
    const fMap = ((dw.fitOff  || {}).tasks) || {};
    const rPct = r.length ? Math.round(r.filter(t => rMap[t.id] === 'complete').length / r.length * 100) : 0;
    const fPct = f.length ? Math.round(f.filter(t => fMap[t.id] === 'complete').length / f.length * 100) : 0;
    if (r.length && f.length) return Math.round((rPct + fPct) / 2);
    return r.length ? rPct : fPct;
  };
  const areasWithCounts = allAreas.map(a => ({ a, pct: areaPct(a) }));
  const areasWithChecklist = areasWithCounts.filter(x => x.pct != null);
  const areasComplete = areasWithChecklist.filter(x => x.pct === 100).length;

  // Phase 10 — projected materials cost (priced items only; unpriced are
  // an unknown until wholesalers come back).
  const cr = STATE.costRollup || {};
  const matCostTone = (cr.itemsCount && cr.unpricedCount === 0) ? 'green' : (cr.unpricedCount > 0 ? 'amber' : '');

  // Crew/client split — separate concepts that used to be jammed into
  // one sub-line. Crew metric reads the count; client gets its own
  // KPI tile so "no client linked" can be acted on directly.
  const crewCount = STATE.crew.filter(u => u.role === 'tradie' || u.role === 'leadingHand').length;
  const lhCount   = STATE.crew.filter(u => u.role === 'leadingHand').length;
  const clientUser = j.clientUserId ? (SHELL.USERS || []).find(u => u.id === j.clientUserId) : null;

  // ── Progress KPI label — "0/0 dwellings" replaced with honest states:
  //   - "No areas set up"             → empty job
  //   - "No checklist on N areas"     → areas exist but neither default
  //                                     nor per-area checklists exist yet
  //   - "X / Y work areas complete"   → real progress, plain language
  let progressSub;
  if (totalAreas === 0) {
    progressSub = '<a href="?s=setup" style="color:var(--warn);text-decoration:underline">No areas set up — open setup →</a>';
  } else if (areasWithChecklist.length === 0) {
    progressSub = `<a href="?s=setup" style="color:var(--warn);text-decoration:underline">No checklist on any of ${totalAreas} ${totalAreas === 1 ? 'area' : 'areas'} →</a>`;
  } else {
    const noChecklist = totalAreas - areasWithChecklist.length;
    progressSub = `<b>${areasComplete}</b>/<b>${areasWithChecklist.length}</b> work ${areasWithChecklist.length === 1 ? 'area' : 'areas'} complete${noChecklist ? ' · <span style="color:var(--warn)">' + noChecklist + ' missing checklist</span>' : ''}`;
  }
  // Use the honest computed pct rather than j.statsPct (which can be
  // stale from the last list-fetch).
  const progressPct = areasWithChecklist.length
    ? Math.round(areasWithChecklist.reduce((s, x) => s + x.pct, 0) / areasWithChecklist.length)
    : 0;

  // ── Hours KPI — state-aware copy. The old "0.0h · 0 crew" was
  //   ambiguous (broken? nobody worked? data not connected?). Replace
  //   with explicit states.
  let hoursValueClass = '', hoursValue, hoursSub;
  if (weekHrs > 0) {
    hoursValue = weekHrs.toFixed(1) + '<sup>h</sup>';
    hoursSub = SHELL.pluralize(weekSubmitters.size, 'crew', 'crew') + ' submitted';
  } else if (crewCount === 0) {
    hoursValue = '—';
    hoursSub = '<span style="color:var(--muted)">no crew assigned yet</span>';
  } else {
    hoursValue = '0<sup>h</sup>';
    hoursValueClass = 'amber';
    hoursSub = `<a href="/admin/hours?view=weekly&job=${SHELL.escapeHtml(STATE.jobId)}" style="color:var(--warn);text-decoration:underline">No hours logged yet this week →</a>`;
  }

  // ── Needs-attention rail — only renders when something is actually
  //   wrong. Each chip is a one-tap deep-link to the action that fixes
  //   it. Per the brief: "Where the UI shows a problem, add direct
  //   action."
  const attention = [];
  if (totalAreas === 0) {
    attention.push({ icon: '⚠', text: 'No work areas set up', cta: 'Open setup', href: '?s=setup' });
  }
  if (totalAreas > 0 && areasWithChecklist.length === 0) {
    attention.push({ icon: '⚠', text: 'No checklist on any area', cta: 'Open setup', href: '?s=setup' });
  }
  if (!j.clientUserId) {
    attention.push({ icon: '!', text: 'No client linked', cta: 'Link client', href: '?s=crew' });
  }
  if (crewCount === 0) {
    attention.push({ icon: '⚠', text: 'No crew assigned', cta: 'Assign crew', href: '?s=crew' });
  }
  if (unassignedSnags > 0) {
    attention.push({ icon: '⚠', text: SHELL.pluralize(unassignedSnags, 'unassigned snag'), cta: 'Triage', href: '?s=snags' });
  }
  if (weekHrs === 0 && crewCount > 0) {
    attention.push({ icon: '⏱', text: 'No hours logged this week', cta: 'Open hours', href: '/admin/hours?view=weekly&job=' + encodeURIComponent(STATE.jobId) });
  }
  const attentionHtml = attention.length ? `
    <div class="card" style="padding:0;margin-bottom:14px;border-left:3px solid var(--warn)">
      <div style="padding:10px 16px;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:.6px">Needs attention</div>
      <div style="padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap">
        ${attention.map(it => `<a href="${it.href}" style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;font-weight:500;color:var(--ink);background:var(--surface);text-decoration:none">
          <span style="color:var(--warn);font-weight:700">${it.icon}</span>
          <span>${SHELL.escapeHtml(it.text)}</span>
          <span style="color:var(--muted);font-size:11px">${SHELL.escapeHtml(it.cta)} →</span>
        </a>`).join('')}
      </div>
    </div>` : '';

  return `
    ${attentionHtml}

    <div class="kgrid">
      <div class="kpi"><div class="kpi-l">Progress</div><div class="kpi-v">${progressPct}<sup>%</sup></div><div class="kpi-d">${progressSub}</div></div>
      <div class="kpi"><div class="kpi-l">Open snags</div><div class="kpi-v ${open.length ? 'red' : 'green'}">${open.length}</div><div class="kpi-d">${unassignedSnags ? `<a href="?s=snags" style="color:var(--warn);text-decoration:underline">${unassignedSnags} unassigned →</a>` : (open.length ? 'all assigned' : 'none open')}</div></div>
      <div class="kpi"><div class="kpi-l">Hours this week</div><div class="kpi-v ${hoursValueClass}">${hoursValue}</div><div class="kpi-d">${hoursSub}</div></div>
      <div class="kpi"><div class="kpi-l">Crew</div><div class="kpi-v">${crewCount}</div><div class="kpi-d">${crewCount === 0 ? '<a href="?s=crew" style="color:var(--warn);text-decoration:underline">none assigned →</a>' : (lhCount ? lhCount + ' LH · ' + (crewCount - lhCount) + ' tradies' : SHELL.pluralize(crewCount, 'tradie'))}</div></div>
      <div class="kpi"><div class="kpi-l">Client</div><div class="kpi-v" style="font-size:14px;font-weight:600;line-height:1.2;padding-top:6px">${clientUser ? '<span style="color:var(--ok)">✓ Linked</span>' : '<span style="color:var(--warn)">Not linked</span>'}</div><div class="kpi-d">${clientUser ? SHELL.escapeHtml(clientUser.username || j.clientUserId) : '<a href="?s=crew" style="color:var(--warn);text-decoration:underline">link a client →</a>'}</div></div>
      ${cr.itemsCount > 0 ? `
        <div class="kpi"><div class="kpi-l">Materials cost (projected)</div>
          <div class="kpi-v ${matCostTone}">${SHELL.fmtMoney(cr.totalCostExGst || 0)}</div>
          <div class="kpi-d">${cr.pricedCount}/${cr.itemsCount} priced · ${cr.unpricedCount ? '<a href="?s=materials" style="color:var(--warn);text-decoration:underline">' + cr.unpricedCount + ' to price →</a>' : 'ex-GST'}</div>
        </div>` : ''}
      ${(cr.committedExGst || 0) > 0 ? `
        <div class="kpi"><div class="kpi-l">Committed / received</div>
          <div class="kpi-v">${SHELL.fmtMoney(cr.committedExGst || 0)}</div>
          <div class="kpi-d"><b style="color:${(cr.receivedExGst || 0) > 0 ? 'var(--ok)' : 'var(--muted)'}">${SHELL.fmtMoney(cr.receivedExGst || 0)}</b> received · ${cr.openPoCount || 0} open PO${(cr.openPoCount || 0) === 1 ? '' : 's'}</div>
        </div>` : ''}
      ${(cr.invoicedExGst || 0) > 0 ? `
        <div class="kpi"><div class="kpi-l">Invoiced / paid</div>
          <div class="kpi-v ${Math.abs(cr.varianceExGst || 0) > 50 ? ((cr.varianceExGst || 0) > 0 ? 'amber' : 'green') : ''}">${SHELL.fmtMoney(cr.invoicedExGst || 0)}</div>
          <div class="kpi-d"><b style="color:var(--ok)">${SHELL.fmtMoney(cr.paidExGst || 0)}</b> paid · ${cr.pendingInvoiceCount || 0} pending${(cr.varianceExGst || 0) !== 0 ? ' · <a href="?s=materials" style="color:var(--' + ((cr.varianceExGst || 0) > 50 ? 'bad' : 'muted') + ');text-decoration:underline">' + ((cr.varianceExGst || 0) > 0 ? '+' : '') + SHELL.fmtMoney2(cr.varianceExGst) + ' vs PO →</a>' : ''}</div>
        </div>` : ''}
    </div>

    <div class="two-col">
      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="card-title">Open snags</div>
            <div class="card-sub">${open.length === 0 ? 'No open snags on this job.' : SHELL.pluralize(open.length, 'snag')}</div>
          </div>
          ${open.length ? `<a class="btn btn-sm btn-ghost" href="?s=snags" data-go="snags">Triage all ${SHELL.ICONS.arrow}</a>` : ''}
        </div>
        ${open.slice(0, 5).map(s => `
          <div style="padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;display:flex;align-items:flex-start;gap:10px">
            <div class="left-stripe ${s.priority || ''}" style="width:4px;align-self:stretch;background:${s.priority === 'High' ? 'var(--bad)' : s.priority === 'Medium' ? 'var(--warn)' : 'var(--info)'};border-radius:2px"></div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:500">${SHELL.escapeHtml(s.desc || '(no description)')}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px">${SHELL.escapeHtml(s.dwellingName || s.stage || '—')} · raised ${SHELL._ago(s.createdAt)}${s.assignedToName ? ' · → ' + SHELL.escapeHtml(s.assignedToName) : ' · <span style="color:var(--warn)">unassigned</span>'}</div>
            </div>
            <a href="?s=snags" class="btn btn-sm btn-ghost" style="flex-shrink:0">View →</a>
          </div>
        `).join('') || ''}
        ${open.length > 5 ? `<div style="padding:8px 16px;font-size:11px;color:var(--muted);text-align:center"><a href="?s=snags" style="color:inherit">${open.length - 5} more →</a></div>` : ''}
      </div>

      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">Setup completeness</div>
          <div class="card-sub">${setupCompletenessSubtitle(j)}</div>
        </div>
        <div style="padding:14px 18px">
          ${setupChecklist(j)}
        </div>
      </div>

      <!-- Polish (brief §13 prereq): contract + claims editor so the
           Cash & margin page has data to roll up. Inline form because
           these fields don't warrant a separate modal. -->
      <div class="card" style="padding:0;margin-top:18px">
        <div class="card-hdr" style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div>
            <div class="card-title">Contract &amp; claims</div>

          <div class="field"><label class="field-lbl">Contract value ex-GST ($)</label>
            <input class="input cv-input" id="cv-contractValue" type="number" step="0.01" min="0" value="${j.contractValue || ''}" placeholder="0"></div>
          <div class="field"><label class="field-lbl">Labour estimate ($)</label>
            <input class="input cv-input" id="cv-labourEstimate" type="number" step="0.01" min="0" value="${j.labourEstimate || ''}" placeholder="0"></div>
          <div class="field"><label class="field-lbl">Material estimate ($)</label>
            <input class="input cv-input" id="cv-materialEstimate" type="number" step="0.01" min="0" value="${j.materialEstimate || ''}" placeholder="0"></div>
          <div class="field"><label class="field-lbl">Claimed to date ($)</label>
            <input class="input cv-input" id="cv-claimedToDate" type="number" step="0.01" min="0" value="${j.claimedToDate || ''}" placeholder="0"></div>
          <div class="field"><label class="field-lbl">Paid to date ($)</label>
            <input class="input cv-input" id="cv-paidToDate" type="number" step="0.01" min="0" value="${j.paidToDate || ''}" placeholder="0"></div>
          <div class="field"><label class="field-lbl">Oldest claim (days)</label>
            <input class="input cv-input" id="cv-oldestClaimDays" type="number" step="1" min="0" value="${j.oldestClaimDays || ''}" placeholder="0"></div>
        </div>

  `;
}

// Polish: wire the contract/claims save (called from paint() once the
// overview HTML is in the DOM). Save lights up once any field changes.
function wireContractClaimsCard() {
  const inputs = document.querySelectorAll('.cv-input');
  if (!inputs.length) return;
  const saveBtn = document.getElementById('cv-save');
  inputs.forEach(i => i.addEventListener('input', () => { if (saveBtn) saveBtn.disabled = false; }));
  if (!saveBtn) return;
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    const body = {
      contractValue:    numOrNull(document.getElementById('cv-contractValue').value),
      labourEstimate:   numOrNull(document.getElementById('cv-labourEstimate').value),
      materialEstimate: numOrNull(document.getElementById('cv-materialEstimate').value),
      claimedToDate:    numOrNull(document.getElementById('cv-claimedToDate').value),
      paidToDate:       numOrNull(document.getElementById('cv-paidToDate').value),
      oldestClaimDays:  numOrNull(document.getElementById('cv-oldestClaimDays').value),
    };
    try {
      const r = await SHELL.api('/api/jobs', { method: 'PUT', body: { id: STATE.jobId, ...body } });
      if (r && r.job) STATE.job = r.job;
      SHELL.toast('Saved', 'ok');
      saveBtn.textContent = 'Save';
    } catch (e) {
      saveBtn.textContent = 'Save';
      saveBtn.disabled = false;
      SHELL.toast('Save failed — ' + e.message, 'bad');
    }
  });
}
function numOrNull(v) { return (v === '' || v == null) ? null : Number(v); }

// Compact subtitle for the Setup completeness card — surfaces "ready"
// or "N to fix" up-front so the admin doesn't have to scan every row.
function setupCompletenessSubtitle(j) {
  const checks = setupChecks(j);
  const missing = checks.filter(c => !c.ok).length;
  if (missing === 0) return '<span style="color:var(--ok)">All set — ready for crew.</span>';
  return missing + ' to fix before this job is fully ready';
}

// Single source of truth for the per-job setup-checks list. Used by both
// the Overview Setup-completeness card AND can be reused elsewhere.
// Each check is: { k, label, value, ok, action: { text, href }? }.
// `value` is the human-readable count when ok ("8 default tasks") or the
// short reason when not ok ("none yet").
function setupChecks(j) {
  const allUsers = SHELL.USERS || [];
  const allAreas = (j.areaGroups || []).flatMap(g => g.areas || []);
  const customRoughCount = allAreas.filter(a => Array.isArray(a.roughInTasks) && a.roughInTasks.length).length;
  const customFitCount   = allAreas.filter(a => Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length).length;
  const groupCount = (j.areaGroups || []).length;
  const tradieCount = STATE.crew.filter(u => u.role === 'tradie').length;
  const lhCount     = STATE.crew.filter(u => u.role === 'leadingHand').length;
  const totalCrew   = tradieCount + lhCount;
  const roughCount  = (j.roughInTasks || []).length;
  const fitCount    = (j.fitOffTasks  || []).length;
  // Rough/fit count as "ok" when EITHER the job default exists OR every
  // area has its own custom override (mirrors PR #23 setup-completeness rule).
  const everyAreaCustomR = allAreas.length > 0 && allAreas.every(a => Array.isArray(a.roughInTasks) && a.roughInTasks.length);
  const everyAreaCustomF = allAreas.length > 0 && allAreas.every(a => Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length);
  return [
    { k: 'groups', label: 'Area groups',
      ok: groupCount > 0,
      value: groupCount > 0 ? SHELL.pluralize(groupCount, 'group') : 'none yet',
      action: { text: 'Open setup', href: '?s=setup' } },
    { k: 'areas', label: 'Work areas',
      ok: allAreas.length > 0,
      value: allAreas.length > 0 ? SHELL.pluralize(allAreas.length, 'area') : 'no areas',
      action: { text: 'Open setup', href: '?s=setup' } },
    { k: 'rough', label: 'Rough-in checklist',
      ok: roughCount > 0 || everyAreaCustomR,
      value: roughCount > 0
        ? SHELL.pluralize(roughCount, 'default task') + (customRoughCount ? ' · ' + customRoughCount + ' custom' : '')
        : (everyAreaCustomR ? 'all ' + allAreas.length + ' areas have custom' : 'no tasks set'),
      action: { text: 'Open setup', href: '?s=setup' } },
    { k: 'fit', label: 'Fit-off checklist',
      ok: fitCount > 0 || everyAreaCustomF,
      value: fitCount > 0
        ? SHELL.pluralize(fitCount, 'default task') + (customFitCount ? ' · ' + customFitCount + ' custom' : '')
        : (everyAreaCustomF ? 'all ' + allAreas.length + ' areas have custom' : 'no tasks set'),
      action: { text: 'Open setup', href: '?s=setup' } },
    { k: 'crew', label: 'Crew',
      ok: totalCrew > 0,
      value: totalCrew > 0 ? (lhCount ? lhCount + ' LH · ' + tradieCount + ' tradies' : SHELL.pluralize(tradieCount, 'tradie')) : 'none assigned',
      action: { text: 'Assign crew', href: '?s=crew' } },
    { k: 'client', label: 'Client',
      ok: !!j.clientUserId,
      value: j.clientUserId ? 'Linked' : 'no client',
      action: { text: 'Link client', href: '?s=crew' } },
  ];
}

function setupChecklist(j) {
  return setupChecks(j).map(c => `
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px">
      <span style="width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:${c.ok ? 'var(--ok-bg)' : 'var(--warn-bg)'};color:${c.ok ? 'var(--ok)' : 'var(--warn)'};font-weight:700;flex-shrink:0">${c.ok ? '✓' : '!'}</span>
      <span style="flex:1">${SHELL.escapeHtml(c.label)}</span>
      <span style="font-size:11px;color:${c.ok ? 'var(--muted)' : 'var(--ink-2)'}">${c.value}</span>
      ${c.ok ? '' : `<a href="${c.action.href}" class="btn btn-sm" style="flex-shrink:0">${c.action.text}</a>`}
    </div>

}

// ── Hours tab ──────────────────────────────────────────────────────────
//
// Per-job, multi-week labour breakdown. Loads lazily on first open of the
// tab. Three sections: KPI strip, weekly breakdown, by-crew totals. Calls
// out unrated workers (rate = 0) so payroll knows to fix it before export.

async function renderHoursTab(body) {
  if (!STATE.jobHours.loaded && !STATE.jobHours.loading) {
    STATE.jobHours.loading = true;
    body.innerHTML = '<div class="empty" style="border:0;padding:30px"><div class="empty-title">Loading hours…</div></div>';
    try {
      const days = STATE.jobHours.range || 84;
      const to   = SHELL._iso(new Date());
      const f    = new Date(); f.setDate(f.getDate() - days);
      const from = SHELL._iso(f);
      const r = await SHELL.api(`/api/time-entries-overview?fromDate=${from}&toDate=${to}&jobId=${encodeURIComponent(STATE.jobId)}`);
      STATE.jobHours.entries = r.entries || [];
      STATE.jobHours.loaded  = true;
    } catch (e) {
      body.innerHTML = `<div class="empty" style="border:0;padding:30px"><div class="empty-title">Couldn't load hours</div><div class="empty-sub">${SHELL.escapeHtml(e.message)}</div></div>`;
      STATE.jobHours.loading = false;
      return;
    }
    STATE.jobHours.loading = false;
  }
  body.innerHTML = renderHours();
  // Range selector
  const sel = body.querySelector('#hr-range');
  if (sel) sel.addEventListener('change', async e => {
    STATE.jobHours.range = Number(e.target.value);
    STATE.jobHours.loaded = false;
    await renderHoursTab(body);
  });
}

function renderHours() {
  const users = (SHELL.USERS || []);
  const userById = {}; users.forEach(u => userById[u.id] = u);
  const entries = STATE.jobHours.entries;

  // Per-allocation: pull only the bits assigned to this job, with rate.
  const allocs = [];
  for (const e of entries) {
    const u = userById[e.userId] || {};
    const rate = (u.role === 'tradie' || u.role === 'leadingHand') ? Number(u.hourlyRate) || 0 : 0;
    // Delegated-entry attribution — when an LH or admin logged the
    // entry on behalf of the worker, surface "by <name>" so admin
    // payroll review can verify the chain of custody. Old entries
    // (pre-PR #25) don't carry enteredByUserId; we treat those as
    // self-logged.
    const delegated = e.enteredByUserId && e.enteredByUserId !== e.userId;
    const enteredByName = delegated ? (e.enteredByName || 'on behalf') : null;
    for (const a of (e.allocations || [])) {
      if (a.jobId !== STATE.jobId) continue;
      const hours = Number(a.hours) || 0;
      if (!hours) continue;
      allocs.push({
        date: e.date,
        userId: e.userId,
        userName: e.userName || u.username || e.userId,
        hourlyRate: rate,
        rateMissing: rate === 0,
        hours,
        cost: hours * rate,
        status: e.status || 'draft',
        delegated,
        enteredByName,
      });
    }
  }
  allocs.sort((a, b) => b.date.localeCompare(a.date));

  // Aggregations
  const totalHrs = allocs.reduce((s, a) => s + a.hours, 0);
  const totalCost = allocs.reduce((s, a) => s + a.cost, 0);
  const approvedHrs = allocs.filter(a => a.status === 'approved').reduce((s, a) => s + a.hours, 0);
  const submittedHrs = allocs.filter(a => a.status === 'submitted').reduce((s, a) => s + a.hours, 0);
  const draftHrs    = allocs.filter(a => a.status === 'draft').reduce((s, a) => s + a.hours, 0);
  const unratedHrs  = allocs.filter(a => a.rateMissing).reduce((s, a) => s + a.hours, 0);
  const unratedUsers = [...new Set(allocs.filter(a => a.rateMissing).map(a => a.userName))];

  // By worker
  const byWorker = {};
  for (const a of allocs) {
    if (!byWorker[a.userId]) byWorker[a.userId] = { name: a.userName, rate: a.hourlyRate, rateMissing: a.rateMissing, hours: 0, cost: 0 };
    byWorker[a.userId].hours += a.hours;
    byWorker[a.userId].cost  += a.cost;
  }
  const workers = Object.values(byWorker).sort((a, b) => b.hours - a.hours);

  // By week (ISO Mon-Sun). Each entry's date determines its week.
  const byWeek = {};
  for (const a of allocs) {
    const wk = isoWeekMondayOf(a.date);
    if (!byWeek[wk]) byWeek[wk] = { weekStart: wk, weekEnd: addDays(wk, 6), hours: 0, cost: 0, workers: new Set(), submittedCount: 0, approvedCount: 0, draftCount: 0 };
    byWeek[wk].hours += a.hours;
    byWeek[wk].cost  += a.cost;
    byWeek[wk].workers.add(a.userName);
    if (a.status === 'submitted') byWeek[wk].submittedCount++;
    else if (a.status === 'approved') byWeek[wk].approvedCount++;
    else if (a.status === 'draft') byWeek[wk].draftCount++;
  }
  const weeks = Object.values(byWeek)
    .map(w => ({ ...w, workers: [...w.workers] }))
    .sort((a, b) => b.weekStart.localeCompare(a.weekStart));

  return `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-l">Total hours</div><div class="kpi-v">${totalHrs.toFixed(1)}<sup>h</sup></div><div class="kpi-d">${SHELL.pluralize(allocs.length, 'allocation')}</div></div>
      <div class="kpi"><div class="kpi-l">Labour cost</div><div class="kpi-v">${SHELL.fmtMoney(totalCost)}</div><div class="kpi-d">rate × hours</div></div>
      <div class="kpi"><div class="kpi-l">Approved</div><div class="kpi-v green">${approvedHrs.toFixed(1)}<sup>h</sup></div><div class="kpi-d">payroll-ready</div></div>
      <div class="kpi"><div class="kpi-l">Awaiting</div><div class="kpi-v ${submittedHrs > 0 ? 'amber' : ''}">${(submittedHrs + draftHrs).toFixed(1)}<sup>h</sup></div><div class="kpi-d">${submittedHrs.toFixed(1)} pending · ${draftHrs.toFixed(1)} draft</div></div>
    </div>

    ${unratedHrs > 0 ? `
      <div class="card" style="border-color:var(--warn);background:rgba(255,193,7,.06);padding:12px 14px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:18px">⚠️</div>
          <div style="flex:1;font-size:13px">
            <b>${unratedUsers.length} crew without an hourly rate</b> have logged ${unratedHrs.toFixed(1)}h on this job — labour cost is undercounted.<br>
            <span style="color:var(--ink-2)">Set a rate on <a href="/admin/crew" style="color:inherit;text-decoration:underline">/admin/crew</a>: ${unratedUsers.map(SHELL.escapeHtml).join(', ')}</span>
          </div>
        </div>
      </div>
    ` : ''}

    <div class="toolbar">
      <select class="select" id="hr-range" style="max-width:160px">
        <option value="14"  ${STATE.jobHours.range === 14  ? 'selected' : ''}>Last 2 weeks</option>
        <option value="28"  ${STATE.jobHours.range === 28  ? 'selected' : ''}>Last 4 weeks</option>
        <option value="84"  ${STATE.jobHours.range === 84  ? 'selected' : ''}>Last 12 weeks</option>
        <option value="180" ${STATE.jobHours.range === 180 ? 'selected' : ''}>Last 6 months</option>
        <option value="365" ${STATE.jobHours.range === 365 ? 'selected' : ''}>Last year</option>
      </select>
      <div class="toolbar-spacer"></div>
      <a class="btn btn-sm" href="/admin/hours?job=${SHELL.escapeHtml(STATE.jobId)}">Open in Hours ${SHELL.ICONS.arrow}</a>
    </div>

    <div class="two-col">
      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">Weekly breakdown</div>
          <div class="card-sub">Mon-Sun ISO weeks. Newest first.</div>
        </div>
        <div class="table-wrap" style="border:none;box-shadow:none;border-radius:0">
          <table class="table">
            <thead><tr>
              <th>Week</th><th class="table-num">Hours</th><th class="table-num">Cost</th><th class="table-num">Crew</th><th>Status</th>
            </tr></thead>
            <tbody>${weeks.length ? weeks.map(w => `<tr>
              <td><b>${w.weekStart}</b><div style="font-size:11px;color:var(--muted)">→ ${w.weekEnd}</div></td>
              <td class="table-num">${w.hours.toFixed(1)}h</td>
              <td class="table-num"><b>${SHELL.fmtMoney(w.cost)}</b></td>
              <td class="table-num">${w.workers.length}</td>
              <td style="font-size:11px;color:var(--ink-2)">
                ${w.approvedCount ? `<span class="pill pill-ok" style="font-size:10px">${w.approvedCount} ✓</span> ` : ''}
                ${w.submittedCount ? `<span class="pill pill-warn" style="font-size:10px">${w.submittedCount} ⏳</span> ` : ''}
                ${w.draftCount ? `<span class="pill" style="font-size:10px">${w.draftCount} draft</span>` : ''}
              </td>
            </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:18px">No hours in this range.</td></tr>'}</tbody>
          </table>
        </div>
      </div>

      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">By crew member</div>
          <div class="card-sub">Sorted by hours.</div>
        </div>
        <div class="table-wrap" style="border:none;box-shadow:none;border-radius:0">
          <table class="table">
            <thead><tr>
              <th>Crew</th><th class="table-num">Rate</th><th class="table-num">Hours</th><th class="table-num">Cost</th>
            </tr></thead>
            <tbody>${workers.length ? workers.map(w => `<tr>
              <td><b>${SHELL.escapeHtml(w.name)}</b></td>
              <td class="table-num">${w.rateMissing ? '<span style="color:var(--warn)">—</span>' : '$' + w.rate + '/h'}</td>
              <td class="table-num">${w.hours.toFixed(1)}h</td>
              <td class="table-num"><b>${SHELL.fmtMoney(w.cost)}</b></td>
            </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:18px">No crew with hours in this range.</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card" style="padding:0;margin-top:14px">
      <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="card-title">Recent entries</div>
          <div class="card-sub">${SHELL.pluralize(allocs.length, 'allocation')} on this job · newest 30 shown</div>
        </div>
        ${submittedHrs > 0 ? `<a class="btn btn-sm btn-accent" href="/admin/approvals?job=${SHELL.escapeHtml(STATE.jobId)}">Approve pending →</a>` : ''}
      </div>
      <div>
        ${allocs.slice(0, 30).map(a => `
          <div style="display:grid;grid-template-columns:1fr 100px 100px 110px;gap:10px;padding:10px 18px;border-bottom:1px solid var(--line);font-size:13px;align-items:center">
            <div>
              <div style="font-weight:500">${SHELL.escapeHtml(a.userName)}${a.delegated ? ` <span style="font-size:10px;color:var(--ink-2);background:var(--surface-3);padding:1px 7px;border-radius:999px;margin-left:4px;font-weight:500" title="Logged on behalf by ${SHELL.escapeHtml(a.enteredByName)}">by ${SHELL.escapeHtml(a.enteredByName)}</span>` : ''}</div>
              <div style="font-size:11px;color:var(--muted)" class="tabular">${SHELL.escapeHtml(a.date)}</div>
            </div>
            <div class="tabular" style="text-align:right">${a.hours.toFixed(2)}h</div>
            <div class="tabular" style="text-align:right;color:${a.rateMissing ? 'var(--warn)' : 'var(--ink-2)'}">${a.rateMissing ? '—' : SHELL.fmtMoney(a.cost)}</div>
            <div>${a.status === 'approved' ? '<span class="pill pill-ok">Approved</span>' : a.status === 'submitted' ? '<span class="pill pill-warn">Pending</span>' : a.status === 'rejected' ? '<span class="pill pill-bad">Rejected</span>' : '<span class="pill">Draft</span>'}</div>
          </div>
        `).join('') || '<div class="empty" style="border:0;padding:30px">No allocations on this job in this range.</div>'}
      </div>
    </div>
  `;
}

function isoWeekMondayOf(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay() || 7;
  const m = new Date(d); m.setDate(d.getDate() - (dow - 1));
  return m.toISOString().slice(0, 10);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
