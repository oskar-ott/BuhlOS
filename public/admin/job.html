// ─────────────────────────────────────────────────────────────────────
// Phase 10 — Materials list, wholesaler pricing, cost rollup
//
// Connects the AI plan-takeoff chain to procurement: confirmed per-dwelling
// counts (from data.json) get rolled up to a job-level schedule, pushed
// into the materials-list (with provenance tags so admin sees which items
// came from the takeoff vs were added manually), priced via wholesaler
// emails, and rolled up into a projected materials-cost figure on the
// per-job Overview.
//
// Single source of truth chain:
//   AI suggests → admin confirms (data.json materials)
//                 → push-to-materials syncs (materials-list.json)
//                 → wholesaler-pricing email (annotated with itemIds)
//                 → admin records reply (writes per-item quotedUnitPrice)
//                 → cost rollup on overview
// Each step is explicit. No silent overwrites; admin-edited fields on
// materials items are preserved across re-syncs (_nameLocked / _categoryLocked).
// ─────────────────────────────────────────────────────────────────────

function renderMaterials(host) {
  const items = (STATE.materials && STATE.materials.items) || [];
  const requests = (STATE.materials && STATE.materials.emailRequests) || [];
  const pos = (STATE.materials && STATE.materials.purchaseOrders) || [];
  const allInvoices = (STATE.materials && STATE.materials.invoices) || [];
  // Split: field-captured invoices (LH uploads from a phone) get their
  // own review panel + their own cost-rollup tracks; PO-flow invoices
  // keep the existing 3-way-match section.
  const captured = allInvoices.filter(i => i.source === 'field_capture');
  const invoices = allInvoices.filter(i => i.source !== 'field_capture');
  const pendingCaptures   = captured.filter(i => i.reviewStatus === 'pending_review');
  const needsInfoCaptures = captured.filter(i => i.reviewStatus === 'needs_info');
  const approvedCaptures  = captured.filter(i => i.reviewStatus === 'approved');
  const cr = STATE.costRollup || { itemsCount: 0, pricedCount: 0, unpricedCount: 0, totalCostExGst: 0, committedExGst: 0, receivedExGst: 0, openPoCount: 0, invoicedExGst: 0, paidExGst: 0, varianceExGst: 0, pendingInvoiceCount: 0, approvedActualExGst: 0, pendingReviewExGst: 0 };
  const stale = items.filter(i => i.staleAfter).length;
  const fromTakeoff = items.filter(i => i.source === 'plan-takeoff').length;
  const manual = items.filter(i => i.source !== 'plan-takeoff').length;
  const haveTakeoff = (STATE.takeoff && STATE.takeoff.dwellings && Object.keys(STATE.takeoff.dwellings).length) > 0;
  const ordered = items.filter(i => (i.qtyOrdered || 0) > 0).length;
  const received = items.filter(i => (i.qtyReceived || 0) > 0).length;
  const havePos = pos.filter(p => p.status !== 'cancelled' && p.status !== 'draft').length > 0;
  const varianceTone = (cr.varianceExGst || 0) > 50 ? 'red' : (cr.varianceExGst || 0) < -50 ? 'green' : '';

  host.innerHTML = `
    <div class="kpi-row" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-l">Items</div><div class="kpi-v">${cr.itemsCount}</div><div class="kpi-d">${fromTakeoff} from takeoff · ${manual} manual${stale ? ' · <span style="color:var(--warn)">' + stale + ' stale</span>' : ''}</div></div>
      <div class="kpi"><div class="kpi-l">Priced</div><div class="kpi-v ${cr.pricedCount === cr.itemsCount && cr.itemsCount ? 'green' : 'amber'}">${cr.pricedCount}</div><div class="kpi-d">${cr.unpricedCount} need pricing</div></div>
      <div class="kpi"><div class="kpi-l">Projected cost</div><div class="kpi-v">${SHELL.fmtMoney(cr.totalCostExGst || 0)}</div><div class="kpi-d">ex-GST · priced items</div></div>
      <div class="kpi"><div class="kpi-l">Committed (POs sent)</div><div class="kpi-v">${SHELL.fmtMoney(cr.committedExGst || 0)}</div><div class="kpi-d">${cr.openPoCount || 0} open of ${cr.poCount || 0} PO${(cr.poCount || 0) === 1 ? '' : 's'}</div></div>
      <div class="kpi"><div class="kpi-l">Received</div><div class="kpi-v ${cr.receivedExGst > 0 ? 'green' : ''}">${SHELL.fmtMoney(cr.receivedExGst || 0)}</div><div class="kpi-d">${received}/${ordered || cr.itemsCount} item${(ordered || cr.itemsCount) === 1 ? '' : 's'} delivered</div></div>
      ${invoices.length ? `<div class="kpi"><div class="kpi-l">Invoiced / paid</div><div class="kpi-v">${SHELL.fmtMoney(cr.invoicedExGst || 0)}</div><div class="kpi-d"><b style="color:var(--ok)">${SHELL.fmtMoney(cr.paidExGst || 0)}</b> paid · ${cr.pendingInvoiceCount || 0} pending${(cr.varianceExGst || 0) !== 0 ? ' · <b style="color:var(--' + (varianceTone === 'red' ? 'bad' : 'ok') + ')">' + ((cr.varianceExGst || 0) > 0 ? '+' : '') + SHELL.fmtMoney2(cr.varianceExGst) + '</b> vs PO' : ''}</div></div>` : ''}
      ${captured.length ? `<div class="kpi"><div class="kpi-l">Captured receipts</div><div class="kpi-v ${pendingCaptures.length ? 'amber' : ''}">${SHELL.fmtMoney(cr.approvedActualExGst || 0)}</div><div class="kpi-d">${pendingCaptures.length || needsInfoCaptures.length ? '<b style="color:var(--warn)">' + SHELL.fmtMoney(cr.pendingReviewExGst || 0) + '</b> pending · ' : ''}<b style="color:var(--ok)">${approvedCaptures.length}</b> approved${needsInfoCaptures.length ? ' · <b style="color:var(--warn)">' + needsInfoCaptures.length + '</b> need info' : ''}</div></div>` : ''}
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Materials list <span class="card-count">${items.length}</span></div>
          <div class="card-sub">Confirmed per-dwelling counts roll up here. Add manual items for cable, conduit, accessories, anything not on the legend.</div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${haveTakeoff ? `<button class="btn btn-accent" id="sync-takeoff">Push from takeoff →</button>` : ''}
          <button class="btn" id="add-manual-item">+ Add item</button>
          <button class="btn" id="bulk-add-items">Bulk add</button>
          <button class="btn btn-primary" id="email-wholesaler" ${items.length ? '' : 'disabled'}>Email wholesaler →</button>
        </div>
      </div>
      ${items.length ? `<div class="table-wrap"><table class="table">
        <thead><tr>
          <th>Item</th><th>Source</th><th class="table-num">Qty</th><th class="table-num" title="Ordered / Received">Ord / Rec</th>
          <th class="table-num">Unit $</th><th class="table-num">Total $</th><th></th>
        </tr></thead>
        <tbody>${items.map(materialRow).join('')}</tbody>
      </table></div>` : `<div class="empty">
        <div class="empty-title">No materials yet</div>
        <div class="empty-sub">${haveTakeoff ? 'Click "Push from takeoff" to roll up the confirmed counts.' : 'Add items manually, or run a plan takeoff first.'}</div>
      </div>`}
    </div>

    ${pos.length ? `<div class="card" style="margin-bottom:14px">
      <div class="card-hdr"><div><div class="card-title">Purchase orders <span class="card-count">${pos.length}</span></div>
        <div class="card-sub">Snapshots of priced items sent to a wholesaler. Receipts here flip items to "received" automatically.</div></div></div>
      ${pos.slice().reverse().map(poRow).join('')}
    </div>` : ''}

    ${captured.length ? `<div class="card" style="margin-bottom:14px;border-left:3px solid ${pendingCaptures.length || needsInfoCaptures.length ? 'var(--warn)' : 'var(--line)'}">
      <div class="card-hdr">
        <div><div class="card-title">Field-captured receipts <span class="card-count">${captured.length}</span></div>
          <div class="card-sub">Receipts uploaded onsite by leading hands — admin approval needed before the cost rolls into job actuals.</div></div>
      </div>
      ${pendingCaptures.length ? `<div style="padding:6px 14px 0;font-size:11px;color:var(--warn);text-transform:uppercase;letter-spacing:.6px;font-weight:700">${pendingCaptures.length} awaiting review</div>` : ''}
      <div class="table-wrap" style="margin-top:8px">
        <table class="table">
          <thead><tr>
            <th></th><th>Supplier · invoice</th><th>Date</th><th class="table-num">Total inc GST</th><th>Captured by</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>${captured.slice().reverse().map(capturedInvoiceRow).join('')}</tbody>
        </table>
      </div>
    </div>` : ''}

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Supplier invoices <span class="card-count">${invoices.length}</span></div>
          <div class="card-sub">PO-matched invoices for 3-way match. Variance threshold: $50 or 5% of PO total.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary" id="add-invoice" ${havePos ? '' : 'disabled title="Send a PO first"'}>+ New invoice</button>
        </div>
      </div>
      ${invoices.length ? invoices.slice().reverse().map(invoiceRow).join('') : `<div class="empty">
        <div class="empty-title">No PO-matched invoices yet</div>
        <div class="empty-sub">When a supplier bills against a PO, capture the invoice here to validate the charge.</div>
      </div>`}
    </div>

    ${requests.length ? `<div class="card" style="margin-bottom:14px">
      <div class="card-hdr"><div><div class="card-title">Wholesaler requests <span class="card-count">${requests.length}</span></div>
        <div class="card-sub">Drafts you've sent + replies received. Capturing a reply applies per-item prices; converting a replied request to a PO commits the spend.</div></div></div>
      ${requests.slice().reverse().map(emailRequestRow).join('')}
    </div>` : ''}
  `;

  if (SHELL.$('#sync-takeoff')) SHELL.$('#sync-takeoff').addEventListener('click', syncFromTakeoff);
  SHELL.$('#add-manual-item').addEventListener('click', openAddItemPanel);
  SHELL.$('#bulk-add-items').addEventListener('click', openBulkAddPanel);
  SHELL.$('#email-wholesaler').addEventListener('click', openEmailWholesalerPanel);
  SHELL.$$('button[data-edit-mat]').forEach(b => b.addEventListener('click', () => editMaterialItem(b.dataset.editMat)));
  SHELL.$$('button[data-rm-mat]').forEach(b => b.addEventListener('click', () => removeMaterialItem(b.dataset.rmMat)));
  SHELL.$$('input[data-mat-price]').forEach(inp =>
    inp.addEventListener('change', () => updateUnitPrice(inp.dataset.matPrice, inp.value)));
  SHELL.$$('button[data-record-reply]').forEach(b =>
    b.addEventListener('click', () => openRecordReplyPanel(b.dataset.recordReply)));
  // Phase 11 — PO actions
  SHELL.$$('button[data-create-po]').forEach(b =>
    b.addEventListener('click', () => createPoFromRequest(b.dataset.createPo)));
  SHELL.$$('button[data-open-po]').forEach(b =>
    b.addEventListener('click', () => openPoPanel(b.dataset.openPo)));
  // Phase 12 — invoice actions
  if (SHELL.$('#add-invoice')) SHELL.$('#add-invoice').addEventListener('click', () => openInvoicePanel(null));
  SHELL.$$('button[data-open-invoice]').forEach(b =>
    b.addEventListener('click', () => openInvoicePanel(b.dataset.openInvoice)));
  // Field-captured invoice review (Phase 13)
  SHELL.$$('button[data-review-capture]').forEach(b =>
    b.addEventListener('click', () => reviewCapturedInvoice(b.dataset.reviewCapture, b.dataset.reviewStatus)));
}

// One row in the field-captured receipts table. Admin-only review controls
// (approve / needs info / reject) drive the cost rollup via /api/materials-list
// ?action=review-captured-invoice. Photo opens in a new tab; PDFs open
// inline via the browser's PDF viewer.
function capturedInvoiceRow(inv) {
  const totalIncGst = Number(inv.totalIncGst) || 0;
  const rs = inv.reviewStatus || 'pending_review';
  const statusPill = rs === 'approved'
    ? '<span class="pill pill-ok"><span class="pill-dot"></span>Approved</span>'
    : rs === 'needs_info'
    ? '<span class="pill pill-warn"><span class="pill-dot"></span>Needs info</span>'
    : rs === 'rejected'
    ? '<span class="pill pill-bad"><span class="pill-dot"></span>Rejected</span>'
    : '<span class="pill pill-warn"><span class="pill-dot"></span>Pending review</span>';
  const isPending = rs === 'pending_review' || rs === 'needs_info';
  const photoCell = inv.photoUrl
    ? `<a href="${SHELL.escapeHtml(inv.photoUrl)}" target="_blank" rel="noopener" title="Open receipt photo" style="display:block;width:40px;height:40px;border-radius:6px;overflow:hidden;background:var(--surface-3)"><img src="${SHELL.escapeHtml(inv.photoUrl)}" style="width:40px;height:40px;object-fit:cover" alt=""></a>`
    : '<div style="width:40px;height:40px;border-radius:6px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;text-align:center;line-height:1.1">no<br>photo</div>';
  return `<tr>
    <td>${photoCell}</td>
    <td>
      <div style="font-weight:600">${SHELL.escapeHtml(inv.wholesalerName || 'Unknown supplier')}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--ff-mono)">${inv.invoiceNumber ? '#' + SHELL.escapeHtml(inv.invoiceNumber) : 'no invoice number'}</div>
      ${inv.notes ? `<div style="font-size:11px;color:var(--ink-2);margin-top:4px;font-style:italic">"${SHELL.escapeHtml(inv.notes)}"</div>` : ''}
    </td>
    <td style="font-size:12px;color:var(--ink-2)">${SHELL.escapeHtml(inv.invoiceDate || inv.receivedDate || '—')}</td>
    <td class="table-num"><b>${totalIncGst ? '$' + totalIncGst.toFixed(2) : '—'}</b>${inv.subtotalExGst != null ? `<div style="font-size:10px;color:var(--muted)">${SHELL.fmtMoney(inv.subtotalExGst)} ex-GST</div>` : ''}</td>
    <td style="font-size:12px;color:var(--ink-2)">${SHELL.escapeHtml(inv.capturedBy || '—')}<div style="font-size:10px;color:var(--muted)">${SHELL._ago(inv.capturedAt) || ''}</div></td>
    <td>${statusPill}${inv.reviewedBy ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">by ${SHELL.escapeHtml(inv.reviewedBy)}</div>` : ''}${inv.reviewNote ? `<div style="font-size:11px;color:var(--ink-2);margin-top:4px;font-style:italic">"${SHELL.escapeHtml(inv.reviewNote)}"</div>` : ''}</td>
    <td style="text-align:right;white-space:nowrap">
      ${isPending ? `
        <button class="btn btn-sm btn-ok" data-review-capture="${SHELL.escapeHtml(inv.id)}" data-review-status="approved" title="Approve — counts toward job actual cost">✓ Approve</button>
        <button class="btn btn-sm" data-review-capture="${SHELL.escapeHtml(inv.id)}" data-review-status="needs_info" title="Send back to capturer for more detail">? Needs info</button>
        <button class="btn btn-sm btn-danger" data-review-capture="${SHELL.escapeHtml(inv.id)}" data-review-status="rejected" title="Reject — drops from cost rollup">✕ Reject</button>
      ` : `
        <button class="btn btn-sm" data-review-capture="${SHELL.escapeHtml(inv.id)}" data-review-status="pending_review" title="Move back to pending review">↺ Re-review</button>
      `}
    </td>
  </tr>`;
}

async function reviewCapturedInvoice(invId, reviewStatus) {
  const labels = { approved: 'approve', needs_info: 'send back as Needs info', rejected: 'reject', pending_review: 'move back to pending review' };
  const ok = confirm('Are you sure you want to ' + labels[reviewStatus] + ' this receipt?');
  if (!ok) return;
  let reviewNote = '';
  if (reviewStatus === 'needs_info' || reviewStatus === 'rejected') {
    reviewNote = prompt('Note for the capturer (optional):') || '';
  }
  try {
    await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=review-captured-invoice&invId=' + encodeURIComponent(invId), {
      method: 'POST',
      body: { reviewStatus, reviewNote },
    });
    SHELL.toast('Receipt review saved', 'ok');
    // Refresh materials data + cost rollup so the KPI tile + panel both update.
    STATE.materials = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId));
    STATE.costRollup = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=cost-rollup');
    paint();
  } catch (e) {
    SHELL.toast('Review failed — ' + e.message, 'bad');
  }
}

function materialRow(it) {
  const total = (Number(it.quotedUnitPrice) || 0) * (Number(it.quantity) || 0);
  const priced = Number(it.quotedUnitPrice) > 0;
  const fromTakeoff = it.source === 'plan-takeoff';
  const stale = !!it.staleAfter;
  const qty = Number(it.quantity) || 0;
  const ord = Number(it.qtyOrdered) || 0;
  const rec = Number(it.qtyReceived) || 0;
  const fullyRecv = qty > 0 && rec >= qty;
  const dwBreakdown = it.perDwelling ? Object.entries(it.perDwelling).map(([d, n]) => SHELL.escapeHtml(d) + ' (' + n + ')').join(' · ') : '';
  // Tone for the ord/rec column: green if fully received, amber if partially, blue if ordered but nothing in, muted if untouched.
  const ordRecHtml = ord === 0
    ? '<span style="color:var(--muted)">—</span>'
    : (fullyRecv
       ? '<span style="color:var(--ok);font-weight:600">' + ord + ' / ' + rec + '</span>'
       : (rec > 0
          ? '<span style="color:var(--warn);font-weight:600">' + ord + ' / ' + rec + '</span>'
          : '<span style="color:var(--info);font-weight:600">' + ord + ' / 0</span>'));
  return `<tr ${stale ? 'style="background:var(--warn-bg)"' : ''}>
    <td>
      <div style="font-weight:600">${SHELL.escapeHtml(it.name)}</div>
      ${it.brandOrSpec ? `<div style="font-size:11px;color:var(--muted)">${SHELL.escapeHtml(it.brandOrSpec)}</div>` : ''}
      ${dwBreakdown ? `<div style="font-size:10.5px;color:var(--muted);margin-top:2px;font-family:var(--ff-mono)">${dwBreakdown}</div>` : ''}
      ${stale ? '<div style="font-size:10.5px;color:var(--warn);margin-top:2px;font-weight:600">⚠ no longer in takeoff schedule</div>' : ''}
    </td>
    <td>
      ${fromTakeoff ? `<span class="pill pill-info"><span class="pill-dot"></span>From takeoff</span>` : `<span class="pill"><span class="pill-dot"></span>Manual</span>`}
      ${it.legendCode ? `<div style="font-size:10px;color:var(--muted);font-family:var(--ff-mono);margin-top:3px">${SHELL.escapeHtml(it.legendCode)}</div>` : ''}
    </td>
    <td class="table-num">${SHELL.escapeHtml(String(qty))} ${SHELL.escapeHtml(it.unit || 'each')}</td>
    <td class="table-num">${ordRecHtml}</td>
    <td class="table-num">
      <input class="input" type="number" min="0" step="0.01" style="width:80px;text-align:right;font-family:var(--ff-mono);padding:4px 6px"
             data-mat-price="${SHELL.escapeHtml(it.id)}" value="${priced ? Number(it.quotedUnitPrice).toFixed(2) : ''}" placeholder="—">
    </td>
    <td class="table-num">${priced ? '<b>' + SHELL.fmtMoney2(total) + '</b>' : '<span style="color:var(--muted)">—</span>'}</td>
    <td style="display:flex;gap:4px;justify-content:flex-end">
      <button class="btn btn-sm" data-edit-mat="${SHELL.escapeHtml(it.id)}">Edit</button>
      <button class="btn btn-sm btn-danger" data-rm-mat="${SHELL.escapeHtml(it.id)}">×</button>
    </td>
  </tr>`;
}

function emailRequestRow(req) {
  const tone = req.status === 'replied' ? (req.chosen ? 'ok' : 'info') : req.status === 'sent' ? 'navy' : 'warn';
  const itemCount = (req.itemIds || []).length;
  // Phase 11: any PO already created from this request?
  const pos = (STATE.materials && STATE.materials.purchaseOrders) || [];
  const existingPo = pos.find(p => p.fromRequestId === req.id);
  return `<div style="border-top:1px solid var(--line);padding:10px 14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="pill pill-${tone}">${SHELL.escapeHtml(req.status)}${req.chosen ? ' · chosen' : ''}</span>
      <strong>${SHELL.escapeHtml(req.wholesalerName || '(no name)')}</strong>
      ${req.recipientEmail ? `<a href="mailto:${SHELL.escapeHtml(req.recipientEmail)}" style="font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${SHELL.escapeHtml(req.recipientEmail)}</a>` : ''}
      <span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${itemCount} item${itemCount === 1 ? '' : 's'} · ${SHELL.escapeHtml(new Date(req.createdAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }))}</span>
    </div>
    <div style="font-family:var(--ff-mono);font-size:12px;color:var(--ink-2);margin-top:6px">${SHELL.escapeHtml(req.subject)}</div>
    ${req.replyTotalExGst != null ? `<div style="margin-top:6px;font-size:13px"><b>Replied: ${SHELL.fmtMoney2(req.replyTotalExGst)}</b>${req.replyAt ? ' · ' + SHELL.escapeHtml(new Date(req.replyAt).toLocaleDateString('en-AU')) : ''}${req.replyNotes ? '<br><em style="color:var(--muted)">"' + SHELL.escapeHtml(req.replyNotes) + '"</em>' : ''}</div>` : ''}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      ${req.status !== 'replied' ? `<button class="btn btn-sm" data-record-reply="${SHELL.escapeHtml(req.id)}">Record reply</button>` : `<button class="btn btn-sm" data-record-reply="${SHELL.escapeHtml(req.id)}">Update reply</button>`}
      ${req.status === 'replied' && !existingPo ? `<button class="btn btn-sm btn-accent" data-create-po="${SHELL.escapeHtml(req.id)}">Convert to PO →</button>` : ''}
      ${existingPo ? `<button class="btn btn-sm" data-open-po="${SHELL.escapeHtml(existingPo.id)}">Open PO ${SHELL.escapeHtml(existingPo.poNumber)} →</button>` : ''}
    </div>
  </div>`;
}

function poRow(po) {
  const tone = ({
    draft: 'navy', sent: 'info', confirmed: 'info', partial: 'warn',
    fulfilled: 'ok', cancelled: 'bad'
  })[po.status] || 'navy';
  const recvCount = (po.itemSnapshots || []).filter(s => {
    const totalRecv = (po.receivedEvents || []).reduce((sum, ev) =>
      sum + (ev.items || []).filter(r => r.itemId === s.itemId).reduce((ss, r) => ss + (Number(r.qtyReceived) || 0), 0), 0);
    return totalRecv >= s.qty;
  }).length;
  const totalLines = (po.itemSnapshots || []).length;
  return `<div style="border-top:1px solid var(--line);padding:10px 14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="pill pill-${tone}">${SHELL.escapeHtml(po.status)}</span>
      <strong>${SHELL.escapeHtml(po.poNumber)}</strong>
      <span style="font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${SHELL.escapeHtml(po.wholesalerName || '(no wholesaler)')}</span>
      <span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${totalLines} line${totalLines === 1 ? '' : 's'} · ${SHELL.fmtMoney2(po.totalIncGst)} inc-GST · ${recvCount}/${totalLines} fully received</span>
    </div>
    ${po.expectedDeliveryDate ? `<div style="font-size:12px;color:var(--ink-2);margin-top:4px">Expected: <b>${SHELL.escapeHtml(po.expectedDeliveryDate)}</b></div>` : ''}
    ${po.notes ? `<div style="font-size:12px;color:var(--muted);font-style:italic;margin-top:4px">"${SHELL.escapeHtml(po.notes)}"</div>` : ''}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-sm" data-open-po="${SHELL.escapeHtml(po.id)}">Open →</button>
    </div>
  </div>`;
}

async function syncFromTakeoff() {
  if (!confirm('Push confirmed per-dwelling counts to the materials list? Manual items are kept; takeoff items get qty + provenance refreshed.')) return;
  try {
    const r = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=sync-from-takeoff', {
      method: 'POST', body: {},
    });
    SHELL.toast(r.added + ' added · ' + r.updated + ' updated' + (r.staled ? ' · ' + r.staled + ' marked stale' : ''), 'ok');
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Sync failed — ' + e.message, 'bad'); }
}

async function updateUnitPrice(itemId, value) {
  const v = Number(value);
  const body = Number.isFinite(v) && v > 0 ? { quotedUnitPrice: v, status: 'priced' } : { quotedUnitPrice: null };
  try {
    await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&id=' + encodeURIComponent(itemId), {
      method: 'PATCH', body,
    });
    // Soft refresh: reload materials + cost rollup, leave the rest untouched.
    STATE.materials = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId));
    STATE.costRollup = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=cost-rollup');
    paint();
  } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
}

function openAddItemPanel(existing) {
  const cur = existing || {};
  const isEdit = !!existing;
  const panel = SHELL.openPanel({
    title: isEdit ? 'Edit item' : 'Add material item',
    body: `
      <div class="field"><label class="field-lbl">Name *</label><input class="input" id="m-name" autofocus value="${SHELL.escapeHtml(cur.name || '')}"></div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Quantity</label><input class="input" id="m-qty" type="number" min="0" step="1" value="${cur.quantity != null ? cur.quantity : 1}"></div>
        <div class="field"><label class="field-lbl">Unit</label><input class="input" id="m-unit" value="${SHELL.escapeHtml(cur.unit || 'each')}"></div>
      </div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Brand / spec</label><input class="input" id="m-brand" value="${SHELL.escapeHtml(cur.brandOrSpec || '')}"></div>
        <div class="field"><label class="field-lbl">Category</label><input class="input" id="m-cat" value="${SHELL.escapeHtml(cur.category || 'Other')}"></div>
      </div>
      <div class="field"><label class="field-lbl">Notes</label><textarea class="textarea" id="m-notes" rows="2">${SHELL.escapeHtml(cur.notes || '')}</textarea></div>
    `,
    footer: `<button class="btn" onclick="SHELL.closePanel()">Cancel</button><button class="btn btn-primary" id="m-save">${isEdit ? 'Save' : 'Add'}</button>`,
  });
  panel.querySelector('#m-save').addEventListener('click', async () => {
    const body = {
      name: panel.querySelector('#m-name').value.trim(),
      quantity: Number(panel.querySelector('#m-qty').value) || 0,
      unit: panel.querySelector('#m-unit').value.trim() || 'each',
      brandOrSpec: panel.querySelector('#m-brand').value.trim(),

// ─────────────────────────────────────────────────────────────────────
// Phase 11 — Purchase orders + receipts
//
// A PO snapshots the priced items + chosen wholesaler. Once sent, it
// commits the spend. Receipts (full or partial) are logged against the
// PO and tip items into 'received' status when fully delivered. Item
// qtyOrdered + qtyReceived are reconciled server-side after every
// PO mutation, so the materials list always shows live flow state.
//
// Lifecycle: draft → sent → confirmed → partial → fulfilled (or
// cancelled at any point). Cancelled POs back out of commitment + flow.
// ─────────────────────────────────────────────────────────────────────

async function createPoFromRequest(requestId) {
  const req = (STATE.materials.emailRequests || []).find(r => r.id === requestId);
  if (!req) return;
  // Filter to priced items only — server enforces this too, but the
  // confirm message should set expectations.
  const itemsById = {};
  for (const it of (STATE.materials.items || [])) itemsById[it.id] = it;
  const priced = (req.itemIds || []).filter(id => {
    const it = itemsById[id];
    return it && Number(it.quotedUnitPrice) > 0;
  });
  if (!priced.length) {
    SHELL.toast('No priced items in this request — record the reply first', 'bad');
    return;
  }
  const skipped = (req.itemIds || []).length - priced.length;
  if (!confirm('Create a draft PO from "' + (req.wholesalerName || 'this request') + '" — ' + priced.length + ' priced item' + (priced.length === 1 ? '' : 's') + (skipped ? ' (' + skipped + ' unpriced will be skipped)' : '') + '?')) return;
  try {
    const r = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=create-po', {
      method: 'POST', body: { requestId },
    });
    SHELL.toast('PO ' + r.po.poNumber + ' created (draft)', 'ok');
    await loadAll(); paint();
    // Open the new PO right away
    setTimeout(() => openPoPanel(r.po.id), 200);
  } catch (e) { SHELL.toast('Create failed — ' + e.message, 'bad'); }
}

function openPoPanel(poId) {
  const po = (STATE.materials.purchaseOrders || []).find(p => p.id === poId);
  if (!po) return;

  const recvByItem = {};
  for (const ev of (po.receivedEvents || [])) {
    for (const r of (ev.items || [])) {
      recvByItem[r.itemId] = (recvByItem[r.itemId] || 0) + (Number(r.qtyReceived) || 0);
    }
  }

  const lineRows = (po.itemSnapshots || []).map(s => {
    const recv = recvByItem[s.itemId] || 0;
    const outstanding = Math.max(0, s.qty - recv);
    const tone = recv === 0 ? '' : (recv >= s.qty ? 'ok' : 'warn');
    return `<tr>
      <td>
        <div style="font-weight:600">${SHELL.escapeHtml(s.name)}</div>
        ${s.brandOrSpec ? `<div style="font-size:11px;color:var(--muted)">${SHELL.escapeHtml(s.brandOrSpec)}</div>` : ''}
      </td>
      <td class="table-num">${s.qty} ${SHELL.escapeHtml(s.unit || 'each')}</td>
      <td class="table-num">${SHELL.fmtMoney2(s.unitPriceExGst)}</td>
      <td class="table-num"><b>${SHELL.fmtMoney2(s.lineTotalExGst)}</b></td>
      <td class="table-num"><span class="${tone ? 'pill pill-' + tone : ''}" style="font-size:11px">${recv} / ${s.qty}</span></td>
    </tr>`;
  }).join('');

  const eventsHtml = (po.receivedEvents || []).slice().reverse().map(ev => `
    <div style="border-top:1px dashed var(--line);padding:8px 0;font-size:12px">
      <div><b>${SHELL.escapeHtml(new Date(ev.at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }))}</b> · by ${SHELL.escapeHtml(ev.by)}${ev.notes ? ' · <em style="color:var(--muted)">' + SHELL.escapeHtml(ev.notes) + '</em>' : ''}</div>
      <div style="font-family:var(--ff-mono);color:var(--muted);margin-top:3px">
        ${(ev.items || []).map(r => {
          const snap = (po.itemSnapshots || []).find(s => s.itemId === r.itemId);
          return SHELL.escapeHtml((snap && snap.name) || r.itemId) + ' × ' + r.qtyReceived;
        }).join(' · ')}
      </div>
    </div>
  `).join('');

  const canSend     = po.status === 'draft';
  const canConfirm  = po.status === 'sent';
  const canReceive  = ['sent', 'confirmed', 'partial'].includes(po.status);
  const canCancel   = !['fulfilled', 'cancelled'].includes(po.status);

  const tone = ({
    draft: 'navy', sent: 'info', confirmed: 'info', partial: 'warn',
    fulfilled: 'ok', cancelled: 'bad'
  })[po.status] || 'navy';

  const panel = SHELL.openPanel({
    title: po.poNumber + ' — ' + (po.wholesalerName || ''),
    body: `
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <span class="pill pill-${tone}">${SHELL.escapeHtml(po.status)}</span>
        ${po.recipientEmail ? `<a href="mailto:${SHELL.escapeHtml(po.recipientEmail)}" style="font-family:var(--ff-mono);font-size:11px;color:var(--ink-2)">${SHELL.escapeHtml(po.recipientEmail)}</a>` : ''}
        <span style="font-family:var(--ff-mono);font-size:11px;color:var(--muted);margin-left:auto">created ${SHELL.escapeHtml(new Date(po.createdAt).toLocaleDateString('en-AU'))} by ${SHELL.escapeHtml(po.createdBy)}</span>
      </div>

      <div class="two-col" style="margin-bottom:14px">
        <div class="field"><label class="field-lbl">Expected delivery</label>
          <input class="input" id="po-eta" type="date" value="${SHELL.escapeHtml((po.expectedDeliveryDate || '').slice(0, 10))}"></div>
        <div class="field"><label class="field-lbl">Notes</label>
          <input class="input" id="po-notes" value="${SHELL.escapeHtml(po.notes || '')}"></div>
      </div>

      <div class="card-title" style="margin:16px 0 6px">Lines (${(po.itemSnapshots || []).length})</div>
      <table class="table" style="font-size:13px">
        <thead><tr><th>Item</th><th class="table-num">Qty</th><th class="table-num">Unit $</th><th class="table-num">Line $</th><th class="table-num">Received</th></tr></thead>
        <tbody>${lineRows}</tbody>
        <tfoot><tr style="background:var(--surface-2);font-weight:700">
          <td colspan="3" style="text-align:right">Total ex-GST</td>
          <td class="table-num">${SHELL.fmtMoney2(po.totalExGst)}</td><td></td>
        </tr><tr style="background:var(--surface-2);font-weight:700">
          <td colspan="3" style="text-align:right">GST (10%)</td>
          <td class="table-num">${SHELL.fmtMoney2(po.gstAmount)}</td><td></td>
        </tr><tr style="background:var(--surface-2);font-weight:800;font-size:14px">
          <td colspan="3" style="text-align:right">Total inc-GST</td>
          <td class="table-num">${SHELL.fmtMoney2(po.totalIncGst)}</td><td></td>
        </tr></tfoot>
      </table>

      ${(po.receivedEvents || []).length ? `
        <div class="card-title" style="margin:18px 0 4px">Receipt history (${po.receivedEvents.length})</div>
        ${eventsHtml}
      ` : ''}

      ${canReceive ? `
        <div class="card-title" style="margin:18px 0 6px">Record a delivery</div>
        <p style="font-size:12px;color:var(--muted);margin:0 0 8px">Enter the qty received this delivery against each line. Leave blank to skip a line. Partial deliveries are fine — the PO will sit at "partial" until everything is in.</p>
        <table class="table" style="font-size:13px">
          <thead><tr><th>Item</th><th class="table-num">Outstanding</th><th class="table-num">Receiving now</th></tr></thead>
          <tbody>${(po.itemSnapshots || []).map(s => {
            const recv = recvByItem[s.itemId] || 0;
            const outstanding = Math.max(0, s.qty - recv);
            return `<tr>
              <td>${SHELL.escapeHtml(s.name)}</td>
              <td class="table-num">${outstanding}</td>
              <td class="table-num"><input class="input" type="number" min="0" max="${outstanding}" step="1" style="width:80px;text-align:right;padding:4px 6px" data-recv-qty="${SHELL.escapeHtml(s.itemId)}" placeholder="—" ${outstanding === 0 ? 'disabled' : ''}></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
        <div class="field" style="margin-top:10px">
          <label class="field-lbl">Receipt notes (optional)</label>
          <input class="input" id="po-recv-notes" placeholder="e.g. Damaged box on arrival, replacement coming">
        </div>
      ` : ''}
    `,
    footer: `
      <button class="btn" onclick="SHELL.closePanel()">Close</button>
      ${canCancel ? `<button class="btn btn-danger" id="po-cancel">Cancel PO</button>` : ''}
      ${canSend ? `<button class="btn btn-primary" id="po-send">Send PO →</button>` : ''}
      ${canConfirm ? `<button class="btn btn-primary" id="po-confirm">Mark confirmed</button>` : ''}
      ${canReceive ? `<button class="btn btn-accent" id="po-receive">Record receipt</button>` : ''}
      <button class="btn" id="po-save-meta">Save</button>
    `,
  });

  // Save metadata (notes + ETA) on demand — doesn't change status
  panel.querySelector('#po-save-meta').addEventListener('click', async () => {
    const eta = panel.querySelector('#po-eta').value;
    const notes = panel.querySelector('#po-notes').value.trim();
    try {
      await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=update-po&poId=' + encodeURIComponent(po.id), {
        method: 'POST', body: { expectedDeliveryDate: eta, notes },
      });
      SHELL.toast('Saved', 'ok');
      await loadAll();
      // Re-open the panel with fresh data so receipt history etc. updates
      paint(); openPoPanel(po.id);
    } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
  });

  if (canSend) panel.querySelector('#po-send').addEventListener('click', () => poStatusChange(po.id, 'sent', 'Send this PO to the wholesaler? Commits the spend.'));
  if (canConfirm) panel.querySelector('#po-confirm').addEventListener('click', () => poStatusChange(po.id, 'confirmed', 'Mark confirmed by wholesaler?'));
  if (canCancel) panel.querySelector('#po-cancel').addEventListener('click', () => poStatusChange(po.id, 'cancelled', 'Cancel this PO? Backs out the commitment and any receipts.'));

  if (canReceive) {
    panel.querySelector('#po-receive').addEventListener('click', async () => {
      const items = [];
      panel.querySelectorAll('input[data-recv-qty]').forEach(inp => {
        const q = Number(inp.value);
        if (Number.isFinite(q) && q > 0) items.push({ itemId: inp.dataset.recvQty, qtyReceived: q });
      });
      if (!items.length) { SHELL.toast('Enter at least one qty', 'warn'); return; }
      const notes = panel.querySelector('#po-recv-notes').value.trim();
      try {
        await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=record-receipt&poId=' + encodeURIComponent(po.id), {
          method: 'POST', body: { items, notes },
        });
        SHELL.toast('Receipt logged', 'ok');
        await loadAll(); paint(); openPoPanel(po.id);
      } catch (e) { SHELL.toast('Receipt failed — ' + e.message, 'bad'); }
    });
  }
}

async function poStatusChange(poId, status, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  try {
    await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=update-po&poId=' + encodeURIComponent(poId), {
      method: 'POST', body: { status },
    });
    SHELL.toast('PO → ' + status, 'ok');
    SHELL.closePanel();
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Failed — ' + e.message, 'bad'); }
}

// ─────────────────────────────────────────────────────────────────────
// Phase 12 — Supplier invoices + 3-way match
//
// Closes the procurement triangle. Capture the supplier's actual bill,
// match it to a PO, surface variance before payment goes out the door.
//
// Variance threshold: ±$50 OR ±5% of PO total (whichever is larger)
// auto-flips the invoice to status 'variance' on match. Admin can
// approve through it (e.g. accepting a small price escalation) or
// dispute (flag for back-and-forth with the supplier).
// ─────────────────────────────────────────────────────────────────────

const INVOICE_STATUS_TONE = {
  pending: 'navy', matched: 'info', variance: 'warn',
  approved: 'ok', paid: 'ok', disputed: 'bad', cancelled: '',
};

function invoiceRow(inv) {
  const tone = INVOICE_STATUS_TONE[inv.status] || 'navy';
  const v = inv.variance;
  const matchedPo = inv.matchedPoId
    ? (STATE.materials.purchaseOrders || []).find(p => p.id === inv.matchedPoId)
    : null;
  const dueSoon = inv.dueDate && new Date(inv.dueDate) - new Date() < 7 * 86400000 && inv.status !== 'paid' && inv.status !== 'cancelled';
  return `<div style="border-top:1px solid var(--line);padding:10px 14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="pill pill-${tone}">${SHELL.escapeHtml(inv.status)}</span>
      <strong style="font-family:var(--ff-mono)">${SHELL.escapeHtml(inv.invoiceNumber)}</strong>
      <span>${SHELL.escapeHtml(inv.wholesalerName || '(no supplier)')}</span>
      ${matchedPo ? `<span style="font-family:var(--ff-mono);font-size:11px;color:var(--muted)">→ ${SHELL.escapeHtml(matchedPo.poNumber)}</span>` : ''}
      <span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--muted)">
        ${inv.invoiceDate ? SHELL.escapeHtml(inv.invoiceDate) : ''} · <b>${SHELL.fmtMoney2(inv.totalIncGst || 0)}</b> inc-GST
      </span>
    </div>
    ${dueSoon ? `<div style="font-size:11px;color:var(--bad);margin-top:4px;font-weight:600">⚠ Due ${SHELL.escapeHtml(inv.dueDate)} — pay soon</div>` : ''}
    ${v && v.significant ? `<div style="font-size:12px;color:var(--warn);margin-top:6px;font-weight:600">⚠ Variance ${(v.diffExGst > 0 ? '+' : '')}${SHELL.fmtMoney2(v.diffExGst)} vs PO ${SHELL.escapeHtml(v.poNumber)} · ${v.poTotalExGst > 0 ? Math.round((v.diffExGst / v.poTotalExGst) * 1000) / 10 + '%' : ''}</div>` : (v ? `<div style="font-size:12px;color:var(--muted);margin-top:6px">Matches PO ${SHELL.escapeHtml(v.poNumber)} (${(v.diffExGst > 0 ? '+' : '')}${SHELL.fmtMoney2(v.diffExGst)})</div>` : '')}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-sm" data-open-invoice="${SHELL.escapeHtml(inv.id)}">Open →</button>
    </div>
  </div>`;
}

function openInvoicePanel(invId) {
  const inv = invId ? (STATE.materials.invoices || []).find(x => x.id === invId) : null;
  const isEdit = !!inv;
  const pos = (STATE.materials.purchaseOrders || []).filter(p => p.status !== 'cancelled' && p.status !== 'draft');
  const matchedPo = isEdit && inv.matchedPoId ? (STATE.materials.purchaseOrders || []).find(p => p.id === inv.matchedPoId) : null;
  const v = isEdit && inv.variance;

  // Default empty line item for create
  const initialLines = isEdit ? (inv.lineItems || []) : [{ lineNumber: 1, description: '', qty: 1, unit: 'each', unitPriceExGst: 0 }];

  const linesHtml = (lines, perLineMap) => lines.map((ln, i) => {
    const mappedItemId = perLineMap ? perLineMap[ln.lineNumber] : '';
    return `<tr data-line-row="${i}">
      <td style="width:40px"><input class="input" data-ln-num style="width:50px;padding:4px 6px" value="${SHELL.escapeHtml(String(ln.lineNumber || (i + 1)))}"></td>
      <td><input class="input" data-ln-desc value="${SHELL.escapeHtml(ln.description || '')}" placeholder="Item description"></td>
      <td><input class="input" type="number" min="0" step="0.01" data-ln-qty style="width:80px;text-align:right;padding:4px 6px" value="${SHELL.escapeHtml(String(ln.qty || 0))}"></td>
      <td><input class="input" data-ln-unit style="width:60px;padding:4px 6px" value="${SHELL.escapeHtml(ln.unit || 'each')}"></td>
      <td><input class="input" type="number" min="0" step="0.01" data-ln-price style="width:90px;text-align:right;padding:4px 6px;font-family:var(--ff-mono)" value="${SHELL.escapeHtml(String(ln.unitPriceExGst || 0))}"></td>
      <td class="table-num" data-ln-total>${SHELL.fmtMoney2((Number(ln.qty) || 0) * (Number(ln.unitPriceExGst) || 0))}</td>
      ${matchedPo ? `<td><select class="select" data-ln-match style="padding:4px 6px;font-size:12px">
        <option value="">— unmapped —</option>
        ${(matchedPo.itemSnapshots || []).map(s => `<option value="${SHELL.escapeHtml(s.itemId)}"${mappedItemId === s.itemId ? ' selected' : ''}>${SHELL.escapeHtml(s.name)}</option>`).join('')}
      </select></td>` : ''}
      <td><button class="btn btn-sm btn-danger" data-rm-line="${i}">×</button></td>
    </tr>`;
  }).join('');

  const lockedStatuses = ['paid', 'cancelled'];
  const locked = isEdit && lockedStatuses.includes(inv.status);

  const panel = SHELL.openPanel({
    title: isEdit ? 'Invoice ' + inv.invoiceNumber : 'New supplier invoice',
    body: `
      <div class="two-col">
        <div class="field"><label class="field-lbl">Invoice number *</label>
          <input class="input" id="inv-number" value="${SHELL.escapeHtml(isEdit ? inv.invoiceNumber : '')}" ${locked ? 'disabled' : ''}></div>
        <div class="field"><label class="field-lbl">Supplier</label>
          <input class="input" id="inv-supplier" value="${SHELL.escapeHtml(isEdit ? inv.wholesalerName : (matchedPo ? matchedPo.wholesalerName : ''))}" ${locked ? 'disabled' : ''}></div>
      </div>
      <div class="three-col">
        <div class="field"><label class="field-lbl">Invoice date</label>
          <input class="input" type="date" id="inv-date" value="${isEdit ? SHELL.escapeHtml((inv.invoiceDate || '').slice(0, 10)) : ''}" ${locked ? 'disabled' : ''}></div>
        <div class="field"><label class="field-lbl">Due date</label>
          <input class="input" type="date" id="inv-due" value="${isEdit ? SHELL.escapeHtml((inv.dueDate || '').slice(0, 10)) : ''}" ${locked ? 'disabled' : ''}></div>
        <div class="field"><label class="field-lbl">Received</label>
          <input class="input" type="date" id="inv-received" value="${isEdit ? SHELL.escapeHtml((inv.receivedDate || '').slice(0, 10)) : new Date().toISOString().slice(0, 10)}" ${locked ? 'disabled' : ''}></div>
      </div>

      <div class="field" style="margin-top:14px">
        <label class="field-lbl">Match to PO</label>
        <select class="select" id="inv-match-po" ${locked ? 'disabled' : ''}>
          <option value="">— not matched —</option>
          ${pos.map(p => `<option value="${SHELL.escapeHtml(p.id)}"${(isEdit && inv.matchedPoId === p.id) ? ' selected' : ''}>${SHELL.escapeHtml(p.poNumber)} — ${SHELL.escapeHtml(p.wholesalerName || '')} · ${SHELL.fmtMoney2(p.totalExGst)}</option>`).join('')}
        </select>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Matching enables per-line variance tracking. Optional but recommended.</div>
      </div>

      ${v ? `<div style="margin:14px 0;padding:10px 12px;border-radius:6px;background:var(--${v.significant ? 'warn-bg' : 'ok-bg'});border:1px solid var(--${v.significant ? 'warn-bd' : 'ok-bd'})">
        <div style="font-weight:700;color:var(--${v.significant ? 'warn' : 'ok'});font-size:13px">${v.significant ? '⚠ Variance flagged' : '✓ Within tolerance'}</div>
        <div style="font-family:var(--ff-mono);font-size:12px;color:var(--ink-2);margin-top:4px">PO ${SHELL.escapeHtml(v.poNumber)}: ${SHELL.fmtMoney2(v.poTotalExGst)} ex-GST · Invoice: ${SHELL.fmtMoney2(v.invoiceTotalExGst)} ex-GST · diff <b>${(v.diffExGst > 0 ? '+' : '')}${SHELL.fmtMoney2(v.diffExGst)}</b>${v.poTotalExGst > 0 ? ' (' + Math.round((v.diffExGst / v.poTotalExGst) * 1000) / 10 + '%)' : ''}</div>
      </div>` : ''}

      <div class="card-title" style="margin:18px 0 6px">Invoice lines</div>
      <table class="table" style="font-size:12px" id="inv-lines-table">
        <thead><tr>
          <th style="width:40px">#</th><th>Description</th><th style="width:80px;text-align:right">Qty</th>
          <th style="width:60px">Unit</th><th style="width:90px;text-align:right">Unit $</th>
          <th class="table-num" style="width:90px">Line $</th>
          ${matchedPo ? '<th>Maps to item</th>' : ''}
          <th style="width:32px"></th>
        </tr></thead>
        <tbody>${linesHtml(initialLines, isEdit ? inv.perLineMap : null)}</tbody>
      </table>
      ${locked ? '' : `<button class="btn btn-sm" id="inv-add-line" style="margin-top:8px">+ Add line</button>`}

      <div style="margin-top:14px;padding:10px 12px;background:var(--surface-2);border-radius:6px;display:grid;grid-template-columns:1fr auto;gap:6px;font-family:var(--ff-mono);font-size:13px">
        <div>Subtotal ex-GST</div><div style="text-align:right" id="inv-subtotal">${SHELL.fmtMoney2(isEdit ? inv.subtotalExGst : 0)}</div>
        <div>GST <input type="number" id="inv-gst" min="0" step="0.01" style="width:80px;text-align:right;padding:2px 4px;font-family:var(--ff-mono);border:1px solid var(--line);border-radius:4px" value="${isEdit && inv.gstAmount != null ? Number(inv.gstAmount).toFixed(2) : ''}" placeholder="auto" ${locked ? 'disabled' : ''}></div><div style="text-align:right" id="inv-gst-display">${SHELL.fmtMoney2(isEdit ? inv.gstAmount : 0)}</div>
        <div style="font-weight:700;font-size:14px">Total inc-GST</div><div style="text-align:right;font-weight:800;font-size:15px" id="inv-total">${SHELL.fmtMoney2(isEdit ? inv.totalIncGst : 0)}</div>
      </div>

      <div class="field" style="margin-top:14px">
        <label class="field-lbl">Notes</label>
        <textarea class="textarea" id="inv-notes" rows="2" ${locked ? 'disabled' : ''}>${SHELL.escapeHtml(isEdit ? (inv.notes || '') : '')}</textarea>
      </div>
    `,
    footer: `
      <button class="btn" onclick="SHELL.closePanel()">Close</button>
      ${isEdit && !lockedStatuses.includes(inv.status) ? `<button class="btn btn-danger" id="inv-cancel">Cancel invoice</button>` : ''}
      ${isEdit && inv.status === 'pending' && inv.matchedPoId ? `<button class="btn" id="inv-dispute">Dispute</button>` : ''}
      ${isEdit && ['matched', 'variance'].includes(inv.status) ? `<button class="btn btn-primary" id="inv-approve">Approve${inv.status === 'variance' ? ' (accept variance)' : ''}</button>` : ''}
      ${isEdit && inv.status === 'approved' ? `<button class="btn btn-accent" id="inv-pay">Mark paid</button>` : ''}
      ${!locked ? `<button class="btn btn-primary" id="inv-save">${isEdit ? 'Save' : 'Create'}</button>` : ''}
    `,
  });

  // Wire row dynamic recompute
  function readLines() {
    const lines = [];
    const perLineMap = {};
    panel.querySelectorAll('tr[data-line-row]').forEach(tr => {
      const num  = tr.querySelector('input[data-ln-num]').value || '';
      const desc = tr.querySelector('input[data-ln-desc]').value.trim();
      const qty  = Number(tr.querySelector('input[data-ln-qty]').value) || 0;
      const unit = tr.querySelector('input[data-ln-unit]').value.trim() || 'each';
      const price = Number(tr.querySelector('input[data-ln-price]').value) || 0;
      const matchSel = tr.querySelector('select[data-ln-match]');
      if (!desc && qty <= 0) return; // skip empty rows
      lines.push({ lineNumber: num || (lines.length + 1), description: desc, qty, unit, unitPriceExGst: price });
      if (matchSel && matchSel.value) perLineMap[num || (lines.length)] = matchSel.value;
    });
    return { lines, perLineMap };
  }
  function recomputeTotals() {
    const { lines } = readLines();
    let sub = 0;
    panel.querySelectorAll('tr[data-line-row]').forEach((tr, i) => {
      const qty = Number(tr.querySelector('input[data-ln-qty]').value) || 0;
      const price = Number(tr.querySelector('input[data-ln-price]').value) || 0;
      const total = qty * price;
      tr.querySelector('[data-ln-total]').textContent = SHELL.fmtMoney2(total);
      sub += total;
    });
    panel.querySelector('#inv-subtotal').textContent = SHELL.fmtMoney2(sub);
    const gstVal = panel.querySelector('#inv-gst').value;
    const gst = gstVal === '' ? sub * 0.10 : Number(gstVal);
    panel.querySelector('#inv-gst-display').textContent = SHELL.fmtMoney2(gst);
    panel.querySelector('#inv-total').textContent = SHELL.fmtMoney2(sub + gst);
  }
  panel.querySelectorAll('input[data-ln-qty], input[data-ln-price]').forEach(el => el.addEventListener('input', recomputeTotals));
  panel.querySelector('#inv-gst').addEventListener('input', recomputeTotals);

  if (panel.querySelector('#inv-add-line')) {
    panel.querySelector('#inv-add-line').addEventListener('click', () => {
      const tbody = panel.querySelector('#inv-lines-table tbody');
      const idx = tbody.querySelectorAll('tr').length;
      const html = linesHtml([{ lineNumber: idx + 1, description: '', qty: 1, unit: 'each', unitPriceExGst: 0 }], null);
      tbody.insertAdjacentHTML('beforeend', html);
      // Re-bind handlers on newly added inputs
      const newRow = tbody.lastElementChild;
      newRow.querySelectorAll('input[data-ln-qty], input[data-ln-price]').forEach(el => el.addEventListener('input', recomputeTotals));
      newRow.querySelector('button[data-rm-line]').addEventListener('click', () => { newRow.remove(); recomputeTotals(); });
    });
  }
  panel.querySelectorAll('button[data-rm-line]').forEach(b => b.addEventListener('click', () => {
    b.closest('tr').remove(); recomputeTotals();
  }));

  // Status flow buttons
  if (panel.querySelector('#inv-cancel')) panel.querySelector('#inv-cancel').addEventListener('click', () => invoiceStatusChange(inv.id, 'cancelled', 'Cancel this invoice? Use this for credit notes / voided invoices.'));
  if (panel.querySelector('#inv-dispute')) panel.querySelector('#inv-dispute').addEventListener('click', () => invoiceStatusChange(inv.id, 'disputed', 'Mark disputed? Pauses the approval flow until resolved with the supplier.'));
  if (panel.querySelector('#inv-approve')) panel.querySelector('#inv-approve').addEventListener('click', () => invoiceStatusChange(inv.id, 'approved', inv.status === 'variance' ? 'Approve this invoice despite the variance?' : 'Approve this invoice for payment?'));
  if (panel.querySelector('#inv-pay'))     panel.querySelector('#inv-pay').addEventListener('click',     () => invoiceStatusChange(inv.id, 'paid', 'Mark this invoice paid? Records today as the payment date.'));

  if (panel.querySelector('#inv-save')) panel.querySelector('#inv-save').addEventListener('click', async () => {
    const { lines, perLineMap } = readLines();
    const matchPoId = panel.querySelector('#inv-match-po').value || null;
    const gstVal = panel.querySelector('#inv-gst').value;
    const body = {
      invoiceNumber:  panel.querySelector('#inv-number').value.trim(),
      wholesalerName: panel.querySelector('#inv-supplier').value.trim(),
      invoiceDate:    panel.querySelector('#inv-date').value,
      dueDate:        panel.querySelector('#inv-due').value,
      receivedDate:   panel.querySelector('#inv-received').value,
      lineItems:      lines,
      gstAmount:      gstVal === '' ? '' : Number(gstVal),
      notes:          panel.querySelector('#inv-notes').value.trim(),
    };
    if (!body.invoiceNumber) { SHELL.toast('Invoice number required', 'bad'); return; }
    try {
      if (isEdit) {
        await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=update-invoice&invId=' + encodeURIComponent(inv.id), { method: 'POST', body });
        // Re-match if matched-PO changed
        if (matchPoId && matchPoId !== inv.matchedPoId) {
          await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=match-invoice&invId=' + encodeURIComponent(inv.id), {
            method: 'POST', body: { poId: matchPoId, perLineMap },
          });
        } else if (matchPoId && Object.keys(perLineMap).length) {
          await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=match-invoice&invId=' + encodeURIComponent(inv.id), {
            method: 'POST', body: { poId: matchPoId, perLineMap },
          });
        }
      } else {
        body.matchPoId = matchPoId;
        body.perLineMap = perLineMap;
        await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=create-invoice', { method: 'POST', body });
      }
      SHELL.toast(isEdit ? 'Saved' : 'Invoice created', 'ok');
      SHELL.closePanel();
      await loadAll(); paint();
    } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
  });

  recomputeTotals();
}

async function invoiceStatusChange(invId, status, confirmMsg) {
  if (confirmMsg && !confirm(confirmMsg)) return;
  try {
    await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=update-invoice&invId=' + encodeURIComponent(invId), {
      method: 'POST', body: { status },
    });
    SHELL.toast('Invoice → ' + status, 'ok');
    SHELL.closePanel();
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Failed — ' + e.message, 'bad'); }
}

// ── Contacts tab ───────────────────────────────────────────────────────
//
// Per-job project + supplier contacts. Admin-only management; tradies +
// LHs get a read-only view inside the field interface. Data lives at
// jobs/<jobId>/contacts.json and is shared with the legacy snag-email
// composer's contact picker (uncategorised contacts coexist there).

let CONTACTS_STATE = { project: [], supplier: [], loaded: false };

async function renderContactsTab(host) {
  host.innerHTML = '<div class="empty"><div class="empty-title">Loading contacts…</div></div>';
  try {
    const r = await SHELL.api('/api/contacts?jobId=' + encodeURIComponent(STATE.jobId));
    const all = (r.contacts || []);
    CONTACTS_STATE.project  = all.filter(c => c.category === 'project').sort((a, b) => sortProject(a, b));
    CONTACTS_STATE.supplier = all.filter(c => c.category === 'supplier').sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    CONTACTS_STATE.loaded = true;
  } catch (e) {
    host.innerHTML = '<div class="empty"><div class="empty-title">Couldn\'t load contacts</div><div class="empty-sub">' + SHELL.escapeHtml(e.message) + '</div></div>';
    return;
  }
  paintContactsTab(host);
}

// Role-priority sort for project contacts — PM first, then Site,
// Builder, then alphabetical for the rest. Matches the field-side
// ordering so admin and tradies see the same sequence.
function sortProject(a, b) {
  const rank = (c) => {
    const r = String((c && c.role) || '').toLowerCase();
    if (r.includes('project manager')) return 0;
    if (r.includes('site manager') || r.includes('site supervisor')) return 1;
    if (r.includes('builder'))   return 2;
    if (r.includes('foreman'))   return 3;
    return 4;
  };
  const ra = rank(a), rb = rank(b);
  if (ra !== rb) return ra - rb;
  return (a.name || '').localeCompare(b.name || '');
}

function paintContactsTab(host) {
  const proj = CONTACTS_STATE.project;
  const supp = CONTACTS_STATE.supplier;
  host.innerHTML = `
    <div class="page-head" style="margin-top:8px">
      <div>
        <div class="card-title" style="font-size:13px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em">Project contacts</div>
        <div class="card-sub">PMs, builders, site managers — anyone the LH might need to call about the build.</div>
      </div>
      <button class="btn btn-accent" id="ct-new-project">${SHELL.ICONS.plus} Add project contact</button>
    </div>
    ${proj.length ? `<div class="card" style="padding:0;margin-bottom:24px">${proj.map(projectRow).join('')}</div>`
      : `<div class="empty" style="margin-bottom:24px"><div class="empty-title">No project contacts yet</div><div class="empty-sub">Add the project manager, site manager, builder, anyone the leading hand might need to call.</div></div>`}

    <div class="page-head" style="margin-top:8px">
      <div>
        <div class="card-title" style="font-size:13px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em">Suppliers</div>
        <div class="card-sub">Wholesalers + suppliers for this job — each with a short description of what they're supplying.</div>
      </div>
      <button class="btn btn-accent" id="ct-new-supplier">${SHELL.ICONS.plus} Add supplier</button>
    </div>
    ${supp.length ? `<div class="card" style="padding:0">${supp.map(supplierRow).join('')}</div>`
      : `<div class="empty"><div class="empty-title">No suppliers yet</div><div class="empty-sub">Add each wholesaler / supplier with the description of what they're providing on this job — e.g. "wall lights for units 1–8", "switchboards", "general electrical".</div></div>`}
  `;
  SHELL.$('#ct-new-project').addEventListener('click', () => openContactPanel('project'));
  SHELL.$('#ct-new-supplier').addEventListener('click', () => openContactPanel('supplier'));
  SHELL.$$('button[data-edit-contact]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.editContact;
    const c = [...CONTACTS_STATE.project, ...CONTACTS_STATE.supplier].find(x => x.id === id);
    if (c) openContactPanel(c.category, c);
  }));
  SHELL.$$('button[data-rm-contact]').forEach(b => b.addEventListener('click', () => removeContact(b.dataset.rmContact)));
}

      <div style="display:flex;align-items:baseline;gap:8px"><b style="font-size:14px">${SHELL.escapeHtml(c.name)}</b>${c.role ? '<span style="font-size:11px;color:var(--ink-2);font-weight:600">' + SHELL.escapeHtml(c.role) + '</span>' : ''}</div>

function openContactPanel(category, existing) {
  const isProject = category === 'project';
  const isEdit = !!existing;
  const panel = SHELL.openPanel({
    title: (isEdit ? 'Edit ' : 'New ') + (isProject ? 'project contact' : 'supplier'),
    body: isProject ? `
      <div class="field"><label class="field-lbl">Name *</label><input class="input" id="ct-name" autofocus value="${SHELL.escapeHtml((existing && existing.name) || '')}" placeholder="e.g. Sam Walker"></div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Role</label><input class="input" id="ct-role" value="${SHELL.escapeHtml((existing && existing.role) || '')}" placeholder="Project manager, Site manager, Builder…"></div>
        <div class="field"><label class="field-lbl">Company</label><input class="input" id="ct-company" value="${SHELL.escapeHtml((existing && existing.company) || '')}" placeholder="e.g. Birdwood Constructions"></div>
      </div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Phone</label><input class="input" id="ct-phone" type="tel" value="${SHELL.escapeHtml((existing && existing.phone) || '')}"></div>
        <div class="field"><label class="field-lbl">Email</label><input class="input" id="ct-email" type="email" value="${SHELL.escapeHtml((existing && existing.email) || '')}"></div>
      </div>
      <div class="field"><label class="field-lbl">Notes</label><textarea class="textarea" id="ct-notes" rows="3">${SHELL.escapeHtml((existing && existing.notes) || '')}</textarea></div>
    ` : `
      <div class="field"><label class="field-lbl">Supplier / company *</label><input class="input" id="ct-name" autofocus value="${SHELL.escapeHtml((existing && existing.name) || '')}" placeholder="e.g. TLE, Lawrence &amp; Hanson"></div>
      <div class="field"><label class="field-lbl">What they're supplying * <span style="font-weight:400;color:var(--muted)">(shown to the LH first)</span></label><input class="input" id="ct-description" value="${SHELL.escapeHtml((existing && existing.description) || '')}" placeholder="e.g. Wall lights for units 1–8 · Switchboards · General electrical"></div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Contact person</label><input class="input" id="ct-contactPerson" value="${SHELL.escapeHtml((existing && existing.contactPerson) || '')}" placeholder="Optional — who to ask for"></div>
        <div class="field"><label class="field-lbl">Phone</label><input class="input" id="ct-phone" type="tel" value="${SHELL.escapeHtml((existing && existing.phone) || '')}"></div>
      </div>
      <div class="field"><label class="field-lbl">Email</label><input class="input" id="ct-email" type="email" value="${SHELL.escapeHtml((existing && existing.email) || '')}"></div>
      <div class="field"><label class="field-lbl">Notes</label><textarea class="textarea" id="ct-notes" rows="3">${SHELL.escapeHtml((existing && existing.notes) || '')}</textarea></div>
    `,
    footer: `<button class="btn" onclick="SHELL.closePanel()">Cancel</button><button class="btn btn-primary" id="ct-save">${isEdit ? 'Save' : 'Add'}</button>`,
  });
  panel.querySelector('#ct-save').addEventListener('click', async () => {
    const body = {
      category,
      name:  panel.querySelector('#ct-name').value.trim(),
      phone: panel.querySelector('#ct-phone').value.trim(),
      email: panel.querySelector('#ct-email').value.trim(),
      notes: panel.querySelector('#ct-notes').value.trim(),
    };
    if (isProject) {
      body.role    = panel.querySelector('#ct-role').value.trim();
      body.company = panel.querySelector('#ct-company').value.trim();
    } else {
      body.contactPerson = panel.querySelector('#ct-contactPerson').value.trim();
      body.description   = panel.querySelector('#ct-description').value.trim();
    }
    if (!body.name) { SHELL.toast(isProject ? 'Name required' : 'Supplier name required', 'bad'); return; }
    if (!isProject && !body.description) { SHELL.toast('Description required (what they\'re supplying)', 'bad'); return; }
    try {
      if (isEdit) {
        body.id = existing.id;
        await SHELL.api('/api/contacts?jobId=' + encodeURIComponent(STATE.jobId), { method: 'PUT', body });
      } else {
        await SHELL.api('/api/contacts?jobId=' + encodeURIComponent(STATE.jobId), { method: 'POST', body });
      }
      SHELL.toast(isEdit ? 'Saved' : 'Added', 'ok');
      SHELL.closePanel();
      renderContactsTab(SHELL.$('#ws-body'));
    } catch (e) { SHELL.toast((isEdit ? 'Save failed — ' : 'Add failed — ') + e.message, 'bad'); }
  });
}

async function removeContact(id) {
  const c = [...CONTACTS_STATE.project, ...CONTACTS_STATE.supplier].find(x => x.id === id);
  if (!c) return;
  if (!confirm('Remove "' + (c.name || 'contact') + '"?')) return;
  try {
    await fetch('/api/contacts?jobId=' + encodeURIComponent(STATE.jobId) + '&id=' + encodeURIComponent(id), { method: 'DELETE', credentials: 'same-origin' })
      .then(r => { if (!r.ok) throw new Error('Failed'); });
    SHELL.toast('Removed', 'ok');
    renderContactsTab(SHELL.$('#ws-body'));
  } catch (e) { SHELL.toast('Remove failed — ' + e.message, 'bad'); }
}

SHELL.boot();
</script>
</body>
</html>
