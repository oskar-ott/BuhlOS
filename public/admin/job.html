<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · job</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
let STATE = {
  jobId: null,
  job: null,
  data: { dwellings: {}, snags: [] },
  jobTypes: [],
  hoursThisWeek: [],
  crew: [],
  section: 'overview',
  // Phase 9 — plan takeoff
  plans: [],         // /api/plans?jobId result
  takeoff: null,     // /api/plans?jobId&action=takeoff result
  pdfjsReady: false,
  // Phase 10 — materials list + cost rollup
  materials: { items: [], emailRequests: [] },
  costRollup: { itemsCount: 0, pricedCount: 0, unpricedCount: 0, totalCostExGst: 0, unpricedQty: 0 },
};

window.PAGE = {
  id: 'jobs',  // sidebar highlight stays on Jobs
  title: 'Job',
  crumb: 'Job',

  async render() {
    // Job ID from URL: /admin/jobs/<id>
    const m = location.pathname.match(/^\/admin\/jobs\/([^\/]+)/);
    STATE.jobId = m ? decodeURIComponent(m[1]) : null;
    if (!STATE.jobId) { location.href = '/admin/jobs'; return; }
    STATE.section = (new URLSearchParams(location.search).get('s')) || 'overview';
    await loadAll();
    paint();
  }
};

async function loadAll() {
  // Job from /api/jobs (already in shell cache)
  STATE.job = (SHELL.JOBS || []).find(j => j.id === STATE.jobId) || null;
  if (!STATE.job) {
    // Fallback: fetch fresh.
    try {
      const r = await SHELL.api('/api/jobs?withStats=1');
      STATE.job = (r.jobs || []).find(j => j.id === STATE.jobId);
    } catch {}
  }
  if (!STATE.job) {
    SHELL.$('#page').innerHTML = '<div class="empty"><div class="empty-title">Job not found</div><div class="empty-sub">It may have been archived. <a href="/admin/jobs" style="color:inherit;text-decoration:underline">Back to Jobs.</a></div></div>';
    return;
  }
  // Per-job blob (snags + dwellings)
  try {
    const r = await fetch('/api/data?jobId=' + encodeURIComponent(STATE.jobId), { credentials: 'same-origin' });
    if (r.ok) STATE.data = await r.json();
  } catch {}
  // Job types
  try {
    const r = await SHELL.api('/api/job-types');
    STATE.jobTypes = r.jobTypes || r.types || [];
  } catch {}
  // Hours this week filtered to this job — for Overview KPI
  try {
    const monday = SHELL.isoWeekMonday();
    const r = await SHELL.api(`/api/time-entries-overview?fromDate=${SHELL._iso(monday)}&toDate=${SHELL._iso(new Date())}`);
    STATE.hoursThisWeek = (r.entries || []).filter(e =>
      (e.allocations || []).some(a => a.jobId === STATE.jobId));
  } catch { STATE.hoursThisWeek = []; }
  // Crew assigned to this job
  STATE.crew = (SHELL.USERS || []).filter(u => (u.assignedJobIds || []).includes(STATE.jobId));
  // Plans + AI takeoff (Phase 9)
  try {
    const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId));
    STATE.plans = (r.plans || []).filter(p => p.status !== 'archived');
  } catch { STATE.plans = []; }
  try {
    STATE.takeoff = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=takeoff');
  } catch { STATE.takeoff = null; }
  // Materials list + cost rollup (Phase 10)
  try {
    STATE.materials = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId));
  } catch { STATE.materials = { items: [], emailRequests: [] }; }
  try {
    STATE.costRollup = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=cost-rollup');
  } catch { STATE.costRollup = { itemsCount: 0, pricedCount: 0, unpricedCount: 0, totalCostExGst: 0, unpricedQty: 0 }; }
}

function paint() {
  if (!STATE.job) return;
  const j = STATE.job;
  const ref = (j.ref || j.id || '').toUpperCase();

  const pendingDwellings = STATE.takeoff && STATE.takeoff.dwellings
    ? Object.values(STATE.takeoff.dwellings).filter(d => d.status === 'pending').length : 0;
  const matsCount = (STATE.materials && STATE.materials.items) ? STATE.materials.items.length : 0;
  const sections = [
    { id: 'overview',  label: 'Overview' },
    { id: 'snags',     label: 'Snags', count: (STATE.data.snags || []).filter(s => s.status === 'Open').length },
    { id: 'hours',     label: 'Hours' },
    { id: 'plans',     label: 'Plans & takeoff', count: pendingDwellings || null },
    { id: 'materials', label: 'Materials',  count: matsCount || null },
    { id: 'crew',      label: 'Crew & client' },
    { id: 'setup',     label: 'Setup (areas, tasks)' },
  ];

  SHELL.$('#page').innerHTML = `
    <div class="ws-head">
      <div class="ws-crumb"><a href="/admin/jobs">← All jobs</a></div>
      <div class="ws-name">
        <h1>${SHELL.escapeHtml(j.name)}</h1>
        ${SHELL.jobStatusPill(j.status || 'active')}
        <span class="user-handle">${SHELL.escapeHtml(ref)}</span>
        <button class="btn btn-sm" id="edit-basics">${SHELL.ICONS.edit} Edit basics</button>
        <a class="btn btn-sm btn-ghost" href="/jobs/${SHELL.escapeHtml(j.id)}" target="_blank" rel="noopener">${SHELL.ICONS.external} Open in field</a>
      </div>
    </div>

    <div class="tabs">
      ${sections.map(s => `
        <a class="tab ${STATE.section === s.id ? 'active' : ''}" href="#" data-section="${s.id}">
          ${SHELL.escapeHtml(s.label)}${s.count != null ? `<span class="badge">${s.count}</span>` : ''}
        </a>
      `).join('')}
    </div>

    <div id="ws-body"></div>
  `;

  SHELL.$$('a[data-section]').forEach(a => a.addEventListener('click', e => {
    e.preventDefault();
    STATE.section = a.dataset.section;
    history.replaceState(null, '', `/admin/jobs/${STATE.jobId}?s=${STATE.section}`);
    paint();
  }));
  SHELL.$('#edit-basics').addEventListener('click', openEditBasics);

  const body = SHELL.$('#ws-body');
  if      (STATE.section === 'overview')  body.innerHTML = renderOverview();
  else if (STATE.section === 'snags')     body.innerHTML = renderSnags();
  else if (STATE.section === 'hours')     body.innerHTML = renderHours();
  else if (STATE.section === 'plans')     renderPlans(body);
  else if (STATE.section === 'materials') renderMaterials(body);
  else if (STATE.section === 'crew')      renderCrew(body);
  else if (STATE.section === 'setup')     renderSetup(body);

  // Wire snags-tab inline triage (same handlers as /admin/snags)
  if (STATE.section === 'snags') {
    SHELL.$$('select[data-field="assignee"]').forEach(sel =>
      sel.addEventListener('change', () => assignSnag(sel.dataset.snagid, sel.value, sel.options[sel.selectedIndex].text)));
    SHELL.$$('button[data-action="close-snag"]').forEach(b =>
      b.addEventListener('click', () => closeSnag(b.dataset.snagid)));
    SHELL.$$('button[data-action="reopen-snag"]').forEach(b =>
      b.addEventListener('click', () => reopenSnag(b.dataset.snagid)));
  }
}

function renderOverview() {
  const j = STATE.job;
  const open = (STATE.data.snags || []).filter(s => s.status === 'Open');
  const weekHrs = STATE.hoursThisWeek.reduce((a, e) => {
    const onJob = (e.allocations || []).filter(x => x.jobId === STATE.jobId);
    return a + onJob.reduce((aa, x) => aa + Number(x.hours || 0), 0);
  }, 0);
  const weekSubmitters = new Set();
  for (const e of STATE.hoursThisWeek) {
    if ((e.allocations || []).some(x => x.jobId === STATE.jobId)) weekSubmitters.add(e.userId);
  }

  // Phase 10 — projected materials cost (priced items only; unpriced are
  // an unknown until wholesalers come back).
  const cr = STATE.costRollup || {};
  const matCostTone = (cr.itemsCount && cr.unpricedCount === 0) ? 'green' : (cr.unpricedCount > 0 ? 'amber' : '');
  return `
    <div class="kgrid">
      <div class="kpi"><div class="kpi-l">Progress</div><div class="kpi-v">${j.statsPct || 0}<sup>%</sup></div><div class="kpi-d">${j.statsDwellingsDone || 0}/${j.statsDwellingCount || 0} dwellings</div></div>
      <div class="kpi"><div class="kpi-l">Open snags</div><div class="kpi-v ${open.length ? 'red' : 'green'}">${open.length}</div><div class="kpi-d">${open.filter(s => !s.assignedToUserId).length} unassigned</div></div>
      <div class="kpi"><div class="kpi-l">Hours this week</div><div class="kpi-v">${weekHrs.toFixed(1)}<sup>h</sup></div><div class="kpi-d">${weekSubmitters.size} crew</div></div>
      <div class="kpi"><div class="kpi-l">Crew assigned</div><div class="kpi-v">${STATE.crew.filter(u => u.role === 'tradie' || u.role === 'leadingHand').length}</div><div class="kpi-d">${j.clientUserId ? 'client linked' : '<span style="color:var(--warn)">no client</span>'}</div></div>
      ${cr.itemsCount > 0 ? `
        <div class="kpi"><div class="kpi-l">Materials cost (projected)</div>
          <div class="kpi-v ${matCostTone}">${SHELL.fmtMoney(cr.totalCostExGst || 0)}</div>
          <div class="kpi-d">${cr.pricedCount}/${cr.itemsCount} priced · ${cr.unpricedCount ? '<a href="?s=materials" style="color:var(--warn);text-decoration:underline">' + cr.unpricedCount + ' to price →</a>' : 'ex-GST'}</div>
        </div>` : ''}
      ${(cr.committedExGst || 0) > 0 ? `
        <div class="kpi"><div class="kpi-l">Committed / received</div>
          <div class="kpi-v">${SHELL.fmtMoney(cr.committedExGst || 0)}</div>
          <div class="kpi-d"><b style="color:${(cr.receivedExGst || 0) > 0 ? 'var(--ok)' : 'var(--muted)'}">${SHELL.fmtMoney(cr.receivedExGst || 0)}</b> received · ${cr.openPoCount || 0} open PO${(cr.openPoCount || 0) === 1 ? '' : 's'}</div>
        </div>` : ''}
      ${(cr.invoicedExGst || 0) > 0 ? `
        <div class="kpi"><div class="kpi-l">Invoiced / paid</div>
          <div class="kpi-v ${Math.abs(cr.varianceExGst || 0) > 50 ? ((cr.varianceExGst || 0) > 0 ? 'amber' : 'green') : ''}">${SHELL.fmtMoney(cr.invoicedExGst || 0)}</div>
          <div class="kpi-d"><b style="color:var(--ok)">${SHELL.fmtMoney(cr.paidExGst || 0)}</b> paid · ${cr.pendingInvoiceCount || 0} pending${(cr.varianceExGst || 0) !== 0 ? ' · <a href="?s=materials" style="color:var(--' + ((cr.varianceExGst || 0) > 50 ? 'bad' : 'muted') + ');text-decoration:underline">' + ((cr.varianceExGst || 0) > 0 ? '+' : '') + SHELL.fmtMoney2(cr.varianceExGst) + ' vs PO →</a>' : ''}</div>
        </div>` : ''}
    </div>

    <div class="two-col">
      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="card-title">Open snags</div>
            <div class="card-sub">${open.length === 0 ? 'No open snags on this job.' : SHELL.pluralize(open.length, 'snag')}</div>
          </div>
          ${open.length ? `<a class="btn btn-sm btn-ghost" href="#" onclick="event.preventDefault();PAGE.section='snags';location.search='?s=snags';" data-go="snags">Triage ${SHELL.ICONS.arrow}</a>` : ''}
        </div>
        ${open.slice(0, 5).map(s => `
          <div style="padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;display:flex;align-items:flex-start;gap:10px">
            <div class="left-stripe ${s.priority || ''}" style="width:4px;align-self:stretch;background:${s.priority === 'High' ? 'var(--bad)' : s.priority === 'Medium' ? 'var(--warn)' : 'var(--info)'};border-radius:2px"></div>
            <div style="flex:1">
              <div style="font-weight:500">${SHELL.escapeHtml(s.desc || '(no description)')}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px">${SHELL.escapeHtml(s.dwellingName || s.stage || '—')} · raised ${SHELL._ago(s.createdAt)}${s.assignedToName ? ' · → ' + SHELL.escapeHtml(s.assignedToName) : ' · <span style="color:var(--warn)">unassigned</span>'}</div>
            </div>
          </div>
        `).join('') || ''}
      </div>

      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">Setup completeness</div>
          <div class="card-sub">What's still missing</div>
        </div>
        <div style="padding:14px 18px">
          ${setupChecklist(j)}
        </div>
      </div>
    </div>
  `;
}

function setupChecklist(j) {
  const checks = [
    { k: 'areas',    label: 'Area groups',     ok: (j.areaGroups || []).length > 0 },
    { k: 'rough',    label: 'Rough-in tasks',  ok: (j.roughInTasks || []).length > 0 },
    { k: 'fit',      label: 'Fit-off tasks',   ok: (j.fitOffTasks || []).length > 0 },
    { k: 'crew',     label: 'Crew assigned',   ok: STATE.crew.some(u => u.role === 'tradie' || u.role === 'leadingHand') },
    { k: 'client',   label: 'Client linked',   ok: !!j.clientUserId },
  ];
  return checks.map(c => `
    <div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px">
      <span style="width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:${c.ok ? 'var(--ok-bg)' : 'var(--warn-bg)'};color:${c.ok ? 'var(--ok)' : 'var(--warn)'}">${c.ok ? '✓' : '!'}</span>
      <span style="flex:1">${SHELL.escapeHtml(c.label)}</span>
      <span style="font-size:11px;color:var(--muted)">${c.ok ? 'OK' : 'set up →'}</span>
    </div>
  `).join('');
}

function renderSnags() {
  const open = (STATE.data.snags || []).filter(s => s.status === 'Open');
  const closed = (STATE.data.snags || []).filter(s => s.status === 'Closed');
  if (!open.length && !closed.length) {
    return '<div class="empty"><div class="empty-title">No snags</div><div class="empty-sub">Tradies haven\'t raised anything on this job.</div></div>';
  }
  const users = (SHELL.USERS || []).filter(u => u.role === 'tradie' || u.role === 'leadingHand');
  return `
    <div class="card" style="padding:0">
      <div class="snag-row head">
        <div></div>
        <div>Description</div>
        <div>Dwelling / stage</div>
        <div>Priority</div>
        <div>Status</div>
        <div>Assignee</div>
        <div>Actions</div>
      </div>
      ${[...open, ...closed].map(s => `
        <div class="snag-row">
          <div class="left-stripe ${s.priority || ''}"></div>
          <div class="desc">
            <b>${SHELL.escapeHtml(s.desc || '(no description)')}</b>
            <div class="desc-meta">SN-${SHELL.escapeHtml(String(s.id).slice(-6))} · raised ${SHELL._ago(s.createdAt)}${s.by ? ' · by ' + SHELL.escapeHtml(s.by) : ''}</div>
          </div>
          <div>
            <div style="font-weight:600;font-size:12px">${SHELL.escapeHtml(s.dwellingName || '—')}</div>
            <div style="font-size:11px;color:var(--muted)">${SHELL.escapeHtml(s.stage || '—')}</div>
          </div>
          <div>${s.priority ? `<span class="pill pill-${s.priority === 'High' ? 'bad' : s.priority === 'Medium' ? 'warn' : 'info'}">${s.priority}</span>` : '—'}</div>
          <div>${s.status === 'Open' ? '<span class="pill pill-warn">Open</span>' : '<span class="pill pill-ok">Resolved</span>'}</div>
          <div>
            <select data-field="assignee" data-snagid="${SHELL.escapeHtml(s.id)}">
              <option value="" ${!s.assignedToUserId ? 'selected' : ''}>— Unassigned —</option>
              ${users.map(u => `<option value="${SHELL.escapeHtml(u.id)}" ${s.assignedToUserId === u.id ? 'selected' : ''}>${SHELL.escapeHtml(u.username)}</option>`).join('')}
            </select>
          </div>
          <div style="display:flex;gap:4px;justify-content:flex-end">
            ${s.status === 'Open'
              ? `<button class="btn btn-sm btn-ok" data-action="close-snag" data-snagid="${SHELL.escapeHtml(s.id)}" title="Mark resolved">${SHELL.ICONS.check}</button>`
              : `<button class="btn btn-sm" data-action="reopen-snag" data-snagid="${SHELL.escapeHtml(s.id)}" title="Reopen">↺</button>`}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderHours() {
  const entries = STATE.hoursThisWeek.filter(e => (e.allocations || []).some(a => a.jobId === STATE.jobId));
  const totalHrs = entries.reduce((a, e) => a + (e.allocations || []).filter(x => x.jobId === STATE.jobId).reduce((aa, x) => aa + Number(x.hours || 0), 0), 0);
  const submitters = new Set(entries.map(e => e.userId));
  return `
    <div class="card" style="padding:0;margin-bottom:14px">
      <div style="padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)">
        <div>
          <div class="card-title">Hours this week — this job</div>
          <div class="card-sub">${SHELL.pluralize(entries.length, 'entry', 'entries')} · ${totalHrs.toFixed(1)}h · ${submitters.size} crew</div>
        </div>
        <a class="btn btn-sm" href="/admin/hours?job=${SHELL.escapeHtml(STATE.jobId)}">Open in Hours ${SHELL.ICONS.arrow}</a>
      </div>
      ${entries.length === 0 ? '<div class="empty" style="border:0;padding:30px">No hours logged this week on this job.</div>' : `
        <div>
          ${entries
            .sort((a,b) => (b.date || '').localeCompare(a.date || ''))
            .map(e => {
              const onJob = (e.allocations || []).filter(x => x.jobId === STATE.jobId);
              const h = onJob.reduce((s,x) => s + Number(x.hours || 0), 0);
              return `
                <div style="display:grid;grid-template-columns:1fr 100px 80px 90px;gap:10px;padding:10px 18px;border-bottom:1px solid var(--line);font-size:13px;align-items:center">
                  <div>
                    <div style="font-weight:500">${SHELL.escapeHtml(e.userName || e.userId)}</div>
                    <div style="font-size:11px;color:var(--muted)" class="tabular">${SHELL.escapeHtml(e.date)}</div>
                  </div>
                  <div class="tabular" style="text-align:right">${h.toFixed(2)}h</div>
                  <div>${e.status === 'approved' ? '<span class="pill pill-ok">Approved</span>' : e.status === 'submitted' ? '<span class="pill pill-warn">Pending</span>' : '<span class="pill">Draft</span>'}</div>
                  <div style="text-align:right">
                    ${e.status === 'submitted' ? `<a class="btn btn-sm" href="/admin/approvals?job=${SHELL.escapeHtml(STATE.jobId)}">Approve</a>` : ''}
                  </div>
                </div>
              `;
            }).join('')}
        </div>
      `}
    </div>
  `;
}

function renderCrew(body) {
  const tradies = STATE.crew.filter(u => u.role === 'tradie' || u.role === 'leadingHand');
  const allCrew = (SHELL.USERS || []).filter(u => u.role === 'tradie' || u.role === 'leadingHand');
  const unassigned = allCrew.filter(u => !(u.assignedJobIds || []).includes(STATE.jobId));
  const j = STATE.job;
  const clients = (SHELL.USERS || []).filter(u => u.role === 'client');
  const linkedClient = j.clientUserId ? clients.find(c => c.id === j.clientUserId) : null;

  body.innerHTML = `
    <div class="two-col">
      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="card-title">Assigned crew</div>
            <div class="card-sub">${SHELL.pluralize(tradies.length, 'person')}</div>
          </div>
        </div>
        <div>
          ${tradies.length ? tradies.map(u => `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--line);font-size:13px">
              <div class="avatar ${u.role}">${SHELL.initials(u.username)}</div>
              <div style="flex:1">
                <div style="font-weight:500">${SHELL.escapeHtml(u.username)}</div>
                <div style="font-size:11px;color:var(--muted)">${u.role === 'leadingHand' ? 'Leading hand' : 'Tradie'}${u.hourlyRate ? ' · $' + u.hourlyRate + '/hr' : ''}</div>
              </div>
              <button class="btn btn-sm btn-danger" data-unassign="${SHELL.escapeHtml(u.id)}">Unassign</button>
            </div>
          `).join('') : '<div class="empty" style="border:0;padding:24px">No crew assigned yet.</div>'}
        </div>
        <div style="padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center">
          <select class="select" id="crew-add-sel" style="flex:1">
            <option value="">— pick someone to assign —</option>
            ${unassigned.map(u => `<option value="${SHELL.escapeHtml(u.id)}">${SHELL.escapeHtml(u.username)} (${u.role === 'leadingHand' ? 'LH' : 'tradie'})</option>`).join('')}
          </select>
          <button class="btn btn-primary" id="crew-add-btn">Assign</button>
        </div>
      </div>

      <div class="card" style="padding:0">
        <div style="padding:14px 18px;border-bottom:1px solid var(--line)">
          <div class="card-title">Client access</div>
          <div class="card-sub">Read-only login for the builder/client</div>
        </div>
        <div style="padding:14px 18px;font-size:13px">
          ${linkedClient ? `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <div class="avatar client">${SHELL.initials(linkedClient.username)}</div>
              <div style="flex:1">
                <div style="font-weight:500">${SHELL.escapeHtml(linkedClient.username)}</div>
                <div style="font-size:11px;color:var(--muted)">Client login linked</div>
              </div>
              <button class="btn btn-sm btn-danger" id="client-unlink">Unlink</button>
            </div>
          ` : `
            <div style="color:var(--muted);margin-bottom:10px">No client linked. The job is invisible to any client portal until you link one.</div>
            ${clients.length ? `
              <div style="display:flex;gap:8px;align-items:center">
                <select class="select" id="client-pick" style="flex:1">
                  <option value="">— pick existing client —</option>
                  ${clients.map(c => `<option value="${SHELL.escapeHtml(c.id)}">${SHELL.escapeHtml(c.username)}</option>`).join('')}

            ` : `<div style="font-size:12px;color:var(--muted)">No client users exist yet. Create one in <a href="/admin/crew" style="color:inherit;text-decoration:underline">Crew</a>.</div>`}
          `}
        </div>
      </div>
    </div>
  `;

  body.querySelectorAll('button[data-unassign]').forEach(b =>
    b.addEventListener('click', () => unassignCrew(b.dataset.unassign)));
  const addBtn = body.querySelector('#crew-add-btn');
  if (addBtn) addBtn.addEventListener('click', () => {
    const sel = body.querySelector('#crew-add-sel');
    if (sel.value) assignCrew(sel.value);
  });
  const linkBtn = body.querySelector('#client-link');
  if (linkBtn) linkBtn.addEventListener('click', () => {
    const sel = body.querySelector('#client-pick');
    if (sel.value) linkClient(sel.value);
  });
  const unlinkBtn = body.querySelector('#client-unlink');
  if (unlinkBtn) unlinkBtn.addEventListener('click', () => linkClient(null));
}

// ── Setup tab — live job structure editor ──────────────────────────────
//
// A job does not stop being editable once work starts. The Setup tab lets
// admin/LH edit areas, rough-in tasks, and fit-off tasks safely on jobs
// that are already in progress.
//
// Safety model:
//   - The PUT /api/jobs endpoint preserves stable IDs by name match. So
//     adding/renaming items is non-destructive — existing per-dwelling
//     progress (data.json dwellings[areaId][stage].tasks[taskId]) keeps
//     pointing at the same IDs.
//   - Removing a task or area that has recorded progress would orphan
//     that progress (it still exists on disk but nothing references it).
//     We block removal client-side when STATE.data shows progress on it,
//     and surface a "rename instead" hint.
//   - All mutations re-fetch the job + data after save and repaint.
function renderSetup(host) {
  const j = STATE.job || {};
  const data = STATE.data || { dwellings: {} };
  const isLive = (j.status || 'active') === 'active' && jobHasAnyProgress(j, data);

  // Setup completeness checklist — admin can scan what's still missing
  // without leaving the page.
  const completeness = [
    { k: 'name',     label: 'Job name set',         ok: !!(j.name && j.name.trim()) },
    { k: 'type',     label: 'Job type set',         ok: !!j.type },
    { k: 'client',   label: 'Client linked',        ok: !!j.clientUserId },
    { k: 'crew',     label: 'Crew assigned',        ok: STATE.crew.some(u => u.role === 'tradie' || u.role === 'leadingHand') },
    { k: 'areas',    label: 'Area groups created',  ok: (j.areaGroups || []).length > 0 },
    { k: 'rough',    label: 'Rough-in tasks set',   ok: (j.roughInTasks || []).length > 0 },
    { k: 'fit',      label: 'Fit-off tasks set',    ok: (j.fitOffTasks || []).length > 0 },
  ];
  const completePct = Math.round(completeness.filter(c => c.ok).length / completeness.length * 100);

  host.innerHTML = `
    ${isLive ? `<div class="card" style="background:var(--warn-bg);border-color:var(--warn-bd);margin-bottom:14px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span style="flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--warn);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-top:1px">!</span>
        <div style="font-size:13px;line-height:1.5;color:var(--ink)">
          <b>This job is already in progress.</b> You can safely add or rename items, but areas or tasks with recorded progress can't be deleted — rename them instead. Existing snags and dwelling status stay linked because IDs are preserved.
        </div>
      </div>
    </div>` : ''}

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Setup completeness</div>
          <div class="card-sub">${completePct}% of the checklist filled in</div></div>
        <div style="font-size:24px;font-weight:700;color:${completePct === 100 ? 'var(--ok)' : 'var(--warn)'}">${completePct}%</div>
      </div>
      <div style="display:grid;gap:6px">
        ${completeness.map(c => `
          <div style="display:flex;align-items:center;gap:10px;font-size:13px">
            <span style="width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:${c.ok ? 'var(--ok-bg)' : 'var(--warn-bg)'};color:${c.ok ? 'var(--ok)' : 'var(--warn)'};font-weight:700;font-size:11px">${c.ok ? '✓' : '!'}</span>
            <span style="flex:1">${SHELL.escapeHtml(c.label)}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Job basics</div>
          <div class="card-sub">Name, type, status, client.</div></div>
        <button class="btn btn-primary" id="setup-edit-basics">${SHELL.ICONS.edit} Edit</button>
      </div>
      <div style="display:grid;grid-template-columns:120px 1fr;gap:6px 14px;font-size:13px">
        <div style="color:var(--muted)">Name</div><div><b>${SHELL.escapeHtml(j.name || '—')}</b></div>
        <div style="color:var(--muted)">Type</div><div>${SHELL.escapeHtml((STATE.jobTypes.find(t => t.id === j.type) || {}).name || '—')}</div>
        <div style="color:var(--muted)">Status</div><div>${SHELL.jobStatusPill(j.status || 'active')}</div>
        <div style="color:var(--muted)">Client</div><div>${j.clientUserId ? SHELL.escapeHtml((SHELL.USERS || []).find(u => u.id === j.clientUserId)?.username || j.clientUserId) : '<span style="color:var(--warn)">No client linked</span>'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Areas <span class="card-count">${countAreas(j)}</span></div>
          <div class="card-sub">Groups + areas. Add new ones any time. Areas with progress can't be deleted — rename instead.</div></div>
        <button class="btn btn-primary" id="setup-add-group">+ Add group</button>
      </div>
      <div id="areas-list">${areasEditorHtml(j, data)}</div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Rough-in tasks <span class="card-count">${(j.roughInTasks || []).length}</span></div>
          <div class="card-sub">The checklist tradies tick off during rough-in. Add or rename safely; tasks with status recorded can't be deleted.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn" id="setup-add-rough">+ Add</button>
          <button class="btn" id="setup-bulk-rough">Bulk paste</button>
        </div>
      </div>
      <div id="rough-list">${tasksEditorHtml(j, data, 'roughIn')}</div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Fit-off tasks <span class="card-count">${(j.fitOffTasks || []).length}</span></div>
          <div class="card-sub">The checklist tradies tick off during fit-off. Same safe-edit rules.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn" id="setup-add-fit">+ Add</button>
          <button class="btn" id="setup-bulk-fit">Bulk paste</button>
        </div>
      </div>
      <div id="fit-list">${tasksEditorHtml(j, data, 'fitOff')}</div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Crew & client</div>
          <div class="card-sub">People with access to this job.</div></div>
        <a class="btn" href="?s=crew">Open Crew &amp; client tab →</a>
      </div>
      <div style="font-size:13px;color:var(--muted)">
        ${STATE.crew.length} ${STATE.crew.length === 1 ? 'person' : 'people'} on this job · ${j.clientUserId ? '1 client linked' : '<span style="color:var(--warn)">no client linked</span>'}
      </div>
    </div>

    <div class="card">
      <div class="card-hdr"><div><div class="card-title">Open in field</div>
        <div class="card-sub">See this job the way the tradies do.</div></div></div>
      <a class="btn" href="/jobs/${SHELL.escapeHtml(STATE.jobId)}" target="_blank" rel="noopener">${SHELL.ICONS.external} Open ${SHELL.escapeHtml(j.name || STATE.jobId)} in field</a>
    </div>
  `;

  // Wire actions
  SHELL.$('#setup-edit-basics').addEventListener('click', openEditBasics);
  SHELL.$('#setup-add-group').addEventListener('click', () => addAreaGroup());
  SHELL.$('#setup-add-rough').addEventListener('click', () => addTask('roughIn'));
  SHELL.$('#setup-bulk-rough').addEventListener('click', () => bulkAddTasks('roughIn'));
  SHELL.$('#setup-add-fit').addEventListener('click', () => addTask('fitOff'));
  SHELL.$('#setup-bulk-fit').addEventListener('click', () => bulkAddTasks('fitOff'));
  SHELL.$$('button[data-rename-area]').forEach(b => b.addEventListener('click', () => renameAreaOrGroup(b.dataset.renameArea)));
  SHELL.$$('button[data-add-area]').forEach(b => b.addEventListener('click', () => addAreaToGroup(b.dataset.addArea)));
  SHELL.$$('button[data-bulk-area]').forEach(b => b.addEventListener('click', () => bulkAddAreas(b.dataset.bulkArea)));
  SHELL.$$('button[data-rm-area]').forEach(b => b.addEventListener('click', () => removeAreaOrGroup(b.dataset.rmArea)));
  SHELL.$$('button[data-rename-task]').forEach(b => b.addEventListener('click', () => renameTask(b.dataset.renameTask, b.dataset.stage)));
  SHELL.$$('button[data-rm-task]').forEach(b => b.addEventListener('click', () => removeTask(b.dataset.rmTask, b.dataset.stage)));
}

// ── Setup helpers ──────────────────────────────────────────────────────

function countAreas(j) {
  return (j.areaGroups || []).reduce((s, g) => s + ((g.areas || []).length), 0);
}

function jobHasAnyProgress(j, data) {
  const dwellings = (data && data.dwellings) || {};
  for (const dwId of Object.keys(dwellings)) {
    const dw = dwellings[dwId];
    for (const stage of ['roughIn', 'fitOff']) {
      const tasks = (dw[stage] && dw[stage].tasks) || {};
      for (const tid of Object.keys(tasks)) {
        if (tasks[tid] && tasks[tid] !== 'not_started') return true;
      }
    }
  }
  return false;
}

// True if any dwelling under this group has any non-not_started task.
function groupHasProgress(group, data) {
  const dwellings = (data && data.dwellings) || {};
  const areaIds = new Set((group.areas || []).map(a => a.id));
  for (const dwId of Object.keys(dwellings)) {
    if (!areaIds.has(dwId)) continue;
    const dw = dwellings[dwId];
    for (const stage of ['roughIn', 'fitOff']) {
      const tasks = (dw[stage] && dw[stage].tasks) || {};
      for (const tid of Object.keys(tasks)) {
        if (tasks[tid] && tasks[tid] !== 'not_started') return true;
      }
    }
  }
  return false;
}

function areaHasProgress(areaId, data) {
  const dw = ((data && data.dwellings) || {})[areaId];
  if (!dw) return false;
  for (const stage of ['roughIn', 'fitOff']) {
    const tasks = (dw[stage] && dw[stage].tasks) || {};
    for (const tid of Object.keys(tasks)) {
      if (tasks[tid] && tasks[tid] !== 'not_started') return true;
    }
  }
  return false;
}

function taskHasProgress(taskId, stage, data) {
  const dwellings = (data && data.dwellings) || {};
  for (const dwId of Object.keys(dwellings)) {
    const tasks = (dwellings[dwId][stage] && dwellings[dwId][stage].tasks) || {};
    if (tasks[taskId] && tasks[taskId] !== 'not_started') return true;
  }
  return false;
}

function areasEditorHtml(j, data) {
  const groups = j.areaGroups || [];
  if (!groups.length) return '<div class="empty"><div class="empty-title">No area groups yet</div><div class="empty-sub">Add a group (e.g. "Units" or "Townhouses") to get started.</div></div>';
  return groups.map(g => {
    const grpProgress = groupHasProgress(g, data);
    const areas = g.areas || [];
    return `<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--surface)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <b style="flex:1;font-size:14px">${SHELL.escapeHtml(g.name)}</b>
        <span style="font-size:11px;color:var(--muted)">${areas.length} ${areas.length === 1 ? 'area' : 'areas'}</span>
        <button class="btn btn-sm" data-rename-area="g:${SHELL.escapeHtml(g.id)}">Rename</button>
        <button class="btn btn-sm btn-danger" data-rm-area="g:${SHELL.escapeHtml(g.id)}" ${grpProgress ? 'disabled title="Areas in this group have recorded progress — rename instead"' : ''}>Remove</button>
      </div>
      ${areas.length ? `<div style="display:grid;gap:4px">
        ${areas.map(a => {
          const used = areaHasProgress(a.id, data);
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface-2);border-radius:6px;font-size:13px">
            <span style="flex:1">${SHELL.escapeHtml(a.name)}${used ? ` <span class="pill pill-info" style="font-size:9px">in progress</span>` : ''}</span>
            <button class="btn btn-sm" data-rename-area="a:${SHELL.escapeHtml(a.id)}">Rename</button>
            <button class="btn btn-sm btn-danger" data-rm-area="a:${SHELL.escapeHtml(a.id)}" ${used ? 'disabled title="Has recorded progress — rename instead"' : ''}>×</button>
          </div>`;
        }).join('')}
      </div>` : '<div style="font-size:12px;color:var(--muted);font-style:italic">No areas yet.</div>'}
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-sm" data-add-area="${SHELL.escapeHtml(g.id)}">+ Add area</button>
        <button class="btn btn-sm" data-bulk-area="${SHELL.escapeHtml(g.id)}">Bulk paste</button>
      </div>
    </div>`;
  }).join('');
}

function tasksEditorHtml(j, data, stage) {
  const tasks = (stage === 'roughIn' ? j.roughInTasks : j.fitOffTasks) || [];
  if (!tasks.length) return '<div class="empty"><div class="empty-title">No tasks yet</div><div class="empty-sub">Add a task (e.g. "Lighting rough-in") or paste a list.</div></div>';
  return `<div style="display:grid;gap:4px">
    ${tasks.map(t => {
      const used = taskHasProgress(t.id, stage, data);
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface-2);border-radius:6px;font-size:13px">
        <span style="flex:1">${SHELL.escapeHtml(t.name)}${used ? ` <span class="pill pill-info" style="font-size:9px">in progress</span>` : ''}</span>
        <button class="btn btn-sm" data-rename-task="${SHELL.escapeHtml(t.id)}" data-stage="${stage}">Rename</button>
        <button class="btn btn-sm btn-danger" data-rm-task="${SHELL.escapeHtml(t.id)}" data-stage="${stage}" ${used ? 'disabled title="Task has recorded progress — rename instead"' : ''}>×</button>
      </div>`;
    }).join('')}
  </div>`;
}

// ── Setup mutations ────────────────────────────────────────────────────

async function saveJobPatch(patch) {
  try {
    await SHELL.api('/api/jobs', { method: 'PUT', body: { id: STATE.jobId, ...patch } });
    SHELL.toast('Saved', 'ok');
    await loadAll();
    if (STATE.section === 'setup') paint();
  } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
}

async function addAreaGroup() {
  const name = prompt('New area group name (e.g. "Units", "Townhouses"):');
  if (!name || !name.trim()) return;
  const groups = (STATE.job.areaGroups || []).slice();
  groups.push({ id: 'g_' + Date.now().toString(36), name: name.trim(), areas: [] });
  await saveJobPatch({ areaGroups: groups });
}

async function addAreaToGroup(groupId) {
  const name = prompt('New area name (e.g. "Unit 7", "Townhouse 3"):');
  if (!name || !name.trim()) return;
  const groups = (STATE.job.areaGroups || []).map(g => {
    if (g.id !== groupId) return g;
    const areas = (g.areas || []).concat({ id: 'a_' + Date.now().toString(36), name: name.trim() });
    return { ...g, areas };
  });
  await saveJobPatch({ areaGroups: groups });
}

async function bulkAddAreas(groupId) {
  const text = prompt('Paste area names — one per line, or use a numbered prefix.\n\nExamples:\n  Lobby\n  Plant Room\n  Switch Room\n\nFor numbered: type "Unit 1" .. "Unit 22" line-by-line.');
  if (!text) return;
  const names = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!names.length) return;
  const groups = (STATE.job.areaGroups || []).map(g => {
    if (g.id !== groupId) return g;
    const areas = (g.areas || []).concat(names.map((nm, i) => ({
      id: 'a_' + Date.now().toString(36) + '_' + i, name: nm,
    })));
    return { ...g, areas };
  });
  await saveJobPatch({ areaGroups: groups });
}

async function renameAreaOrGroup(token) {
  // Token format: "g:<id>" or "a:<id>"
  const [kind, id] = token.split(':');
  const groups = STATE.job.areaGroups || [];
  if (kind === 'g') {
    const g = groups.find(x => x.id === id); if (!g) return;
    const nm = prompt('Rename group:', g.name);
    if (nm == null || !nm.trim() || nm.trim() === g.name) return;
    const next = groups.map(x => x.id === id ? { ...x, name: nm.trim() } : x);
    await saveJobPatch({ areaGroups: next });
  } else {
    let target = null, parent = null;
    for (const g of groups) {
      const a = (g.areas || []).find(x => x.id === id);
      if (a) { target = a; parent = g; break; }
    }
    if (!target) return;
    const nm = prompt('Rename area:', target.name);
    if (nm == null || !nm.trim() || nm.trim() === target.name) return;
    const next = groups.map(g => g.id !== parent.id ? g : ({
      ...g, areas: g.areas.map(a => a.id === id ? { ...a, name: nm.trim() } : a),
    }));
    await saveJobPatch({ areaGroups: next });
  }
}

async function removeAreaOrGroup(token) {
  const [kind, id] = token.split(':');
  const groups = STATE.job.areaGroups || [];
  if (kind === 'g') {
    const g = groups.find(x => x.id === id); if (!g) return;
    if (groupHasProgress(g, STATE.data)) {
      SHELL.toast('Group has areas with recorded progress — rename instead', 'warn'); return;
    }
    if (!confirm('Remove group "' + g.name + '" and its ' + ((g.areas || []).length) + ' areas?')) return;
    const next = groups.filter(x => x.id !== id);
    await saveJobPatch({ areaGroups: next });
  } else {
    if (areaHasProgress(id, STATE.data)) {
      SHELL.toast('Area has recorded progress — rename instead', 'warn'); return;
    }
    let parent = null;
    for (const g of groups) if ((g.areas || []).some(a => a.id === id)) { parent = g; break; }
    if (!parent) return;
    const target = parent.areas.find(a => a.id === id);
    if (!confirm('Remove area "' + target.name + '"?')) return;
    const next = groups.map(g => g.id !== parent.id ? g : ({ ...g, areas: g.areas.filter(a => a.id !== id) }));
    await saveJobPatch({ areaGroups: next });
  }
}

async function addTask(stage) {
  const label = stage === 'roughIn' ? 'rough-in' : 'fit-off';
  const name = prompt('New ' + label + ' task name (e.g. "Lighting ' + label + '"):');
  if (!name || !name.trim()) return;
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const tasks = (STATE.job[key] || []).concat({
    id: (stage === 'roughIn' ? 'rt_' : 'ft_') + Date.now().toString(36),
    name: name.trim(),
  });
  await saveJobPatch({ [key]: tasks });
}

async function bulkAddTasks(stage) {
  const label = stage === 'roughIn' ? 'rough-in' : 'fit-off';
  const text = prompt('Paste ' + label + ' task names, one per line:');
  if (!text) return;
  const names = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!names.length) return;
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const prefix = stage === 'roughIn' ? 'rt_' : 'ft_';
  const tasks = (STATE.job[key] || []).concat(names.map((nm, i) => ({
    id: prefix + Date.now().toString(36) + '_' + i, name: nm,
  })));
  await saveJobPatch({ [key]: tasks });
}

async function renameTask(taskId, stage) {
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const t = (STATE.job[key] || []).find(x => x.id === taskId); if (!t) return;
  const nm = prompt('Rename task:', t.name);
  if (nm == null || !nm.trim() || nm.trim() === t.name) return;
  const tasks = (STATE.job[key] || []).map(x => x.id === taskId ? { ...x, name: nm.trim() } : x);
  await saveJobPatch({ [key]: tasks });
}

async function removeTask(taskId, stage) {
  if (taskHasProgress(taskId, stage, STATE.data)) {
    SHELL.toast('Task has recorded progress — rename instead', 'warn'); return;
  }
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const t = (STATE.job[key] || []).find(x => x.id === taskId); if (!t) return;
  if (!confirm('Remove task "' + t.name + '"?')) return;
  const tasks = (STATE.job[key] || []).filter(x => x.id !== taskId);
  await saveJobPatch({ [key]: tasks });
}

  });
}

async function readData() {
  const r = await fetch('/api/data?jobId=' + encodeURIComponent(STATE.jobId), { credentials: 'same-origin' });
  if (!r.ok) throw new Error('read failed');
  return await r.json();
}
async function writeData(d) {
  const r = await fetch('/api/data?jobId=' + encodeURIComponent(STATE.jobId), {
    method: 'POST', credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(d),
  });
  if (!r.ok) throw new Error('save failed');
}
async function assignSnag(snagId, newUserId, newUserText) {
  try {
    const d = await readData();
    const idx = (d.snags || []).findIndex(s => s.id === snagId);
    if (idx < 0) throw new Error('snag not found');
    const s = d.snags[idx];
    if ((s.assignedToUserId || null) === (newUserId || null)) return;
    s.assignedToUserId = newUserId || null;
    s.assignedToName = newUserId ? newUserText.trim() : null;
    s.updatedBy = SHELL.ME.username;
    s.updatedAt = new Date().toISOString();
    await writeData(d);
    if (newUserId && newUserId !== SHELL.ME.id) {
      fetch('/api/snag-notify', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: newUserId, snagId, jobId: STATE.jobId, kind: 'assigned' }),
      }).catch(() => {});
    }
    SHELL.toast(newUserId ? 'Assigned to ' + newUserText : 'Unassigned', 'ok');
    await loadAll();
    await SHELL.refreshCounts();
    paint();
  } catch (e) { SHELL.toast('Assign failed — ' + e.message, 'bad'); }
}
async function closeSnag(snagId) {
  if (!confirm('Mark this snag resolved?')) return;
  try {
    const d = await readData();
    const idx = (d.snags || []).findIndex(s => s.id === snagId);
    if (idx < 0) throw new Error('snag not found');
    d.snags[idx].status = 'Closed';
    d.snags[idx].closedAt = new Date().toISOString();
    d.snags[idx].closedBy = SHELL.ME.username;
    d.snags[idx].updatedBy = SHELL.ME.username;
    d.snags[idx].updatedAt = d.snags[idx].closedAt;
    await writeData(d);
    SHELL.toast('Resolved', 'ok');
    await loadAll();
    await SHELL.refreshCounts();
    paint();
  } catch (e) { SHELL.toast('Close failed — ' + e.message, 'bad'); }
}
async function reopenSnag(snagId) {
  if (!confirm('Reopen this snag?')) return;
  try {
    const d = await readData();
    const idx = (d.snags || []).findIndex(s => s.id === snagId);
    if (idx < 0) throw new Error('snag not found');
    d.snags[idx].status = 'Open';
    d.snags[idx].closedAt = null;

// ─────────────────────────────────────────────────────────────────────
// Phase 9 — Plans & AI-assisted material takeoff
//
// Three flows live in this section:
//   1. Upload PDF → render to PNGs client-side via PDF.js → register pages
//      against the plan record on the server.
//   2. Pick a page from a registered plan and run "Extract legend" — Stage 0
//      of the vision pipeline. The legend becomes the spine for everything
//      downstream.
//   3. For each remaining page, run "Analyse sheet" — Stages 1+2. AI
//      classifies the sheet (which dwelling? what type?) and counts each
//      legend symbol on it. Counts get written to ai-takeoff.json keyed by
//      detected dwelling.
//
// Per the brief: AI suggests, admin transcribes. The dwelling-review side-
// panel shows AI counts read-only on the right while the admin types the
// confirmed numbers into the materials fields on the left. There is
// deliberately no "accept all" button — the transcription step is the
// forcing function for review.
// ─────────────────────────────────────────────────────────────────────

const TAKEOFF_DPI = 180; // A1 plan @ 180 DPI ≈ 4200×6000 PNG, ~2 MB
const PDFJS_VER  = '4.0.379';
const PDFJS_BASE = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VER}/legacy/build`;

async function loadPdfJs() {
  if (STATE.pdfjsReady && window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = PDFJS_BASE + '/pdf.min.js';
    s.onload = res; s.onerror = () => rej(new Error('PDF.js failed to load'));
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_BASE + '/pdf.worker.min.js';
  STATE.pdfjsReady = true;
  return window.pdfjsLib;
}

// ───────────── Upload + render flow ─────────────

async function handlePlanUpload(file) {
  const status = SHELL.$('#upload-status');
  if (file.size > 25 * 1024 * 1024) {
    status.textContent = 'File too large (25 MB limit).'; status.style.color = 'var(--bad)'; return;
  }
  status.textContent = 'Uploading PDF…'; status.style.color = 'var(--muted)';
  try {
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(file);
    });
    const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId), {
      method: 'POST',
      body: { fileName: file.name, mimeType: file.type, dataUrl, title: file.name.replace(/\.[^.]+$/, '') },
    });
    SHELL.$('#plan-file').value = '';
    status.textContent = 'Uploaded. Rendering pages…'; status.style.color = 'var(--muted)';
    await loadAll();
    paint();
    // Auto-render the new plan's pages immediately
    if (r.plan && r.plan.id) await renderAndRegisterPages(r.plan.id, file);
  } catch (e) {
    status.textContent = 'Upload failed: ' + e.message; status.style.color = 'var(--bad)';
  }
}

async function renderAndRegisterPages(planId, file) {
  const plan = STATE.plans.find(p => p.id === planId);
  if (!plan) return;
  const status = SHELL.$('#upload-status');
  if (status) { status.style.color = 'var(--muted)'; status.textContent = 'Loading PDF.js…'; }

  await loadPdfJs();
  // Source: prefer the file the admin just picked (already in memory).
  // Falls back to fetching the Blob URL for re-rendering of an existing plan.
  let arrayBuffer;
  if (file) arrayBuffer = await file.arrayBuffer();
  else {
    if (status) status.textContent = 'Fetching PDF from storage…';
    const r = await fetch(plan.url);
    arrayBuffer = await r.arrayBuffer();
  }
  if (status) status.textContent = 'Rendering pages at ' + TAKEOFF_DPI + ' DPI…';

  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    if (status) status.textContent = `Rendering page ${i}/${pdf.numPages}…`;
    const page = await pdf.getPage(i);
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = TAKEOFF_DPI / 72; // PDF.js default unit is 72 DPI
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const pngDataUrl = canvas.toDataURL('image/png');
    const sha256 = await sha256OfDataUrl(pngDataUrl);
    pages.push({ pageIndex: i - 1, pngDataUrl, sha256 });
    // Free the canvas memory before the next page
    canvas.width = 0; canvas.height = 0;
  }

  // POST one page per call — Vercel serverless body limit is 4.5 MB and a
  // single 180-DPI A1 PNG is ~2 MB base64. Sending 1-at-a-time also gives
  // a tight progress bar on big plans.
  for (let i = 0; i < pages.length; i++) {
    if (status) status.textContent = `Uploading rendered page ${i + 1}/${pages.length}…`;
    await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&id=' + encodeURIComponent(planId) + '&action=set-pages', {
      method: 'POST', body: { pages: [pages[i]] },
    });
  }
  if (status) { status.textContent = 'Pages rendered. Pick the legend page, then analyse the rest.'; status.style.color = 'var(--ok)'; }
  await loadAll(); paint();
}

async function sha256OfDataUrl(dataUrl) {
  const base64 = dataUrl.split(',')[1] || '';
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const buf = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ───────────── Vision calls ─────────────

async function extractLegend(planId, pageIndex) {
  if (!confirm('Extract the legend from page ' + (pageIndex + 1) + '? This is a paid AI vision call (~$0.02).')) return;
  SHELL.toast('Extracting legend…');
  try {
    const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=analyse-legend', {
      method: 'POST', body: { planId, pageIndex },
    });
    const items = (r.legend && r.legend.items) || [];
    SHELL.toast('Legend extracted — ' + items.length + ' symbol' + (items.length === 1 ? '' : 's') + (r.cached ? ' (cached)' : ''), 'ok');
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Legend extract failed — ' + e.message, 'bad'); }
}

async function analyseSheet(planId, pageIndex) {
  SHELL.toast('Analysing page ' + (pageIndex + 1) + '…');
  try {
    const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=analyse-sheet', {
      method: 'POST', body: { planId, pageIndex },
    });
    const cls = (r.result && r.result.classification) || {};
    SHELL.toast(
      cls.dwelling ? 'Page ' + (pageIndex + 1) + ' → ' + (Array.isArray(cls.dwelling) ? cls.dwelling.join(', ') : cls.dwelling) + (r.cached ? ' (cached)' : '')
      : 'Page ' + (pageIndex + 1) + ' classified as ' + (cls.sheetType || 'unknown') + (r.cached ? ' (cached)' : ''), 'ok');
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Analyse failed — ' + e.message, 'bad'); }
}

async function analyseAllSheets(planId) {
  const plan = STATE.plans.find(p => p.id === planId);
  if (!plan || !(plan.pages || []).length) { SHELL.toast('Render pages first', 'warn'); return; }
  if (!STATE.takeoff || !(STATE.takeoff.legendItems || []).length) {
    SHELL.toast('Extract a legend first', 'warn'); return;
  }
  if (!confirm('Analyse all ' + plan.pages.length + ' page' + (plan.pages.length === 1 ? '' : 's') + ' on this plan? Estimated cost ~$' + (plan.pages.length * 0.012).toFixed(2) + '.')) return;
  // Sequential — keeps under any client-side rate limit and lets us stop on cost-cap.
  for (const pg of plan.pages) {
    try {
      const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=analyse-sheet', {
        method: 'POST', body: { planId, pageIndex: pg.pageIndex },
      });
      // Live update — repaint after each
      await loadAll(); paint();
    } catch (e) {
      if (/cost cap/i.test(e.message)) { SHELL.toast('Cost cap reached — stopping', 'warn'); return; }
      SHELL.toast('Page ' + (pg.pageIndex + 1) + ' failed: ' + e.message, 'bad');
    }
  }
  SHELL.toast('All pages analysed', 'ok');
}

// ───────────── Dwelling review side-panel ─────────────

function openDwellingReview(dwellingId) {
  const dw = STATE.takeoff && STATE.takeoff.dwellings && STATE.takeoff.dwellings[dwellingId];
  if (!dw) { SHELL.toast('No AI suggestions for this dwelling', 'warn'); return; }
  const legend = (STATE.takeoff && STATE.takeoff.legendItems) || [];
  const existingMaterials = (STATE.data.dwellings && STATE.data.dwellings[dwellingId] && STATE.data.dwellings[dwellingId].materials) || {};
  const sheetThumbs = (dw.sheetIds || []).map(s => {
    const p = STATE.plans.find(pl => pl.id === s.planId);
    const pg = p && (p.pages || []).find(x => x.pageIndex === s.pageIndex);
    return pg ? { url: pg.pngUrl, label: (p.fileName || s.planId) + ' p.' + (s.pageIndex + 1) } : null;
  }).filter(Boolean);

  // Build the materials editor table — one row per legend item.
  const rows = legend.map(it => {
    const code = it.code;
    const aiQty = dw.suggestions[code] || 0;
    const confidence = dw.confidence[code] || (aiQty > 0 ? 'clear' : 'missing');
    const adminQty = existingMaterials[code] != null ? existingMaterials[code] : '';
    const confTone = confidence === 'partial' ? 'warn' : confidence === 'missing' ? 'navy' : 'ok';
    return `<tr>
      <td style="font-size:13px"><b>${SHELL.escapeHtml(it.label)}</b><div style="font-size:11px;color:var(--muted);font-family:var(--ff-mono)">${SHELL.escapeHtml(code)}</div></td>
      <td style="text-align:center;background:var(--surface-2);border-left:1px dashed var(--line);border-right:1px dashed var(--line)">
        <div style="font-size:18px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums">${aiQty}</div>
        <span class="pill pill-${confTone}" style="font-size:9px">${confidence}</span>
      </td>
      <td style="text-align:center">
        <input class="input" type="number" min="0" step="1" style="width:80px;text-align:center" data-mat-code="${SHELL.escapeHtml(code)}" value="${SHELL.escapeHtml(String(adminQty))}" placeholder="—">
      </td>
    </tr>`;
  }).join('');

  const panel = SHELL.openPanel({
    title: 'Review takeoff — ' + dwellingId,
    body: `
      <div style="margin-bottom:12px;padding:10px 12px;background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:6px;font-size:12px;color:var(--ink-2)">
        <b>AI suggests, you transcribe.</b> The middle column is read-only. Type the confirmed count into the right column. Suggestions are saved to a separate file and never overwrite your numbers.
      </div>
      ${sheetThumbs.length ? `<div style="margin-bottom:12px"><div class="card-sub" style="margin-bottom:6px">Source sheets (${sheetThumbs.length})</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${sheetThumbs.map(t => `<a href="${SHELL.escapeHtml(t.url)}" target="_blank" rel="noopener" title="${SHELL.escapeHtml(t.label)}" style="display:block;width:80px;height:60px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:#fff"><img src="${SHELL.escapeHtml(t.url)}" alt="${SHELL.escapeHtml(t.label)}" style="width:100%;height:100%;object-fit:cover"></a>`).join('')}
        </div></div>` : ''}
      ${STATE.takeoff.legendSource ? `<div style="margin-bottom:12px;font-size:12px"><a href="${(() => {
        const ls = STATE.takeoff.legendSource;
        const p = STATE.plans.find(pl => pl.id === ls.planId);
        const pg = p && (p.pages || []).find(x => x.pageIndex === ls.pageIndex);
        return pg ? SHELL.escapeHtml(pg.pngUrl) : '#';
      })()}" target="_blank" rel="noopener">View legend ↗</a></div>` : ''}
      <table class="table" style="font-size:13px">
        <thead><tr><th>Legend item</th><th style="text-align:center;background:var(--surface-2)">AI suggests</th><th style="text-align:center">Confirmed (admin)</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px">No legend items yet.</td></tr>'}</tbody>
      </table>
    `,
    footer: `
      <button class="btn" onclick="SHELL.closePanel()">Close</button>
      <button class="btn btn-danger" id="dw-dismiss-${SHELL.escapeHtml(dwellingId)}">Dismiss AI</button>
      <button class="btn btn-primary" id="dw-save-${SHELL.escapeHtml(dwellingId)}">Save confirmed counts</button>
    `,
  });
  panel.querySelector('#dw-save-' + CSS.escape(dwellingId)).addEventListener('click', async () => {
    const materials = {};
    panel.querySelectorAll('input[data-mat-code]').forEach(inp => {
      const v = parseInt(inp.value, 10);
      if (Number.isFinite(v) && v > 0) materials[inp.dataset.matCode] = v;
    });
    try {
      await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=set-dwelling-materials', {
        method: 'POST', body: { dwellingId, materials },
      });
      await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=mark-reviewed', {
        method: 'POST', body: { dwellingId },
      });
      SHELL.toast('Saved — dwelling marked reviewed', 'ok');
      SHELL.closePanel();
      await loadAll(); paint();
    } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
  });
  panel.querySelector('#dw-dismiss-' + CSS.escape(dwellingId)).addEventListener('click', async () => {
    await dismissDwelling(dwellingId);
    SHELL.closePanel();
  });
}

async function dismissDwelling(dwellingId) {
  if (!confirm('Dismiss AI suggestions for ' + dwellingId + '? Your materials data is untouched; only the AI panel goes away.')) return;
  try {
    await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=dismiss-dwelling', {
      method: 'POST', body: { dwellingId },
    });
    SHELL.toast('Dismissed', 'ok');
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Dismiss failed — ' + e.message, 'bad'); }
}

// ─────────────────────────────────────────────────────────────────────
// Phase 10 — Materials list, wholesaler pricing, cost rollup
//
// Connects the AI plan-takeoff chain to procurement: confirmed per-dwelling
// counts (from data.json) get rolled up to a job-level schedule, pushed
// into the materials-list (with provenance tags so admin sees which items
// came from the takeoff vs were added manually), priced via wholesaler
// emails, and rolled up into a projected materials-cost figure on the
// per-job Overview.
//
// Single source of truth chain:
//   AI suggests → admin confirms (data.json materials)
//                 → push-to-materials syncs (materials-list.json)
//                 → wholesaler-pricing email (annotated with itemIds)
//                 → admin records reply (writes per-item quotedUnitPrice)
//                 → cost rollup on overview
// Each step is explicit. No silent overwrites; admin-edited fields on
// materials items are preserved across re-syncs (_nameLocked / _categoryLocked).
// ─────────────────────────────────────────────────────────────────────

function renderMaterials(host) {
  const items = (STATE.materials && STATE.materials.items) || [];
  const requests = (STATE.materials && STATE.materials.emailRequests) || [];
  const pos = (STATE.materials && STATE.materials.purchaseOrders) || [];
  const invoices = (STATE.materials && STATE.materials.invoices) || [];
  const cr = STATE.costRollup || { itemsCount: 0, pricedCount: 0, unpricedCount: 0, totalCostExGst: 0, committedExGst: 0, receivedExGst: 0, openPoCount: 0, invoicedExGst: 0, paidExGst: 0, varianceExGst: 0, pendingInvoiceCount: 0 };
  const stale = items.filter(i => i.staleAfter).length;
  const fromTakeoff = items.filter(i => i.source === 'plan-takeoff').length;
  const manual = items.filter(i => i.source !== 'plan-takeoff').length;
  const haveTakeoff = (STATE.takeoff && STATE.takeoff.dwellings && Object.keys(STATE.takeoff.dwellings).length) > 0;
  const ordered = items.filter(i => (i.qtyOrdered || 0) > 0).length;
  const received = items.filter(i => (i.qtyReceived || 0) > 0).length;
  const havePos = pos.filter(p => p.status !== 'cancelled' && p.status !== 'draft').length > 0;
  const varianceTone = (cr.varianceExGst || 0) > 50 ? 'red' : (cr.varianceExGst || 0) < -50 ? 'green' : '';

  host.innerHTML = `
    <div class="kpi-row" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-l">Items</div><div class="kpi-v">${cr.itemsCount}</div><div class="kpi-d">${fromTakeoff} from takeoff · ${manual} manual${stale ? ' · <span style="color:var(--warn)">' + stale + ' stale</span>' : ''}</div></div>
      <div class="kpi"><div class="kpi-l">Priced</div><div class="kpi-v ${cr.pricedCount === cr.itemsCount && cr.itemsCount ? 'green' : 'amber'}">${cr.pricedCount}</div><div class="kpi-d">${cr.unpricedCount} need pricing</div></div>
      <div class="kpi"><div class="kpi-l">Projected cost</div><div class="kpi-v">${SHELL.fmtMoney(cr.totalCostExGst || 0)}</div><div class="kpi-d">ex-GST · priced items</div></div>
      <div class="kpi"><div class="kpi-l">Committed (POs sent)</div><div class="kpi-v">${SHELL.fmtMoney(cr.committedExGst || 0)}</div><div class="kpi-d">${cr.openPoCount || 0} open of ${cr.poCount || 0} PO${(cr.poCount || 0) === 1 ? '' : 's'}</div></div>
      <div class="kpi"><div class="kpi-l">Received</div><div class="kpi-v ${cr.receivedExGst > 0 ? 'green' : ''}">${SHELL.fmtMoney(cr.receivedExGst || 0)}</div><div class="kpi-d">${received}/${ordered || cr.itemsCount} item${(ordered || cr.itemsCount) === 1 ? '' : 's'} delivered</div></div>
      ${invoices.length ? `<div class="kpi"><div class="kpi-l">Invoiced / paid</div><div class="kpi-v">${SHELL.fmtMoney(cr.invoicedExGst || 0)}</div><div class="kpi-d"><b style="color:var(--ok)">${SHELL.fmtMoney(cr.paidExGst || 0)}</b> paid · ${cr.pendingInvoiceCount || 0} pending${(cr.varianceExGst || 0) !== 0 ? ' · <b style="color:var(--' + (varianceTone === 'red' ? 'bad' : 'ok') + ')">' + ((cr.varianceExGst || 0) > 0 ? '+' : '') + SHELL.fmtMoney2(cr.varianceExGst) + '</b> vs PO' : ''}</div></div>` : ''}
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Materials list <span class="card-count">${items.length}</span></div>
          <div class="card-sub">Confirmed per-dwelling counts roll up here. Add manual items for cable, conduit, accessories, anything not on the legend.</div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${haveTakeoff ? `<button class="btn btn-accent" id="sync-takeoff">Push from takeoff →</button>` : ''}
          <button class="btn" id="add-manual-item">+ Add item</button>
          <button class="btn" id="bulk-add-items">Bulk add</button>
          <button class="btn btn-primary" id="email-wholesaler" ${items.length ? '' : 'disabled'}>Email wholesaler →</button>
        </div>
      </div>
      ${items.length ? `<div class="table-wrap"><table class="table">
        <thead><tr>
          <th>Item</th><th>Source</th><th class="table-num">Qty</th><th class="table-num" title="Ordered / Received">Ord / Rec</th>
          <th class="table-num">Unit $</th><th class="table-num">Total $</th><th></th>
        </tr></thead>
        <tbody>${items.map(materialRow).join('')}</tbody>
      </table></div>` : `<div class="empty">
        <div class="empty-title">No materials yet</div>
        <div class="empty-sub">${haveTakeoff ? 'Click "Push from takeoff" to roll up the confirmed counts.' : 'Add items manually, or run a plan takeoff first.'}</div>
      </div>`}
    </div>

    ${pos.length ? `<div class="card" style="margin-bottom:14px">
      <div class="card-hdr"><div><div class="card-title">Purchase orders <span class="card-count">${pos.length}</span></div>
        <div class="card-sub">Snapshots of priced items sent to a wholesaler. Receipts here flip items to "received" automatically.</div></div></div>
      ${pos.slice().reverse().map(poRow).join('')}
    </div>` : ''}

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Supplier invoices <span class="card-count">${invoices.length}</span></div>
          <div class="card-sub">Match each supplier invoice to its PO to spot price/qty drift before payment goes out. Variance threshold: $50 or 5% of PO total.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary" id="add-invoice" ${havePos ? '' : 'disabled title="Send a PO first"'}>+ New invoice</button>
        </div>
      </div>
      ${invoices.length ? invoices.slice().reverse().map(invoiceRow).join('') : `<div class="empty">
        <div class="empty-title">No invoices yet</div>
        <div class="empty-sub">When the supplier bills you, capture the invoice + match it to the PO to validate the charge.</div>
      </div>`}
    </div>

    ${requests.length ? `<div class="card" style="margin-bottom:14px">
      <div class="card-hdr"><div><div class="card-title">Wholesaler requests <span class="card-count">${requests.length}</span></div>
        <div class="card-sub">Drafts you've sent + replies received. Capturing a reply applies per-item prices; converting a replied request to a PO commits the spend.</div></div></div>
      ${requests.slice().reverse().map(emailRequestRow).join('')}
    </div>` : ''}
  `;

  if (SHELL.$('#sync-takeoff')) SHELL.$('#sync-takeoff').addEventListener('click', syncFromTakeoff);
  SHELL.$('#add-manual-item').addEventListener('click', openAddItemPanel);
  SHELL.$('#bulk-add-items').addEventListener('click', openBulkAddPanel);
  SHELL.$('#email-wholesaler').addEventListener('click', openEmailWholesalerPanel);
  SHELL.$$('button[data-edit-mat]').forEach(b => b.addEventListener('click', () => editMaterialItem(b.dataset.editMat)));
  SHELL.$$('button[data-rm-mat]').forEach(b => b.addEventListener('click', () => removeMaterialItem(b.dataset.rmMat)));
  SHELL.$$('input[data-mat-price]').forEach(inp =>
    inp.addEventListener('change', () => updateUnitPrice(inp.dataset.matPrice, inp.value)));
  SHELL.$$('button[data-record-reply]').forEach(b =>
    b.addEventListener('click', () => openRecordReplyPanel(b.dataset.recordReply)));
  // Phase 11 — PO actions
  SHELL.$$('button[data-create-po]').forEach(b =>
    b.addEventListener('click', () => createPoFromRequest(b.dataset.createPo)));
  SHELL.$$('button[data-open-po]').forEach(b =>
    b.addEventListener('click', () => openPoPanel(b.dataset.openPo)));
  // Phase 12 — invoice actions
  if (SHELL.$('#add-invoice')) SHELL.$('#add-invoice').addEventListener('click', () => openInvoicePanel(null));
  SHELL.$$('button[data-open-invoice]').forEach(b =>
    b.addEventListener('click', () => openInvoicePanel(b.dataset.openInvoice)));
}

function materialRow(it) {
  const total = (Number(it.quotedUnitPrice) || 0) * (Number(it.quantity) || 0);
  const priced = Number(it.quotedUnitPrice) > 0;
  const fromTakeoff = it.source === 'plan-takeoff';
  const stale = !!it.staleAfter;
  const qty = Number(it.quantity) || 0;
  const ord = Number(it.qtyOrdered) || 0;
  const rec = Number(it.qtyReceived) || 0;
  const fullyRecv = qty > 0 && rec >= qty;
  const dwBreakdown = it.perDwelling ? Object.entries(it.perDwelling).map(([d, n]) => SHELL.escapeHtml(d) + ' (' + n + ')').join(' · ') : '';
  // Tone for the ord/rec column: green if fully received, amber if partially, blue if ordered but nothing in, muted if untouched.
  const ordRecHtml = ord === 0
    ? '<span style="color:var(--muted)">—</span>'
    : (fullyRecv
       ? '<span style="color:var(--ok);font-weight:600">' + ord + ' / ' + rec + '</span>'
       : (rec > 0
          ? '<span style="color:var(--warn);font-weight:600">' + ord + ' / ' + rec + '</span>'
          : '<span style="color:var(--info);font-weight:600">' + ord + ' / 0</span>'));
  return `<tr ${stale ? 'style="background:var(--warn-bg)"' : ''}>
    <td>
      <div style="font-weight:600">${SHELL.escapeHtml(it.name)}</div>
      ${it.brandOrSpec ? `<div style="font-size:11px;color:var(--muted)">${SHELL.escapeHtml(it.brandOrSpec)}</div>` : ''}
      ${dwBreakdown ? `<div style="font-size:10.5px;color:var(--muted);margin-top:2px;font-family:var(--ff-mono)">${dwBreakdown}</div>` : ''}
      ${stale ? '<div style="font-size:10.5px;color:var(--warn);margin-top:2px;font-weight:600">⚠ no longer in takeoff schedule</div>' : ''}
    </td>
    <td>
      ${fromTakeoff ? `<span class="pill pill-info"><span class="pill-dot"></span>From takeoff</span>` : `<span class="pill"><span class="pill-dot"></span>Manual</span>`}
      ${it.legendCode ? `<div style="font-size:10px;color:var(--muted);font-family:var(--ff-mono);margin-top:3px">${SHELL.escapeHtml(it.legendCode)}</div>` : ''}
    </td>
    <td class="table-num">${SHELL.escapeHtml(String(qty))} ${SHELL.escapeHtml(it.unit || 'each')}</td>
    <td class="table-num">${ordRecHtml}</td>
    <td class="table-num">
      <input class="input" type="number" min="0" step="0.01" style="width:80px;text-align:right;font-family:var(--ff-mono);padding:4px 6px"
             data-mat-price="${SHELL.escapeHtml(it.id)}" value="${priced ? Number(it.quotedUnitPrice).toFixed(2) : ''}" placeholder="—">
    </td>
    <td class="table-num">${priced ? '<b>' + SHELL.fmtMoney2(total) + '</b>' : '<span style="color:var(--muted)">—</span>'}</td>
    <td style="display:flex;gap:4px;justify-content:flex-end">
      <button class="btn btn-sm" data-edit-mat="${SHELL.escapeHtml(it.id)}">Edit</button>
      <button class="btn btn-sm btn-danger" data-rm-mat="${SHELL.escapeHtml(it.id)}">×</button>
    </td>
  </tr>`;
}

function emailRequestRow(req) {
  const tone = req.status === 'replied' ? (req.chosen ? 'ok' : 'info') : req.status === 'sent' ? 'navy' : 'warn';
  const itemCount = (req.itemIds || []).length;
  // Phase 11: any PO already created from this request?
  const pos = (STATE.materials && STATE.materials.purchaseOrders) || [];
  const existingPo = pos.find(p => p.fromRequestId === req.id);
  return `<div style="border-top:1px solid var(--line);padding:10px 14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="pill pill-${tone}">${SHELL.escapeHtml(req.status)}${req.chosen ? ' · chosen' : ''}</span>
      <strong>${SHELL.escapeHtml(req.wholesalerName || '(no name)')}</strong>
      ${req.recipientEmail ? `<a href="mailto:${SHELL.escapeHtml(req.recipientEmail)}" style="font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${SHELL.escapeHtml(req.recipientEmail)}</a>` : ''}
      <span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${itemCount} item${itemCount === 1 ? '' : 's'} · ${SHELL.escapeHtml(new Date(req.createdAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }))}</span>
    </div>
    <div style="font-family:var(--ff-mono);font-size:12px;color:var(--ink-2);margin-top:6px">${SHELL.escapeHtml(req.subject)}</div>
    ${req.replyTotalExGst != null ? `<div style="margin-top:6px;font-size:13px"><b>Replied: ${SHELL.fmtMoney2(req.replyTotalExGst)}</b>${req.replyAt ? ' · ' + SHELL.escapeHtml(new Date(req.replyAt).toLocaleDateString('en-AU')) : ''}${req.replyNotes ? '<br><em style="color:var(--muted)">"' + SHELL.escapeHtml(req.replyNotes) + '"</em>' : ''}</div>` : ''}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      ${req.status !== 'replied' ? `<button class="btn btn-sm" data-record-reply="${SHELL.escapeHtml(req.id)}">Record reply</button>` : `<button class="btn btn-sm" data-record-reply="${SHELL.escapeHtml(req.id)}">Update reply</button>`}
      ${req.status === 'replied' && !existingPo ? `<button class="btn btn-sm btn-accent" data-create-po="${SHELL.escapeHtml(req.id)}">Convert to PO →</button>` : ''}
      ${existingPo ? `<button class="btn btn-sm" data-open-po="${SHELL.escapeHtml(existingPo.id)}">Open PO ${SHELL.escapeHtml(existingPo.poNumber)} →</button>` : ''}
    </div>
  </div>`;
}

function poRow(po) {
  const tone = ({
    draft: 'navy', sent: 'info', confirmed: 'info', partial: 'warn',
    fulfilled: 'ok', cancelled: 'bad'
  })[po.status] || 'navy';
  const recvCount = (po.itemSnapshots || []).filter(s => {
    const totalRecv = (po.receivedEvents || []).reduce((sum, ev) =>
      sum + (ev.items || []).filter(r => r.itemId === s.itemId).reduce((ss, r) => ss + (Number(r.qtyReceived) || 0), 0), 0);
    return totalRecv >= s.qty;
  }).length;
  const totalLines = (po.itemSnapshots || []).length;
  return `<div style="border-top:1px solid var(--line);padding:10px 14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="pill pill-${tone}">${SHELL.escapeHtml(po.status)}</span>
      <strong>${SHELL.escapeHtml(po.poNumber)}</strong>
      <span style="font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${SHELL.escapeHtml(po.wholesalerName || '(no wholesaler)')}</span>
      <span style="margin-left:auto;font-family:var(--ff-mono);font-size:11px;color:var(--muted)">${totalLines} line${totalLines === 1 ? '' : 's'} · ${SHELL.fmtMoney2(po.totalIncGst)} inc-GST · ${recvCount}/${totalLines} fully received</span>
    </div>
    ${po.expectedDeliveryDate ? `<div style="font-size:12px;color:var(--ink-2);margin-top:4px">Expected: <b>${SHELL.escapeHtml(po.expectedDeliveryDate)}</b></div>` : ''}
    ${po.notes ? `<div style="font-size:12px;color:var(--muted);font-style:italic;margin-top:4px">"${SHELL.escapeHtml(po.notes)}"</div>` : ''}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-sm" data-open-po="${SHELL.escapeHtml(po.id)}">Open →</button>
    </div>
  </div>`;
}

async function syncFromTakeoff() {
  if (!confirm('Push confirmed per-dwelling counts to the materials list? Manual items are kept; takeoff items get qty + provenance refreshed.')) return;
  try {
    const r = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=sync-from-takeoff', {
      method: 'POST', body: {},
    });
    SHELL.toast(r.added + ' added · ' + r.updated + ' updated' + (r.staled ? ' · ' + r.staled + ' marked stale' : ''), 'ok');
    await loadAll(); paint();
  } catch (e) { SHELL.toast('Sync failed — ' + e.message, 'bad'); }
}

async function updateUnitPrice(itemId, value) {
  const v = Number(value);
  const body = Number.isFinite(v) && v > 0 ? { quotedUnitPrice: v, status: 'priced' } : { quotedUnitPrice: null };
  try {
    await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&id=' + encodeURIComponent(itemId), {
      method: 'PATCH', body,
    });
    // Soft refresh: reload materials + cost rollup, leave the rest untouched.
    STATE.materials = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId));
    STATE.costRollup = await SHELL.api('/api/materials-list?jobId=' + encodeURIComponent(STATE.jobId) + '&action=cost-rollup');
    paint();
  } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
}

function openAddItemPanel(existing) {
  const cur = existing || {};
  const isEdit = !!existing;
  const panel = SHELL.openPanel({
    title: isEdit ? 'Edit item' : 'Add material item',
    body: `
      <div class="field"><label class="field-lbl">Name *</label><input class="input" id="m-name" autofocus value="${SHELL.escapeHtml(cur.name || '')}"></div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Quantity</label><input class="input" id="m-qty" type="number" min="0" step="1" value="${cur.quantity != null ? cur.quantity : 1}"></div>
        <div class="field"><label class="field-lbl">Unit</label><input class="input" id="m-unit" value="${SHELL.escapeHtml(cur.unit || 'each')}"></div>
      </div>
      <div class="two-col">
        <div class="field"><label class="field-lbl">Brand / spec</label><input class="input" id="m-brand" value="${SHELL.escapeHtml(cur.brandOrSpec || '')}"></div>
