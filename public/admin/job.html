// ── Setup tab — live job structure editor ──────────────────────────────
//
// A job does not stop being editable once work starts. The Setup tab lets
// admin/LH edit areas, rough-in tasks, and fit-off tasks safely on jobs
// that are already in progress.
//
// Safety model:
//   - The PUT /api/jobs endpoint preserves stable IDs by name match. So
//     adding/renaming items is non-destructive — existing per-dwelling
//     progress (data.json dwellings[areaId][stage].tasks[taskId]) keeps
//     pointing at the same IDs.
//   - Removing a task or area that has recorded progress would orphan
//     that progress (it still exists on disk but nothing references it).
//     We block removal client-side when STATE.data shows progress on it,
//     and surface a "rename instead" hint.
//   - All mutations re-fetch the job + data after save and repaint.
function renderSetup(host) {
  const j = STATE.job || {};
  const data = STATE.data || { dwellings: {} };
  const isLive = (j.status || 'active') === 'active' && jobHasAnyProgress(j, data);

  // Setup completeness checklist — admin can scan what's still missing
  // without leaving the page.
  //
  // Per the brief, the rough/fit checklists are considered "set" when
  // EITHER the job has a default list OR every area has its own custom
  // override. A job built entirely from per-area custom checklists (e.g.
  // a commercial mixed-use job where every space is unique) is just as
  // ready as one built on job defaults — the brief specifically calls
  // this out to avoid forcing admins to populate empty defaults that
  // nothing reads.
  const allAreas = (j.areaGroups || []).flatMap(g => g.areas || []);
  const everyAreaHasRoughOverride = allAreas.length > 0 && allAreas.every(a => Array.isArray(a.roughInTasks) && a.roughInTasks.length);
  const everyAreaHasFitOverride   = allAreas.length > 0 && allAreas.every(a => Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length);
  const completeness = [
    { k: 'name',     label: 'Job name set',         ok: !!(j.name && j.name.trim()) },
    { k: 'type',     label: 'Job type set',         ok: !!j.type },
    { k: 'client',   label: 'Client linked',        ok: !!j.clientUserId },
    { k: 'crew',     label: 'Crew assigned',        ok: STATE.crew.some(u => u.role === 'tradie' || u.role === 'leadingHand') },
    { k: 'areas',    label: 'Area groups created',  ok: (j.areaGroups || []).length > 0 },
    { k: 'rough',    label: 'Rough-in tasks set (default or all-areas-custom)', ok: (j.roughInTasks || []).length > 0 || everyAreaHasRoughOverride },
    { k: 'fit',      label: 'Fit-off tasks set (default or all-areas-custom)',  ok: (j.fitOffTasks  || []).length > 0 || everyAreaHasFitOverride   },
  ];
  const completePct = Math.round(completeness.filter(c => c.ok).length / completeness.length * 100);

  host.innerHTML = `
    ${isLive ? `<div class="card" style="background:var(--warn-bg);border-color:var(--warn-bd);margin-bottom:14px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span style="flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--warn);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-top:1px">!</span>
        <div style="font-size:13px;line-height:1.5;color:var(--ink)">
          <b>This job is already in progress.</b> You can safely add or rename items, but areas or tasks with recorded progress can't be deleted — rename them instead. Existing snags and dwelling status stay linked because IDs are preserved.
        </div>
      </div>
    </div>` : ''}

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Setup completeness</div>
          <div class="card-sub">${completePct}% of the checklist filled in</div></div>
        <div style="font-size:24px;font-weight:700;color:${completePct === 100 ? 'var(--ok)' : 'var(--warn)'}">${completePct}%</div>
      </div>
      <div style="display:grid;gap:6px">
        ${completeness.map(c => `
          <div style="display:flex;align-items:center;gap:10px;font-size:13px">
            <span style="width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:${c.ok ? 'var(--ok-bg)' : 'var(--warn-bg)'};color:${c.ok ? 'var(--ok)' : 'var(--warn)'};font-weight:700;font-size:11px">${c.ok ? '✓' : '!'}</span>
            <span style="flex:1">${SHELL.escapeHtml(c.label)}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Job basics</div>
          <div class="card-sub">Name, type, status, client.</div></div>
        <button class="btn btn-primary" id="setup-edit-basics">${SHELL.ICONS.edit} Edit</button>
      </div>
      <div style="display:grid;grid-template-columns:120px 1fr;gap:6px 14px;font-size:13px">
        <div style="color:var(--muted)">Name</div><div><b>${SHELL.escapeHtml(j.name || '—')}</b></div>
        <div style="color:var(--muted)">Type</div><div>${SHELL.escapeHtml((STATE.jobTypes.find(t => t.id === j.type) || {}).name || '—')}</div>
        <div style="color:var(--muted)">Status</div><div>${SHELL.jobStatusPill(j.status || 'active')}</div>
        <div style="color:var(--muted)">Client</div><div>${j.clientUserId ? SHELL.escapeHtml((SHELL.USERS || []).find(u => u.id === j.clientUserId)?.username || j.clientUserId) : '<span style="color:var(--warn)">No client linked</span>'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Areas <span class="card-count">${countAreas(j)}</span></div>
          <div class="card-sub">Groups + areas. Add new ones any time. Areas with progress can't be deleted — rename instead.</div></div>
        <button class="btn btn-primary" id="setup-add-group">+ Add group</button>
      </div>
      <div id="areas-list">${areasEditorHtml(j, data)}</div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Rough-in tasks <span class="card-count">${(j.roughInTasks || []).length}</span></div>
          <div class="card-sub">The checklist tradies tick off during rough-in. Add or rename safely; tasks with status recorded can't be deleted.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn" id="setup-add-rough">+ Add</button>
          <button class="btn" id="setup-bulk-rough">Bulk paste</button>
        </div>
      </div>
      <div id="rough-list">${tasksEditorHtml(j, data, 'roughIn')}</div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Fit-off tasks <span class="card-count">${(j.fitOffTasks || []).length}</span></div>
          <div class="card-sub">The checklist tradies tick off during fit-off. Same safe-edit rules.</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn" id="setup-add-fit">+ Add</button>
          <button class="btn" id="setup-bulk-fit">Bulk paste</button>
        </div>
      </div>
      <div id="fit-list">${tasksEditorHtml(j, data, 'fitOff')}</div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr">
        <div><div class="card-title">Crew & client</div>
          <div class="card-sub">People with access to this job.</div></div>
        <a class="btn" href="?s=crew">Open Crew &amp; client tab →</a>
      </div>
      <div style="font-size:13px;color:var(--muted)">
        ${STATE.crew.length} ${STATE.crew.length === 1 ? 'person' : 'people'} on this job · ${j.clientUserId ? '1 client linked' : '<span style="color:var(--warn)">no client linked</span>'}
      </div>
    </div>

    <div class="card">
      <div class="card-hdr"><div><div class="card-title">Open in field</div>
        <div class="card-sub">See this job the way the tradies do.</div></div></div>
      <a class="btn" href="/jobs/${SHELL.escapeHtml(STATE.jobId)}" target="_blank" rel="noopener">${SHELL.ICONS.external} Open ${SHELL.escapeHtml(j.name || STATE.jobId)} in field</a>
    </div>
  `;

  // Wire actions
  SHELL.$('#setup-edit-basics').addEventListener('click', openEditBasics);
  SHELL.$('#setup-add-group').addEventListener('click', () => addAreaGroup());
  SHELL.$('#setup-add-rough').addEventListener('click', () => addTask('roughIn'));
  SHELL.$('#setup-bulk-rough').addEventListener('click', () => bulkAddTasks('roughIn'));
  SHELL.$('#setup-add-fit').addEventListener('click', () => addTask('fitOff'));
  SHELL.$('#setup-bulk-fit').addEventListener('click', () => bulkAddTasks('fitOff'));
  SHELL.$$('button[data-rename-area]').forEach(b => b.addEventListener('click', () => renameAreaOrGroup(b.dataset.renameArea)));
  SHELL.$$('button[data-add-area]').forEach(b => b.addEventListener('click', () => addAreaToGroup(b.dataset.addArea)));
  SHELL.$$('button[data-bulk-area]').forEach(b => b.addEventListener('click', () => bulkAddAreas(b.dataset.bulkArea)));
  SHELL.$$('button[data-rm-area]').forEach(b => b.addEventListener('click', () => removeAreaOrGroup(b.dataset.rmArea)));
  SHELL.$$('button[data-edit-checklist]').forEach(b => b.addEventListener('click', () => openAreaChecklistPanel(b.dataset.editChecklist)));
  SHELL.$$('button[data-dup-area]').forEach(b => b.addEventListener('click', () => duplicateArea(b.dataset.dupArea)));
  SHELL.$$('button[data-rename-task]').forEach(b => b.addEventListener('click', () => renameTask(b.dataset.renameTask, b.dataset.stage)));
  SHELL.$$('button[data-rm-task]').forEach(b => b.addEventListener('click', () => removeTask(b.dataset.rmTask, b.dataset.stage)));
}

// ── Setup helpers ──────────────────────────────────────────────────────

function countAreas(j) {
  return (j.areaGroups || []).reduce((s, g) => s + ((g.areas || []).length), 0);
}

function jobHasAnyProgress(j, data) {
  const dwellings = (data && data.dwellings) || {};
  for (const dwId of Object.keys(dwellings)) {
    const dw = dwellings[dwId];
    for (const stage of ['roughIn', 'fitOff']) {
      const tasks = (dw[stage] && dw[stage].tasks) || {};
      for (const tid of Object.keys(tasks)) {
        if (tasks[tid] && tasks[tid] !== 'not_started') return true;
      }
    }
  }
  return false;
}

// True if any dwelling under this group has any non-not_started task.
function groupHasProgress(group, data) {
  const dwellings = (data && data.dwellings) || {};
  const areaIds = new Set((group.areas || []).map(a => a.id));
  for (const dwId of Object.keys(dwellings)) {
    if (!areaIds.has(dwId)) continue;
    const dw = dwellings[dwId];
    for (const stage of ['roughIn', 'fitOff']) {
      const tasks = (dw[stage] && dw[stage].tasks) || {};
      for (const tid of Object.keys(tasks)) {
        if (tasks[tid] && tasks[tid] !== 'not_started') return true;
      }
    }
  }
  return false;
}

function areaHasProgress(areaId, data) {
  const dw = ((data && data.dwellings) || {})[areaId];
  if (!dw) return false;
  for (const stage of ['roughIn', 'fitOff']) {
    const tasks = (dw[stage] && dw[stage].tasks) || {};
    for (const tid of Object.keys(tasks)) {
      if (tasks[tid] && tasks[tid] !== 'not_started') return true;
    }
  }
  return false;
}

function taskHasProgress(taskId, stage, data) {
  const dwellings = (data && data.dwellings) || {};
  for (const dwId of Object.keys(dwellings)) {
    const tasks = (dwellings[dwId][stage] && dwellings[dwId][stage].tasks) || {};
    if (tasks[taskId] && tasks[taskId] !== 'not_started') return true;
  }
  return false;
}

function areasEditorHtml(j, data) {
  const groups = j.areaGroups || [];
  if (!groups.length) return '<div class="empty"><div class="empty-title">No area groups yet</div><div class="empty-sub">Add a group (e.g. "Units" or "Townhouses") to get started.</div></div>';
  // Setup-summary block: tells the admin at a glance how many areas are
  // running on the job-default checklist vs how many have a customised
  // one. Per the brief: "15 areas using default checklist, 3 areas have
  // custom checklists, 0 areas missing tasks." Lives ABOVE the per-group
  // editor so it's the first thing the admin reads.
  const allAreas = groups.flatMap(g => g.areas || []);
  const customCount  = allAreas.filter(a => (Array.isArray(a.roughInTasks) && a.roughInTasks.length) || (Array.isArray(a.fitOffTasks) && a.fitOffTasks.length)).length;
  const jobR = (j.roughInTasks || []).length;
  const jobF = (j.fitOffTasks  || []).length;
  const missingChecklist = allAreas.filter(a => {
    const r = (Array.isArray(a.roughInTasks) && a.roughInTasks.length) ? a.roughInTasks.length : jobR;
    const f = (Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length)  ? a.fitOffTasks.length  : jobF;
    return r === 0 && f === 0;
  }).length;
  const summary = `<div style="display:flex;gap:14px;flex-wrap:wrap;padding:10px 12px;margin-bottom:10px;background:var(--surface-2);border:1px dashed var(--line);border-radius:8px;font-size:12px;color:var(--ink-2)">
    <span><b>${allAreas.length}</b> total ${allAreas.length === 1 ? 'area' : 'areas'}</span>
    <span><b>${allAreas.length - customCount}</b> using default checklist</span>
    <span><b style="color:${customCount ? 'var(--accent)' : 'var(--ink)'}">${customCount}</b> with custom checklist</span>
    <span><b style="color:${missingChecklist ? 'var(--warn)' : 'var(--ok)'}">${missingChecklist}</b> with no checklist at all</span>
  </div>`;
  return summary + groups.map(g => {
    const grpProgress = groupHasProgress(g, data);
    const areas = g.areas || [];
    return `<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--surface)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <b style="flex:1;font-size:14px">${SHELL.escapeHtml(g.name)}</b>
        <span style="font-size:11px;color:var(--muted)">${areas.length} ${areas.length === 1 ? 'area' : 'areas'}</span>
        <button class="btn btn-sm" data-rename-area="g:${SHELL.escapeHtml(g.id)}">Rename</button>
        <button class="btn btn-sm btn-danger" data-rm-area="g:${SHELL.escapeHtml(g.id)}" ${grpProgress ? 'disabled title="Areas in this group have recorded progress — rename instead"' : ''}>Remove</button>
      </div>
      ${areas.length ? `<div style="display:grid;gap:4px">
        ${areas.map(a => areaRowHtml(j, a, data)).join('')}
      </div>` : '<div style="font-size:12px;color:var(--muted);font-style:italic">No areas yet.</div>'}
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-sm" data-add-area="${SHELL.escapeHtml(g.id)}">+ Add area</button>
        <button class="btn btn-sm" data-bulk-area="${SHELL.escapeHtml(g.id)}">Bulk paste</button>
      </div>
    </div>`;
  }).join('');
}

// Single area row inside the Setup → Areas editor. Shows the checklist
// mode (Default / Custom) and the effective task counts so the admin can
// see at a glance which areas have been customised. The "Custom"
// affordance opens a small panel that lets the admin start an override
// from job-default, copy from another area, paste a list, or reset.
function areaRowHtml(j, a, data) {
  const used = areaHasProgress(a.id, data);
  const jobR = (j.roughInTasks || []).length;
  const jobF = (j.fitOffTasks  || []).length;
  const hasRoughOverride = !!(Array.isArray(a.roughInTasks) && a.roughInTasks.length);
  const hasFitOverride   = !!(Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length);
  const hasOverride = hasRoughOverride || hasFitOverride;
  const effR = hasRoughOverride ? a.roughInTasks.length : jobR;
  const effF = hasFitOverride   ? a.fitOffTasks.length  : jobF;
  const modeLabel = hasOverride
    ? `<span class="pill pill-info" style="font-size:9px">${
        hasRoughOverride && hasFitOverride ? 'Custom · both' :
        hasRoughOverride ? 'Custom · rough-in' : 'Custom · fit-off'
      }</span>`
    : `<span style="font-size:10px;color:var(--muted)">Default checklist</span>`;
  const spaceTypeChip = a.spaceType
    ? `<span style="font-size:10px;color:var(--ink-2);background:var(--surface-3);padding:1px 7px;border-radius:999px">${SHELL.escapeHtml(a.spaceType)}</span>`
    : '';
  return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface-2);border-radius:6px;font-size:13px">
    <div style="flex:1;min-width:0">
      <div style="display:flex;gap:8px;align-items:center">
        <b>${SHELL.escapeHtml(a.name)}</b>
        ${spaceTypeChip}
        ${used ? '<span class="pill pill-info" style="font-size:9px">in progress</span>' : ''}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">
        ${modeLabel} · <b>${effR}</b> rough-in · <b>${effF}</b> fit-off
      </div>
    </div>
    <button class="btn btn-sm" data-edit-checklist="${SHELL.escapeHtml(a.id)}" title="Customise this area's checklist">Checklist</button>
    <button class="btn btn-sm" data-dup-area="${SHELL.escapeHtml(a.id)}" title="Duplicate this area (carries the space type and any custom checklist)">Duplicate</button>
    <button class="btn btn-sm" data-rename-area="a:${SHELL.escapeHtml(a.id)}">Rename</button>
    <button class="btn btn-sm btn-danger" data-rm-area="a:${SHELL.escapeHtml(a.id)}" ${used ? 'disabled title="Has recorded progress — rename instead"' : ''}>×</button>
  </div>`;
}

function tasksEditorHtml(j, data, stage) {
  const tasks = (stage === 'roughIn' ? j.roughInTasks : j.fitOffTasks) || [];
  if (!tasks.length) return '<div class="empty"><div class="empty-title">No tasks yet</div><div class="empty-sub">Add a task (e.g. "Lighting rough-in") or paste a list.</div></div>';
  return `<div style="display:grid;gap:4px">
    ${tasks.map(t => {
      const used = taskHasProgress(t.id, stage, data);
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface-2);border-radius:6px;font-size:13px">
        <span style="flex:1">${SHELL.escapeHtml(t.name)}${used ? ` <span class="pill pill-info" style="font-size:9px">in progress</span>` : ''}</span>
        <button class="btn btn-sm" data-rename-task="${SHELL.escapeHtml(t.id)}" data-stage="${stage}">Rename</button>
        <button class="btn btn-sm btn-danger" data-rm-task="${SHELL.escapeHtml(t.id)}" data-stage="${stage}" ${used ? 'disabled title="Task has recorded progress — rename instead"' : ''}>×</button>
      </div>`;
    }).join('')}
  </div>`;
}

// ── Setup mutations ────────────────────────────────────────────────────

async function saveJobPatch(patch) {
  try {
    await SHELL.api('/api/jobs', { method: 'PUT', body: { id: STATE.jobId, ...patch } });
    SHELL.toast('Saved', 'ok');
    await loadAll();
    if (STATE.section === 'setup') paint();
  } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
}

async function addAreaGroup() {
  const name = prompt('New area group name (e.g. "Units", "Townhouses"):');
  if (!name || !name.trim()) return;
  const groups = (STATE.job.areaGroups || []).slice();
  groups.push({ id: 'g_' + Date.now().toString(36), name: name.trim(), areas: [] });
  await saveJobPatch({ areaGroups: groups });
}

async function addAreaToGroup(groupId) {
  const name = prompt('New area name (e.g. "Unit 7", "Townhouse 3"):');
  if (!name || !name.trim()) return;
  const groups = (STATE.job.areaGroups || []).map(g => {
    if (g.id !== groupId) return g;
    const areas = (g.areas || []).concat({ id: 'a_' + Date.now().toString(36), name: name.trim() });
    return { ...g, areas };
  });
  await saveJobPatch({ areaGroups: groups });
}

// Duplicate an area inside the same group, including any space-type +
// custom checklist overrides. Useful when an admin set up Unit 1's
// checklist by hand and now needs Units 2..15 with the same shape —
// duplicate-then-rename is faster than the multi-step "create area then
// open Checklist then Customise then Copy from Unit 1".
//
// New task ids are generated for the override lists so progress stays
// scoped to the new area (otherwise data.dwellings[<newAreaId>] would
// share task ids with the source and conflate progress on read).
async function duplicateArea(areaId) {
  const { area, group } = findAreaInJob(areaId);
  if (!area || !group) return;
  const suggested = (area.name || 'Area') + ' (copy)';
  const name = prompt('Duplicate area as:', suggested);
  if (name == null) return;
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  const stamp = Date.now().toString(36);
  let counter = 0;
  const cloneList = (list, prefix) => list.map((t, i) => ({
    id: prefix + stamp + '_' + (counter++) + '_' + i,
    name: t.name,
  }));
  const newArea = { id: 'a_' + stamp, name: trimmed };
  if (area.spaceType) newArea.spaceType = area.spaceType;
  if (Array.isArray(area.roughInTasks) && area.roughInTasks.length) {
    newArea.roughInTasks = cloneList(area.roughInTasks, 'rt_');
  }
  if (Array.isArray(area.fitOffTasks) && area.fitOffTasks.length) {
    newArea.fitOffTasks = cloneList(area.fitOffTasks, 'ft_');
  }
  const groups = (STATE.job.areaGroups || []).map(g => {
    if (g.id !== group.id) return g;
    // Insert directly after the source area so it shows up next to it.
    const idx = g.areas.findIndex(a => a.id === areaId);
    const next = g.areas.slice();
    next.splice(idx >= 0 ? idx + 1 : next.length, 0, newArea);
    return { ...g, areas: next };
  });
  await saveJobPatch({ areaGroups: groups });
}

async function bulkAddAreas(groupId) {
  const text = prompt('Paste area names — one per line, or use a numbered prefix.\n\nExamples:\n  Lobby\n  Plant Room\n  Switch Room\n\nFor numbered: type "Unit 1" .. "Unit 22" line-by-line.');
  if (!text) return;
  const names = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!names.length) return;
  const groups = (STATE.job.areaGroups || []).map(g => {
    if (g.id !== groupId) return g;
    const areas = (g.areas || []).concat(names.map((nm, i) => ({
      id: 'a_' + Date.now().toString(36) + '_' + i, name: nm,
    })));
    return { ...g, areas };
  });
  await saveJobPatch({ areaGroups: groups });
}

async function renameAreaOrGroup(token) {
  // Token format: "g:<id>" or "a:<id>"
  const [kind, id] = token.split(':');
  const groups = STATE.job.areaGroups || [];
  if (kind === 'g') {
    const g = groups.find(x => x.id === id); if (!g) return;
    const nm = prompt('Rename group:', g.name);
    if (nm == null || !nm.trim() || nm.trim() === g.name) return;
    const next = groups.map(x => x.id === id ? { ...x, name: nm.trim() } : x);
    await saveJobPatch({ areaGroups: next });
  } else {
    let target = null, parent = null;
    for (const g of groups) {
      const a = (g.areas || []).find(x => x.id === id);
      if (a) { target = a; parent = g; break; }
    }
    if (!target) return;
    const nm = prompt('Rename area:', target.name);
    if (nm == null || !nm.trim() || nm.trim() === target.name) return;
    const next = groups.map(g => g.id !== parent.id ? g : ({
      ...g, areas: g.areas.map(a => a.id === id ? { ...a, name: nm.trim() } : a),
    }));
    await saveJobPatch({ areaGroups: next });
  }
}

async function removeAreaOrGroup(token) {
  const [kind, id] = token.split(':');
  const groups = STATE.job.areaGroups || [];
  if (kind === 'g') {
    const g = groups.find(x => x.id === id); if (!g) return;
    if (groupHasProgress(g, STATE.data)) {
      SHELL.toast('Group has areas with recorded progress — rename instead', 'warn'); return;
    }
    if (!confirm('Remove group "' + g.name + '" and its ' + ((g.areas || []).length) + ' areas?')) return;
    const next = groups.filter(x => x.id !== id);
    await saveJobPatch({ areaGroups: next });
  } else {
    if (areaHasProgress(id, STATE.data)) {
      SHELL.toast('Area has recorded progress — rename instead', 'warn'); return;
    }
    let parent = null;
    for (const g of groups) if ((g.areas || []).some(a => a.id === id)) { parent = g; break; }
    if (!parent) return;
    const target = parent.areas.find(a => a.id === id);
    if (!confirm('Remove area "' + target.name + '"?')) return;
    const next = groups.map(g => g.id !== parent.id ? g : ({ ...g, areas: g.areas.filter(a => a.id !== id) }));
    await saveJobPatch({ areaGroups: next });
  }
}

async function addTask(stage) {
  const label = stage === 'roughIn' ? 'rough-in' : 'fit-off';
  const name = prompt('New ' + label + ' task name (e.g. "Lighting ' + label + '"):');
  if (!name || !name.trim()) return;
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const tasks = (STATE.job[key] || []).concat({
    id: (stage === 'roughIn' ? 'rt_' : 'ft_') + Date.now().toString(36),
    name: name.trim(),
  });
  await saveJobPatch({ [key]: tasks });
}

async function bulkAddTasks(stage) {
  const label = stage === 'roughIn' ? 'rough-in' : 'fit-off';
  const text = prompt('Paste ' + label + ' task names, one per line:');
  if (!text) return;
  const names = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!names.length) return;
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const prefix = stage === 'roughIn' ? 'rt_' : 'ft_';
  const tasks = (STATE.job[key] || []).concat(names.map((nm, i) => ({
    id: prefix + Date.now().toString(36) + '_' + i, name: nm,
  })));
  await saveJobPatch({ [key]: tasks });
}

async function renameTask(taskId, stage) {
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const t = (STATE.job[key] || []).find(x => x.id === taskId); if (!t) return;
  const nm = prompt('Rename task:', t.name);
  if (nm == null || !nm.trim() || nm.trim() === t.name) return;
  const tasks = (STATE.job[key] || []).map(x => x.id === taskId ? { ...x, name: nm.trim() } : x);
  await saveJobPatch({ [key]: tasks });
}

async function removeTask(taskId, stage) {
  if (taskHasProgress(taskId, stage, STATE.data)) {
    SHELL.toast('Task has recorded progress — rename instead', 'warn'); return;
  }
  const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
  const t = (STATE.job[key] || []).find(x => x.id === taskId); if (!t) return;
  if (!confirm('Remove task "' + t.name + '"?')) return;
  const tasks = (STATE.job[key] || []).filter(x => x.id !== taskId);
  await saveJobPatch({ [key]: tasks });
}

// ── Per-area checklist editor ──────────────────────────────────────────
//
// Slide-in panel that lets the admin customise an area's rough-in / fit-off
// task list. Two modes per stage (Default / Custom). A space-type chip up
// top tags the area (Bathroom, Kitchen, Switch room, NBN, …) — informational
// only, doesn't change behaviour. A "Copy from another area" picker lets
// the admin propagate a custom checklist across similar spaces.
//
// Safety:
//   • Tasks with recorded progress can't be deleted from a custom list
//     (rename-only). Same rule the global list has.
//   • Reset-to-default warns if any task is in progress.
//   • Stable IDs are preserved by name when the admin renames or copies.
function findAreaInJob(areaId) {
  for (const g of (STATE.job.areaGroups || [])) {
    const a = (g.areas || []).find(x => x.id === areaId);
    if (a) return { area: a, group: g };
  }
  return { area: null, group: null };
}

function openAreaChecklistPanel(areaId) {
  const { area, group } = findAreaInJob(areaId);
  if (!area) return;
  const j = STATE.job;
  const data = STATE.data || { dwellings: {} };
  const jobR = j.roughInTasks || [];
  const jobF = j.fitOffTasks  || [];
  const usingCustomR = !!(Array.isArray(area.roughInTasks) && area.roughInTasks.length);
  const usingCustomF = !!(Array.isArray(area.fitOffTasks)  && area.fitOffTasks.length);
  const effR = usingCustomR ? area.roughInTasks : jobR;
  const effF = usingCustomF ? area.fitOffTasks  : jobF;
  // List of "copyable" areas — anywhere in the job with an existing
  // override. Excludes the current area.
  const copySources = (j.areaGroups || []).flatMap(g => (g.areas || [])
    .filter(a => a.id !== areaId && ((Array.isArray(a.roughInTasks) && a.roughInTasks.length) || (Array.isArray(a.fitOffTasks) && a.fitOffTasks.length)))
    .map(a => ({ id: a.id, name: a.name, group: g.name })));

  const stageBlock = (stage) => {
    const isCustom = stage === 'roughIn' ? usingCustomR : usingCustomF;
    const tasks    = stage === 'roughIn' ? effR         : effF;
    const stageLabel = stage === 'roughIn' ? 'Rough-in' : 'Fit-off';
    return `<div class="card" style="padding:0;margin-bottom:14px">
      <div style="padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <div class="card-title">${stageLabel} checklist <span class="card-count">${tasks.length}</span></div>
          <div class="card-sub">${isCustom ? 'Custom for this area' : 'Using job default'}</div>
        </div>
        ${isCustom
          ? `<button class="btn btn-sm" data-acl-reset="${stage}" title="Drop the override and use the job default again">Reset to default</button>`
          : `<button class="btn btn-sm btn-primary" data-acl-customise="${stage}" title="Start a custom checklist for this area, copied from the job default">Customise →</button>`}
      </div>
      ${tasks.length ? `<div style="display:grid;gap:4px;padding:8px 10px">
        ${tasks.map((t, i) => `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface-2);border-radius:6px;font-size:13px">
          <span style="flex:1">${SHELL.escapeHtml(t.name)}${!isCustom ? ' <span style="font-size:10px;color:var(--muted)">(from default)</span>' : ''}</span>
          ${isCustom ? `
            <button class="btn btn-sm" data-acl-rename="${stage}|${i}">Rename</button>
            <button class="btn btn-sm btn-danger" data-acl-rm="${stage}|${i}" ${taskHasProgress(t.id, stage, data) ? 'disabled title="Has recorded progress — rename instead"' : ''}>×</button>
          ` : ''}
        </div>`).join('')}
      </div>` : '<div style="padding:14px;color:var(--muted);font-size:12px;text-align:center">No tasks yet.</div>'}
      ${isCustom ? `<div style="display:flex;gap:6px;padding:0 10px 10px;flex-wrap:wrap">
        <button class="btn btn-sm" data-acl-add="${stage}">+ Add task</button>
        <button class="btn btn-sm" data-acl-bulk="${stage}">Bulk paste</button>
        ${copySources.length ? `<button class="btn btn-sm" data-acl-copy="${stage}">Copy from another area</button>` : ''}
        <!-- Apply this stage's checklist to OTHER areas. The inverse of
             "Copy from another area" — instead of pulling, the admin
             pushes this checklist to N selected siblings. The brief
             explicitly calls this out as critical for speed:
             "Create Unit 1 checklist → Copy to Unit 2-15 → Customise
             Unit 7 only." -->
        <button class="btn btn-sm" data-acl-apply-many="${stage}" title="Apply this checklist to selected other areas in the job">Apply to other areas →</button>
      </div>` : ''}
    </div>`;
  };

  // Common space-type suggestions — admin can also free-type any other.
  const spaceSuggestions = [
    'Apartment', 'Townhouse', 'Bedroom', 'Bathroom', 'Kitchen',
    'Living', 'Corridor', 'Lobby', 'Switch room', 'Comms room',
    'Riser', 'Plant room', 'External', 'NBN', 'Carpark',
  ];

  const panel = SHELL.openPanel({
    title: 'Checklist · ' + (area.name || 'Area'),
    body: `
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px">
        ${SHELL.escapeHtml(group ? group.name : '—')} · ${countAreas(j)} ${countAreas(j) === 1 ? 'area' : 'areas'} on this job
      </div>

      <div class="field" style="margin-bottom:14px">
        <label class="field-lbl">Space type <span style="font-weight:400;color:var(--muted)">(optional — helps you and other admins recognise the area)</span></label>
        <input class="input" id="acl-space" list="acl-space-list" value="${SHELL.escapeHtml(area.spaceType || '')}" placeholder="e.g. Bathroom">
        <datalist id="acl-space-list">
          ${spaceSuggestions.map(s => `<option value="${SHELL.escapeHtml(s)}">`).join('')}
        </datalist>
      </div>

      ${stageBlock('roughIn')}
      ${stageBlock('fitOff')}

      <div style="font-size:11px;color:var(--muted);line-height:1.5;padding:10px 12px;background:var(--surface-2);border-radius:8px">
        Custom checklists override the job default for this area only. Workers see the right tasks automatically — no migration needed. Tasks with recorded progress can't be deleted (rename instead).
      </div>
    `,
    footer: `
      <button class="btn" onclick="SHELL.closePanel()">Close</button>
      <button class="btn btn-primary" id="acl-save">Save</button>
    `,
  });

  // Wire interactions inside the panel. Working state lives in a local
  // map so multiple stage edits don't stomp each other; we patch the
  // job once on Save.
  const working = {
    spaceType: area.spaceType || '',
    roughInTasks: usingCustomR ? area.roughInTasks.map(t => ({ ...t })) : null,
    fitOffTasks:  usingCustomF ? area.fitOffTasks.map(t => ({ ...t }))  : null,
  };

  panel.querySelectorAll('button[data-acl-customise]').forEach(b => b.addEventListener('click', () => {
    const stage = b.dataset.aclCustomise;
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    const src = (stage === 'roughIn' ? jobR : jobF).map(t => ({ id: t.id, name: t.name }));
    working[key] = src;
    saveAndReopen();
  }));
  panel.querySelectorAll('button[data-acl-reset]').forEach(b => b.addEventListener('click', () => {
    const stage = b.dataset.aclReset;
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    // Block reset if any task in the override has recorded progress and
    // isn't on the job default — that progress would orphan.
    const cur = working[key] || (stage === 'roughIn' ? area.roughInTasks : area.fitOffTasks) || [];
    const def = stage === 'roughIn' ? jobR : jobF;
    const defIds = new Set(def.map(t => t.id));
    const orphaned = cur.filter(t => !defIds.has(t.id) && taskHasProgress(t.id, stage, data));
    if (orphaned.length) {
      if (!confirm(orphaned.length + ' task(s) in this custom checklist have recorded progress and aren\'t in the job default — that progress will become hidden. Continue?')) return;
    } else {
      if (!confirm('Reset this stage to the job default?')) return;
    }
    working[key] = null;
    saveAndReopen();
  }));
  panel.querySelectorAll('button[data-acl-add]').forEach(b => b.addEventListener('click', () => {
    const stage = b.dataset.aclAdd;
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    const nm = prompt('New ' + (stage === 'roughIn' ? 'rough-in' : 'fit-off') + ' task name:');
    if (!nm || !nm.trim()) return;
    const prefix = stage === 'roughIn' ? 'rt_' : 'ft_';
    if (!working[key]) working[key] = [];
    working[key].push({ id: prefix + Date.now().toString(36), name: nm.trim() });
    saveAndReopen();
  }));
  panel.querySelectorAll('button[data-acl-bulk]').forEach(b => b.addEventListener('click', () => {
    const stage = b.dataset.aclBulk;
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    const text = prompt('Paste task names, one per line:');
    if (!text) return;
    const names = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    if (!names.length) return;
    const prefix = stage === 'roughIn' ? 'rt_' : 'ft_';
    if (!working[key]) working[key] = [];
    names.forEach((nm, i) => working[key].push({ id: prefix + Date.now().toString(36) + '_' + i, name: nm }));
    saveAndReopen();
  }));
  panel.querySelectorAll('button[data-acl-rename]').forEach(b => b.addEventListener('click', () => {
    const [stage, idxStr] = b.dataset.aclRename.split('|');
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    const i = Number(idxStr);
    const list = working[key] || (stage === 'roughIn' ? area.roughInTasks : area.fitOffTasks) || [];
    const t = list[i]; if (!t) return;
    const nm = prompt('Rename task:', t.name);
    if (nm == null || !nm.trim() || nm.trim() === t.name) return;
    if (!working[key]) working[key] = list.map(x => ({ ...x }));
    working[key][i] = { ...working[key][i], name: nm.trim() };
    saveAndReopen();
  }));
  panel.querySelectorAll('button[data-acl-rm]').forEach(b => b.addEventListener('click', () => {
    const [stage, idxStr] = b.dataset.aclRm.split('|');
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    const i = Number(idxStr);
    const list = working[key] || (stage === 'roughIn' ? area.roughInTasks : area.fitOffTasks) || [];
    const t = list[i]; if (!t) return;
    if (taskHasProgress(t.id, stage, data)) {
      SHELL.toast('Task has recorded progress — rename instead', 'warn'); return;
    }
    if (!confirm('Remove task "' + t.name + '"?')) return;
    if (!working[key]) working[key] = list.map(x => ({ ...x }));
    working[key].splice(i, 1);
    saveAndReopen();
  }));
  panel.querySelectorAll('button[data-acl-copy]').forEach(b => b.addEventListener('click', () => {
    const stage = b.dataset.aclCopy;
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    if (!copySources.length) { SHELL.toast('No other areas have a custom checklist yet', 'warn'); return; }
    const lines = copySources
      .map((s, i) => (i + 1) + '. ' + s.name + ' (' + s.group + ')')
      .join('\n');
    const pickStr = prompt('Copy ' + (stage === 'roughIn' ? 'rough-in' : 'fit-off') + ' checklist from which area? Enter number:\n\n' + lines);
    if (!pickStr) return;
    const idx = Number(pickStr) - 1;
    if (!Number.isFinite(idx) || idx < 0 || idx >= copySources.length) {
      SHELL.toast('Invalid selection', 'warn'); return;
    }
    const src = findAreaInJob(copySources[idx].id).area;
    const srcList = src && src[key];
    if (!srcList || !srcList.length) {
      SHELL.toast('That area has no ' + stage + ' override', 'warn'); return;
    }
    // Copy with fresh ids — the new tasks belong to THIS area and the
    // server preserves ids on rename, but we don't want two areas
    // sharing identical task ids (would conflate progress).
    const prefix = stage === 'roughIn' ? 'rt_' : 'ft_';
    working[key] = srcList.map((t, i) => ({ id: prefix + Date.now().toString(36) + '_' + i, name: t.name }));
    SHELL.toast('Copied from ' + (src.name || 'area'), 'ok');
    saveAndReopen();
  }));

  // Apply-to-many: push THIS area's stage checklist to N selected
  // siblings. Persists pending working-state edits first so what the
  // admin sees in the editor is what propagates.
  panel.querySelectorAll('button[data-acl-apply-many]').forEach(b => b.addEventListener('click', async () => {
    const stage = b.dataset.aclApplyMany;
    const key = stage === 'roughIn' ? 'roughInTasks' : 'fitOffTasks';
    // Make sure any pending edits are saved before we propagate — otherwise
    // we'd be applying stale tasks to other areas.
    const spaceInput = panel.querySelector('#acl-space');
    if (spaceInput) working.spaceType = spaceInput.value.trim();
    await persistWorking();
    SHELL.closePanel();
    openApplyToManyPanel(areaId, stage);
  }));

  // Save → patch areaGroups with the new override (or null override).
  // Triggered by both the explicit Save button and any in-panel mutation
  // (so changes don't get stuck in the working state).
  let saving = false;
  async function persistWorking() {
    if (saving) return;
    saving = true;
    try {
      const groups = (STATE.job.areaGroups || []).map(g => ({
        ...g,
        areas: (g.areas || []).map(a => {
          if (a.id !== areaId) return a;
          const next = { id: a.id, name: a.name };
          // Preserve stuff we don't touch
          for (const k of Object.keys(a)) {
            if (!['id','name','spaceType','roughInTasks','fitOffTasks','_previewSpaceType'].includes(k)) {
              next[k] = a[k];
            }
          }
          if (working.spaceType) next.spaceType = working.spaceType;
          if (Array.isArray(working.roughInTasks) && working.roughInTasks.length) next.roughInTasks = working.roughInTasks;
          if (Array.isArray(working.fitOffTasks)  && working.fitOffTasks.length)  next.fitOffTasks  = working.fitOffTasks;
          return next;
        }),
      }));
      await SHELL.api('/api/jobs', { method: 'PUT', body: { id: STATE.jobId, areaGroups: groups } });
      await loadAll();
    } catch (e) {
      SHELL.toast('Save failed — ' + e.message, 'bad');
    } finally { saving = false; }
  }

  async function saveAndReopen() {
    // Pull spaceType from input each time before persisting
    const spaceInput = panel.querySelector('#acl-space');
    if (spaceInput) working.spaceType = spaceInput.value.trim();
    await persistWorking();
    SHELL.closePanel();
    openAreaChecklistPanel(areaId);
  }

  panel.querySelector('#acl-save').addEventListener('click', async () => {
    const spaceInput = panel.querySelector('#acl-space');
    if (spaceInput) working.spaceType = spaceInput.value.trim();
    await persistWorking();
    SHELL.toast('Checklist saved', 'ok');
    SHELL.closePanel();
    paint();
  });
}

// ── Apply this checklist to many other areas ───────────────────────────
//
// The brief calls this out as critical for setup speed: a real job has
// 15 of the same kind of room — admin should configure ONE then push
// that checklist to all the others, customising the exceptions later.
//
// Flow:
//   1. Compose a multi-select of every OTHER area in the job, grouped by
//      area-group, with each row showing current mode (Default / Custom).
//   2. Per-group "Select all in group" + "Areas with no override" quick
//      shortcut so admin doesn't have to tick 14 boxes by hand.
//   3. Stage selector — both stages by default (when source has both
//      customised), single stage when source only has that one.
//   4. Submit — compute newCustom vs willOverwrite. If any overwrites,
//      show a confirm("X areas already have a custom checklist — replace?").
//   5. Build a single areaGroups payload with every override applied
//      (fresh task IDs per destination so progress stays scoped to that
//      area). One PUT, one toast.
function openApplyToManyPanel(sourceAreaId, focusStage) {
  const j = STATE.job || {};
  const data = STATE.data || { dwellings: {} };
  const { area: source, group: sourceGroup } = findAreaInJob(sourceAreaId);
  if (!source) { SHELL.toast('Source area not found', 'bad'); return; }

  const sourceHasRough = !!(Array.isArray(source.roughInTasks) && source.roughInTasks.length);
  const sourceHasFit   = !!(Array.isArray(source.fitOffTasks)  && source.fitOffTasks.length);
  if (!sourceHasRough && !sourceHasFit) {
    SHELL.toast('This area has no custom checklist to apply', 'warn');
    return;
  }
  // Default stages to apply: whatever this area has customised. The
  // focusStage hint (the button the admin clicked) is honoured if it's
  // available on the source; otherwise we fall back to "all customised
  // stages" so the admin still sees something pre-ticked.
  const wantStages = new Set();
  if (sourceHasRough) wantStages.add('roughIn');
  if (sourceHasFit)   wantStages.add('fitOff');
  if (focusStage && wantStages.has(focusStage) && wantStages.size > 1) {
    // If the admin came in via the rough-in button on a both-stage
    // source, default to JUST rough-in — they can re-tick fit-off if
    // they want both. Reduces the risk of an accidental two-stage push.
    wantStages.clear();
    wantStages.add(focusStage);
  }

  // Working selection state — Set of areaIds. Mirrors the checkboxes.
  const selected = new Set();
  const stages = new Set(wantStages);

  // Build the areas tree (excluding source). For each area we precompute
  // the "would overwrite" flag for each stage so the summary is cheap.
  const groups = (j.areaGroups || []).map(g => ({
    id: g.id, name: g.name,
    areas: (g.areas || [])
      .filter(a => a.id !== sourceAreaId)
      .map(a => ({
        id: a.id, name: a.name,
        spaceType: a.spaceType || '',
        hasRough: !!(Array.isArray(a.roughInTasks) && a.roughInTasks.length),
        hasFit:   !!(Array.isArray(a.fitOffTasks)  && a.fitOffTasks.length),
        hasProgressR: !!Object.keys(((data.dwellings[a.id] || {}).roughIn || {}).tasks || {}).some(tid => (((data.dwellings[a.id] || {}).roughIn || {}).tasks || {})[tid] && (((data.dwellings[a.id] || {}).roughIn || {}).tasks || {})[tid] !== 'not_started'),
        hasProgressF: !!Object.keys(((data.dwellings[a.id] || {}).fitOff  || {}).tasks || {}).some(tid => (((data.dwellings[a.id] || {}).fitOff  || {}).tasks || {})[tid] && (((data.dwellings[a.id] || {}).fitOff  || {}).tasks || {})[tid] !== 'not_started'),
      })),
  }));
  const totalAreas = groups.reduce((s, g) => s + g.areas.length, 0);
  if (!totalAreas) {
    SHELL.toast('No other areas to apply to', 'warn');
    return;
  }

  const stageChip = (id, label, count, locked) => `<label style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font-size:13px;cursor:${locked ? 'not-allowed' : 'pointer'};opacity:${locked ? '.55' : '1'};background:${stages.has(id) ? 'var(--accent-bg, var(--surface-2))' : 'var(--surface)'}">
    <input type="checkbox" id="atm-stage-${id}" ${stages.has(id) ? 'checked' : ''} ${locked ? 'disabled' : ''}>
    ${label} <span style="font-size:11px;color:var(--muted)">(${count})</span>
  </label>`;

  const areaRow = (a, gName) => {
    const overlay = [];
    if (stages.has('roughIn') && a.hasRough) overlay.push('rough-in');
    if (stages.has('fitOff') && a.hasFit) overlay.push('fit-off');
    const overwrite = overlay.length;
    const progressTags = [];
    if (stages.has('roughIn') && a.hasProgressR) progressTags.push('rough-in progress');
    if (stages.has('fitOff') && a.hasProgressF) progressTags.push('fit-off progress');
    return `<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px;${selected.has(a.id) ? 'background:var(--surface-2)' : ''}">
      <input type="checkbox" data-atm-area="${SHELL.escapeHtml(a.id)}" ${selected.has(a.id) ? 'checked' : ''}>
      <div style="flex:1;min-width:0">
        <div><b>${SHELL.escapeHtml(a.name)}</b>${a.spaceType ? ` <span style="font-size:10px;color:var(--ink-2);background:var(--surface-3);padding:1px 7px;border-radius:999px">${SHELL.escapeHtml(a.spaceType)}</span>` : ''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">
          ${overwrite ? `<span style="color:var(--warn)">⚠ would replace existing custom (${overlay.join(' + ')})</span>` : 'currently using default checklist'}
          ${progressTags.length ? ` · <span style="color:var(--bad)">${progressTags.join(' · ')}</span>` : ''}
        </div>
      </div>
    </label>`;
  };

  const groupBlock = (g) => {
    if (!g.areas.length) return '';
    return `<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface-3);border-radius:8px 8px 0 0;font-size:12px;font-weight:600">
        <span style="flex:1">${SHELL.escapeHtml(g.name)} <span style="color:var(--muted);font-weight:400">· ${g.areas.length}</span></span>
        <button class="btn btn-sm" data-atm-group-all="${SHELL.escapeHtml(g.id)}" type="button">Select all</button>
        <button class="btn btn-sm" data-atm-group-none="${SHELL.escapeHtml(g.id)}" type="button">None</button>
      </div>
      <div style="border:1px solid var(--line);border-top:0;border-radius:0 0 8px 8px;background:var(--surface)">
        ${g.areas.map(a => areaRow(a, g.name)).join('')}
      </div>
    </div>`;
  };

  const panel = SHELL.openPanel({
    title: 'Apply ' + (source.name || 'area') + '\'s checklist',
    body: `
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
        Source: <b>${SHELL.escapeHtml(source.name)}</b>${sourceGroup ? ' (' + SHELL.escapeHtml(sourceGroup.name) + ')' : ''}${source.spaceType ? ' · ' + SHELL.escapeHtml(source.spaceType) : ''}
      </div>

      <div style="margin-bottom:14px">
        <div class="field-lbl" style="margin-bottom:6px">Apply which stages</div>
        <div id="atm-stages" style="display:flex;gap:8px;flex-wrap:wrap">
          ${stageChip('roughIn', 'Rough-in', (source.roughInTasks || []).length, !sourceHasRough)}
          ${stageChip('fitOff',  'Fit-off',  (source.fitOffTasks  || []).length, !sourceHasFit)}
        </div>
      </div>

      <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline">
        <div class="field-lbl" style="margin:0">Apply to</div>
        <div style="font-size:11px;color:var(--muted)">
          <button class="btn btn-sm" data-atm-all="1" type="button">Select all</button>
          <button class="btn btn-sm" data-atm-clear="1" type="button">Clear</button>
        </div>
      </div>

      <div id="atm-tree">${groups.map(groupBlock).join('')}</div>

      <div id="atm-summary" style="font-size:12px;color:var(--ink-2);padding:10px 12px;background:var(--surface-2);border-radius:8px;margin-top:6px"></div>
    `,
    footer: `
      <button class="btn" onclick="SHELL.closePanel()">Cancel</button>
      <button class="btn" id="atm-back">← Back to checklist</button>
      <button class="btn btn-primary" id="atm-apply">Apply</button>
    `,
  });

  function repaintTree() {
    panel.querySelector('#atm-tree').innerHTML = groups.map(groupBlock).join('');
    wireTreeHandlers();
    repaintSummary();
  }
  function repaintSummary() {
    const targets = [];
    for (const g of groups) for (const a of g.areas) if (selected.has(a.id)) targets.push(a);
    let willNew = 0, willReplace = 0;
    for (const a of targets) {
      const replaceR = stages.has('roughIn') && a.hasRough;
      const replaceF = stages.has('fitOff')  && a.hasFit;
      if (replaceR || replaceF) willReplace++; else willNew++;
    }
    const stagesList = [...stages].map(s => s === 'roughIn' ? 'rough-in' : 'fit-off').join(' + ') || '(no stage selected)';
    const summary = panel.querySelector('#atm-summary');
    if (!targets.length) {
      summary.innerHTML = '<span style="color:var(--muted)">Select areas above to apply this checklist to them.</span>';
    } else {
      summary.innerHTML = `Will apply <b>${stagesList}</b> to <b>${targets.length}</b> ${targets.length === 1 ? 'area' : 'areas'}.`
        + (willReplace ? ` <span style="color:var(--warn)">⚠ ${willReplace} already have a custom checklist — you'll be asked to confirm replacement.</span>` : '');
    }
    panel.querySelector('#atm-apply').disabled = !targets.length || !stages.size;
  }
  function wireTreeHandlers() {
    panel.querySelectorAll('input[data-atm-area]').forEach(cb => cb.addEventListener('change', () => {
      if (cb.checked) selected.add(cb.dataset.atmArea); else selected.delete(cb.dataset.atmArea);
      repaintSummary();
      // Light visual update (background tint) without full re-render
      cb.closest('label').style.background = cb.checked ? 'var(--surface-2)' : '';
    }));
    panel.querySelectorAll('button[data-atm-group-all]').forEach(b => b.addEventListener('click', () => {
      const g = groups.find(x => x.id === b.dataset.atmGroupAll); if (!g) return;
      g.areas.forEach(a => selected.add(a.id));
      repaintTree();
    }));
    panel.querySelectorAll('button[data-atm-group-none]').forEach(b => b.addEventListener('click', () => {
      const g = groups.find(x => x.id === b.dataset.atmGroupNone); if (!g) return;
      g.areas.forEach(a => selected.delete(a.id));
      repaintTree();
    }));
  }
  panel.querySelectorAll('#atm-stages input[type="checkbox"]').forEach(cb => cb.addEventListener('change', () => {
    const id = cb.id.replace('atm-stage-', '');
    if (cb.checked) stages.add(id); else stages.delete(id);
    repaintTree();
  }));
  panel.querySelector('button[data-atm-all]').addEventListener('click', () => {
    for (const g of groups) for (const a of g.areas) selected.add(a.id);
    repaintTree();
  });
  panel.querySelector('button[data-atm-clear]').addEventListener('click', () => {
    selected.clear();
    repaintTree();
  });
  panel.querySelector('#atm-back').addEventListener('click', () => {
    SHELL.closePanel();
    openAreaChecklistPanel(sourceAreaId);
  });
  panel.querySelector('#atm-apply').addEventListener('click', async () => {
    const targetIds = [...selected];
    if (!targetIds.length || !stages.size) return;
    const targets = groups.flatMap(g => g.areas).filter(a => selected.has(a.id));
    const willReplace = targets.filter(a => (stages.has('roughIn') && a.hasRough) || (stages.has('fitOff') && a.hasFit));
    if (willReplace.length) {
      const ok = confirm(
        willReplace.length + ' ' + (willReplace.length === 1 ? 'area already has a custom checklist for this stage' : 'areas already have a custom checklist for this stage') + '. Replace?\n\n' +
        willReplace.slice(0, 8).map(a => '• ' + a.name).join('\n') +
        (willReplace.length > 8 ? '\n…and ' + (willReplace.length - 8) + ' more' : '')
      );
      if (!ok) return;
    }

    // Build a single areaGroups payload with the overrides applied to
    // every selected target. Each destination gets fresh task ids so
    // progress stays scoped to its own area (server preserves ids on
    // rename, but identical ids across areas would conflate progress
    // maps when reading data.dwellings[areaId].roughIn.tasks).
    const targetSet = new Set(targetIds);
    const stamp = Date.now().toString(36);
    let perAreaCounter = 0;
    const cloneList = (list, prefix) => list.map((t, i) => ({
      id: prefix + stamp + '_' + (perAreaCounter++) + '_' + i,
      name: t.name,
    }));
    const newGroups = (j.areaGroups || []).map(g => ({
      ...g,
      areas: (g.areas || []).map(a => {
        if (!targetSet.has(a.id)) return a;
        const next = { ...a };
        if (stages.has('roughIn') && sourceHasRough) {
          next.roughInTasks = cloneList(source.roughInTasks, 'rt_');
        }
        if (stages.has('fitOff') && sourceHasFit) {
          next.fitOffTasks = cloneList(source.fitOffTasks, 'ft_');
        }
        return next;
      }),
    }));

    try {
      panel.querySelector('#atm-apply').disabled = true;
      await SHELL.api('/api/jobs', { method: 'PUT', body: { id: STATE.jobId, areaGroups: newGroups } });
      SHELL.toast('Applied to ' + targetIds.length + ' ' + (targetIds.length === 1 ? 'area' : 'areas'), 'ok');
      await loadAll();
      SHELL.closePanel();
      paint();
    } catch (e) {
      SHELL.toast('Apply failed — ' + e.message, 'bad');
      panel.querySelector('#atm-apply').disabled = false;
    }
  });

  wireTreeHandlers();
  repaintSummary();
}

/* ── Snag mutations (same shape as /admin/snags) ─────────── */
async function readData() {
  const r = await fetch('/api/data?jobId=' + encodeURIComponent(STATE.jobId), { credentials: 'same-origin' });
  if (!r.ok) throw new Error('read failed');
  return await r.json();
}
async function writeData(d) {
  const r = await fetch('/api/data?jobId=' + encodeURIComponent(STATE.jobId), {
    method: 'POST', credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(d),
  });
  if (!r.ok) throw new Error('save failed');
}
async function assignSnag(snagId, newUserId, newUserText) {
  try {
    const d = await readData();
    const idx = (d.snags || []).findIndex(s => s.id === snagId);
    if (idx < 0) throw new Error('snag not found');
    const s = d.snags[idx];
    if ((s.assignedToUserId || null) === (newUserId || null)) return;
    s.assignedToUserId = newUserId || null;
    s.assignedToName = newUserId ? newUserText.trim() : null;
    s.updatedBy = SHELL.ME.username;
    s.updatedAt = new Date().toISOString();
    await writeData(d);
    if (newUserId && newUserId !== SHELL.ME.id) {
      fetch('/api/snag-notify', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: newUserId, snagId, jobId: STATE.jobId, kind: 'assigned' }),
      }).catch(() => {});
    }
    SHELL.toast(newUserId ? 'Assigned to ' + newUserText : 'Unassigned', 'ok');
    await loadAll();
    await SHELL.refreshCounts();
    paint();
  } catch (e) { SHELL.toast('Assign failed — ' + e.message, 'bad'); }
}
async function closeSnag(snagId) {
  if (!confirm('Mark this snag resolved?')) return;
  try {
    const d = await readData();
    const idx = (d.snags || []).findIndex(s => s.id === snagId);
    if (idx < 0) throw new Error('snag not found');
    d.snags[idx].status = 'Closed';
    d.snags[idx].closedAt = new Date().toISOString();
    d.snags[idx].closedBy = SHELL.ME.username;
    d.snags[idx].updatedBy = SHELL.ME.username;
    d.snags[idx].updatedAt = d.snags[idx].closedAt;
    await writeData(d);
    SHELL.toast('Resolved', 'ok');
    await loadAll();
    await SHELL.refreshCounts();
    paint();
  } catch (e) { SHELL.toast('Close failed — ' + e.message, 'bad'); }
}
async function reopenSnag(snagId) {
  if (!confirm('Reopen this snag?')) return;
  try {
    const d = await readData();
    const idx = (d.snags || []).findIndex(s => s.id === snagId);
    if (idx < 0) throw new Error('snag not found');
    d.snags[idx].status = 'Open';
    d.snags[idx].closedAt = null;
    d.snags[idx].updatedBy = SHELL.ME.username;
    d.snags[idx].updatedAt = new Date().toISOString();
    await writeData(d);
    SHELL.toast('Reopened', 'ok');
    await loadAll();
    await SHELL.refreshCounts();
    paint();
  } catch (e) { SHELL.toast('Reopen failed — ' + e.message, 'bad'); }
}

// ─────────────────────────────────────────────────────────────────────
// Phase 9 — Plans & AI-assisted material takeoff
//
// Three flows live in this section:
//   1. Upload PDF → render to PNGs client-side via PDF.js → register pages
//      against the plan record on the server.
//   2. Pick a page from a registered plan and run "Extract legend" — Stage 0
//      of the vision pipeline. The legend becomes the spine for everything
//      downstream.
//   3. For each remaining page, run "Analyse sheet" — Stages 1+2. AI
//      classifies the sheet (which dwelling? what type?) and counts each
//      legend symbol on it. Counts get written to ai-takeoff.json keyed by
//      detected dwelling.
//
// Per the brief: AI suggests, admin transcribes. The dwelling-review side-
// panel shows AI counts read-only on the right while the admin types the
// confirmed numbers into the materials fields on the left. There is
// deliberately no "accept all" button — the transcription step is the
// forcing function for review.
// ─────────────────────────────────────────────────────────────────────

const TAKEOFF_DPI = 180; // A1 plan @ 180 DPI ≈ 4200×6000 PNG, ~2 MB
const PDFJS_VER  = '4.0.379';
const PDFJS_BASE = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VER}/legacy/build`;

async function loadPdfJs() {
  if (STATE.pdfjsReady && window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = PDFJS_BASE + '/pdf.min.js';
    s.onload = res; s.onerror = () => rej(new Error('PDF.js failed to load'));
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_BASE + '/pdf.worker.min.js';
  STATE.pdfjsReady = true;
  return window.pdfjsLib;
}

function renderPlans(host) {
  const plans = STATE.plans || [];
  const takeoff = STATE.takeoff || { dwellings: {}, legendItems: [], spend: { totalUsd: 0 } };
  const legendCount = (takeoff.legendItems || []).length;
  const dwellingCount = Object.keys(takeoff.dwellings || {}).length;
  const pendingCount = Object.values(takeoff.dwellings || {}).filter(d => d.status === 'pending').length;
  const reviewedCount = Object.values(takeoff.dwellings || {}).filter(d => d.status === 'reviewed').length;
  const spend = (takeoff.spend && takeoff.spend.totalUsd) || 0;

  host.innerHTML = `
    <div class="kpi-row" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-l">Plans uploaded</div><div class="kpi-v">${plans.length}</div></div>
      <div class="kpi"><div class="kpi-l">Legend symbols</div><div class="kpi-v ${legendCount ? '' : 'amber'}">${legendCount || '—'}</div><div class="kpi-d">${legendCount ? 'extracted' : 'extract a legend to start'}</div></div>
      <div class="kpi"><div class="kpi-l">Dwellings detected</div><div class="kpi-v">${dwellingCount}</div><div class="kpi-d">${pendingCount} pending review · ${reviewedCount} reviewed</div></div>
      <div class="kpi"><div class="kpi-l">AI spend</div><div class="kpi-v">$${spend.toFixed(2)}</div><div class="kpi-d">vision calls this job</div></div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-hdr"><div><div class="card-title">Upload a plan PDF</div>
        <div class="card-sub">Pages are rendered to PNG in your browser at ${TAKEOFF_DPI} DPI, then sent for AI takeoff. PDF stays in Vercel Blob.</div></div></div>
      <input type="file" id="plan-file" accept="application/pdf" style="font-family:inherit">
      <div id="upload-status" style="margin-top:10px;font-size:13px;color:var(--muted)"></div>
    </div>

// ───────────── Upload + render flow ─────────────

async function handlePlanUpload(file) {
  const status = SHELL.$('#upload-status');
  if (file.size > 25 * 1024 * 1024) {
    status.textContent = 'File too large (25 MB limit).'; status.style.color = 'var(--bad)'; return;
  }
  status.textContent = 'Uploading PDF…'; status.style.color = 'var(--muted)';
  try {
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(file);
    });
    const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId), {
      method: 'POST',
      body: { fileName: file.name, mimeType: file.type, dataUrl, title: file.name.replace(/\.[^.]+$/, '') },
    });
    SHELL.$('#plan-file').value = '';
    status.textContent = 'Uploaded. Rendering pages…'; status.style.color = 'var(--muted)';
    await loadAll();
    paint();
    // Auto-render the new plan's pages immediately
    if (r.plan && r.plan.id) await renderAndRegisterPages(r.plan.id, file);
  } catch (e) {
    status.textContent = 'Upload failed: ' + e.message; status.style.color = 'var(--bad)';
  }
}

async function renderAndRegisterPages(planId, file) {
  const plan = STATE.plans.find(p => p.id === planId);
  if (!plan) return;
  const status = SHELL.$('#upload-status');
  if (status) { status.style.color = 'var(--muted)'; status.textContent = 'Loading PDF.js…'; }

  await loadPdfJs();
  // Source: prefer the file the admin just picked (already in memory).
  // Falls back to fetching the Blob URL for re-rendering of an existing plan.
  let arrayBuffer;
  if (file) arrayBuffer = await file.arrayBuffer();
  else {
    if (status) status.textContent = 'Fetching PDF from storage…';
    const r = await fetch(plan.url);
    arrayBuffer = await r.arrayBuffer();
  }
  if (status) status.textContent = 'Rendering pages at ' + TAKEOFF_DPI + ' DPI…';

  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    if (status) status.textContent = `Rendering page ${i}/${pdf.numPages}…`;
    const page = await pdf.getPage(i);
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = TAKEOFF_DPI / 72; // PDF.js default unit is 72 DPI
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const pngDataUrl = canvas.toDataURL('image/png');
    const sha256 = await sha256OfDataUrl(pngDataUrl);
    pages.push({ pageIndex: i - 1, pngDataUrl, sha256 });
    // Free the canvas memory before the next page
    canvas.width = 0; canvas.height = 0;
  }

  // POST one page per call — Vercel serverless body limit is 4.5 MB and a
  // single 180-DPI A1 PNG is ~2 MB base64. Sending 1-at-a-time also gives
  // a tight progress bar on big plans.
  for (let i = 0; i < pages.length; i++) {
    if (status) status.textContent = `Uploading rendered page ${i + 1}/${pages.length}…`;
    await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&id=' + encodeURIComponent(planId) + '&action=set-pages', {
      method: 'POST', body: { pages: [pages[i]] },
    });
  }
  if (status) { status.textContent = 'Pages rendered. Pick the legend page, then analyse the rest.'; status.style.color = 'var(--ok)'; }
  await loadAll(); paint();
}

async function sha256OfDataUrl(dataUrl) {
  const base64 = dataUrl.split(',')[1] || '';
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const buf = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function analyseSheet(planId, pageIndex) {

async function analyseAllSheets(planId) {
  const plan = STATE.plans.find(p => p.id === planId);
  if (!plan || !(plan.pages || []).length) { SHELL.toast('Render pages first', 'warn'); return; }
  if (!STATE.takeoff || !(STATE.takeoff.legendItems || []).length) {
    SHELL.toast('Extract a legend first', 'warn'); return;
  }
  if (!confirm('Analyse all ' + plan.pages.length + ' page' + (plan.pages.length === 1 ? '' : 's') + ' on this plan? Estimated cost ~$' + (plan.pages.length * 0.012).toFixed(2) + '.')) return;
  // Sequential — keeps under any client-side rate limit and lets us stop on cost-cap.
  for (const pg of plan.pages) {
    try {
      const r = await SHELL.api('/api/plans?jobId=' + encodeURIComponent(STATE.jobId) + '&action=analyse-sheet', {
        method: 'POST', body: { planId, pageIndex: pg.pageIndex },
      });
      // Live update — repaint after each
      await loadAll(); paint();
    } catch (e) {
      if (/cost cap/i.test(e.message)) { SHELL.toast('Cost cap reached — stopping', 'warn'); return; }
      SHELL.toast('Page ' + (pg.pageIndex + 1) + ' failed: ' + e.message, 'bad');
    }
  }
  SHELL.toast('All pages analysed', 'ok');
}
