<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · ITP / QA</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
// ITP / QA — Inspection &amp; Test Plans surfaced to the admin shell.
// Snags already have their own queue at /admin/snags; this surface
// covers the ITP checkpoints themselves: status, evidence, sign-off.
//
// Today's data lives in job records on the existing Birdwood checklist
// pipeline (see seed-birdwood-checklist.js + unify-birdwood-stages.js).
// The aggregated cross-job ITP view is the new bit and is pending.
window.PAGE = {
  id: 'itp',
  title: 'ITP / QA',
  crumb: 'ITP / QA',
  async render() {
    SHELL.$('#page').innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-h1">ITP / QA</div>
          <div class="page-sub">Inspection &amp; Test Plans across every active job. Evidence status, photo-linked checkpoints, independent reviewer sign-off.</div>
        </div>
        <div>
          <a class="btn" href="/admin/snags" style="border:1px solid var(--line);padding:8px 14px;border-radius:8px;color:var(--ink);text-decoration:none;font-size:13px">Snag triage →</a>
        </div>
      </div>

      <div class="empty" style="text-align:left;padding:28px 32px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
          <span style="font-family:var(--mono,monospace);font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--accent-ink);background:var(--accent);padding:4px 10px;border-radius:2px">Feature under construction</span>
          <span style="color:var(--muted);font-size:13px">Per-job ITP data already lives on each job — the cross-job aggregator is being built.</span>
        </div>
        <div class="empty-title" style="font-size:18px;text-align:left">When live, this view will show:</div>
        <ul style="margin:14px 0 0 18px;color:var(--ink-2);line-height:1.85;font-size:14px">
          <li>Every active ITP checkpoint, grouped by job / stage</li>
          <li>Evidence status (photos required vs received) per checkpoint</li>
          <li>Photos linked directly to their checkpoint</li>
          <li>Reviewer sign-off — including the independent-review rule where the rule applies</li>
          <li>Blocked states where evidence is missing (so handover packs don't stall silently)</li>
        </ul>
        <div style="margin-top:20px;color:var(--muted);font-size:13px">
          Today: open <a href="/admin/jobs" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px">any job</a> to see its own ITP / checklist state; <a href="/admin/snags" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px">Snag triage</a> covers defects.
        </div>
      </div>
    `;
  }
};

SHELL.boot();
</script>
</body>
</html>
