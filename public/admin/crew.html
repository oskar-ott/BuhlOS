<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl admin · crew</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1f35">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
</head>
<body>
<script>
let STATE = {
  filterRole: 'all',
  search: '',
  users: [],
};

window.PAGE = {
  id: 'crew',
  title: 'Crew & people',
  crumb: 'Crew',
  async render() {
    STATE.users = (SHELL.USERS || []).slice();
    paint();
    // If we arrived from /admin/support with a "Create user" intent,
    // pop the new-user panel pre-filled with the request's name + role
    // + email + the sourceRequestId so we can mark the request resolved
    // once the user lands.
    const params = new URLSearchParams(location.search);
    if (params.get('newFromRequest')) {
      try {
        const raw = sessionStorage.getItem('buhlos.newUserPrefill');
        if (raw) {
          const prefill = JSON.parse(raw);
          // One-shot — clear so a refresh doesn't re-pop the panel.
          sessionStorage.removeItem('buhlos.newUserPrefill');
          // Clean the URL so a refresh doesn't reapply the hint.
          const u = new URL(location.href); u.searchParams.delete('newFromRequest');
          history.replaceState(null, '', u);
          if (prefill && prefill.username) addUserPanel(prefill);
        }
      } catch (e) {}
    }
  }
};

function paint() {
  const counts = {
    all: STATE.users.length,
    admin: STATE.users.filter(u => u.role === 'admin').length,
    leadingHand: STATE.users.filter(u => u.role === 'leadingHand').length,
    tradie: STATE.users.filter(u => u.role === 'tradie').length,
    client: STATE.users.filter(u => u.role === 'client').length,
  };
  const q = STATE.search.toLowerCase();
  const matches = (u) => {
    if (!q) return true;
    const blob = `${u.username} ${u.email || ''} ${u.role}`.toLowerCase();
    return blob.includes(q);
  };

  // Per the admin redesign brief: "Users should be organised by role and
  // responsibility, not just listed." When the user picks "All", we
  // render a grouped view (Admins → LHs → Tradies → Clients). When they
  // pick a single role, we render a flat list with the table headers.
  const sorted = (xs) => xs.slice().sort((a, b) => a.username.localeCompare(b.username));
  const grouped = STATE.filterRole === 'all';
  const list = grouped
    ? null
    : sorted(STATE.users.filter(u => u.role === STATE.filterRole && matches(u)));

  const groups = grouped ? [
    { key: 'admin',       label: 'Admins',         desc: 'Full access — can edit jobs, users, hours, settings.', users: sorted(STATE.users.filter(u => u.role === 'admin' && matches(u))) },
    { key: 'leadingHand', label: 'Leading hands',  desc: 'Scoped to assigned jobs — can approve hours, raise snags.', users: sorted(STATE.users.filter(u => u.role === 'leadingHand' && matches(u))) },
    { key: 'tradie',      label: 'Tradies',        desc: 'Assigned-job access — log hours, update tasks, raise snags.', users: sorted(STATE.users.filter(u => u.role === 'tradie' && matches(u))) },
    { key: 'client',      label: 'Clients',        desc: 'Read-only progress portal for one job.', users: sorted(STATE.users.filter(u => u.role === 'client' && matches(u))) },
  ] : null;

  SHELL.$('#page').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-h1">People</div>
        <div class="page-sub">${counts.tradie + counts.leadingHand} crew · ${counts.admin} admin${counts.admin === 1 ? '' : 's'} · ${counts.client} client${counts.client === 1 ? '' : 's'}. Rates + Xero IDs are admin-only and never exposed to tradies/clients.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-accent" id="add-user">${SHELL.ICONS.plus} Add person</button>
      </div>
    </div>

    <div class="tabs">
      ${[
        { v: 'all', l: 'All' },
        { v: 'tradie', l: 'Tradies' },
        { v: 'leadingHand', l: 'Leading hands' },
        { v: 'admin', l: 'Admins' },
        { v: 'client', l: 'Clients' },
      ].map(s => `<a class="tab ${STATE.filterRole === s.v ? 'active' : ''}" href="#" data-role="${s.v}">${s.l}<span class="badge">${counts[s.v] || 0}</span></a>`).join('')}
    </div>

    <div class="toolbar">
      <div class="search">${SHELL.ICONS.search}<input id="se-i" placeholder="Search by name, email…" value="${SHELL.escapeHtml(STATE.search)}"></div>
      <div class="toolbar-spacer"></div>
      <span style="color:var(--muted);font-size:12px">${grouped ? 'grouped by role' : SHELL.pluralize(list.length, 'person', 'people')}</span>
    </div>

    ${grouped ? groups.map(groupBlock).join('') : `
      <div class="table-wrap">
        <table class="table">
          <thead><tr>
            <th>Name</th><th>Role</th><th>Email</th><th>Assigned jobs</th><th class="table-num">Rate</th><th></th>
          </tr></thead>
          <tbody>${list.length ? list.map(userRow).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">No people match those filters.</td></tr>'}</tbody>
        </table>
      </div>
    `}
  `;
  SHELL.$$('a[data-role]').forEach(t => t.addEventListener('click', e => { e.preventDefault(); STATE.filterRole = t.dataset.role; paint(); }));
  SHELL.$('#se-i').addEventListener('input', e => { STATE.search = e.target.value; paint(); });
  SHELL.$('#add-user').addEventListener('click', addUserPanel);
  SHELL.$$('button[data-edit-user]').forEach(b => b.addEventListener('click', () => editUserPanel(b.dataset.editUser)));
}

// Render one role-section (admin / LH / tradie / client) with its members
// laid out as compact cards. Each card surfaces: name, role pill, assigned
// jobs (clickable chips), rate (admin-only data, fine because this whole
// page is admin-gated), and Edit button. Empty groups still render so the
// admin sees the empty state and knows the role exists.
function groupBlock(g) {
  return `<div class="card" style="padding:0;margin-bottom:16px">
    <div style="padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px">
      <div class="card-title">${SHELL.escapeHtml(g.label)}</div>
      <span style="font-size:11px;color:var(--muted)">${g.users.length} · ${SHELL.escapeHtml(g.desc)}</span>
    </div>
    ${g.users.length
      ? g.users.map(u => userCard(u, g.key)).join('')
      : `<div style="padding:18px;color:var(--muted);font-size:12px;text-align:center">No ${g.label.toLowerCase()} yet.</div>`}
  </div>`;
}

function userCard(u, roleKey) {
  const jobs = SHELL.JOBS || [];
  const jobById = {}; jobs.forEach(j => { jobById[j.id] = j; });
  const assigned = (u.assignedJobIds || []).map(id => jobById[id]).filter(Boolean);
  const isPaid = (u.role === 'tradie' || u.role === 'leadingHand');
  const showRate = isPaid;
  return `<div style="display:flex;align-items:flex-start;gap:14px;padding:12px 16px;border-bottom:1px solid var(--line)">
    <div class="avatar ${u.role}" style="flex-shrink:0">${SHELL.initials(u.username)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <b style="font-size:14px">${SHELL.escapeHtml(u.username)}</b>
        ${u.email ? `<a href="mailto:${SHELL.escapeHtml(u.email)}" style="font-size:11px;color:var(--muted)">${SHELL.escapeHtml(u.email)}</a>` : ''}
        ${showRate && u.xeroEmployeeId ? `<span style="font-size:10px;color:var(--muted);font-family:var(--ff-mono)">Xero: ${SHELL.escapeHtml(u.xeroEmployeeId)}</span>` : ''}
      </div>
      ${assigned.length
        ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">
            ${assigned.slice(0, 6).map(j => `<a href="/admin/jobs/${SHELL.escapeHtml(j.id)}" style="font-size:11px;background:var(--surface-2);border:1px solid var(--line);padding:2px 8px;border-radius:999px;color:var(--ink-2);text-decoration:none">${SHELL.escapeHtml(j.name)}</a>`).join('')}
            ${assigned.length > 6 ? `<span style="font-size:11px;color:var(--muted);align-self:center">+${assigned.length - 6} more</span>` : ''}
          </div>`
        : roleKey === 'admin'
          ? '<div style="font-size:11px;color:var(--muted);margin-top:6px">No job restriction — sees everything.</div>'
          : `<div style="font-size:11px;color:var(--warn);margin-top:6px">Not assigned to any job — won't see jobs in field app.</div>`}
    </div>
    ${showRate ? `<div class="tabular" style="font-size:13px;font-weight:600;text-align:right;flex-shrink:0;min-width:70px">${u.hourlyRate ? '$' + u.hourlyRate + '/h' : '<span style="color:var(--warn)">no rate</span>'}</div>` : ''}
    <button class="btn btn-sm" data-edit-user="${SHELL.escapeHtml(u.id)}" style="flex-shrink:0">Edit</button>
  </div>`;
}

function userRow(u) {
  const isPaid = (u.role === 'tradie' || u.role === 'leadingHand');
  const jobs = SHELL.JOBS || [];
  const jobById = {}; jobs.forEach(j => { jobById[j.id] = j; });
  const assigned = (u.assignedJobIds || []).map(id => jobById[id]).filter(Boolean);
  const jobChips = assigned.length
    ? assigned.slice(0, 3).map(j => `<a href="/admin/jobs/${SHELL.escapeHtml(j.id)}" style="font-size:11px;background:var(--surface-2);border:1px solid var(--line);padding:2px 8px;border-radius:999px;color:var(--ink-2);text-decoration:none;margin-right:4px">${SHELL.escapeHtml(j.name)}</a>`).join('') + (assigned.length > 3 ? `<span style="font-size:11px;color:var(--muted)">+${assigned.length - 3}</span>` : '')
    : '<span style="color:var(--muted);font-size:11px">—</span>';
  return `<tr>
    <td><b>${SHELL.escapeHtml(u.username)}</b>${isPaid && u.xeroEmployeeId ? `<div style="font-size:11px;color:var(--muted);font-family:var(--ff-mono)">Xero: ${SHELL.escapeHtml(u.xeroEmployeeId)}</div>` : ''}</td>
    <td>${SHELL.rolePill(u.role)}</td>
    <td>${u.email ? `<a href="mailto:${SHELL.escapeHtml(u.email)}">${SHELL.escapeHtml(u.email)}</a>` : '<span style="color:var(--muted)">—</span>'}</td>
    <td>${jobChips}</td>
    <td class="table-num">${isPaid ? (u.hourlyRate ? '$' + u.hourlyRate + '/h' : '<span style="color:var(--warn)">—</span>') : '—'}</td>
    <td><button class="btn btn-sm" data-edit-user="${SHELL.escapeHtml(u.id)}">Edit</button></td>
  </tr>`;
}

function addUserPanel(prefill) {
  // `prefill` is passed when the admin arrived here from /admin/support
  // ("Create user…" on an open access request). The panel opens with the
  // suggested username + role + email, and on successful create we mark
  // the originating access request resolved so it drops out of the
  // open-queue badge automatically.
  prefill = prefill || {};
  const panel = SHELL.openPanel({
    title: prefill.sourceRequestId ? 'Add person · from access request' : 'Add person',
    body: `
      ${prefill.sourceRequestId ? `<div style="margin-bottom:12px;padding:10px 12px;background:var(--surface-2);border-radius:8px;font-size:12px;color:var(--ink-2)">Pre-filled from access request <code>${SHELL.escapeHtml(prefill.sourceRequestId)}</code>. Creating the user will mark the request resolved.</div>` : ''}
      <div class="field"><label class="field-lbl">Username *</label><input class="input" id="nu-name" autofocus value="${SHELL.escapeHtml(prefill.username || '')}"></div>
      <div class="field"><label class="field-lbl">Role *</label>
        <select class="select" id="nu-role">
          <option value="tradie"${prefill.role === 'tradie' ? ' selected' : ''}>Tradie</option>
          <option value="leadingHand"${prefill.role === 'leadingHand' ? ' selected' : ''}>Leading hand</option>
          <option value="admin"${prefill.role === 'admin' ? ' selected' : ''}>Admin</option>
          <option value="client"${prefill.role === 'client' ? ' selected' : ''}>Client</option>
        </select></div>
      <div class="field"><label class="field-lbl">Secret (PIN for tradie/LH, password for admin) *</label><input class="input" id="nu-secret" type="text"></div>
      <div class="field"><label class="field-lbl">Email (optional)</label><input class="input" id="nu-email" type="email" value="${SHELL.escapeHtml(prefill.email || '')}"></div>
      <div class="field" id="nu-rate-wrap"${(prefill.role && prefill.role !== 'tradie' && prefill.role !== 'leadingHand') ? ' style="display:none"' : ''}><label class="field-lbl">Hourly rate ($) — tradies / LHs only</label><input class="input" id="nu-rate" type="number" min="0" step="0.5" value="0"></div>
    `,
    footer: `<button class="btn" onclick="SHELL.closePanel()">Cancel</button><button class="btn btn-primary" id="nu-save">Create</button>`,
  });
  panel.querySelector('#nu-role').addEventListener('change', e => {
    panel.querySelector('#nu-rate-wrap').style.display = (e.target.value === 'tradie' || e.target.value === 'leadingHand') ? '' : 'none';
  });
  panel.querySelector('#nu-save').addEventListener('click', async () => {
    const role = panel.querySelector('#nu-role').value;
    const body = {
      username: panel.querySelector('#nu-name').value.trim(),
      role,
      secret: panel.querySelector('#nu-secret').value,
      email: panel.querySelector('#nu-email').value.trim(),
      hourlyRate: (role === 'tradie' || role === 'leadingHand') ? Number(panel.querySelector('#nu-rate').value) || 0 : undefined,
    };
    if (!body.username || !body.secret) { SHELL.toast('Username + secret required', 'bad'); return; }
    try {
      await SHELL.api('/api/users', { method: 'POST', body });
      // Mark the originating access request resolved (best-effort —
      // user is already created, this is bookkeeping).
      if (prefill.sourceRequestId) {
        try {
          await SHELL.api('/api/access-requests?id=' + encodeURIComponent(prefill.sourceRequestId), {
            method: 'PUT',
            body: { status: 'resolved', adminNotes: 'User created in /admin/crew on ' + new Date().toISOString().slice(0, 10) },
          });
        } catch (e) { /* leave the request open for manual resolution */ }
      }
      SHELL.toast('Created', 'ok');
      SHELL.closePanel();
      try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
      paint();
    } catch (e) { SHELL.toast('Create failed — ' + e.message, 'bad'); }
  });
}

function editUserPanel(id) {
  const u = STATE.users.find(x => x.id === id);
  if (!u) return;
  const jobs = SHELL.JOBS || [];
  const showRate = (u.role === 'tradie' || u.role === 'leadingHand');
  const showJobs = (u.role === 'tradie' || u.role === 'leadingHand' || u.role === 'client');
  const panel = SHELL.openPanel({
    title: 'Edit ' + u.username,
    body: `
      <div class="field"><label class="field-lbl">Username</label><input class="input" id="eu-name" value="${SHELL.escapeHtml(u.username)}"></div>
      <div class="field"><label class="field-lbl">Email</label><input class="input" id="eu-email" type="email" value="${SHELL.escapeHtml(u.email || '')}"></div>
      ${showRate ? `<div class="two-col">
        <div class="field"><label class="field-lbl">Hourly rate ($)</label><input class="input" id="eu-rate" type="number" min="0" step="0.5" value="${u.hourlyRate || 0}"></div>
        <div class="field"><label class="field-lbl">Xero employee ID <span style="color:var(--muted);font-weight:400;font-size:11px">(optional — for payroll CSV)</span></label><input class="input" id="eu-xero" value="${SHELL.escapeHtml(u.xeroEmployeeId || '')}" placeholder="e.g. EMP-042 or UUID"></div>
      </div>` : ''}
      ${showJobs ? `<div class="field"><label class="field-lbl">Assigned jobs</label>
        <div style="border:1px solid var(--line);border-radius:8px;padding:8px;max-height:240px;overflow:auto;background:var(--surface)">
          ${jobs.filter(j => (j.status || 'active') !== 'archived').map(j => `<label style="display:flex;gap:8px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:13px">
            <input type="checkbox" data-job="${SHELL.escapeHtml(j.id)}"${(u.assignedJobIds || []).includes(j.id) ? ' checked' : ''}>
            <span>${SHELL.escapeHtml(j.name)} <span style="color:var(--muted);font-size:11px">${SHELL.escapeHtml(j.id)}</span></span>
          </label>`).join('')}
        </div></div>` : ''}
      <div class="field"><label class="field-lbl">New secret (leave blank to keep)</label><input class="input" id="eu-secret" type="text" placeholder="•••••"></div>
    `,
    footer: `<button class="btn" onclick="SHELL.closePanel()">Cancel</button>
             ${u.role !== 'admin' ? '<button class="btn btn-danger" id="eu-delete">Remove</button>' : ''}
             <button class="btn btn-primary" id="eu-save">Save</button>`,
  });
  panel.querySelector('#eu-save').addEventListener('click', async () => {
    const body = { id: u.id, username: panel.querySelector('#eu-name').value.trim(), email: panel.querySelector('#eu-email').value.trim() };
    if (showJobs) body.assignedJobIds = Array.from(panel.querySelectorAll('input[data-job]:checked')).map(c => c.dataset.job);
    if (showRate) {
      body.hourlyRate = Number(panel.querySelector('#eu-rate').value) || 0;
      body.xeroEmployeeId = panel.querySelector('#eu-xero').value.trim();
    }
    const secret = panel.querySelector('#eu-secret').value;
    if (secret) body.secret = secret;
    try {
      await SHELL.api('/api/users', { method: 'PUT', body });
      SHELL.toast('Saved', 'ok');
      SHELL.closePanel();
      try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
      paint();
    } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
  });
  if (u.role !== 'admin') {
    panel.querySelector('#eu-delete').addEventListener('click', async () => {
      if (!confirm('Remove ' + u.username + '? This cannot be undone.')) return;
      try {
        await fetch('/api/users?id=' + encodeURIComponent(u.id), { method: 'DELETE', credentials: 'same-origin' })
          .then(r => { if (!r.ok) throw new Error('Failed'); });
        SHELL.toast('Removed', 'ok');
        SHELL.closePanel();
        try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
        paint();
      } catch (e) { SHELL.toast('Remove failed — ' + e.message, 'bad'); }
    });
  }
}

SHELL.boot();
</script>
</body>
</html>
