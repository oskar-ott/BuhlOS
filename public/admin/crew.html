<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bühl · people</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1b34">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/_shell.css">
<script src="/admin/_shell.js"></script>
<script type="module" src="/components/list-row.js"></script>
<script type="module" src="/components/role-pill.js"></script>

<!--
  /admin/crew · Users & access (phase 06 of the rebuild)
  ──────────────────────────────────────────────────────

  Per brief §08: "People, rates, and what they can touch."

  Same <list-row> component as Jobs (one list shape for the whole
  console). Role chip uses <role-pill> from phase 01. Soft warnings
  are YELLOW chips, not red banners — "no rate", "not assigned",
  "stale" — per the brief's "soft warnings (yellow, not red)" rule.

  Tabs: All · Admin · Office · Tradie · LH · Client.
  (Office is a new role from §05 — we accept it in the schema today;
  the user just needs to be invited with that role.)

  Phone-number invite path (§08 "One field: phone number") needs an
  SMS provider — kept as a follow-up. Existing username/secret/role
  panel still works.
-->

<style>
  .ppl-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 18px; gap: 14px; flex-wrap: wrap;
  }
  .ppl-head h1 {
    font-family: var(--ff-display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -.012em;
    color: var(--ink);
    margin: 0;
  }
  .ppl-head .sub { color: var(--muted); font-size: 13px; margin-top: 4px; max-width: 60ch; }

  .ppl-tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
    overflow-x: auto;
  }
  .ppl-tab {
    padding: 9px 14px;
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
  }
  .ppl-tab:hover { color: var(--ink-2); }
  .ppl-tab.on { color: var(--ink); border-bottom-color: var(--accent); }
  .ppl-tab .ct {
    background: var(--surface-2);
    color: var(--muted);
    font-family: var(--ff-mono);
    font-size: 10.5px;
    padding: 1px 7px;
    border-radius: 999px;
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }
  .ppl-tab.on .ct { background: var(--ink); color: var(--surface); }

  .ppl-tools {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .ppl-tools .search {
    flex: 1; min-width: 220px; max-width: 420px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 10px;
  }
  .ppl-tools .search input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-size: 13px; color: var(--ink);
  }
  .ppl-tools .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 10px;
    font-family: var(--ff-mono);
    font-size: 11.5px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .ppl-tools .filter-chip:hover { color: var(--ink-2); }
  .ppl-tools .filter-chip.on {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: transparent;
    font-weight: 700;
  }
  .ppl-tools .spacer { flex: 1; }
  .ppl-tools .count {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .ppl-list {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
  }
  .ppl-empty {
    padding: 50px 22px;
    text-align: center;
    color: var(--muted);
  }
  .ppl-empty b { color: var(--ink); font-family: var(--ff-display); font-weight: 700; font-size: 16px; }

  /* Yellow soft-warning chip — never red. Brief §08: "Soft warnings". */
  .warn-chip {
    background: var(--accent);
    color: var(--accent-ink);
    font-family: var(--ff-mono);
    font-size: 10.5px;
    font-weight: 700;
    padding: 1px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
  .meta-chip {
    background: var(--surface-2);
    color: var(--ink-2);
    font-family: var(--ff-mono);
    font-size: 10.5px;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 999px;
    margin-right: 6px;
  }

  list-row .lr-action .btn-sm {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: 12px;
  }
</style>
</head>
<body>

<script>
'use strict';

let STATE = {
  filterRole: 'all',
  filterFlag: '',   // '' | 'no-rate' | 'unassigned' | 'stale'
  search: '',
  users: [],
};

window.PAGE = {
  id: 'crew',
  title: 'People',
  crumb: 'People',
  async render() {
    STATE.users = (SHELL.USERS || []).slice();
    const params = new URLSearchParams(location.search);
    if (params.get('filter') === 'no-rate')     STATE.filterFlag = 'no-rate';
    if (params.get('filter') === 'unassigned')  STATE.filterFlag = 'unassigned';
    if (params.get('filter') === 'stale')       STATE.filterFlag = 'stale';
    if (params.get('new') === '1' || params.get('newFromRequest')) {
      paint();
      // Pre-fill from /admin/support if applicable.
      if (params.get('newFromRequest')) {
        try {
          const raw = sessionStorage.getItem('buhlos.newUserPrefill');
          if (raw) {
            const prefill = JSON.parse(raw);
            sessionStorage.removeItem('buhlos.newUserPrefill');
            const u = new URL(location.href); u.searchParams.delete('newFromRequest');
            history.replaceState(null, '', u);
            if (prefill && prefill.username) addUserPanel(prefill);
            return;
          }
        } catch {}
      }
      addUserPanel();
    } else {
      paint();
    }
    registerPeopleCommands();
  }
};

/* ── Render ──────────────────────────────────────────────────── */

function paint() {
  const counts = {
    all:         STATE.users.length,
    admin:       STATE.users.filter(u => u.role === 'admin').length,
    office:      STATE.users.filter(u => u.role === 'office').length,
    leadingHand: STATE.users.filter(u => u.role === 'leadingHand').length,
    tradie:      STATE.users.filter(u => u.role === 'tradie').length,
    client:      STATE.users.filter(u => u.role === 'client').length,
  };
  const flagged = {
    'no-rate':    STATE.users.filter(u => isPaidRole(u.role) && !Number(u.hourlyRate)).length,
    'unassigned': STATE.users.filter(u => (u.role === 'tradie' || u.role === 'leadingHand') && !hasAssignedActiveJob(u)).length,
    'stale':      STATE.users.filter(u => isStale(u)).length,
  };

  const list = peopleForView();

  SHELL.$('#page').innerHTML = `
    <div class="ppl-head">
      <div>
        <h1>People</h1>
        <div class="sub">${counts.tradie + counts.leadingHand} crew · ${counts.admin} admin${counts.admin === 1 ? '' : 's'} · ${counts.client} client${counts.client === 1 ? '' : 's'}. Rates and Xero IDs are admin-only and never visible to tradies or clients.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" id="archived-users" title="Archived users (last 30 days, restorable)">Archived ▾</button>
        <button class="btn btn-primary" id="add-user">+ Add person</button>
      </div>
    </div>

    <div class="ppl-tabs">
      ${[
        { v: 'all',         l: 'All' },
        { v: 'tradie',      l: 'Tradies' },
        { v: 'leadingHand', l: 'Leading hands' },
        { v: 'admin',       l: 'Admins' },
        { v: 'office',      l: 'Office' },
        { v: 'client',      l: 'Clients' },
      ].map(s => `<a class="ppl-tab ${STATE.filterRole === s.v ? 'on' : ''}" href="#" data-role="${s.v}">${s.l}<span class="ct">${counts[s.v] || 0}</span></a>`).join('')}
    </div>

    <div class="ppl-tools">
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
        <input id="se-i" placeholder="Search by name, email…" value="${SHELL.escapeHtml(STATE.search)}">
      </div>
      <label class="filter-chip ${STATE.filterFlag === 'no-rate' ? 'on' : ''}" data-flag="no-rate">No rate · ${flagged['no-rate']}</label>
      <label class="filter-chip ${STATE.filterFlag === 'unassigned' ? 'on' : ''}" data-flag="unassigned">Unassigned · ${flagged.unassigned}</label>
      <label class="filter-chip ${STATE.filterFlag === 'stale' ? 'on' : ''}" data-flag="stale">Stale &gt;14d · ${flagged.stale}</label>
      <div class="spacer"></div>
      <span class="count">${SHELL.pluralize(list.length, 'person', 'people')}</span>
    </div>

    <div class="ppl-list" id="ppl-list"></div>
  `;

  paintList(list);

  SHELL.$$('a[data-role]').forEach(t => t.addEventListener('click', e => {
    e.preventDefault();
    STATE.filterRole = t.dataset.role;
    paint();
  }));
  SHELL.$$('.filter-chip[data-flag]').forEach(c => c.addEventListener('click', () => {
    STATE.filterFlag = (STATE.filterFlag === c.dataset.flag) ? '' : c.dataset.flag;
    paint();
  }));
  SHELL.$('#se-i').addEventListener('input', e => { STATE.search = e.target.value; paint(); });
  SHELL.$('#add-user').addEventListener('click', () => addUserPanel());
  SHELL.$('#archived-users').addEventListener('click', () => openArchivedUsersPanel());
}

function peopleForView() {
  const q = STATE.search.toLowerCase().trim();
  return STATE.users.filter(u => {
    if (STATE.filterRole !== 'all' && u.role !== STATE.filterRole) return false;
    if (STATE.filterFlag === 'no-rate'    && !(isPaidRole(u.role) && !Number(u.hourlyRate))) return false;
    if (STATE.filterFlag === 'unassigned' && !((u.role === 'tradie' || u.role === 'leadingHand') && !hasAssignedActiveJob(u))) return false;
    if (STATE.filterFlag === 'stale'      && !isStale(u)) return false;
    if (q) {
      const blob = `${u.username || ''} ${u.email || ''} ${u.role || ''}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => (a.username || '').localeCompare(b.username || ''));
}

function paintList(list) {
  const wrap = document.getElementById('ppl-list');
  if (!list.length) {
    wrap.innerHTML = `
      <div class="ppl-empty">
        <b>No people match those filters.</b><br>
        <span style="font-size:13px">Try a different tab or clear the search.</span>
      </div>
    `;
    return;
  }
  wrap.innerHTML = '';

  // Head row.
  const head = document.createElement('list-row');
  head.setAttribute('head', '');
  head.setAttribute('name', 'Name');
  const headMetric = document.createElement('div');
  headMetric.setAttribute('slot', 'metric');
  headMetric.textContent = 'Jobs · rate';
  head.appendChild(headMetric);
  const headAction = document.createElement('div');
  headAction.setAttribute('slot', 'action');
  headAction.textContent = 'Edit';
  head.appendChild(headAction);
  wrap.appendChild(head);

  const jobs = SHELL.JOBS || [];
  const jobById = {}; jobs.forEach(j => { jobById[j.id] = j; });

  for (const u of list) {
    const isPaid = isPaidRole(u.role);
    const assigned = (u.assignedJobIds || []).map(id => jobById[id]).filter(Boolean);
    const activeAssigned = assigned.filter(j => (j.status || 'active') === 'active');
    const warnings = [];
    if (isPaid && !Number(u.hourlyRate))                                    warnings.push('no rate');
    if ((u.role === 'tradie' || u.role === 'leadingHand') && !activeAssigned.length) warnings.push('not assigned');
    if (isStale(u))                                                         warnings.push('stale');

    const row = document.createElement('list-row');
    row.setAttribute('status', warnings.length ? 'yellow' : 'none');
    row.setAttribute('name', u.username || u.id);
    if (u.email) row.setAttribute('sub', u.email);

    // identity-extra slot: role pill + warning chips inline with the name.
    const identityExtra = document.createElement('div');
    identityExtra.setAttribute('slot', 'identity-extra');
    identityExtra.style.cssText = 'display:flex;align-items:center;gap:6px;margin-left:8px';
    const pill = document.createElement('role-pill');
    pill.setAttribute('role', u.role || '');
    pill.setAttribute('size', 'sm');
    identityExtra.appendChild(pill);
    for (const w of warnings) {
      const chip = document.createElement('span');
      chip.className = 'warn-chip';
      chip.textContent = w;
      identityExtra.appendChild(chip);
    }
    row.appendChild(identityExtra);

    // metric: jobs + rate (admin-visible only — page is admin-gated anyway).
    const metric = document.createElement('div');
    metric.setAttribute('slot', 'metric');
    const jobsText = activeAssigned.length
      ? activeAssigned.slice(0, 3).map(j => `<span class="meta-chip">${SHELL.escapeHtml(j.name)}</span>`).join('') +
        (activeAssigned.length > 3 ? `<span style="color:var(--muted);font-size:11px">+${activeAssigned.length - 3}</span>` : '')
      : (u.role === 'admin' ? '<span style="color:var(--muted);font-size:11px">sees all</span>' : '');
    const rateText = isPaid
      ? (u.hourlyRate
          ? `<b>$${Number(u.hourlyRate).toFixed(2)}/h</b>`
          : '<span style="color:var(--muted)">—</span>')
      : '';
    metric.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">${jobsText}</span>${rateText ? '<span style="margin-left:14px">' + rateText + '</span>' : ''}`;
    row.appendChild(metric);

    // action.
    const action = document.createElement('div');
    action.setAttribute('slot', 'action');
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-sm';
    editBtn.textContent = 'Edit';
    editBtn.addEventListener('click', () => editUserPanel(u.id));
    action.appendChild(editBtn);
    row.appendChild(action);

    wrap.appendChild(row);
  }
}

/* ── Soft-warning helpers ─────────────────────────────────── */

function isPaidRole(role) { return role === 'tradie' || role === 'leadingHand'; }

function hasAssignedActiveJob(u) {
  const assigned = u.assignedJobIds || [];
  if (!assigned.length) return false;
  const jobs = SHELL.JOBS || [];
  const activeIds = new Set(jobs.filter(j => (j.status || 'active') === 'active').map(j => j.id));
  return assigned.some(id => activeIds.has(id));
}

function isStale(u) {
  // Last seen tracking isn't implemented yet; treat archived/disabled as not stale.
  if (u.archived) return false;
  const t = u.lastSeenAt || u.lastLoginAt;
  if (!t) return false;
  const days = (Date.now() - new Date(t).getTime()) / 86400000;
  return days > 14;
}

/* ── Add user panel (kept as username/secret form) ────────────
   Brief §08 wants phone-number magic-link invites; needs an SMS
   provider integration. Lands as a follow-up. The schema accepts
   role='office' so users can be invited with that role today. */

function addUserPanel(prefill) {
  prefill = prefill || {};
  const panel = SHELL.openPanel({
    title: prefill.sourceRequestId ? 'Add person · from access request' : 'Add person',
    body: `
      ${prefill.sourceRequestId ? `<div style="margin-bottom:12px;padding:10px 12px;background:var(--surface-2);border-radius:8px;font-size:12px;color:var(--ink-2)">Pre-filled from access request <code>${SHELL.escapeHtml(prefill.sourceRequestId)}</code>. Creating the user will mark the request resolved.</div>` : ''}
      <div class="field"><label class="field-lbl">Username *</label><input class="input" id="nu-name" autofocus value="${SHELL.escapeHtml(prefill.username || '')}"></div>
      <div class="field"><label class="field-lbl">Role *</label>
        <select class="select" id="nu-role">
          <option value="tradie"${prefill.role === 'tradie' ? ' selected' : ''}>Tradie</option>
          <option value="leadingHand"${prefill.role === 'leadingHand' ? ' selected' : ''}>Leading hand</option>
          <option value="office"${prefill.role === 'office' ? ' selected' : ''}>Office</option>
          <option value="admin"${prefill.role === 'admin' ? ' selected' : ''}>Admin</option>
          <option value="client"${prefill.role === 'client' ? ' selected' : ''}>Client</option>
        </select></div>
      <div class="field"><label class="field-lbl">Secret (PIN for tradie/LH, password for admin) *</label><input class="input" id="nu-secret" type="text"></div>
      <div class="field"><label class="field-lbl">Email (optional)</label><input class="input" id="nu-email" type="email" value="${SHELL.escapeHtml(prefill.email || '')}"></div>
      <div class="field" id="nu-rate-wrap"${(prefill.role && prefill.role !== 'tradie' && prefill.role !== 'leadingHand') ? ' style="display:none"' : ''}><label class="field-lbl">Hourly rate ($) — tradies / LHs only</label><input class="input" id="nu-rate" type="number" min="0" step="0.5" value="0"></div>
    `,
    footer: `<button class="btn" onclick="SHELL.closePanel()">Cancel</button><button class="btn btn-primary" id="nu-save">Create</button>`,
  });
  panel.querySelector('#nu-role').addEventListener('change', e => {
    panel.querySelector('#nu-rate-wrap').style.display = (e.target.value === 'tradie' || e.target.value === 'leadingHand') ? '' : 'none';
  });
  panel.querySelector('#nu-save').addEventListener('click', async () => {
    const role = panel.querySelector('#nu-role').value;
    const body = {
      username: panel.querySelector('#nu-name').value.trim(),
      role,
      secret: panel.querySelector('#nu-secret').value,
      email: panel.querySelector('#nu-email').value.trim(),
      hourlyRate: isPaidRole(role) ? Number(panel.querySelector('#nu-rate').value) || 0 : undefined,
    };
    if (!body.username || !body.secret) { SHELL.toast('Username + secret required', 'bad'); return; }
    try {
      await SHELL.api('/api/users', { method: 'POST', body });
      if (prefill.sourceRequestId) {
        try {
          await SHELL.api('/api/access-requests?id=' + encodeURIComponent(prefill.sourceRequestId), {
            method: 'PUT',
            body: { status: 'resolved', adminNotes: 'User created in /admin/crew on ' + new Date().toISOString().slice(0, 10) },
          });
        } catch {}
      }
      SHELL.toast('Created', 'ok');
      SHELL.closePanel();
      try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
      paint();
    } catch (e) { SHELL.toast('Create failed — ' + e.message, 'bad'); }
  });
}

function editUserPanel(id) {
  const u = STATE.users.find(x => x.id === id);
  if (!u) return;
  const jobs = SHELL.JOBS || [];
  const showRate = isPaidRole(u.role);
  const showJobs = (u.role === 'tradie' || u.role === 'leadingHand' || u.role === 'client');
  const panel = SHELL.openPanel({
    title: 'Edit ' + u.username,
    body: `
      <div class="field"><label class="field-lbl">Username</label><input class="input" id="eu-name" value="${SHELL.escapeHtml(u.username)}"></div>
      <div class="field"><label class="field-lbl">Email</label><input class="input" id="eu-email" type="email" value="${SHELL.escapeHtml(u.email || '')}"></div>
      ${showRate ? `<div class="two-col">
        <div class="field"><label class="field-lbl">Hourly rate ($)</label><input class="input" id="eu-rate" type="number" min="0" step="0.5" value="${u.hourlyRate || 0}"></div>
        <div class="field"><label class="field-lbl">Xero employee ID <span style="color:var(--muted);font-weight:400;font-size:11px">(optional)</span></label><input class="input" id="eu-xero" value="${SHELL.escapeHtml(u.xeroEmployeeId || '')}" placeholder="e.g. EMP-042"></div>
      </div>` : ''}
      ${showJobs ? `<div class="field"><label class="field-lbl">Assigned jobs</label>
        <div style="border:1px solid var(--line);border-radius:8px;padding:8px;max-height:240px;overflow:auto;background:var(--surface)">
          ${jobs.filter(j => (j.status || 'active') !== 'archived').map(j => `<label style="display:flex;gap:8px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:13px">
            <input type="checkbox" data-job="${SHELL.escapeHtml(j.id)}"${(u.assignedJobIds || []).includes(j.id) ? ' checked' : ''}>
            <span>${SHELL.escapeHtml(j.name)} <span style="color:var(--muted);font-size:11px">${SHELL.escapeHtml(j.id)}</span></span>
          </label>`).join('')}
        </div></div>` : ''}
      <div class="field"><label class="field-lbl">New secret (leave blank to keep)</label><input class="input" id="eu-secret" type="text" placeholder="•••••"></div>
    `,
    footer: `<button class="btn" onclick="SHELL.closePanel()">Cancel</button>
             ${u.role !== 'admin' ? '<button class="btn btn-danger" id="eu-delete">Remove</button>' : ''}
             <button class="btn btn-primary" id="eu-save">Save</button>`,
  });
  panel.querySelector('#eu-save').addEventListener('click', async () => {
    const body = { id: u.id, username: panel.querySelector('#eu-name').value.trim(), email: panel.querySelector('#eu-email').value.trim() };
    if (showJobs) body.assignedJobIds = Array.from(panel.querySelectorAll('input[data-job]:checked')).map(c => c.dataset.job);
    if (showRate) {
      body.hourlyRate = Number(panel.querySelector('#eu-rate').value) || 0;
      body.xeroEmployeeId = panel.querySelector('#eu-xero').value.trim();
    }
    const secret = panel.querySelector('#eu-secret').value;
    if (secret) body.secret = secret;
    try {
      await SHELL.api('/api/users', { method: 'PUT', body });
      SHELL.toast('Saved', 'ok');
      SHELL.closePanel();
      try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
      paint();
    } catch (e) { SHELL.toast('Save failed — ' + e.message, 'bad'); }
  });
  if (u.role !== 'admin') {
    panel.querySelector('#eu-delete').addEventListener('click', async () => {
      // Brief §08: soft-archive by default; 30-day window to restore.
      if (!confirm(`Archive ${u.username}? They drop out of active lists but stay restorable for 30 days. Hours stay on file.`)) return;
      try {
        const res = await fetch('/api/users?id=' + encodeURIComponent(u.id), { method: 'DELETE', credentials: 'same-origin' });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || ('HTTP ' + res.status));
        }
        SHELL.toast('Archived — 30 days to restore', 'ok');
        SHELL.closePanel();
        try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
        paint();
      } catch (e) { SHELL.toast('Archive failed — ' + e.message, 'bad'); }
    });
  }
}

// Brief §08: list users archived but still inside the 30-day restore
// window. Restore button flips them back; the row falls out of the
// panel after a successful restore.
async function openArchivedUsersPanel() {
  let archived = [];
  try {
    const r = await SHELL.api('/api/users?action=archived');
    archived = r.users || [];
  } catch (e) {
    SHELL.toast('Couldn\'t load archived users — ' + e.message, 'bad');
    return;
  }
  const panel = SHELL.openPanel({
    title: `Archived users (${archived.length})`,
    body: archived.length
      ? `
        <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5">
          Users archived in the last 30 days. Restore to put them back in active lists.
          A nightly sweep hard-deletes anyone past 30 days who has no unapproved hours.
        </p>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${archived.map(u => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--surface)">
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:14px">${SHELL.escapeHtml(u.username || u.id)}</div>
                <div style="font-size:11px;color:var(--muted);font-family:var(--ff-mono);margin-top:2px">
                  ${SHELL.escapeHtml(u.role || '?')} · archived ${u.archivedAt ? SHELL._ago(u.archivedAt) : '—'} · <b>${u.restoreWindowDaysRemaining}d</b> left
                </div>
              </div>
              <button class="btn btn-sm btn-primary" data-restore="${SHELL.escapeHtml(u.id)}">Restore</button>
            </div>
          `).join('')}
        </div>
      `
      : '<div class="empty"><div class="empty-title">No archived users</div><div class="empty-sub">Archived users appear here for 30 days before they\'re cleared.</div></div>',
    footer: `<button class="btn" onclick="SHELL.closePanel()">Close</button>`,
  });
  panel.querySelectorAll('[data-restore]').forEach(b => b.addEventListener('click', async () => {
    const id = b.dataset.restore;
    b.disabled = true; b.textContent = 'Restoring…';
    try {
      await SHELL.api('/api/users?action=restore&id=' + encodeURIComponent(id), { method: 'POST', body: {} });
      SHELL.toast('Restored', 'ok');
      try { const r = await SHELL.api('/api/users'); STATE.users = r.users || []; SHELL.USERS = STATE.users; } catch {}
      paint();
      // Refresh the panel in place.
      SHELL.closePanel();
      openArchivedUsersPanel();
    } catch (e) {
      b.disabled = false; b.textContent = 'Restore';
      SHELL.toast('Restore failed — ' + e.message, 'bad');
    }
  }));
}

/* ── Per-view palette commands (Phase 04 hook) ─────────── */

async function registerPeopleCommands() {
  await SHELL.registerCommands('people-page', [
    { id: 'ppl-filter-no-rate',    verb: 'Filter', group: 'People',
      label: 'People with no rate',
      run: () => { STATE.filterFlag = 'no-rate'; STATE.filterRole = 'all'; paint(); } },
    { id: 'ppl-filter-unassigned', verb: 'Filter', group: 'People',
      label: 'People not on any active job',
      run: () => { STATE.filterFlag = 'unassigned'; STATE.filterRole = 'all'; paint(); } },
    { id: 'ppl-filter-stale',      verb: 'Filter', group: 'People',
      label: 'People stale > 14 days',
      run: () => { STATE.filterFlag = 'stale'; STATE.filterRole = 'all'; paint(); } },
    { id: 'ppl-new',               verb: 'Create', group: 'Actions',
      label: 'New person',
      run: () => addUserPanel() },
  ]);
}

SHELL.boot();
