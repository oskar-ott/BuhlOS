<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1f35">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BuhlOS">
<title>Field Control · bühl</title>
<script type="module" src="/components/queue.js"></script>
<script type="module" src="/components/buhl-mark.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ╔══════════════════════════════════════════════════════════════════╗
   ║  /lh-home — Leading Hand Field Control                          ║
   ║                                                                  ║
   ║  Purpose-built landing for the leadingHand role. NOT a shrunken ║
   ║  admin dashboard. Answers four questions in order:               ║
   ║                                                                  ║
   ║    1. Which jobs am I running today?                             ║
   ║    2. What needs my attention across them?                       ║
   ║    3. What's blocking the crew?                                  ║
   ║    4. What action do I take next?                                ║
   ║                                                                  ║
   ║  Mobile-first responsive: phone shows vertical card stack with   ║
   ║  primary actions inline; tablet/desktop floats Attention column  ║
   ║  alongside the job stack so both read in one viewport.           ║
   ║                                                                  ║
   ║  Data sources (all permission-scoped on the server):             ║
   ║    /api/auth?action=me           — identity + role gate          ║
   ║    /api/jobs?withStats=1         — assigned jobs + per-job stats ║
   ║    /api/snags-all?status=Open    — open snags across my jobs     ║
   ║    /api/time-entries-overview    — this week's hours             ║
   ║                                                                  ║
   ║  Falls back to honest empty states for every section so a fresh  ║
   ║  LH with no jobs yet sees "No jobs assigned" instead of NaN.     ║
   ╚══════════════════════════════════════════════════════════════════╝ */

:root {
  --bg:        #f3efe7;
  --paper:     #ffffff;
  --paper-2:   #faf8f3;
  --paper-3:   #efece4;

  --navy:      #0d1f35;
  --navy-2:    #152840;
  --navy-3:    #2a3958;

  --ink:       #0d1f35;
  --ink-2:     #2a3958;
  --ink-3:     #6a7591;
  --ink-4:     #9aa3bc;

  --rule:      #d2ccbf;
  --rule-2:    #c5beaf;
  --line:      #ece7da;

  --yellow:    #f5d020;
  --yellow-2:  #e8c000;
  --yellow-ink:#1d1700;
  --yellow-bg: #fff8d8;
  --yellow-edge:#f3e3a4;

  --red:       #c0312f;
  --red-bg:    #fbeae8;
  --red-edge:  #f0c4be;

  --amber:     #d18b1c;
  --amber-bg:  #fbf1de;

  --green:     #1f8b5a;
  --green-bg:  #e6f4ec;

  --info:      #1c5fb8;
  --info-bg:   #e7eef9;

  --ff-display: "Inter Tight", system-ui, sans-serif;
  --ff-sans:    "Inter", system-ui, sans-serif;
  --ff-mono:    "JetBrains Mono", ui-monospace, monospace;

  --safe-t: env(safe-area-inset-top, 0);
  --safe-b: env(safe-area-inset-bottom, 0);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; }
body {
  font-family: var(--ff-sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01","cv11";
  overflow-x: hidden;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }
.tabular { font-variant-numeric: tabular-nums; }

/* ── Header (solid navy band — same vocabulary as the mobile job page) ── */
.hdr {
  background: var(--navy);
  color: #fff;
  padding: calc(12px + var(--safe-t)) 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.hdr-mark {
  flex-shrink: 0;
  color: rgba(255,255,255,.7);
}
.hdr-body { flex: 1; min-width: 0; }
.hdr-eyebrow {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  margin-bottom: 1px;
}
.hdr-title {
  font-family: var(--ff-display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -.018em;
  color: #fff;
  line-height: 1.05;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-date {
  font-size: 11.5px;
  color: rgba(255,255,255,.6);
  margin-top: 2px;
}
.hdr-action {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 13px;
  border-radius: 999px;
  background: rgba(255,255,255,.1);
  color: #fff;
  font-size: 12.5px;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,.18);
}
.hdr-action:hover { background: rgba(255,255,255,.18); }

/* ── Main canvas ── */
.canvas {
  max-width: 1080px;
  margin: 0 auto;
  padding: 16px 14px calc(96px + var(--safe-b));
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 16px;
}
@media (min-width: 880px) {
  .canvas {
    grid-template-columns: minmax(0, 1.6fr) minmax(280px, 1fr);
    padding: 22px 24px calc(40px + var(--safe-b));
    gap: 22px;
  }
}

/* ── Section heading ── */
.sec-h {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin: 8px 4px 10px;
}
.sec-h-l {
  font-family: var(--ff-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.sec-h-c {
  font-family: var(--ff-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-2);
  background: var(--paper-3);
  padding: 1px 8px;
  border-radius: 999px;
}
.sec-h-link {
  margin-left: auto;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-3);
}
.sec-h-link:hover { color: var(--ink); }

/* ── Notification bell + drawer ──
   Bell sits in the header. Red pip when unread items exist. Drawer
   slides in from the right on desktop, up from the bottom on mobile. */
.hdr-bell {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 999px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.18);
  color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.hdr-bell:hover { background: rgba(255,255,255,.18); }
.hdr-bell-pip {
  position: absolute;
  top: 6px; right: 7px;
  min-width: 14px; height: 14px; padding: 0 4px;
  background: var(--red); color: #fff;
  border-radius: 999px;
  font-family: var(--ff-mono);
  font-size: 9px; font-weight: 700;
  line-height: 14px;
  border: 2px solid var(--navy);
  text-align: center;
}
.lh-notif-scrim {
  position: fixed; inset: 0; background: rgba(13,31,53,.42);
  z-index: 998; animation: lhScrimIn .18s ease-out;
}
.lh-notif-drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--paper);
  z-index: 999;
  border-radius: 18px 18px 0 0;
  max-height: 85vh;
  display: flex; flex-direction: column;
  animation: lhSheetIn .22s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 -10px 32px rgba(15,23,42,.18);
  padding-bottom: var(--safe-b);
}
@media (min-width: 720px) {
  .lh-notif-drawer {
    top: 0; bottom: 0; right: 0; left: auto;
    width: 380px; max-height: none;
    border-radius: 0;
    animation: lhDrawerSlide .22s cubic-bezier(.16,1,.3,1);
    box-shadow: -10px 0 32px rgba(15,23,42,.18);
  }
  @keyframes lhDrawerSlide { from { transform: translateX(100%); } to { transform: translateX(0); } }
}
.lh-notif-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(14px + var(--safe-t)) 18px 14px;
  font-family: var(--ff-display);
  font-size: 17px; font-weight: 700;
  letter-spacing: -.012em;
  color: var(--ink);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.lh-notif-x {
  background: none; border: 0; cursor: pointer;
  font-size: 24px; line-height: 1; color: var(--ink-3);
  padding: 4px 8px;
}
.lh-notif-x:hover { color: var(--ink); }
.lh-notif-body { overflow-y: auto; flex: 1; }
.lh-notif-grp {
  font-family: var(--ff-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-3);
  padding: 14px 18px 8px;
  border-top: 1px solid var(--line);
}
.lh-notif-grp:first-child { border-top: 0; }
.lh-notif-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 18px;
  text-decoration: none;
  color: inherit;
  border-bottom: 1px solid var(--line);
  transition: background .12s;
}
.lh-notif-item:hover { background: var(--paper-2); }
.lh-notif-item:last-child { border-bottom: 0; }
.lh-notif-item-dot {
  flex-shrink: 0; margin-top: 4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-3);
}
.lh-notif-item-dot.red { background: var(--red); }
.lh-notif-item-dot.amber { background: var(--amber); }
.lh-notif-item-dot.green { background: var(--green); }
.lh-notif-item-body { flex: 1; min-width: 0; }
.lh-notif-item-l {
  font-size: 14px; font-weight: 600;
  color: var(--ink); line-height: 1.3;
}
.lh-notif-item-sub {
  font-size: 11.5px; color: var(--ink-3);
  margin-top: 2px;
}
.lh-notif-empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--ink-3);
  font-size: 13px;
}
.lh-notif-empty b {
  display: block;
  font-family: var(--ff-display);
  color: var(--ink);
  font-size: 16px;
  margin-bottom: 6px;
}

/* ── LH Tools bottom sheet ──
   Opened from the header Tools button. Brief §14: three groups in
   fixed order, empty groups hide entirely. Slides up from the bottom
   on mobile and on desktop. */
.lh-tools-scrim {
  position: fixed; inset: 0; background: rgba(13,31,53,.42);
  z-index: 998; animation: lhScrimIn .18s ease-out;
}
.lh-tools-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--paper);
  border-radius: 18px 18px 0 0;
  padding: 8px 0 max(16px, var(--safe-b));
  max-height: 80vh; overflow-y: auto;
  z-index: 999;
  box-shadow: 0 -10px 32px rgba(15,23,42,.18);
  animation: lhSheetIn .22s cubic-bezier(.16,1,.3,1);
}
@media (min-width: 600px) {
  .lh-tools-sheet {
    left: 50%; right: auto; bottom: 24px;
    transform: translateX(-50%);
    max-width: 420px; width: calc(100% - 32px);
    border-radius: 18px;
  }
}
@keyframes lhScrimIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes lhSheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
.lh-tools-grab {
  width: 36px; height: 4px; background: var(--rule);
  border-radius: 2px; margin: 6px auto 8px;
}
.lh-tools-h {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 18px 8px;
  font-family: var(--ff-mono);
  font-size: 10.5px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-3);
}
.lh-tools-x {
  background: none; border: 0; cursor: pointer;
  font-size: 24px; line-height: 1; color: var(--ink-3);
  padding: 4px 8px;
}
.lh-tools-x:hover { color: var(--ink); }
.lh-tools-grp-h {
  padding: 12px 18px 6px;
  font-family: var(--ff-mono);
  font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-3);
}
.lh-tools-item {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 12px 18px;
  background: none; border: 0; cursor: pointer;
  text-decoration: none; color: var(--ink);
  font-size: 14.5px; font-weight: 500;
  border-bottom: 1px solid var(--line);
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.lh-tools-item:hover { background: var(--paper-2); }
.lh-tools-item:active { background: var(--paper-3); }
.lh-tools-item:last-child { border-bottom: 0; }
.lh-tools-item svg { width: 20px; height: 20px; color: var(--ink-2); flex-shrink: 0; }
.lh-tools-item-arrow { margin-left: auto; color: var(--ink-3); }
.lh-tools-item.danger { color: var(--red); }
.lh-tools-item.danger svg { color: var(--red); }

/* ── Quick-stats strip ── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 4px;
}

/* ── Quick-actions row — three direct shortcuts above the job stack. */
.qa {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 10px 0 4px;
}
.qa-btn {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 12px 6px 10px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  color: var(--ink);
  text-decoration: none;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: -.005em;
  transition: background .12s, border-color .12s;
}
.qa-btn:hover { background: var(--paper-2); border-color: var(--rule-2); }
.qa-btn:active { transform: scale(.98); }
.qa-btn svg { width: 20px; height: 20px; color: var(--ink-2); }
.stat {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
}
.stat-l {
  font-family: var(--ff-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.stat-v {
  font-family: var(--ff-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.stat-v small {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink-3);
  margin-left: 2px;
}
.stat-v.bad { color: var(--red); }
.stat-v.warn { color: var(--amber); }

/* ── Job card ── */
.job {
  display: block;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  text-decoration: none;
  color: inherit;
  transition: border-color .12s, transform .08s;
  cursor: pointer;
}
.job:hover { border-color: var(--rule-2); }
.job:active { transform: scale(.99); }
.job-top {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 8px;
}
.job-name {
  font-family: var(--ff-display);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.018em;
  color: var(--ink);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.job-ref {
  flex-shrink: 0;
  font-family: var(--ff-mono);
  font-size: 10.5px;
  font-weight: 600;
  color: var(--ink-3);
  background: var(--paper-3);
  padding: 1px 6px;
  border-radius: 4px;
}
.job-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 12.5px;
  color: var(--ink-3);
  margin-bottom: 12px;
}
.job-meta b {
  color: var(--ink);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.job-meta .bad b { color: var(--red); }
.job-meta .warn b { color: var(--amber); }
.job-progress {
  height: 6px;
  background: var(--paper-3);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.job-progress i {
  display: block;
  height: 100%;
  background: var(--yellow);
  border-radius: 3px;
}
.job-actions {
  display: flex;
  gap: 8px;
}
.job-cta {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 42px;
  border-radius: 10px;
  background: var(--yellow);
  color: var(--yellow-ink);
  font-size: 13.5px;
  font-weight: 700;
  letter-spacing: -.005em;
}
.job-cta:hover { background: var(--yellow-2); }
.job-2nd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 42px;
  padding: 0 14px;
  border-radius: 10px;
  background: var(--paper-2);
  border: 1px solid var(--rule-2);
  color: var(--ink);
  font-size: 13.5px;
  font-weight: 600;
}
.job-2nd:hover { background: var(--paper-3); }

/* ── Attention card ── */
.atn {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 10px;
}
.atn-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
}
.atn-head b {
  font-family: var(--ff-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-2);
  flex: 1;
}
.atn-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  text-decoration: none;
  color: inherit;
  transition: background .12s;
}
.atn-row:last-child { border-bottom: 0; }
.atn-row:hover { background: var(--paper-2); }
.atn-row-dot {
  flex-shrink: 0;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ink-3);
}
.atn-row-dot.red    { background: var(--red); }
.atn-row-dot.amber  { background: var(--amber); }
.atn-row-dot.yellow { background: var(--yellow-2); }
.atn-row-dot.green  { background: var(--green); }
.atn-row-body {
  flex: 1;
  min-width: 0;
}
.atn-row-l {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
.atn-row-sub {
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: .04em;
  color: var(--ink-3);
  margin-top: 2px;
}
.atn-row-chev {
  color: var(--ink-3);
  font-family: var(--ff-mono);
  font-size: 14px;
  flex-shrink: 0;
}

/* ── Empty state ── */
.empty {
  padding: 32px 22px;
  text-align: center;
  background: var(--paper);
  border: 1px dashed var(--rule-2);
  border-radius: 14px;
  color: var(--ink-2);
}
.empty b {
  display: block;
  font-family: var(--ff-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.018em;
  margin-bottom: 8px;
}
.empty span {
  display: block;
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-3);
}

/* ── Bottom tab bar (mobile only) ── */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, .96);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--line);
  padding: 8px 8px calc(8px + var(--safe-b));
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 2px;
  z-index: 30;
}
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 4px;
  border-radius: 10px;
  color: var(--ink-3);
  text-decoration: none;
  position: relative;
}
.tab svg {
  width: 20px;
  height: 20px;
}
.tab-l {
  font-size: 10px;
  font-weight: 600;
}
.tab.active {
  color: var(--ink);
}
.tab.active::before {
  content: "";
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 3px;
  background: var(--yellow);
  border-radius: 0 0 3px 3px;
}
@media (min-width: 880px) {
  .tabbar { display: none; }
  body { padding-bottom: 0; }
  .canvas { padding-bottom: 60px; }
}

/* ── Pull-to-refresh affordance ── */
.ptr {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 0;
  overflow: hidden;
  background: var(--paper);
  font-family: var(--ff-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-3);
  pointer-events: none;
  transition: height .2s ease-out;
}
.ptr.armed { color: var(--ink); }
.ptr.loading { height: 48px; }
.ptr-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--rule);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: ptrSpin .8s linear infinite;
  display: none;
}
.ptr.loading .ptr-spinner { display: block; }
@keyframes ptrSpin { to { transform: rotate(360deg); } }

/* ── Loading skeleton — shown before fetches resolve ── */
.skel-row {
  height: 90px;
  background: linear-gradient(90deg, var(--paper-2), var(--paper-3), var(--paper-2));
  background-size: 200% 100%;
  animation: skelShimmer 1.4s ease-in-out infinite;
  border-radius: 14px;
  margin-bottom: 10px;
}
@keyframes skelShimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<!-- LH Tools bottom sheet — anchored to the Tools button in the header.
     Three groups in fixed order per brief §14: Tools (Temps & Assets,

</div>

<div class="canvas">
  <!-- Main column: jobs + open snags inbox -->
  <div>
    <!-- Quick stats: jobs / snags assigned to me / crew missing hours -->
    <div class="stats" id="lh-stats">
      <div class="stat"><div class="stat-l">Jobs</div><div class="stat-v tabular" id="stat-jobs">–</div></div>
      <div class="stat"><div class="stat-l">My snags</div><div class="stat-v tabular" id="stat-mine">–</div></div>
      <div class="stat"><div class="stat-l">Open snags</div><div class="stat-v tabular" id="stat-open">–</div></div>
    </div>

    <!-- Quick actions — direct shortcuts to the three things LHs do on
         their phone every day: triage snags across all their jobs, check

         Sits above the job stack so the LH doesn't need to drill into a

    <div class="qa">

        <span>Approve hours</span>

      <a href="/admin/hours" class="qa-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-7 4 14 3-7h4"/></svg>

<!-- Bottom tab bar — mobile-only field control nav. Five surfaces
     in the order an LH actually uses them:
       Home (this page) · Jobs (list) · Snags (triage) ·
       Hours (review/approve crew) · Materials (PO chase)
     Materials replaced the previous "More → /admin/temps" placeholder.
     Temps and Test & Tag stay accessible via the admin sidebar on
     /admin/jobs but they're rare-use surfaces; Materials is the
     fifth column most field LHs touch daily. -->
<nav class="tabbar" id="tabbar">

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V8l8-5 8 5v12"/><path d="M9 20v-6h6v6"/></svg>

    <span class="tab-l">Jobs</span>
  </a>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v6M12 16v.5"/></svg>
    <span class="tab-l">Snags</span>

    <span class="tab-l">Materials</span>

<script>
'use strict';

/* ── Helpers ─────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function firstName(u) {
  if (!u) return 'there';
  const raw = u.username || u.name || '';
  return raw.split(/[\s._-]/)[0] || 'there';
}
function todayDate() {
  return new Date().toLocaleDateString('en-AU', {
    weekday: 'long', day: 'numeric', month: 'long',
  });
}
function _localToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

/* ── State ──────────────────────────────────────────────────────────── */
let ME = null;
let JOBS = [];
let SNAGS = [];   // all open snags across my jobs

/* ── Bootstrap ──────────────────────────────────────────────────────── */
async function boot() {
  // Auth gate. Leading hands are the primary audience here, but admin
  // is allowed in too: the operations page has a "Field control →" link
  // that lets admin preview the LH surface without re-logging. If we
  // redirected admin away (the original behaviour), the preview link
  // would bounce admin straight back to /admin/operations — a redirect
  // loop. Tradies and clients still get sent home; they don't have
  // permission to view cross-job LH data.
  try {
    const meRes = await fetch('/api/auth?action=me', { credentials: 'same-origin' });
    if (!meRes.ok) { location.href = '/login'; return; }
    const j = await meRes.json();
    ME = j.user;
  } catch {
    location.href = '/login'; return;
  }
  if (ME.role === 'tradie')  { location.href = '/my-day'; return; }
  if (ME.role === 'client')  { location.href = '/client'; return; }
  if (ME.role !== 'leadingHand' && ME.role !== 'admin') {
    location.href = '/login'; return;
  }

  // Paint the header copy as soon as identity is known.
  document.getElementById('hdr-title').textContent = `Hi, ${firstName(ME)}.`;
  document.getElementById('hdr-date').textContent = todayDate();

  // When an admin is previewing, flip the eyebrow and show the
  // dedicated "Site office →" link alongside Tools (admin previews
  // benefit from a fast escape hatch back to /admin/operations; LH
  // doesn't need one).
  if (ME.role === 'admin') {
    const eyebrow = document.querySelector('.hdr-eyebrow');
    if (eyebrow) eyebrow.textContent = 'Field control · admin preview';
    const adminLink = document.getElementById('hdr-action-admin');
    if (adminLink) adminLink.style.display = '';
  }

  // Wire the Tools sheet. Open from header button, close on backdrop
  // or X. Mount the sheet body lazily on first open so a worker who
  // never taps Tools doesn't pay the DOM cost.
  initToolsSheet();
  // Wire the notification bell + drawer. Fires a background fetch
  // for the unread-pip count even when the drawer is closed.
  initNotifInbox();

  await loadAndPaint();
  initPullToRefresh();
}

/* ── Notification inbox ────────────────────────────────────────────
   Bell in the header opens a drawer that aggregates:
     • Snags assigned to me (active blockers)
     • Pending crew-hour approvals (LH/admin only — per PR #183 LH
       can approve own crew, scoped server-side)
     • Snags I raised that closed recently (last 14 days, soft "FYI"
       category that doesn't carry an unread pip)
   No new backend — each item comes from an endpoint that already
   exists (snags-mine, time-entries scope=approver).
   Unread tracking is local-only: last-seen timestamp in localStorage,
   anything newer counts toward the red pip. */
const NOTIF_SEEN_KEY = 'lh.notifInbox.lastSeenAt';
function notifLastSeen() {
  try { return Number(localStorage.getItem(NOTIF_SEEN_KEY)) || 0; }
  catch (e) { return 0; }
}
function notifMarkSeen() {
  try { localStorage.setItem(NOTIF_SEEN_KEY, String(Date.now())); }
  catch (e) {}
}

function initNotifInbox() {
  const bell    = document.getElementById('hdr-bell');
  const scrim   = document.getElementById('lh-notif-scrim');
  const drawer  = document.getElementById('lh-notif-drawer');
  const closeX  = document.getElementById('lh-notif-x');
  const body    = document.getElementById('lh-notif-body');
  const pipEl   = document.getElementById('hdr-bell-pip');
  if (!bell || !drawer) return;

  function open() {
    scrim.hidden = false;
    drawer.hidden = false;
    bell.setAttribute('aria-expanded', 'true');
    loadInbox();
  }
  function close() {
    scrim.hidden = true;
    drawer.hidden = true;
    bell.setAttribute('aria-expanded', 'false');
    // Mark everything as seen on close so the next render zeros the pip.
    notifMarkSeen();
    refreshPip();
  }
  bell.addEventListener('click', () => drawer.hidden ? open() : close());
  scrim.addEventListener('click', close);
  closeX && closeX.addEventListener('click', close);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !drawer.hidden) close(); });

  // Initial pip refresh — fires the same composition the drawer uses
  // but only counts unread (items with ts > lastSeen) toward the pip.
  refreshPip();
}

async function fetchInboxData() {
  const tasks = [
    fetch('/api/snags-mine?view=assigned&status=Open', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : { snags: [] })
      .catch(() => ({ snags: [] })),
    fetch('/api/snags-mine?view=raised&status=Closed', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : { snags: [] })
      .catch(() => ({ snags: [] })),
    // Pending approvals — only meaningful for LH/admin. The server
    // 403s tradies/clients on the approver scope, which the catch
    // turns into an empty list.
    fetch('/api/time-entries?status=submitted&scope=approver', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : { entries: [] })
      .catch(() => ({ entries: [] })),
  ];
  const [assigned, resolved, pending] = await Promise.all(tasks);
  return {
    assigned: assigned.snags || [],
    resolved: resolved.snags || [],
    pending:  pending.entries || [],
  };
}

async function refreshPip() {
  const pipEl = document.getElementById('hdr-bell-pip');
  if (!pipEl) return;
  try {
    const { assigned, pending } = await fetchInboxData();
    // Anything created/updated after the last-seen timestamp counts.
    // Resolved-snags don't carry a pip — they're FYI, not actionable.
    const since = notifLastSeen();
    const unreadAssigned = assigned.filter(s => {
      const t = new Date(s.createdAt || s.updatedAt || 0).getTime();
      return t > since;
    }).length;
    const unreadPending = pending.filter(p => {
      const t = new Date(p.submittedAt || p.updatedAt || 0).getTime();
      return t > since;
    }).length;
    const total = unreadAssigned + unreadPending;
    if (total > 0) {
      pipEl.textContent = total > 9 ? '9+' : String(total);
      pipEl.hidden = false;
    } else {
      pipEl.hidden = true;
    }
  } catch (e) {
    pipEl.hidden = true;
  }
}

async function loadInbox() {
  const body = document.getElementById('lh-notif-body');
  if (!body) return;
  body.innerHTML = '<div style="padding:32px 22px;color:var(--ink-3);text-align:center">Loading…</div>';
  try {
    const { assigned, resolved, pending } = await fetchInboxData();
    if (!assigned.length && !resolved.length && !pending.length) {
      body.innerHTML = `<div class="lh-notif-empty">
        <b>All caught up.</b>
        <span>No snags assigned, no pending approvals, no recent resolutions.</span>
      </div>`;
      return;
    }
    let html = '';

    // Assigned to me — actionable, top of the inbox.
    if (assigned.length) {
      html += `<div class="lh-notif-grp">Assigned to me · ${assigned.length}</div>`;
      html += assigned.slice(0, 12).map(s => {
        const t = new Date(s.createdAt || 0);
        const when = isFinite(t.getTime()) ? agoStr(t.getTime()) : '';
        const dot = (s.priority || '').toLowerCase() === 'high' ? 'red' : 'amber';
        return `<a class="lh-notif-item" href="/jobs/${esc(s.jobId)}?snag=${esc(s.id)}">
          <span class="lh-notif-item-dot ${dot}"></span>
          <div class="lh-notif-item-body">
            <div class="lh-notif-item-l">${esc(s.desc || '(no description)')}</div>
            <div class="lh-notif-item-sub">${esc(s.jobName || '')}${s.dwellingName ? ' · ' + esc(s.dwellingName) : ''}${when ? ' · ' + esc(when) : ''}</div>
          </div>
        </a>`;
      }).join('');
    }

    // Pending hour approvals — admin / LH only. Server already gated.
    if (pending.length) {
      html += `<div class="lh-notif-grp">Hours pending approval · ${pending.length}</div>`;
      html += pending.slice(0, 12).map(p => {
        const t = new Date(p.submittedAt || p.date || 0);
        const when = isFinite(t.getTime()) ? agoStr(t.getTime()) : '';
        const hrs = Number(p.totalHours || 0).toFixed(1);
        return `<a class="lh-notif-item" href="/admin/approvals">
          <span class="lh-notif-item-dot amber"></span>
          <div class="lh-notif-item-body">
            <div class="lh-notif-item-l">${esc(p.userName || p.userId || 'Crew')} · ${esc(hrs)}h</div>
            <div class="lh-notif-item-sub">Submitted ${esc(when)}</div>
          </div>
        </a>`;
      }).join('');
    }

    // Recently resolved (snags I raised, closed in last 14 days).
    // FYI category — no pip.
    if (resolved.length) {
      const recent = resolved.filter(s => {
        const t = new Date(s.closedAt || 0).getTime();
        if (!isFinite(t)) return false;
        return (Date.now() - t) < 14 * 86400000;
      }).slice(0, 6);
      if (recent.length) {
        html += `<div class="lh-notif-grp">Recently resolved · ${recent.length}</div>`;
        html += recent.map(s => {
          const t = new Date(s.closedAt || 0);
          const when = isFinite(t.getTime()) ? agoStr(t.getTime()) : '';
          return `<a class="lh-notif-item" href="/jobs/${esc(s.jobId)}?snag=${esc(s.id)}">
            <span class="lh-notif-item-dot green"></span>
            <div class="lh-notif-item-body">
              <div class="lh-notif-item-l">${esc(s.desc || '(no description)')}</div>
              <div class="lh-notif-item-sub">${esc(s.jobName || '')} · resolved ${esc(when)}</div>
            </div>
          </a>`;
        }).join('');
      }
    }
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div class="lh-notif-empty">
      <b>Couldn't load inbox.</b>
      <span>${esc(e && e.message || 'Try again later.')}</span>
    </div>`;
  }
}

// Shared "X mins/hours/days ago" formatter — used by inbox rows.
function agoStr(ms) {
  if (!ms) return '';
  const s = Math.max(1, Math.floor((Date.now() - ms) / 1000));
  if (s < 60)        return 'just now';
  if (s < 3600)      return Math.floor(s / 60) + 'm ago';
  if (s < 86400)     return Math.floor(s / 3600) + 'h ago';
  if (s < 86400 * 7) return Math.floor(s / 86400) + 'd ago';
  const d = new Date(ms);
  return d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
}

/* ── LH Tools bottom sheet ────────────────────────────────────────── */
function initToolsSheet() {
  const btn    = document.getElementById('hdr-action');
  const scrim  = document.getElementById('lh-tools-scrim');
  const sheet  = document.getElementById('lh-tools-sheet');
  const closeX = document.getElementById('lh-tools-x');
  const body   = document.getElementById('lh-tools-body');
  if (!btn || !scrim || !sheet) return;

  let mounted = false;
  function mountBody() {
    if (mounted) return;
    mounted = true;
    // Three groups, fixed order per brief §14. Items that route through
    // the admin shell rely on the shell's per-page role gate (admin/
    // _shell.js PAGE_ROLES) — anything LH isn't allowed bounces back
    // to /lh automatically. We only list items LH actually has access
    // to so the sheet stays honest.
    body.innerHTML = `
      <div class="lh-tools-grp-h">Tools</div>
      <a class="lh-tools-item" href="/admin/temps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>
        <span>Temps &amp; assets</span>
        <span class="lh-tools-item-arrow">›</span>
      </a>
      <a class="lh-tools-item" href="/admin/activity">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-7 4 14 3-7h4"/></svg>
        <span>Activity log</span>
        <span class="lh-tools-item-arrow">›</span>
      </a>
      <div class="lh-tools-grp-h">Documents</div>
      <a class="lh-tools-item" href="/admin/jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <span>Plans &amp; takeoff</span>
        <span class="lh-tools-item-arrow" style="font-size:11px">via job</span>
      </a>
      <div class="lh-tools-grp-h">Account</div>
      <button type="button" class="lh-tools-item danger" id="lh-tools-signout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 17l5-5-5-5M21 12H9M13 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/></svg>
        <span>Sign out</span>
      </button>
    `;
    // Wire the sign-out button. Hits the auth logout endpoint and
    // sends the worker back to /login.
    const signOut = document.getElementById('lh-tools-signout');
    if (signOut) {
      signOut.addEventListener('click', async () => {
        try {
          await fetch('/api/auth?action=logout', { method: 'POST', credentials: 'same-origin' });
        } catch (e) {}
        location.href = '/login';
      });
    }
  }

  function open() {
    mountBody();
    scrim.hidden = false;
    sheet.hidden = false;
    btn.setAttribute('aria-expanded', 'true');
  }
  function close() {
    scrim.hidden = true;
    sheet.hidden = true;
    btn.setAttribute('aria-expanded', 'false');
  }
  btn.addEventListener('click', () => sheet.hidden ? open() : close());
  scrim.addEventListener('click', close);
  closeX && closeX.addEventListener('click', close);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !sheet.hidden) close(); });
}

/* ── Data load ──────────────────────────────────────────────────────── */
async function loadAndPaint() {
  // Three parallel reads — sidebar counts come from /api/jobs (LH-scoped)
  // and /api/snags-all (LH-scoped). Time-entries-overview is admin/LH
  // gated and powers the "X missing hours today" attention row.
  const [jobsR, snagsR] = await Promise.allSettled([
    fetch('/api/jobs?withStats=1', { credentials: 'same-origin' }).then(r => r.ok ? r.json() : { jobs: [] }),
    fetch('/api/snags-all?status=Open', { credentials: 'same-origin' }).then(r => r.ok ? r.json() : { snags: [] }),
  ]);
  JOBS  = (jobsR.status === 'fulfilled' ? (jobsR.value.jobs || []) : []).filter(j => (j.status || 'active') !== 'archived');
  SNAGS = (snagsR.status === 'fulfilled' ? (snagsR.value.snags || []) : []);

  paintStats();
  paintJobs();
  paintAttention();
}

/* ── Stats ──────────────────────────────────────────────────────────── */
function paintStats() {
  const myId = ME && ME.id;
  const minePending = SNAGS.filter(s => s.assignedToUserId === myId).length;
  const open = SNAGS.length;
  document.getElementById('stat-jobs').textContent = JOBS.length;
  const mineEl = document.getElementById('stat-mine');
  mineEl.textContent = minePending;
  mineEl.className = 'stat-v tabular' + (minePending > 0 ? ' bad' : '');
  const openEl = document.getElementById('stat-open');
  openEl.textContent = open;
  openEl.className = 'stat-v tabular' + (open > 5 ? ' warn' : '');
}

/* ── Job list ───────────────────────────────────────────────────────── */
function paintJobs() {
  const list = document.getElementById('jobs-list');
  document.getElementById('jobs-count').textContent = String(JOBS.length);
  if (!JOBS.length) {
    list.innerHTML = `<div class="empty">
      <b>No jobs assigned yet</b>
      <span>Ask admin to add you as a leading hand on a job</span>
    </div>`;
    return;
  }
  // Sort: jobs with open snags first, then most-areas, then alpha
  const myId = ME && ME.id;
  const jobs = JOBS.slice().sort((a, b) => {
    const sa = (SNAGS.filter(s => s.jobId === a.id).length > 0) ? 0 : 1;
    const sb = (SNAGS.filter(s => s.jobId === b.id).length > 0) ? 0 : 1;
    if (sa !== sb) return sa - sb;
    const pa = Number(a.statsPct || 0);
    const pb = Number(b.statsPct || 0);
    if (pa !== pb) return pa - pb;
    return (a.name || '').localeCompare(b.name || '');
  });
  list.innerHTML = jobs.map(j => {
    const ref = (j.ref || j.shortRef || j.id || '').toUpperCase();
    const pct = (typeof j.statsPct === 'number' && j.statsPct >= 0) ? j.statsPct : null;
    const dw  = Number(j.statsDwellingCount || 0);
    const sn  = SNAGS.filter(s => s.jobId === j.id).length;
    const mine = SNAGS.filter(s => s.jobId === j.id && s.assignedToUserId === myId).length;
    const metaBits = [];
    if (dw > 0) metaBits.push(`<span><b>${dw}</b> ${dw === 1 ? 'area' : 'areas'}</span>`);
    if (pct != null) metaBits.push(`<span><b>${pct}%</b> complete</span>`);
    if (sn > 0) metaBits.push(`<span class="${mine > 0 ? 'bad' : 'warn'}"><b>${sn}</b> open ${sn === 1 ? 'snag' : 'snags'}${mine > 0 ? ` · ${mine} mine` : ''}</span>`);
    if (!metaBits.length) metaBits.push('<span><b>Setup pending</b></span>');
    return `<a class="job" href="/jobs/${esc(j.id)}">
      <div class="job-top">
        <div class="job-name">${esc(j.name || '(unnamed)')}</div>
        <div class="job-ref">${esc(ref)}</div>
      </div>
      <div class="job-meta">${metaBits.join('')}</div>
      ${pct != null ? `<div class="job-progress"><i style="width:${pct}%"></i></div>` : ''}
      <div class="job-actions">
        <span class="job-cta">Open job →</span>
      </div>
    </a>`;
  }).join('');
}

/* ── Attention list ─────────────────────────────────────────────────── */
function paintAttention() {
  const myId = ME && ME.id;
  const list = document.getElementById('attn-list');
  const rows = [];

  // Mine first — snags I'm assigned to.
  const mineSnags = SNAGS.filter(s => s.assignedToUserId === myId);
  if (mineSnags.length) {
    rows.push({
      dot: 'red',
      label: `${mineSnags.length} snag${mineSnags.length === 1 ? '' : 's'} assigned to me`,
      sub: 'Tap to triage',
      href: '/admin/snags?assignedToUserId=' + encodeURIComponent(myId),
    });
  }

  // Then unassigned snags on my jobs.
  const unassigned = SNAGS.filter(s => !s.assignedToUserId);
  if (unassigned.length) {
    rows.push({
      dot: 'amber',
      label: `${unassigned.length} unassigned snag${unassigned.length === 1 ? '' : 's'}`,
      sub: 'Across my jobs',
      href: '/admin/snags?assignedToUserId=unassigned',
    });
  }

  // Then high-priority snags.
  const high = SNAGS.filter(s => (s.priority || '').toLowerCase() === 'high');
  if (high.length) {
    rows.push({
      dot: 'red',
      label: `${high.length} high-priority snag${high.length === 1 ? '' : 's'}`,
      sub: 'Open across my jobs',
      href: '/admin/snags?priority=High',
    });
  }

  // Pending approvals (LHs can approve their crew's hours per PR #183).
  // Fire-and-forget — silently skip if the endpoint returns nothing.
  fetch('/api/time-entries?status=submitted&scope=approver', { credentials: 'same-origin' })
    .then(r => r.ok ? r.json() : { entries: [] })
    .then(j => {
      const pending = (j.entries || []).length;
      if (pending > 0) {
        const row = mkAttnRow({
          dot: 'yellow',
          label: `${pending} hour entr${pending === 1 ? 'y' : 'ies'} pending approval`,
          sub: 'From my crew',
          href: '/admin/approvals',
        });
        list.insertBefore(row, list.firstChild);
      }
    })
    .catch(() => {});

  // Render the synchronous rows first; the async pending-approvals row
  // gets prepended above when it lands.
  if (!rows.length) {
    list.innerHTML = `<div class="empty">
      <b>Quiet day</b>
      <span>Nothing flagged across your jobs</span>
    </div>`;
    return;
  }
  list.innerHTML = '';
  rows.forEach(r => list.appendChild(mkAttnRow(r)));
}

function mkAttnRow({ dot, label, sub, href }) {
  const a = document.createElement('a');
  a.className = 'atn-row';
  a.href = href || '#';
  a.innerHTML = `
    <span class="atn-row-dot ${esc(dot || '')}"></span>
    <div class="atn-row-body">
      <div class="atn-row-l">${esc(label)}</div>
      ${sub ? `<div class="atn-row-sub">${esc(sub)}</div>` : ''}
    </div>
    <span class="atn-row-chev">›</span>
  `;
  return a;
}

/* ── Pull-to-refresh ──────────────────────────────────────────────────
   Tightened to avoid false triggers from finger drift on taps. See
   public/my-day.html for the matching change — same gesture, same
   thresholds, applied to the LH home as well so the field-control
   surface doesn't flash a stray indicator on every card tap. */
function initPullToRefresh() {
  const ptr = document.getElementById('ptr');
  if (!ptr) return;
  const VISIBLE_PX = 32;
  const TRIGGER_PX = 64;
  let startY = 0, deltaY = 0, dragging = false;

  function isInteractive(el) {
    if (!el || el === document.body) return false;
    const tag = el.tagName;
    if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'A' || tag === 'LABEL') return true;
    if (el.getAttribute && el.getAttribute('role') === 'button') return true;
    if (el.classList && (el.classList.contains('job') || el.classList.contains('atn-row') || el.classList.contains('tab'))) return true;
    return isInteractive(el.parentElement);
  }

  document.addEventListener('touchstart', (e) => {
    if (window.scrollY > 0) return;
    if (isInteractive(e.target)) return;
    const t = e.touches[0];
    startY = t.clientY; deltaY = 0; dragging = true;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < VISIBLE_PX) {
      if (dy < 0) dragging = false;
      return;
    }
    deltaY = Math.min(dy, 120);
    ptr.style.height = (deltaY - VISIBLE_PX) + 'px';
    ptr.classList.toggle('armed', deltaY >= TRIGGER_PX);
    const lbl = ptr.querySelector('.ptr-label');
    if (lbl) lbl.textContent = deltaY >= TRIGGER_PX ? 'Release to refresh' : 'Pull to refresh';
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    if (deltaY >= TRIGGER_PX) {
      ptr.classList.add('loading');
      ptr.classList.remove('armed');
      ptr.style.height = '';
      const lbl = ptr.querySelector('.ptr-label');
      if (lbl) lbl.textContent = 'Refreshing…';
      try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
      loadAndPaint().finally(() => {
        ptr.classList.remove('loading');
        ptr.style.height = '';
      });
    } else {
      ptr.style.height = '';
      ptr.classList.remove('armed');
    }
  });
}

// LH role gets the Tools button by default. Admin previewing /lh also
// gets a dedicated "Site office →" link (shown in boot() above) for a
// fast escape back to /admin/operations. No additional role gating
// needed here now that Tools handles every role's needs.
boot();
</script>
