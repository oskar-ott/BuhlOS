<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>buhl — admin</title>
<link rel="stylesheet" href="/theme.css">
<style>
/* Admin-specific tokens (aligned with theme) */
:root {
  --bd: var(--border);
  --tx: var(--ink);
  --mu: var(--muted);
  --ac: var(--accent);
  --er: var(--danger);
  --ok: #22c55e;
}
/* Header */
header.app-header {
  position: sticky; top: 0; z-index: 100;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.08);
  padding-top: max(0px, env(safe-area-inset-top));
}
header.app-header h1 { margin: 0; font-size: 18px; font-weight: 600; }
header.app-header a, header.app-header .hdr-btn {
  background: transparent; border: 1px solid rgba(255,255,255,.25);
  color: var(--header-ink); padding: 8px 12px; border-radius: 8px;
  font-size: var(--fs-sm); text-decoration: none; cursor: pointer;
  margin-left: 8px;
}
/* Tab nav */
nav { display: flex; gap: 2px; padding: 0 18px;
      border-bottom: 1px solid var(--bd); overflow-x: auto;
      background: var(--card); }
nav::-webkit-scrollbar { display: none; }
nav button { background: none; border: 0; color: var(--mu); padding: 12px 16px;
             font-size: var(--fs-base); cursor: pointer;
             border-bottom: 2px solid transparent; white-space: nowrap; }
nav button.active { color: var(--tx); border-bottom-color: var(--ac); font-weight: 600; }
/* Layout */
.wrap { padding: 18px; max-width: 960px; margin: 0 auto; }
.tab { display: none; } .tab.active { display: block; }
/* Card: theme provides bg/border/radius; we add margin */
.card { margin-bottom: 12px; }
.row { display: flex; justify-content: space-between; align-items: center;
       gap: 12px; flex-wrap: wrap; }
.row h3 { margin: 0; font-size: 15px; font-weight: 600; }
/* Utility */
.mu { color: var(--mu); font-size: 12px; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 999px;
        font-size: 11px; background: var(--bd); color: var(--mu);
        text-transform: uppercase; letter-spacing: .5px; }
.err { color: var(--er); font-size: var(--fs-sm); margin-top: 8px; }
.ok  { color: var(--ok); font-size: var(--fs-sm); margin-top: 8px; }
/* Table */
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--bd); font-size: var(--fs-sm); }
th { color: var(--mu); font-weight: 600; font-size: 11px;
     text-transform: uppercase; letter-spacing: .5px; }
/* Multi-select list */
.multi { max-height: 140px; overflow: auto; border: 1px solid var(--bd);
         border-radius: 8px; padding: 8px; }
.multi label { display: flex; align-items: center; gap: 8px;
               margin: 4px 0; color: var(--tx); font-size: var(--fs-sm); cursor: pointer; }
.multi input { width: auto; min-height: auto; }
/* Dialog */
dialog { background: var(--card); color: var(--tx);
         border: 1px solid var(--bd); border-radius: 12px;
         padding: 20px; max-width: 480px; width: 90%; }
dialog::backdrop { background: rgba(0,0,0,.35); }
dialog h3 { margin: 0 0 14px; }
/* Flex helpers */
.flex { display: flex; gap: 8px; align-items: center; }
.grow { flex: 1; }
/* Area group editor */
.grp-group { background: var(--bg); border: 1px solid var(--bd);
             border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.grp-area-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
.grp-area-row input { flex: 1; }
/* Tight inline buttons within group editor get min 40px */
.grp-group .btn { min-height: 36px; padding: 6px 10px; font-size: 12px; }
</style></head><body>

<header class="app-header">
  <div class="flex">
    <a href="/jobs">← Jobs</a>
    <img src="/BUHL_LOGO.png" class="logo" alt="buhl" style="margin-left:8px" onerror="this.style.display='none'">
    <h1 style="margin-left:8px">Admin</h1>
  </div>
  <div>
    <span id="me" class="mu" style="color:rgba(255,255,255,.6)"></span>
    <button class="hdr-btn" id="logout">Sign out</button>
  </div>
</header>

<nav>
  <button class="active" data-tab="jobs">Jobs</button>
  <button data-tab="users">Users</button>
  <button data-tab="costs">Costs</button>
  <button data-tab="settings">Settings</button>
  <button data-tab="job-types">Job Types</button>
</nav>

<div class="wrap">
  <!-- Jobs tab -->
  <div id="jobs" class="tab active">
    <div class="card"><div class="row"><h3>Create job</h3></div>
      <label>Job name</label><input id="j-name" placeholder="e.g. North Sydney T2">
      <label>Job ID (URL slug)</label><input id="j-id" placeholder="auto">
      <label>Type</label>
      <select id="j-type"><option value="">— select type —</option></select>
      <label>Client (optional)</label><select id="j-client"><option value="">— none —</option></select>
      <div style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Area groups</span>
          <button class="btn sec" id="jc-add-group">+ Add group</button>
        </div>
        <div id="jc-groups"></div>
      </div>
      <div style="margin-top:14px">
        <button class="btn primary" id="j-create">Create job</button>
        <span id="j-msg" style="margin-left:10px"></span>
      </div>
    </div>
    <div id="jobs-list"></div>
  </div>

  <!-- Users tab -->
  <div id="users" class="tab">
    <div class="card"><div class="row"><h3>Create user</h3></div>
      <label>Username</label><input id="u-name">
      <label>Role</label>
      <select id="u-role">
        <option value="tradie">Tradie</option>
        <option value="client">Client</option>
        <option value="admin">Admin</option>
      </select>
      <label id="u-sec-lbl">4-digit PIN</label>
      <input id="u-sec" inputmode="numeric" maxlength="32">
      <div id="u-rate-wrap"><label>Hourly rate ($)</label><input id="u-rate" type="number" inputmode="decimal" value="85"></div>
      <div id="u-jobs-wrap"><label>Assign to jobs</label><div class="multi" id="u-jobs"></div></div>
      <div style="margin-top:14px">
        <button class="btn primary" id="u-create">Create user</button>
        <span id="u-msg" style="margin-left:10px"></span>
      </div>
    </div>
    <div id="users-list"></div>
  </div>

  <!-- Costs tab -->
  <div id="costs" class="tab">
    <div class="card">
      <div class="row"><h3>Labour cost rollup</h3>
        <button class="btn sec" id="c-refresh">Refresh</button>
      </div>
      <div id="c-totals" style="margin-top:12px"></div>
      <div id="c-list" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- Settings tab -->
  <div id="settings" class="tab">
    <div class="card"><h3 style="margin:0 0 16px">Change my password</h3>
      <label>Current password</label><input id="s-cur" type="password">
      <label>New password (min 6 chars)</label><input id="s-new" type="password">
      <div style="margin-top:14px">
        <button class="btn primary" id="s-save">Save</button>
        <span id="s-msg" style="margin-left:10px"></span>
      </div>
    </div>
  </div>

  <!-- Job Types tab -->
  <div id="job-types" class="tab">
    <div class="card"><div class="row"><h3>Create job type</h3></div>
      <label>Name</label><input id="jt-name" placeholder="e.g. Residential fitout">
      <div style="margin-top:14px">
        <button class="btn primary" id="jt-create">Create type</button>
        <span id="jt-msg" style="margin-left:10px"></span>
      </div>
    </div>
    <div id="jt-list"></div>
  </div>
</div>

<!-- Edit job dialog -->
<dialog id="edit-job" style="max-width:520px">
  <h3 id="ej-title">Edit job</h3>
  <input type="hidden" id="ej-id">
  <label>Job name</label><input id="ej-name">
  <label>Type</label><select id="ej-type"><option value="">— none —</option></select>
  <label>Client</label><select id="ej-client"><option value="">— none —</option></select>
  <label>Status</label>
  <select id="ej-status">
    <option value="active">Active</option>
    <option value="complete">Complete</option>
    <option value="archived">Archived</option>
  </select>
  <div style="margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Area groups</span>
      <button class="btn sec" id="ej-add-group">+ Add group</button>
    </div>
    <div id="ej-groups"></div>
  </div>
  <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
    <button class="btn sec" id="ej-cancel">Cancel</button>
    <button class="btn primary" id="ej-save">Save</button>
  </div>
  <div class="err" id="ej-msg"></div>
</dialog>

<!-- Edit job type dialog -->
<dialog id="edit-jt">
  <h3 id="ejt-title">Edit job type</h3>
  <input type="hidden" id="ejt-id">
  <label>Name</label><input id="ejt-name">
  <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
    <button class="btn sec" id="ejt-cancel">Cancel</button>
    <button class="btn danger" id="ejt-delete">Delete</button>
    <button class="btn primary" id="ejt-save">Save</button>
  </div>
  <div class="err" id="ejt-msg"></div>
</dialog>

<!-- Edit user dialog -->
<dialog id="edit-user">
  <h3 id="eu-title">Edit user</h3>
  <input type="hidden" id="eu-id">
  <label>Username</label><input id="eu-name">
  <div id="eu-rate-wrap"><label>Hourly rate ($)</label><input id="eu-rate" type="number"></div>
  <div id="eu-jobs-wrap"><label>Assign to jobs</label><div class="multi" id="eu-jobs"></div></div>
  <label>New PIN / password (leave blank to keep)</label><input id="eu-sec" type="text">
  <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
    <button class="btn sec" id="eu-cancel">Cancel</button>
    <button class="btn danger" id="eu-delete">Delete</button>
    <button class="btn primary" id="eu-save">Save</button>
  </div>
  <div class="err" id="eu-msg"></div>
</dialog>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => '$' + Number(n||0).toLocaleString('en-AU',{maximumFractionDigits:0});
let ME=null, JOBS=[], USERS=[], JOB_TYPES=[];
let jcGroups=[], ejGroups=[];

async function api(url, opts={}) {
  opts.credentials='same-origin';
  opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
  const r = await fetch(url, opts);
  const j = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(j.error || 'request failed');
  return j;
}

async function boot() {
  try { const r = await api('/api/auth?action=me'); ME = r.user; }
  catch { location.href='/login'; return; }
  if (ME.role !== 'admin') { location.href='/jobs'; return; }
  document.getElementById('me').textContent = ME.username + ' · admin';
  document.getElementById('logout').onclick = async () => {
    await api('/api/auth?action=logout', {method:'POST'}); location.href='/login';
  };
  document.querySelectorAll('nav button').forEach(b => b.onclick = () => switchTab(b.dataset.tab));
  wireJobs(); wireUsers(); wireCosts(); wireSettings(); wireJobTypes();
  await refreshAll();
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector('nav button[data-tab="'+id+'"]').classList.add('active');
  if (id==='costs') loadCosts();
}

async function refreshAll() {
  const [jr, ur, jtr] = await Promise.all([
    api('/api/jobs'),
    api('/api/users'),
    api('/api/job-types?action=list'),
  ]);
  JOBS = jr.jobs || [];
  USERS = ur.users || [];
  JOB_TYPES = jtr.jobTypes || [];
  renderJobs(); renderUsers(); populateJobForm(); populateUserForm(); renderJobTypes();
}

// ── Area group editor ─────────────────────────────────────────────────────
function grpState(cid) { return cid==='jc-groups' ? jcGroups : ejGroups; }
function grpGroupName(gi,cid,v) { grpState(cid)[gi].name=v; }
function grpAreaName(gi,ai,cid,v) { grpState(cid)[gi].areas[ai].name=v; }
function grpAddArea(gi,cid) { grpState(cid)[gi].areas.push({id:null,name:''}); renderGrpEditor(cid,grpState(cid)); }
function grpRemoveArea(gi,ai,cid) { grpState(cid)[gi].areas.splice(ai,1); renderGrpEditor(cid,grpState(cid)); }
function grpAddGroup(cid) { grpState(cid).push({id:null,name:'',areas:[]}); renderGrpEditor(cid,grpState(cid)); }
function grpRemoveGroup(gi,cid) { grpState(cid).splice(gi,1); renderGrpEditor(cid,grpState(cid)); }
function renderGrpEditor(cid, groups) {
  const el = document.getElementById(cid);
  if (!groups.length) { el.innerHTML='<div class="mu" style="font-size:12px;padding:4px 0">No groups — click "+ Add group" above</div>'; return; }
  el.innerHTML = groups.map((g,gi) =>
    '<div class="grp-group">' +
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">' +
    '<input style="flex:1" placeholder="Group name e.g. Units" value="'+esc(g.name)+'" oninput="grpGroupName('+gi+',\''+cid+'\',this.value)">' +
    '<button class="btn danger" onclick="grpRemoveGroup('+gi+',\''+cid+'\')">Remove</button></div>' +
    g.areas.map((a,ai) =>
      '<div class="grp-area-row">' +
      '<input placeholder="Area name" value="'+esc(a.name)+'" oninput="grpAreaName('+gi+','+ai+',\''+cid+'\',this.value)">' +
      '<button class="btn sec" onclick="grpRemoveArea('+gi+','+ai+',\''+cid+'\')">×</button></div>'
    ).join('') +
    '<button class="btn sec" style="margin-top:4px" onclick="grpAddArea('+gi+',\''+cid+'\')">+ Add area</button>' +
    '</div>'
  ).join('');
}

// ── Jobs ──────────────────────────────────────────────────────────────────
function wireJobs() {
  document.getElementById('j-name').addEventListener('input', e => {
    const slug = e.target.value.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    document.getElementById('j-id').placeholder = slug || 'auto';
  });
  renderGrpEditor('jc-groups', jcGroups);
  document.getElementById('jc-add-group').onclick = () => grpAddGroup('jc-groups');
  document.getElementById('j-create').onclick = async () => {
    const name = document.getElementById('j-name').value.trim();
    const id = document.getElementById('j-id').value.trim();
    const type = document.getElementById('j-type').value || null;
    const clientUserId = document.getElementById('j-client').value || null;
    const msg = document.getElementById('j-msg'); msg.className=''; msg.textContent='';
    if (!name) { msg.className='err'; msg.textContent='Name required'; return; }
    if (!type) { msg.className='err'; msg.textContent='Type required'; return; }
    if (!jcGroups.length) { msg.className='err'; msg.textContent='At least one area group required'; return; }
    for (const g of jcGroups) {
      if (!g.name.trim()) { msg.className='err'; msg.textContent='All group names must be non-empty'; return; }
      if (!g.areas.length) { msg.className='err'; msg.textContent='Each group must have at least one area'; return; }
      for (const a of g.areas) {
        if (!a.name.trim()) { msg.className='err'; msg.textContent='All area names must be non-empty'; return; }
      }
    }
    const areaGroups = jcGroups.map(g=>({name:g.name,areas:g.areas.map(a=>({name:a.name}))}));
    try {
      await api('/api/jobs', { method:'POST', body:{name, id: id||undefined, type, clientUserId, areaGroups}});
      document.getElementById('j-name').value=''; document.getElementById('j-id').value='';
      document.getElementById('j-type').value=''; document.getElementById('j-client').value='';
      jcGroups=[]; renderGrpEditor('jc-groups', jcGroups);
      msg.className='ok'; msg.textContent='Created'; await refreshAll();
    } catch(e) { msg.className='err'; msg.textContent=e.message; }
  };
  document.getElementById('ej-cancel').onclick = ()=>document.getElementById('edit-job').close();
  document.getElementById('ej-add-group').onclick = ()=>grpAddGroup('ej-groups');
  document.getElementById('ej-save').onclick = async () => {
    const id = document.getElementById('ej-id').value;
    const name = document.getElementById('ej-name').value.trim();
    const type = document.getElementById('ej-type').value || null;
    const clientUserId = document.getElementById('ej-client').value || null;
    const status = document.getElementById('ej-status').value;
    const msg = document.getElementById('ej-msg'); msg.textContent='';
    if (!name) { msg.textContent='Name required'; return; }
    if (!type) { msg.textContent='Type required'; return; }
    if (!ejGroups.length) { msg.textContent='At least one area group required'; return; }
    for (const g of ejGroups) {
      if (!g.name.trim()) { msg.textContent='All group names must be non-empty'; return; }
      if (!g.areas.length) { msg.textContent='Each group must have at least one area'; return; }
      for (const a of g.areas) {
        if (!a.name.trim()) { msg.textContent='All area names must be non-empty'; return; }
      }
    }
    const areaGroups = ejGroups.map(g=>({
      ...(g.id?{id:g.id}:{}), name:g.name,
      areas:g.areas.map(a=>({...(a.id?{id:a.id}:{}),name:a.name}))
    }));
    try {
      await api('/api/jobs', { method:'PUT', body:{id, name, type, clientUserId, status, areaGroups}});
      document.getElementById('edit-job').close();
      await refreshAll();
    } catch(e) { msg.textContent=e.message; }
  };
}

function openEditJob(id) {
  const j = JOBS.find(x=>x.id===id); if (!j) return;
  document.getElementById('ej-id').value = j.id;
  document.getElementById('ej-name').value = j.name;
  document.getElementById('ej-title').textContent = 'Edit ' + j.name;
  document.getElementById('ej-status').value = j.status || 'active';
  document.getElementById('ej-msg').textContent = '';
  const tSel = document.getElementById('ej-type');
  tSel.innerHTML = '<option value="">— none —</option>' +
    JOB_TYPES.map(t=>'<option value="'+esc(t.id)+'"'+(j.type===t.id?' selected':'')+'>'+esc(t.name)+'</option>').join('');
  const cSel = document.getElementById('ej-client');
  cSel.innerHTML = '<option value="">— none —</option>' +
    USERS.filter(u=>u.role==='client').map(u=>'<option value="'+esc(u.id)+'"'+(j.clientUserId===u.id?' selected':'')+'>'+esc(u.username)+'</option>').join('');
  ejGroups = (j.areaGroups||[]).map(g=>({id:g.id||null,name:g.name,areas:(g.areas||[]).map(a=>({id:a.id||null,name:a.name}))}));
  renderGrpEditor('ej-groups', ejGroups);
  document.getElementById('edit-job').showModal();
}

function populateJobForm() {
  const tSel = document.getElementById('j-type');
  const prev = tSel.value;
  tSel.innerHTML = '<option value="">— select type —</option>' +
    JOB_TYPES.map(t=>'<option value="'+esc(t.id)+'">'+esc(t.name)+'</option>').join('');
  if (prev) tSel.value = prev;
  const cSel = document.getElementById('j-client');
  const prevC = cSel.value;
  cSel.innerHTML='<option value="">— none —</option>';
  USERS.filter(u=>u.role==='client').forEach(u=>{
    const o=document.createElement('option'); o.value=u.id; o.textContent=u.username; cSel.appendChild(o);
  });
  if (prevC) cSel.value = prevC;
}

function renderJobs() {
  const el = document.getElementById('jobs-list');
  if (!JOBS.length) { el.innerHTML='<div style="color:var(--mu);padding:20px 0;font-size:13px">No jobs yet.</div>'; return; }
  el.innerHTML = JOBS.map(j => {
    const client = USERS.find(u=>u.id===j.clientUserId);
    const typeName = JOB_TYPES.find(t=>t.id===j.type);
    const st = j.status || 'active';
    return '<div class="card"><div class="row"><div>' +
      '<h3>'+esc(j.name)+'</h3>' +
      '<div class="mu">'+esc(j.id)+' · <span class="badge '+st+'">'+st+'</span>' +
      (typeName?' · '+esc(typeName.name):'') +
      (client?' · '+esc(client.username):'')+'</div></div>' +
      '<div style="display:flex;gap:8px">' +
      '<button class="btn sec" data-edit-job="'+esc(j.id)+'">Edit</button>' +
      '<a class="btn sec" href="/jobs/'+esc(j.id)+'">Open</a>' +
      '</div></div></div>';
  }).join('');
  el.querySelectorAll('[data-edit-job]').forEach(b=>b.onclick=()=>openEditJob(b.dataset.editJob));
}

// ── Users ─────────────────────────────────────────────────────────────────
function wireUsers() {
  const role = document.getElementById('u-role');
  const secLbl = document.getElementById('u-sec-lbl');
  const sec = document.getElementById('u-sec');
  const rateWrap = document.getElementById('u-rate-wrap');
  const jobsWrap = document.getElementById('u-jobs-wrap');
  function updateRoleUI(){
    const r = role.value;
    if (r==='admin'){ secLbl.textContent='Password (min 6 chars)'; sec.type='password'; sec.maxLength=64; sec.inputMode='text'; }
    else { secLbl.textContent='4-digit PIN'; sec.type='text'; sec.inputMode='numeric'; sec.maxLength=4; }
    rateWrap.style.display = r==='tradie'?'':'none';
    jobsWrap.style.display = r==='tradie'?'':'none';
  }
  role.onchange = updateRoleUI; updateRoleUI();
  document.getElementById('u-create').onclick = async () => {
    const body = {
      username: document.getElementById('u-name').value.trim(),
      role: role.value,
      secret: sec.value,
    };
    if (body.role==='tradie') {
      body.hourlyRate = Number(document.getElementById('u-rate').value)||0;
      body.assignedJobIds = Array.from(document.querySelectorAll('#u-jobs input:checked')).map(i=>i.value);
    }
    const msg = document.getElementById('u-msg'); msg.className=''; msg.textContent='';
    try {
      await api('/api/users', { method:'POST', body });
      document.getElementById('u-name').value=''; sec.value='';
      msg.className='ok'; msg.textContent='Created'; await refreshAll();
    } catch(e){ msg.className='err'; msg.textContent=e.message; }
  };
}

function populateUserForm() {
  const el = document.getElementById('u-jobs');
  el.innerHTML = JOBS.map(j=>'<label><input type="checkbox" value="'+esc(j.id)+'"> '+esc(j.name)+'</label>').join('') || '<div class="mu">No jobs yet</div>';
}

function renderUsers() {
  const el = document.getElementById('users-list');
  if (!USERS.length) { el.innerHTML='<div style="color:var(--mu);padding:20px 0;font-size:13px">No users yet.</div>'; return; }
  el.innerHTML = '<div class="card"><table><thead><tr><th>Username</th><th>Role</th><th>Rate</th><th>Jobs</th><th></th></tr></thead><tbody>' +
    USERS.map(u=>'<tr><td>'+esc(u.username)+'</td><td><span class="badge">'+esc(u.role)+'</span></td><td>'+(u.role==='tradie'?fmt(u.hourlyRate)+'/hr':'—')+'</td><td class="mu">'+((u.assignedJobIds||[]).length?(u.assignedJobIds||[]).length+' assigned':'—')+'</td><td><button class="btn sec" data-edit="'+esc(u.id)+'">Edit</button></td></tr>').join('') + '</tbody></table></div>';
  el.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEditUser(b.dataset.edit));
}

function openEditUser(id) {
  const u = USERS.find(x=>x.id===id); if (!u) return;
  document.getElementById('eu-id').value = u.id;
  document.getElementById('eu-name').value = u.username;
  document.getElementById('eu-title').textContent = 'Edit ' + u.username + ' (' + u.role + ')';
  document.getElementById('eu-rate').value = u.hourlyRate || 0;
  document.getElementById('eu-rate-wrap').style.display = u.role==='tradie'?'':'none';
  document.getElementById('eu-jobs-wrap').style.display = u.role==='tradie'?'':'none';
  document.getElementById('eu-jobs').innerHTML = JOBS.map(j=>
    '<label><input type="checkbox" value="'+esc(j.id)+'" '+((u.assignedJobIds||[]).includes(j.id)?'checked':'')+'> '+esc(j.name)+'</label>'
  ).join('') || '<div class="mu">No jobs</div>';
  document.getElementById('eu-sec').value = '';
  document.getElementById('eu-msg').textContent = '';
  document.getElementById('edit-user').showModal();
}

document.getElementById('eu-cancel').onclick = ()=>document.getElementById('edit-user').close();
document.getElementById('eu-save').onclick = async () => {
  const id = document.getElementById('eu-id').value;
  const u = USERS.find(x=>x.id===id);
  const body = { id, username: document.getElementById('eu-name').value.trim() };
  if (u.role==='tradie') {
    body.hourlyRate = Number(document.getElementById('eu-rate').value)||0;
    body.assignedJobIds = Array.from(document.querySelectorAll('#eu-jobs input:checked')).map(i=>i.value);
  }
  const sec = document.getElementById('eu-sec').value;
  if (sec) body.secret = sec;
  const msg = document.getElementById('eu-msg'); msg.textContent='';
  try {
    await api('/api/users', { method:'PUT', body });
    document.getElementById('edit-user').close();
    await refreshAll();
  } catch(e) { msg.textContent = e.message; }
};
document.getElementById('eu-delete').onclick = async () => {
  const id = document.getElementById('eu-id').value;
  if (!confirm('Delete this user?')) return;
  try { await api('/api/users?id='+encodeURIComponent(id), { method:'DELETE' });
    document.getElementById('edit-user').close(); await refreshAll();
  } catch(e){ document.getElementById('eu-msg').textContent = e.message; }
};

// ── Costs ─────────────────────────────────────────────────────────────────
function wireCosts() { document.getElementById('c-refresh').onclick = loadCosts; }
async function loadCosts() {
  try {
    const r = await api('/api/costs');
    const th = r.totals.hours.toFixed(1);
    const tc = fmt(r.totals.cost);
    document.getElementById('c-totals').innerHTML =
      '<div style="display:flex;gap:32px;flex-wrap:wrap;padding:8px 0">'+
      '<div><div class="mu">Total hours</div><div style="font-size:22px;font-weight:700">'+th+'</div></div>'+
      '<div><div class="mu">Total labour cost</div><div style="font-size:22px;font-weight:700">'+tc+'</div></div></div>';
    const rows = r.jobs.map(j=>'<tr><td>'+esc(j.name)+'</td><td>'+j.hours.toFixed(1)+'</td><td>'+fmt(j.cost)+'</td></tr>').join('');
    document.getElementById('c-list').innerHTML =
      '<table><thead><tr><th>Job</th><th>Hours</th><th>Labour cost</th></tr></thead><tbody>'+(rows||'<tr><td colspan=3 class=mu>No data</td></tr>')+'</tbody></table>';
  } catch(e) { document.getElementById('c-list').innerHTML = '<div class="err">'+esc(e.message)+'</div>'; }
}

// ── Settings ──────────────────────────────────────────────────────────────
function wireSettings() {
  document.getElementById('s-save').onclick = async () => {
    const msg = document.getElementById('s-msg'); msg.className=''; msg.textContent='';
    try {
      await api('/api/auth?action=change-password', { method:'POST', body:{
        currentSecret: document.getElementById('s-cur').value,
        newSecret: document.getElementById('s-new').value,
      }});
      msg.className='ok'; msg.textContent='Password updated';
      document.getElementById('s-cur').value=''; document.getElementById('s-new').value='';
    } catch(e){ msg.className='err'; msg.textContent=e.message; }
  };
}

// ── Job Types ─────────────────────────────────────────────────────────────
function renderJobTypes() {
  const el = document.getElementById('jt-list');
  if (!JOB_TYPES.length) { el.innerHTML='<div style="color:var(--mu);padding:20px 0;font-size:13px">No job types yet.</div>'; return; }
  el.innerHTML = '<div class="card"><table><thead><tr><th>Name</th><th>Jobs using</th><th></th></tr></thead><tbody>' +
    JOB_TYPES.map(t => {
      const count = JOBS.filter(j=>j.type===t.id).length;
      return '<tr><td>'+esc(t.name)+'</td><td class="mu">'+(count||'—')+'</td><td><button class="btn sec" data-edit-jt="'+esc(t.id)+'">Edit</button></td></tr>';
    }).join('') + '</tbody></table></div>';
  el.querySelectorAll('[data-edit-jt]').forEach(b=>b.onclick=()=>openEditJt(b.dataset.editJt));
}

function openEditJt(id) {
  const t = JOB_TYPES.find(x=>x.id===id); if (!t) return;
  document.getElementById('ejt-id').value = t.id;
  document.getElementById('ejt-name').value = t.name;
  document.getElementById('ejt-title').textContent = 'Edit ' + t.name;
  document.getElementById('ejt-msg').textContent = '';
  document.getElementById('edit-jt').showModal();
}

function wireJobTypes() {
  document.getElementById('jt-create').onclick = async () => {
    const name = document.getElementById('jt-name').value.trim();
    const msg = document.getElementById('jt-msg'); msg.className=''; msg.textContent='';
    if (!name) { msg.className='err'; msg.textContent='Name required'; return; }
    try {
      await api('/api/job-types?action=create',{method:'POST',body:{name}});
      document.getElementById('jt-name').value='';
      msg.className='ok'; msg.textContent='Created';
      await refreshAll();
    } catch(e) { msg.className='err'; msg.textContent=e.message; }
  };
  document.getElementById('ejt-cancel').onclick = ()=>document.getElementById('edit-jt').close();
  document.getElementById('ejt-save').onclick = async () => {
    const id = document.getElementById('ejt-id').value;
    const name = document.getElementById('ejt-name').value.trim();
    const msg = document.getElementById('ejt-msg'); msg.textContent='';
    if (!name) { msg.textContent='Name required'; return; }
    try {
      await api('/api/job-types?action=update',{method:'POST',body:{id,name}});
      document.getElementById('edit-jt').close();
      await refreshAll();
    } catch(e) { msg.textContent=e.message; }
  };
  document.getElementById('ejt-delete').onclick = async () => {
    const id = document.getElementById('ejt-id').value;
    const typeName = document.getElementById('ejt-name').value;
    if (!confirm('Delete job type "'+typeName+'"?')) return;
    const msg = document.getElementById('ejt-msg'); msg.textContent='';
    try {
      await api('/api/job-types?action=delete',{method:'POST',body:{id}});
      document.getElementById('edit-jt').close();
      await refreshAll();
    } catch(e) { msg.textContent=e.message; }
  };
}

boot();
</script></body></html>
