let STAGES_JOB=null;        // last loaded job (rich stages)
let STAGES_DRAFT=null;      // editable copy of {roughIn:[], fitOff:[]}
let ITP_TEMPLATES=[];       // {id, name, items:[...]}

const REQ_TOGGLES=[
  ['photo',                 'Photo required'],
  ['note',                  'Note required'],
  ['itp',                   'ITP required'],
  ['independentReview',     'Independent review required'],
  ['blocksSelfReview',      'Block self-review'],
  ['blockIfOpenSnags',      'Block if open snags'],
  ['blockIfSupersededPlan', 'Block if superseded plan'],
  ['blockIfMissingGear',    'Block if missing gear'],
  ['adminSignoff',          'Admin sign-off required'],
];

function stageSummary(s){
  const r=s.requires||{};
  const parts=[];
  if(r.photo) parts.push('Photo');
  if(r.note) parts.push('Note');
  if(r.itp) parts.push('ITP');
  if(r.independentReview) parts.push('Independent review');
  if(r.blockIfOpenSnags) parts.push('Blocks open snags');
  if(r.adminSignoff) parts.push('Admin sign-off');
  return parts.length?parts.join(' · '):'No requirements';
}

async function openStagesEditor(){
  const el=document.getElementById('stages');
  el.innerHTML='<div style="padding:20px;color:#888;">Loading stage requirements…</div>';
  try{
    const [jr,tr]=await Promise.all([
      fetch('/api/jobs?id='+encodeURIComponent(JOB_ID),{credentials:'same-origin'}),
      fetch('/api/itp?scope=templates',{credentials:'same-origin'}),
    ]);
    if(!jr.ok){el.innerHTML=`<div style="padding:20px;color:#c0312f;">Could not load job (${jr.status}). ${ME&&ME.role!=='admin'?'Requirements editing is admin-only.':''}</div>`;return;}
    const jb=await jr.json();
    STAGES_JOB=jb.job;
    STAGES_DRAFT={
      roughIn:(STAGES_JOB.stages&&STAGES_JOB.stages.roughIn||[]).map(s=>structuredCopy(s)),
      fitOff: (STAGES_JOB.stages&&STAGES_JOB.stages.fitOff||[]).map(s=>structuredCopy(s)),
    };
    ITP_TEMPLATES=(tr.ok?((await tr.json()).templates||[]):[]);
    renderStagesEditor();
  }catch(e){
    el.innerHTML='<div style="padding:20px;color:#c0312f;">Network error loading stages.</div>';
  }
}

function structuredCopy(o){return JSON.parse(JSON.stringify(o));}

function renderStagesEditor(){
  const el=document.getElementById('stages');
  if(!STAGES_DRAFT){el.innerHTML='';return;}
  const groups=[
    {key:'roughIn',label:'Rough-In'},
    {key:'fitOff', label:'Fit-Off'},
  ];
  let h=`<div style="padding:18px 22px;max-width:1100px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <h2 style="margin:0;font-size:20px;">Stage requirements</h2>
      <button onclick="saveStages()" style="margin-left:auto;background:#1f8b5a;color:#fff;border:0;padding:9px 14px;border-radius:6px;font-weight:600;cursor:pointer;">Save</button>
      <button onclick="openStagesEditor()" style="background:none;border:1px solid #ccc;padding:9px 14px;border-radius:6px;cursor:pointer;">Reset</button>
    </div>
    <p style="margin:0 0 18px;color:#666;font-size:13px;">Phil will enforce these requirements before each stage can be marked done.</p>`;
  groups.forEach(g=>{
    h+=`<div style="margin-top:20px;"><h3 style="margin:0 0 8px;font-size:15px;color:#444;">${g.label}</h3>`;
    const list=STAGES_DRAFT[g.key]||[];
    if(!list.length){h+='<div style="color:#888;font-size:13px;padding:8px 0;">No stages.</div>';}
    list.forEach((s,i)=>{h+=stageCardHtml(g.key,s,i,list.length);});
    h+=`<button onclick="addStage('${g.key}')" style="margin-top:6px;background:none;border:1px dashed #aaa;padding:8px 14px;border-radius:6px;cursor:pointer;color:#666;">+ Add ${g.label} stage</button></div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

function stageCardHtml(group,stage,idx,total){
  const ev=stage.evidence||{minPhotos:0,minNotes:0};
  const tplOpts=ITP_TEMPLATES.map(t=>`<option value="${esc(t.id)}" ${stage.itpTemplateId===t.id?'selected':''}>${esc(t.name)}</option>`).join('');
  const togglesHtml=REQ_TOGGLES.map(([key,label])=>{
    const checked=stage.requires&&stage.requires[key]?'checked':'';
    return `<label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:3px 0;">
      <input type="checkbox" ${checked} onchange="setStageReq('${group}',${idx},'${key}',this.checked)"> ${label}
    </label>`;
  }).join('');
  return `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <input value="${esc(stage.name||'')}" onchange="setStageField('${group}',${idx},'name',this.value)" style="flex:1;font-weight:600;font-size:15px;border:1px solid #ddd;padding:6px 10px;border-radius:6px;">
      <button onclick="moveStage('${group}',${idx},-1)" ${idx===0?'disabled':''} title="Move up" style="background:none;border:1px solid #ccc;padding:6px 9px;border-radius:6px;cursor:pointer;">↑</button>
      <button onclick="moveStage('${group}',${idx},1)" ${idx===total-1?'disabled':''} title="Move down" style="background:none;border:1px solid #ccc;padding:6px 9px;border-radius:6px;cursor:pointer;">↓</button>
      <button onclick="removeStage('${group}',${idx})" title="Remove" style="background:none;border:1px solid #c0312f;color:#c0312f;padding:6px 9px;border-radius:6px;cursor:pointer;">Remove</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-top:10px;">${togglesHtml}</div>
    <div style="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;align-items:center;">
      <label style="font-size:13px;">Min photos
        <input type="number" min="0" value="${Number(ev.minPhotos)||0}" onchange="setStageEv('${group}',${idx},'minPhotos',this.value)" style="width:60px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;margin-left:4px;">
      </label>
      <label style="font-size:13px;">Min notes
        <input type="number" min="0" value="${Number(ev.minNotes)||0}" onchange="setStageEv('${group}',${idx},'minNotes',this.value)" style="width:60px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;margin-left:4px;">
      </label>
      <label style="font-size:13px;">ITP template
        <select onchange="setStageField('${group}',${idx},'itpTemplateId',this.value)" style="padding:4px 6px;border:1px solid #ddd;border-radius:4px;margin-left:4px;">
          <option value="">— none —</option>${tplOpts}
        </select>
      </label>
      <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
        <input type="checkbox" ${stage.active!==false?'checked':''} onchange="setStageField('${group}',${idx},'active',this.checked)"> Active
      </label>
    </div>
    <div style="margin-top:8px;font-size:12px;color:#666;">${stageSummary(stage)}</div>
  </div>`;
}

function setStageField(group,idx,key,val){
  if(!STAGES_DRAFT[group][idx])return;
  const stage=STAGES_DRAFT[group][idx];
  // Preserve old name in legacyNames so existing dwelling data isn't orphaned.
  if(key==='name'&&val&&stage.name&&val!==stage.name){
    stage.legacyNames=Array.isArray(stage.legacyNames)?stage.legacyNames:[];
    if(stage.legacyNames.indexOf(stage.name)===-1)stage.legacyNames.push(stage.name);
  }
  stage[key]=val;
  if(key==='name')renderStagesEditor(); // summary may have changed
}
function setStageReq(group,idx,key,val){
  if(!STAGES_DRAFT[group][idx])return;
  STAGES_DRAFT[group][idx].requires=STAGES_DRAFT[group][idx].requires||{};
  STAGES_DRAFT[group][idx].requires[key]=!!val;
  // Independent review implies block self-review unless admin explicitly unchecks.
  if(key==='independentReview'&&val&&STAGES_DRAFT[group][idx].requires.blocksSelfReview===undefined){
    STAGES_DRAFT[group][idx].requires.blocksSelfReview=true;
  }
  renderStagesEditor();
}
function setStageEv(group,idx,key,val){
  if(!STAGES_DRAFT[group][idx])return;
  STAGES_DRAFT[group][idx].evidence=STAGES_DRAFT[group][idx].evidence||{};
  STAGES_DRAFT[group][idx].evidence[key]=Math.max(0,parseInt(val,10)||0);
}
function moveStage(group,idx,dir){
  const list=STAGES_DRAFT[group];
  const j=idx+dir;
  if(j<0||j>=list.length)return;
  [list[idx],list[j]]=[list[j],list[idx]];
  list.forEach((s,i)=>{s.order=i;});
  renderStagesEditor();
}
function removeStage(group,idx){
  if(!confirm('Remove this stage?'))return;
  STAGES_DRAFT[group].splice(idx,1);
  STAGES_DRAFT[group].forEach((s,i)=>{s.order=i;});
  renderStagesEditor();
}
function addStage(group){
  const name=prompt('New stage name:');
  if(!name||!name.trim())return;
  const list=STAGES_DRAFT[group];
  list.push({
    name:name.trim(), category:group, order:list.length, active:true,
    requires:{photo:false,note:false,itp:false,independentReview:false,blocksSelfReview:false,blockIfOpenSnags:false,blockIfSupersededPlan:false,blockIfMissingGear:false,adminSignoff:false},
    evidence:{minPhotos:0,minNotes:0}, itpTemplateId:null,
  });
  renderStagesEditor();
}
async function saveStages(){
  if(!STAGES_DRAFT)return;
  try{
    const r=await fetch('/api/jobs',{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify({id:JOB_ID,stages:STAGES_DRAFT})});
    const j=await r.json();
    if(!r.ok){alert('Save failed: '+(j.error||r.status));return;}
    STAGES_JOB=j.job;
    // Update the live JOB source so Dashboard/Units/Townhouses/Review/Missing
    // Evidence immediately reflect the new stage config without a reload.
    JOB=j.job;
    STAGES_DRAFT={
      roughIn:(j.job.stages&&j.job.stages.roughIn||[]).map(s=>structuredCopy(s)),
      fitOff: (j.job.stages&&j.job.stages.fitOff||[]).map(s=>structuredCopy(s)),
    };
    renderStagesEditor();
    renderAll();
    alert('Requirements saved. Old completion data is preserved via stage aliases.');
  }catch(e){alert('Network error saving stages.');}
}

// ════════════════════════════════════════════════════════════════
// REVIEW QUEUE — admin reviews Phil's submitted work + resolved snags.
// ════════════════════════════════════════════════════════════════
let REVIEW_JOB=null, REVIEW_DATA=null, REVIEW_PHOTOS=[], REVIEW_NOTES=[], REVIEW_ITP=[];

async function openReview(){
  const el=document.getElementById('review');
  el.innerHTML='<div style="padding:20px;color:#888;">Loading review queue…</div>';
  try{
    const [jr,dr,pr,ir]=await Promise.all([
      fetch('/api/jobs?id='+encodeURIComponent(JOB_ID),{credentials:'same-origin'}),
      fetch('/api/data?jobId='+encodeURIComponent(JOB_ID)+'&t='+Date.now(),{credentials:'same-origin'}),
      fetch('/api/photos?jobId='+encodeURIComponent(JOB_ID),{credentials:'same-origin'}),
      fetch('/api/itp?jobId='+encodeURIComponent(JOB_ID),{credentials:'same-origin'}),
    ]);
    REVIEW_JOB=jr.ok?(await jr.json()).job:null;
    REVIEW_DATA=dr.ok?(await dr.json()):{dwellings:{},snags:[],notes:[]};
    REVIEW_PHOTOS=pr.ok?((await pr.json()).photos||[]):[];
    REVIEW_NOTES=Array.isArray(REVIEW_DATA.notes)?REVIEW_DATA.notes:[];
    REVIEW_ITP=ir.ok?((await ir.json()).submissions||[]):[];
    renderReview();
  }catch(e){
    el.innerHTML='<div style="padding:20px;color:#c0312f;">Network error loading review queue.</div>';
  }
}

function allStagesForJob(j){
  if(!j||!j.stages)return [];
  return [...(j.stages.roughIn||[]),...(j.stages.fitOff||[])]
    .filter(s=>!s||s.active!==false);
}
// Tolerant stage-def lookup by name, id, legacy alias, or case-insensitive name.
function findStageDefByAnyKey(defs,key){
  const lc=String(key||'').toLowerCase();
  return defs.find(s=>s.name===key)
      ||defs.find(s=>s.id===key)
      ||defs.find(s=>Array.isArray(s.legacyNames)&&s.legacyNames.indexOf(key)>=0)
      ||defs.find(s=>String(s.name||'').toLowerCase()===lc)
      ||null;
}
// Names that should be treated as the same stage when matching photos/notes/snags.
function stageReviewAliases(stage){
  if(!stage)return [];
  const out=[];
  if(stage.name)out.push(stage.name);
  if(stage.id)  out.push(stage.id);
  if(Array.isArray(stage.legacyNames))out.push(...stage.legacyNames);
  return out;
}
function reviewEq(a,b){return String(a||'').trim().toLowerCase()===String(b||'').trim().toLowerCase();}
function evidenceFor(area,stage){
  // stage may be a rich object (preferred) or a legacy string.
  const aliases=typeof stage==='object'&&stage?stageReviewAliases(stage):[String(stage)];
  const match=(...vals)=>vals.some(v=>v&&aliases.some(a=>reviewEq(a,v)));
  const photos=REVIEW_PHOTOS.filter(p=>p.meta&&reviewEq(p.meta.area,area)&&match(p.meta.stage,p.meta.stageId));
  const notes =REVIEW_NOTES.filter(n=>reviewEq(n.dwelling,area)&&match(n.stage,n.stageId));
  const openSnags=(REVIEW_DATA.snags||[]).filter(s=>(s.status||'Open')==='Open'&&reviewEq(s.dwelling,area)&&match(s.stage,s.stageId));
  return {photos,notes,openSnags};
}

function renderReview(){
  const el=document.getElementById('review');
  if(!REVIEW_JOB){el.innerHTML='<div style="padding:20px;">No job loaded.</div>';return;}

  // 1. Stages waiting for review (alias-aware so renamed stages still match)
  const waiting=[];
  const missing=[];
  const dws=REVIEW_DATA.dwellings||{};
  const stageDefs=allStagesForJob(REVIEW_JOB);
  Object.entries(dws).forEach(([area,row])=>{
    Object.entries(row).forEach(([stageKey,info])=>{
      if(!info||typeof info!=='object')return;
      const def=findStageDefByAnyKey(stageDefs,stageKey);
      // Display the *current* configured name when a def is found, falling
      // back to the stored key for stages no longer in the config.
      const stageName=def?def.name:stageKey;
      const status=String(info.status||'Not started');
      if(['Submitted','Reopened','Review'].includes(status)){
        waiting.push({area,stageName,stageKey,status,info,def});
      }
      if(['In progress','Blocked'].includes(status)&&def){
        const ev=evidenceFor(area,def);
        const reqs=def.requires||{};
        const minP=Math.max((def.evidence&&def.evidence.minPhotos)||0,reqs.photo?1:0);
        const minN=Math.max((def.evidence&&def.evidence.minNotes)||0,reqs.note?1:0);
        const gaps=[];
        if(minP>ev.photos.length) gaps.push(`Missing photo (${ev.photos.length}/${minP})`);
        if(minN>ev.notes.length)  gaps.push(`Missing note (${ev.notes.length}/${minN})`);
        if(reqs.itp&&!REVIEW_ITP.some(s=>s.areaId===area&&stageReviewAliases(def).some(a=>reviewEq(s.stageId,a)||reviewEq(s.stageName,a))&&['submitted','approved'].includes(s.status))) gaps.push('ITP not submitted');
        if(reqs.blockIfOpenSnags&&ev.openSnags.length) gaps.push(`${ev.openSnags.length} open snag${ev.openSnags.length===1?'':'s'}`);
        if(gaps.length) missing.push({area,stageName,status,gaps});
      }
    });
  });

  // 2. Resolved snags awaiting closure
  const resolved=(REVIEW_DATA.snags||[]).filter(s=>(s.status||'')==='Resolved');

  let h=`<div style="padding:18px 22px;max-width:1100px;">
    <h2 style="margin:0 0 14px;font-size:20px;">Review queue</h2>

    <h3 style="font-size:14px;color:#444;margin:18px 0 6px;">Waiting for review (${waiting.length})</h3>`;
  if(!waiting.length){h+='<div style="color:#888;font-size:13px;padding:6px 0;">Nothing waiting.</div>';}
  waiting.forEach(w=>{
    const def=w.def;
    const ev=def?evidenceFor(w.area,def):{photos:[],notes:[],openSnags:[]};
    const reqs=(def&&def.requires)||{};
    const itpAliases=def?stageReviewAliases(def):[];
    const itpHere=REVIEW_ITP.filter(s=>s.areaId===w.area&&itpAliases.some(a=>reviewEq(s.stageId,a)||reviewEq(s.stageName,a)));
    const evidenceBits=[
      reqs.photo||((def&&def.evidence&&def.evidence.minPhotos)||0)>0?`${ev.photos.length} photo${ev.photos.length===1?'':'s'}`:'',
      reqs.note ||((def&&def.evidence&&def.evidence.minNotes )||0)>0?`${ev.notes.length} note${ev.notes.length===1?'':'s'}`:'',
      reqs.itp?(itpHere.some(s=>s.status==='approved')?'ITP approved':itpHere.some(s=>s.status==='submitted')?'ITP submitted':'ITP missing'):'',
      reqs.blockIfOpenSnags?(ev.openSnags.length?`${ev.openSnags.length} open snag${ev.openSnags.length===1?'':'s'}`:'no open snags'):'',
    ].filter(Boolean).join(' · ')||'No specific requirements';
    h+=`<div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="flex:1;min-width:160px;">
          <div style="font-weight:600;">${esc(w.area)} — ${esc(w.stageName)}</div>
          <div style="font-size:12px;color:#666;margin-top:2px;">Submitted by ${esc(w.info.completedByName||w.info.updatedBy||'—')} · ${esc(w.info.completedAt||w.info.updatedAt||'')}</div>
        </div>
        <button onclick="reviewStage('${esc(w.area)}','${esc(w.stageName)}','approve')" style="background:#1f8b5a;color:#fff;border:0;padding:7px 12px;border-radius:6px;font-weight:600;cursor:pointer;">Approve</button>
        <button onclick="reviewStage('${esc(w.area)}','${esc(w.stageName)}','send-back')" style="background:#fff;border:1px solid #d68a1a;color:#d68a1a;padding:7px 12px;border-radius:6px;font-weight:600;cursor:pointer;">Send back</button>
      </div>
      <div style="font-size:12px;color:#666;margin-top:6px;">${esc(evidenceBits)}</div>
      ${ev.photos.length?`<div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;">${ev.photos.slice(0,6).map(p=>`<a href="${esc(p.url)}" target="_blank"><img src="${esc(p.url)}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;"></a>`).join('')}</div>`:''}
      ${ev.notes.length?`<div style="margin-top:8px;font-size:12px;color:#444;">${ev.notes.slice(-3).map(n=>'↪ '+esc(n.desc||'')+' — '+esc(n.by||'')).join('<br>')}</div>`:''}
    </div>`;
  });

  h+=`<h3 style="font-size:14px;color:#444;margin:18px 0 6px;">Resolved snags (${resolved.length})</h3>`;
  if(!resolved.length){h+='<div style="color:#888;font-size:13px;padding:6px 0;">No resolved snags awaiting closure.</div>';}
  resolved.forEach(s=>{
    h+=`<div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:10px;">
      <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;">
        <div style="flex:1;min-width:160px;">
          <div style="font-weight:600;">${esc(s.desc||'(no description)')}</div>
          <div style="font-size:12px;color:#666;margin-top:2px;">${esc(s.dwelling||'—')}${s.stage?' · '+esc(s.stage):''} · raised by ${esc(s.by||'')} · ${esc(s.date||'')}</div>
          ${s.resolution?`<div style="margin-top:6px;font-size:13px;color:#444;">↪ ${esc(s.resolution)} — ${esc(s.resolvedByName||'')} · ${esc(s.resolvedAt||'')}</div>`:''}
        </div>
        <button onclick="closeSnag('${esc(s.id||'')}')" style="background:#1f8b5a;color:#fff;border:0;padding:7px 12px;border-radius:6px;font-weight:600;cursor:pointer;">Close</button>
        <button onclick="reopenSnag('${esc(s.id||'')}')" style="background:#fff;border:1px solid #c0312f;color:#c0312f;padding:7px 12px;border-radius:6px;font-weight:600;cursor:pointer;">Reopen</button>
      </div>
    </div>`;
  });

  h+=`<h3 style="font-size:14px;color:#444;margin:18px 0 6px;">Missing evidence (${missing.length})</h3>`;
  if(!missing.length){h+='<div style="color:#888;font-size:13px;padding:6px 0;">Everything is on track.</div>';}
  missing.forEach(m=>{
    h+=`<div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;margin-bottom:8px;">
      <div style="font-weight:600;font-size:14px;">${esc(m.area)} — ${esc(m.stageName)}</div>
      <div style="font-size:12px;color:#d68a1a;margin-top:4px;">${m.gaps.map(g=>esc(g)).join(' · ')}</div>
    </div>`;
  });

  h+='</div>';
  el.innerHTML=h;
}

async function reviewStage(area,stageName,decision){
  let note='';
  if(decision==='send-back'){
    note=prompt('Why are you sending this back?');
    if(note===null)return;
  }
  try{
    const r=await fetch('/api/workflow?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify({action:'review-stage',areaId:area,stageName,decision,note})});
    const j=await r.json();
    if(!r.ok){alert('Review failed: '+(j.error||r.status));return;}
    openReview();
  }catch(e){alert('Network error');}
}
async function closeSnag(snagId){
  if(!snagId){alert('Snag has no id — refresh and try again.');return;}
  const note=prompt('Optional closing note:');
  if(note===null)return;
  try{
    const r=await fetch('/api/workflow?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify({action:'close-snag',snagId,note})});
    const j=await r.json();
    if(!r.ok){alert('Close failed: '+(j.error||r.status));return;}
    openReview();
  }catch(e){alert('Network error');}
}
async function reopenSnag(snagId){
  if(!snagId){alert('Snag has no id — refresh and try again.');return;}
  const reason=prompt('Reason for reopening:');
  if(!reason)return;
  try{
    const r=await fetch('/api/workflow?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify({action:'reopen-snag',snagId,reason})});
    const j=await r.json();
    if(!r.ok){alert('Reopen failed: '+(j.error||r.status));return;}
    openReview();
  }catch(e){alert('Network error');}
}
