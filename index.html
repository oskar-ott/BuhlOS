<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birdwood IV3232</title>
<style>
:root{
  --navy:#0d1f35;--navy2:#152840;
  --blue:#2563eb;--green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-bd:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
  --border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --card:#fff;--page:#f1f5f9;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--page);color:var(--text);min-height:100vh}

/* Header */
.hdr{background:var(--navy);height:60px;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-logo{height:32px;width:32px;object-fit:contain;border-radius:6px;background:#fff;padding:3px;flex-shrink:0}
.hdr-div{width:1px;height:22px;background:rgba(255,255,255,.15);flex-shrink:0}
.hdr-job{flex:1;min-width:0}
.hdr-name{color:#fff;font-size:14px;font-weight:600;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{color:#64748b;font-size:11px;margin-top:1px}
.sync-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sdot.syncing{background:#f59e0b;animation:blink 1s infinite}
.sdot.err{background:#ef4444}
.stxt{color:#94a3b8;font-size:11px;font-weight:500}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Nav */
.nav{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:60px;z-index:100}
.nav::-webkit-scrollbar{display:none}
.nb{flex-shrink:0;padding:13px 16px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nb.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.nb:hover:not(.active){color:var(--text);background:#f8fafc}
.nbadge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:10px;min-width:16px;height:16px;padding:0 4px;margin-left:4px}

.pg{max-width:900px;margin:0 auto;padding:14px}
.sc{display:none}.sc.active{display:block}

/* Hero */
.hero{background:var(--navy2);border-radius:var(--r);padding:20px;margin-bottom:14px;overflow:hidden;position:relative}
.hero::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:rgba(255,255,255,.025);border-radius:50%;pointer-events:none}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.hero-lbl{color:#64748b;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:2px}
.hero-pct{color:#fff;font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px}
.hero-pct sup{font-size:20px;font-weight:500;opacity:.5;letter-spacing:0;vertical-align:super}
.hero-stats{display:flex;gap:16px;flex-wrap:wrap}
.hst{text-align:right}
.hst-v{color:#fff;font-size:22px;font-weight:700;line-height:1}
.hst-l{color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.hero-bar-bg{background:rgba(255,255,255,.1);border-radius:6px;height:8px;overflow:hidden}
.hero-bar{height:8px;border-radius:6px;background:linear-gradient(90deg,#3b82f6,#22c55e);transition:width .7s ease}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--card);border-radius:var(--rs);padding:12px 14px;border:1px solid var(--border)}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px}
.kpi-v{font-size:24px;font-weight:700;line-height:1}
.kpi-v.g{color:var(--green)}.kpi-v.a{color:var(--amber)}.kpi-v.r{color:var(--red)}.kpi-v.b{color:var(--navy)}

.stitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* Dwelling cards */
.dgrid{display:flex;flex-direction:column;gap:6px}
.dc{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px;cursor:pointer;transition:all .14s}
.dc:hover{border-color:#a5b4fc;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.07)}
.dc:active{transform:translateY(0)}
.dc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.green{background:#22c55e}.dot.amber{background:#f59e0b}.dot.red{background:#ef4444}.dot.grey{background:#cbd5e1}
.dc-name{font-size:14px;font-weight:600;flex:1;color:var(--text)}
.dc-snag{font-size:11px;font-weight:600;color:var(--red);background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;padding:1px 7px}
.dc-pct{font-size:13px;font-weight:700;color:var(--muted);min-width:36px;text-align:right}
.bar-bg{background:#f1f5f9;border-radius:5px;height:6px;overflow:hidden}
.bar{height:6px;border-radius:5px;transition:width .5s}
.stage-dots{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap}
.sdot2{width:8px;height:8px;border-radius:2px;background:#e2e8f0}
.sdot2.done{background:#22c55e}.sdot2.inprog{background:#f59e0b}.sdot2.snagged{background:#ef4444}

/* Dwelling detail */
.back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--navy);cursor:pointer;font-size:13px;font-weight:600;margin-bottom:12px;padding:0}
.back:hover{opacity:.7}
.dh{background:var(--card);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;border:1px solid var(--border)}
.dh-name{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:10px}
.dh-bar-bg{background:#f1f5f9;border-radius:8px;height:11px;overflow:hidden;margin-bottom:6px}
.dh-bar{height:11px;border-radius:8px;transition:width .5s}
.dh-pct{font-size:13px;color:var(--muted)}
.dh-pct b{color:var(--text);font-weight:700}

/* Detail tabs */
.dtabs{display:flex;background:var(--card);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.dtab{flex:1;padding:10px 8px;border:none;background:none;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.dtab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600;background:#f8fafc}
.dpanel{display:none}.dpanel.active{display:block}

.ghdr{display:flex;align-items:center;gap:8px;margin:12px 0 7px}
.gpill{padding:3px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.gpill.rough{background:#dcfce7;color:#166634}
.gpill.fitoff{background:#fef3c7;color:#92400e}
.gline{flex:1;height:1px;background:var(--border)}

.sr{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:10px 13px;margin-bottom:5px;display:flex;align-items:center;gap:9px}
.sr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sr-nm{flex:1;font-size:13px;font-weight:500}
.sr-sel{padding:6px 9px;border-radius:6px;border:1px solid var(--border);background:#f8fafc;font-size:12px;cursor:pointer;color:var(--text);font-weight:500;outline:none}
.sr-sel.done{border-color:var(--green-bd);background:var(--green-bg);color:var(--green)}
.sr-sel.inprog{border-color:var(--amber-bd);background:var(--amber-bg);color:var(--amber)}
.sr-sel.snagged{border-color:var(--red-bd);background:var(--red-bg);color:var(--red)}
.sr-sel.na{color:#94a3b8}

.nc{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:13px;margin-top:12px}
.nl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
textarea{width:100%;padding:9px 11px;border-radius:var(--rs);border:1px solid var(--border);font-size:13px;font-family:inherit;resize:vertical;min-height:75px;color:var(--text);background:#fafafa;outline:none}
textarea:focus{border-color:var(--navy);background:#fff}
.save-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.sbtn{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600}
.sbtn:hover{opacity:.85}
.sbtn:disabled{opacity:.5;cursor:not-allowed}
.sok{font-size:12px;color:var(--green);opacity:0;transition:opacity .3s;font-weight:500}

/* ITP photos */
.itp-header{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px}
.itp-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.itp-title{font-size:14px;font-weight:700;color:var(--navy)}
.itp-count{font-size:12px;color:var(--muted);background:#f1f5f9;padding:3px 10px;border-radius:10px;font-weight:500}
.itp-upload-form{display:flex;flex-direction:column;gap:8px}
.itp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.itp-row{grid-template-columns:1fr}}
.itp-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.itp-sel,.itp-inp{width:100%;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);font-size:13px;font-family:inherit;background:#fafafa;color:var(--text);outline:none}
.photo-pick{display:flex;align-items:center;justify-content:center;gap:8px;border:2px dashed var(--border);border-radius:var(--rs);padding:16px;cursor:pointer;transition:all .15s;background:#fafafa;position:relative}
.photo-pick:hover{border-color:#a5b4fc;background:#f0f4ff}
.photo-pick input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-pick-icon{font-size:22px}
.photo-pick-txt{font-size:13px;color:var(--muted);font-weight:500}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);border:1px solid var(--border);display:none}
.upload-btn{padding:9px 20px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;width:100%}
.upload-btn:disabled{opacity:.5;cursor:not-allowed}
.upload-progress{font-size:12px;color:var(--muted);text-align:center;display:none}
.photo-group{margin-bottom:16px}
.photo-group-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.photo-group-title::after{content:'';flex:1;height:1px;background:var(--border)}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.photo-grid{grid-template-columns:repeat(3,1fr)}}
.photo-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .14s}
.photo-card:hover{border-color:#a5b4fc;box-shadow:0 4px 12px rgba(0,0,0,.07)}
.photo-card img{width:100%;height:120px;object-fit:cover;display:block}
.photo-card-info{padding:8px 10px}
.photo-card-stage{font-size:11px;font-weight:600;color:var(--navy);margin-bottom:2px}
.photo-card-cap{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-card-meta{font-size:10px;color:#94a3b8;margin-top:3px}
.photo-card-del{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;padding:0;margin-top:3px;display:block}

/* Snags */
.sform{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:15px;margin-bottom:14px}
.sform-t{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sform-t::before{content:'';width:3px;height:16px;border-radius:2px;flex-shrink:0}
.sform-t.red{color:var(--red)}.sform-t.red::before{background:var(--red)}
.sform-t.navy{color:var(--navy)}.sform-t.navy::before{background:var(--navy)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
@media(max-width:480px){.fg{grid-template-columns:1fr}}
.fg.full{grid-template-columns:1fr}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);font-size:13px;font-family:inherit;background:#fafafa;color:var(--text);outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy);background:#fff}
.asbtn{padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600}

/* Item cards (snags, tags, temps) */
.si{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px;margin-bottom:7px}
.si.closed{opacity:.5}
.si-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.bh{background:#fee2e2;color:#991b1b}.bm{background:#fef3c7;color:#92400e}.bl{background:#dcfce7;color:#166534}
.bo{background:#dbeafe;color:#1e40af}.bc{background:#f0fdf4;color:#166534}
.si-dw{font-size:11px;color:var(--muted);background:#f1f5f9;padding:2px 7px;border-radius:8px;font-weight:500}
.si-stage{font-size:11px;color:#94a3b8}
.si-desc{font-size:13px;font-weight:600;margin-bottom:5px}
.si-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.si-by{font-size:11px;color:#94a3b8}
.cbtn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:3px 9px;cursor:pointer}
.cbtn:hover{background:#f8fafc}
.cbtn.danger{color:var(--red);border-color:var(--red-bd)}

/* Accent card (with left border) */
.accent-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden;display:flex;margin-bottom:7px}
.accent-bar{width:4px;flex-shrink:0}
.accent-bar.green{background:#22c55e}
.accent-bar.amber{background:#f59e0b}
.accent-bar.red{background:#ef4444}
.accent-bar.blue{background:#3b82f6}
.accent-bar.yellow{background:#eab308}
.accent-bar.pink{background:#ec4899}
.accent-bar.grey{background:#9ca3af}
.accent-body{flex:1;padding:12px 14px}
.accent-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.accent-name{font-size:14px;font-weight:700;color:var(--text);flex:1}
.accent-meta{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;font-size:12px;color:var(--muted);margin-bottom:8px}
.accent-meta b{color:var(--text);font-weight:600}

/* Status / type pills */
.spill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.spill.valid{background:#dcfce7;color:#166534}
.spill.expiring{background:#fef3c7;color:#92400e}
.spill.expired{background:#fee2e2;color:#991b1b}
.spill.board{background:#dbeafe;color:#1e40af}
.spill.lights{background:#fef9c3;color:#854d0e}
.spill.outlets{background:#fce7f3;color:#9d174d}
.spill.other{background:#f3f4f6;color:#374151}

/* Temp photo grid */
.temp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:600px){.temp-grid{grid-template-columns:repeat(3,1fr)}}
.temp-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);overflow:hidden}
.temp-card:hover{border-color:#a5b4fc;box-shadow:0 4px 12px rgba(0,0,0,.07)}
.temp-img{width:100%;height:140px;object-fit:cover;display:block;cursor:pointer}
.temp-no-img{width:100%;height:80px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.temp-body{padding:10px 12px}

.empty{text-align:center;padding:36px;color:var(--muted);font-size:13px}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.lightbox.open{display:flex}
.lightbox-img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px}
.lightbox-info{color:#fff;text-align:center;margin-top:12px}
.lightbox-stage{font-size:14px;font-weight:600}
.lightbox-cap{font-size:13px;opacity:.7;margin-top:3px}
.lightbox-meta{font-size:11px;opacity:.5;margin-top:4px}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer}

/* Loading */
#loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;transition:opacity .4s}
#loading.out{opacity:0;pointer-events:none}
.ll{height:40px;object-fit:contain}
.lb-bg{width:140px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.lb{height:3px;background:var(--blue);border-radius:2px;animation:lp 1.2s ease infinite}
@keyframes lp{0%{width:0;margin-left:0}50%{width:55%;margin-left:20%}100%{width:0;margin-left:100%}}
.lt{color:#64748b;font-size:11px}

/* Materials */
.mat-sum{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:600px){.mat-sum{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.mat-sum{grid-template-columns:repeat(5,1fr)}}
.mat-attn{background:#fffbeb;border:1px solid var(--amber-bd);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px}
.mat-attn-t{font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mat-attn-list{display:flex;flex-direction:column;gap:6px}
.mat-attn-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border:1px solid var(--amber-bd);border-radius:6px;padding:7px 10px;font-size:13px}
.mat-attn-row .l{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.mat-attn-row .b{font-size:11px;font-weight:600;background:var(--navy);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;flex-shrink:0}
.mat-attn-row .b.amber{background:var(--amber)}
.mat-attn-row .b.red{background:var(--red)}
.mat-attn-row .b.green{background:var(--green)}

.mat-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.mat-tb-btn{flex:1;min-width:120px;padding:11px 14px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer}
.mat-tb-btn.alt{background:#fff;color:var(--navy);border:1px solid var(--border)}
.mat-tb-btn:hover{opacity:.9}

.mat-filters{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px}
.mat-filters::-webkit-scrollbar{display:none}
.mat-filter{flex-shrink:0;padding:7px 12px;background:#fff;border:1px solid var(--border);border-radius:18px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap}
.mat-filter.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
.mat-filter .ct{display:inline-block;background:rgba(255,255,255,.18);color:inherit;border-radius:8px;padding:0 6px;margin-left:4px;font-size:10px;font-weight:700}
.mat-filter:not(.active) .ct{background:#f1f5f9;color:var(--muted)}

<script>
// Fallback stage names — used only when the job has no configured stages.
// The real source of truth is JOB.stages, loaded from /api/jobs?id=JOB_ID.
const FALLBACK_ROUGH=['AC Rough-In','Lighting Rough-In','Power Rough-In','NBN','Rough-In Inspection'];
const FALLBACK_FITOFF=['AC Fit-Off','GPO / Switch Install','Lighting Install','Switchboard Fit-Off','Final Test & Commission','Certificate of Compliance','Handover'];
// Back-compat names so legacy code paths still work during the transition.
const ROUGH=FALLBACK_ROUGH;
const FITOFF=FALLBACK_FITOFF;
const ALL_STAGES=[...ROUGH,...FITOFF];

// Loaded job (rich stages). null until /api/jobs?id=JOB_ID resolves.
let JOB=null;

// ── Stage source-of-truth helpers ──────────────────────────────
// Returns the active stage list as rich objects, ordered. Falls back to the
// constant defaults when the job hasn't loaded or has no stages.
function getAllJobStages(includeInactive){
  if(!JOB||!JOB.stages){
    return [...FALLBACK_ROUGH.map((n,i)=>normaliseClientStage(n,'roughIn',i)),
            ...FALLBACK_FITOFF.map((n,i)=>normaliseClientStage(n,'fitOff',FALLBACK_ROUGH.length+i))];
  }
  const r=(JOB.stages.roughIn||[]).map((s,i)=>normaliseClientStage(s,'roughIn',i));
  const f=(JOB.stages.fitOff ||[]).map((s,i)=>normaliseClientStage(s,'fitOff', r.length+i));
  let all=[...r,...f];
  all.sort((a,b)=>(a.order||0)-(b.order||0));
  if(!includeInactive) all=all.filter(s=>s.active!==false);
  return all;
}
// Returns { category: [stages] } in a stable display order. Custom
// categories are preserved (rendered after the known ones).
const CATEGORY_LABELS={roughIn:'Rough-In',fitOff:'Fit-Off',testing:'Testing',handover:'Handover',other:'Other'};
const CATEGORY_ORDER=['roughIn','fitOff','testing','handover','other'];
function getJobStageGroups(includeInactive){
  const groups={};
  getAllJobStages(includeInactive).forEach(s=>{
    const cat=s.category||'other';
    (groups[cat]=groups[cat]||[]).push(s);
  });
  // Stable ordering: known categories first, then anything custom alphabetically.
  const ordered={};
  CATEGORY_ORDER.forEach(c=>{if(groups[c])ordered[c]=groups[c];});
  Object.keys(groups).sort().forEach(c=>{if(!ordered[c])ordered[c]=groups[c];});
  return ordered;
}
function categoryLabel(cat){
  if(CATEGORY_LABELS[cat])return CATEGORY_LABELS[cat];
  // Convert camelCase / snake_case / kebab-case to a display label.
  return String(cat||'Other').replace(/([a-z])([A-Z])/g,'$1 $2').replace(/[_-]+/g,' ')
    .replace(/\b\w/g,c=>c.toUpperCase());
}
function normaliseClientStage(s,category,index){
  if(s&&typeof s==='object'){
    return {
      id:s.id||stableStageId(category,s.name||''),
      name:String(s.name||'').trim(),
      category:s.category||category||'other',
      order:Number.isFinite(Number(s.order))?Number(s.order):index,
      active:s.active===false?false:true,
      requires:s.requires||{},
      evidence:s.evidence||{minPhotos:0,minNotes:0},
      itpTemplateId:s.itpTemplateId||null,
      legacyNames:Array.isArray(s.legacyNames)?s.legacyNames:[],
      // preserve anything else (workflow round-trips, future fields)
      _orig:s,
    };
  }
  const name=String(s||'').trim();
  return {
    id:stableStageId(category,name),
    name,
    category:category||'other',
    order:index,
    active:true,
    requires:{},
    evidence:{minPhotos:0,minNotes:0},
    itpTemplateId:null,
    legacyNames:[],
    _orig:s,
  };
}
function stableStageId(category,name){
  const base=String(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'stage';
  return 'stage_'+category+'_'+base;
}
// Tolerant lookup against existing data.dwellings[area][?]
// Returns the existing row (status, notes) if any old key still matches.
function findStageState(areaData,stage){
  if(!areaData||!stage)return null;
  if(areaData[stage.id]) return areaData[stage.id];
  if(areaData[stage.name])return areaData[stage.name];
  if(Array.isArray(stage.legacyNames)){
    for(const n of stage.legacyNames){
      if(areaData[n])return areaData[n];
    }
  }
  // Case-insensitive fallback (people occasionally rename only by casing)
  const lc=String(stage.name||'').toLowerCase();
  for(const k of Object.keys(areaData)){
    if(k.toLowerCase()===lc)return areaData[k];
  }
  return null;
}
// Storage key. Prefer stage.name for backward-compat with existing data
// (status maps were keyed by stage name historically). Workflow API writes
// by stage.name too, so the two stay aligned.
function getStageKey(stage){return stage.name;}
// Display name for the UI (used in headings, dots, etc.)
function stageDisplayName(stage){return stage.name||'Stage';}
// "Photo · ITP · Independent review" summary for the editor.
function stageRequirementSummary(stage){
  const r=stage.requires||{};
  const parts=[];
  if(r.photo) parts.push('Photo');
  if(r.note) parts.push('Note');
  if(r.itp) parts.push('ITP');
  if(r.independentReview) parts.push('Independent review');
  if(r.blockIfOpenSnags) parts.push('Blocks open snags');
  if(r.adminSignoff) parts.push('Admin sign-off');
  return parts.length?parts.join(' · '):'No requirements';
}
// Old code asked "does this stage belong to rough-in?". Replace with category lookup.
function stageInCategory(stageName,category){
  const s=getAllJobStages(true).find(x=>
    x.name===stageName||x.id===stageName||
    (x.legacyNames||[]).indexOf(stageName)>=0
  );
  return !!s && s.category===category;
}
const UNITS=Array.from({length:15},(_,i)=>`Unit ${i+1}`);
const TH=Array.from({length:7},(_,i)=>`Townhouse ${i+1}`);
const ALL=[...UNITS,...TH];
const OPTS=['Not Started','In Progress','Done','Snagged','N/A'];

let D={dwellings:{},snags:[]};
let tagData=[];
let tempsData=[];
let saveT=null;
let selectedFile=null;
let tempSelectedFile=null;
let currentDwellingPhotos=[];

// Materials state
const JOB_ID = (location.pathname.match(/^\/jobs\/([^/]+)/) || [])[1] || 'birdwood-iv3232';
let ME = null;          // { id, username, role, assignedJobIds }
let MAT = null;         // { materials:[], invoices:[], summary }
let MAT_LOADED = false; // lazy load flag
let MAT_FILTER = 'all'; // filter pill state
let MAT_FILE = null;    // pending invoice upload file

// Assets state
let ASSETS = null;
let ASSETS_LOADED = false;
let ASSETS_USERS = null; // cached user list for transfer picker (admin only)

// Contacts state
let CONTACTS = null;
let CONTACTS_LOADED = false;

// ── Core data ───────────────────────────────────────────────
async function loadMe(){
  try{const r=await fetch('/api/auth?action=me',{credentials:'same-origin'});
    if(r.ok){const j=await r.json();ME=j.user||null;}}
  catch(e){}
  // Hide internal tabs for clients
  if(ME&&ME.role==='client'){
    ['mnav','anav','cnav','rvnav','stnav'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  }
  // Hide stages editor for non-admins (workers don't configure rules)
  if(ME&&ME.role!=='admin'){
    const st=document.getElementById('stnav');if(st)st.style.display='none';
  }
}
async function load(){
  await loadMe();
  // Job (rich stages) + dwelling data in parallel — JOB drives every render.
  const [jobR,dataR]=await Promise.allSettled([
    fetch('/api/jobs?id='+encodeURIComponent(JOB_ID),{credentials:'same-origin'}),
    fetch('/api/data?jobId='+encodeURIComponent(JOB_ID)+'&t='+Date.now(),{credentials:'same-origin'}),
  ]);
  try{
    if(jobR.status==='fulfilled'&&jobR.value.ok){
      const j=await jobR.value.json();
      JOB=j.job||null;
    }
  }catch(e){}
  try{
    if(dataR.status==='fulfilled'&&dataR.value.ok){
      D=await dataR.value.json();
      if(!D.snags)D.snags=[];
    }else if(dataR.status==='rejected'){sync('error');}
  }catch(e){sync('error');}
  const el=document.getElementById('loading');
  el.classList.add('out');setTimeout(()=>el.style.display='none',450);
  renderAll();
}
async function persist(){
  sync('syncing');
  try{await fetch('/api/data?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(D)});sync('ok');}
  catch(e){sync('error');}
}
function sched(){clearTimeout(saveT);saveT=setTimeout(persist,800);}
function sync(s){
  const d=document.getElementById('sdot'),t=document.getElementById('stxt');
  d.className='sdot'+(s==='syncing'?' syncing':s==='error'?' err':'');
  t.textContent=s==='syncing'?'Saving…':s==='error'?'Offline':'Saved';
}
function inf(dw){return D.dwellings[dw]||{};}
// Tolerant value lookup — accepts a stage object OR a legacy stage name.
function stv(dw,st){
  const area=inf(dw);
  const stage=(typeof st==='object'&&st)?st:getAllJobStages(true).find(x=>x.name===st||x.id===st||(x.legacyNames||[]).indexOf(st)>=0)||{name:String(st),legacyNames:[]};
  const row=findStageState(area,stage);
  return(row&&row.status)||'Not Started';
}
// Writes stage status. Uses stage.name as the storage key for back-compat
// with existing data.dwellings shape. If the data only had a legacy key,
// migrate the row to the current name on first write.
function setSt(dw,st,v){
  if(!D.dwellings[dw])D.dwellings[dw]={};
  const area=D.dwellings[dw];
  const stage=(typeof st==='object'&&st)?st:getAllJobStages(true).find(x=>x.name===st||x.id===st||(x.legacyNames||[]).indexOf(st)>=0)||{name:String(st),legacyNames:[]};
  const key=getStageKey(stage);
  // If an older alias holds the row, lift it onto the current name.
  if(!area[key]){
    if(stage.id&&area[stage.id]){area[key]={...area[stage.id]};delete area[stage.id];}
    else if(Array.isArray(stage.legacyNames)){
      for(const n of stage.legacyNames){
        if(area[n]){area[key]={...area[n]};delete area[n];break;}
      }
    }
  }
  if(!area[key])area[key]={};
  area[key].status=v;
  sched();
}
function setN(dw,v){if(!D.dwellings[dw])D.dwellings[dw]={};D.dwellings[dw]._notes=v;sched();}
function stats(dw){
  let done=0,ip=0,sn=0,sub=0;
  const stages=getAllJobStages();
  stages.forEach(stage=>{
    const v=stv(dw,stage);
    if(v==='Done')done++;
    else if(v==='In Progress'||v==='Reopened')ip++;
    else if(v==='Snagged')sn++;
    else if(v==='Submitted'||v==='Review')sub++;
  });
  const total=Math.max(1,stages.length);
  return{done,ip,sn,sub,total:stages.length,pct:Math.round(done/total*100)};
}
function tlc(pct,sn){if(sn>0)return'red';if(pct===100)return'green';if(pct>0)return'amber';return'grey';}
function bc(pct){if(pct===100)return'#22c55e';if(pct>=50)return'#f59e0b';return'#3b82f6';}
function sc2(v){if(v==='Done')return'done';if(v==='In Progress')return'inprog';if(v==='Snagged')return'snagged';if(v==='N/A')return'na';return'';}
function dc(v){if(v==='Done')return'#22c55e';if(v==='In Progress')return'#f59e0b';if(v==='Snagged')return'#ef4444';return'#cbd5e1';}

function renderAll(){renderDash();updateBadge();}

// Accepts a stage object (preferred) or a legacy stage name for back-compat.
function stRow(dw,stageOrName){
  const stage=(typeof stageOrName==='object'&&stageOrName)
    ? stageOrName

async function uploadPhoto(dw){
  if(!selectedFile)return;
  const btn=document.getElementById('upload-btn');
  const prog=document.getElementById('upload-progress');
  btn.disabled=true;btn.style.display='none';prog.style.display='block';
  const stage=document.getElementById('itp-stage').value;
  // Derive group from the job's configured stage category — not from
  // hardcoded constants. Falls back to rough/fitoff/other.
  const stageDef=getAllJobStages(true).find(x=>x.name===stage||x.id===stage||(x.legacyNames||[]).indexOf(stage)>=0);
  const cat=(stageDef&&stageDef.category)||(ROUGH.includes(stage)?'roughIn':FITOFF.includes(stage)?'fitOff':'other');
  const group=cat==='roughIn'?'rough':cat==='fitOff'?'fitoff':cat;
  const reader=new FileReader();
  reader.onload=async e=>{
    await fetch('/api/photos?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify({dwelling:dw,stage,group,caption:document.getElementById('itp-cap').value,uploadedBy:document.getElementById('itp-by').value||'Unknown',dataUrl:e.target.result})});
    selectedFile=null;
    document.getElementById('photo-preview').style.display='none';
    document.getElementById('photo-pick-area').style.display='flex';
    document.getElementById('itp-cap').value='';
    btn.style.display='block';btn.disabled=true;prog.style.display='none';
    loadPhotos(dw);
  };
  reader.readAsDataURL(selectedFile);
}

async function loadPhotos(dw){
  try{
    const r=await fetch(`/api/photos?jobId=${encodeURIComponent(JOB_ID)}&dwelling=${encodeURIComponent(dw)}`,{credentials:'same-origin'});
    currentDwellingPhotos=await r.json();
    renderGallery(dw,currentDwellingPhotos);
    const c=document.getElementById('itp-count');
    if(c)c.textContent=currentDwellingPhotos.length+' photo'+(currentDwellingPhotos.length!==1?'s':'');
  }catch(e){}
}

function renderGallery(dw,photos){
  const el=document.getElementById('photo-gallery');if(!el)return;
  if(!photos.length){el.innerHTML='<div class="empty">No photos yet</div>';return;}
  // Group photos by the stage's *configured* category, with old `group`
  // ('rough'/'fitoff') falling back to the legacy mapping.
  const buckets={};
  photos.forEach((p,i)=>{
    const def=getAllJobStages(true).find(x=>x.name===p.stage||x.id===p.stage||(x.legacyNames||[]).indexOf(p.stage)>=0);
    let cat=def&&def.category;
    if(!cat){
      if(p.group==='rough'||(p.stage&&FALLBACK_ROUGH.includes(p.stage)))cat='roughIn';
      else if(p.group==='fitoff'||(p.stage&&FALLBACK_FITOFF.includes(p.stage)))cat='fitOff';
      else cat='other';
    }
    (buckets[cat]=buckets[cat]||[]).push({p,i});
  });
  // Render in the same order the editor uses.
  let h='';
  const order=['roughIn','fitOff','testing','handover','other',...Object.keys(buckets)];
  const seen=new Set();
  order.forEach(cat=>{
    if(seen.has(cat)||!buckets[cat])return;
    seen.add(cat);
    h+=`<div class="photo-group"><div class="photo-group-title">${esc(categoryLabel(cat))}</div><div class="photo-grid">`;
    buckets[cat].forEach(({p,i})=>{h+=photoCard(p,i);});
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

function tagStatus(expiryDate){
  const exp=new Date(expiryDate.split('/').reverse().join('-'));
  const diff=Math.floor((exp-new Date())/(1000*60*60*24));
  if(diff<0)return{label:'Expired',cls:'expired',days:diff};
  if(diff<=30)return{label:`Expires in ${diff}d`,cls:'expiring',days:diff};
  return{label:'Valid',cls:'valid',days:diff};
}

  const warn=tagData.filter(t=>tagStatus(t.expiryDate).cls!=='valid').length;

    <button class="sbtn" onclick="addTag()">Add tool</button>

  <div class="stitle">${sorted.length} tool${sorted.length!==1?'s':''} on site</div>`;

  if(!sorted.length){h+=`<div class="empty">No tools registered yet</div>`;}

    const st=tagStatus(t.expiryDate);

    h+=`<div class="accent-card">

async function deleteTag(id){

async function loadTemps(){
  try{const r=await fetch('/api/temps?jobId='+encodeURIComponent(JOB_ID),{credentials:'same-origin'});if(r.ok)tempsData=await r.json();}catch(e){}

function tempTypeClass(type){
  if(!type)return'other';
  const t=type.toLowerCase();
  if(t.includes('board'))return'board';
  if(t.includes('light'))return'lights';
  if(t.includes('outlet')||t.includes('power'))return'outlets';
  return'other';
}

function renderTemps(){
  const boards=tempsData.filter(t=>t.type==='Temp Board').length;
  const lights=tempsData.filter(t=>t.type==='Temp Lights').length;
  const outlets=tempsData.filter(t=>t.type==='Power Outlets').length;
  const other=tempsData.filter(t=>!['Temp Board','Temp Lights','Power Outlets'].includes(t.type)).length;

  let h=`<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px">
    <div class="kpi"><div class="kpi-l">Boards</div><div class="kpi-v b">${boards}</div></div>
    <div class="kpi"><div class="kpi-l">Lights</div><div class="kpi-v" style="color:#854d0e">${lights}</div></div>
    <div class="kpi"><div class="kpi-l">Outlets</div><div class="kpi-v" style="color:#9d174d">${outlets}</div></div>
    <div class="kpi"><div class="kpi-l">Other</div><div class="kpi-v" style="color:var(--muted)">${other}</div></div>
  </div>
  <div class="sform">
    <div class="sform-t navy">Log temp equipment</div>
    <div class="fg">
      <div><label>Type</label>
        <select id="tp-type">
          <option>Temp Board</option>
          <option>Temp Lights</option>
          <option>Power Outlets</option>
          <option>Other</option>
        </select>
      </div>
      <div><label>Logged by</label><input id="tp-by" type="text" placeholder="Your name"></div>
    </div>
    <div class="fg full"><div><label>Location on site</label><input id="tp-loc" type="text" placeholder="e.g. Unit 3 — Level 1 corridor"></div></div>
    <div style="margin-bottom:10px">
      <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Photo</label>
      <div class="photo-pick" id="tp-pick-area">
        <input type="file" accept="image/*" capture="environment" onchange="handleTempFile(this)">

      </div>
      <img class="photo-preview" id="tp-preview" style="margin-top:6px">
    </div>
    <button class="sbtn" id="tp-submit" onclick="addTemp()">Log equipment</button>
    <div id="tp-progress" style="font-size:12px;color:var(--muted);margin-top:6px;display:none">Uploading…</div>
  </div>
  <div class="stitle">${tempsData.length} item${tempsData.length!==1?'s':''} on site</div>`;

  if(!tempsData.length){h+=`<div class="empty">No temp equipment logged yet</div>`;}
  else{
    h+=`<div class="temp-grid">`;
    tempsData.slice().reverse().forEach(t=>{
      const tc=tempTypeClass(t.type);
      h+=`<div class="temp-card">
        ${t.photoUrl?`<img class="temp-img" src="${t.photoUrl}" alt="${t.type}" onclick="openTempLightbox('${t.photoUrl}','${t.type}','${t.location||''}')">`:
        `<div class="temp-no-img">No photo</div>`}

            <span class="spill ${tc}">${t.type}</span>

function handleTempFile(input){
  const file=input.files[0];if(!file)return;
  tempSelectedFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('tp-preview').src=e.target.result;
    document.getElementById('tp-preview').style.display='block';
    document.getElementById('tp-pick-area').style.display='none';
  };
  reader.readAsDataURL(file);
}

async function addTemp(){
  const loc=document.getElementById('tp-loc').value.trim();
  if(!loc){alert('Please enter a location.');return;}
  const btn=document.getElementById('tp-submit');
  const prog=document.getElementById('tp-progress');
  btn.disabled=true;prog.style.display='block';
  let dataUrl=null;
  if(tempSelectedFile){
    dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(tempSelectedFile);});
  }
  await fetch('/api/temps?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
    body:JSON.stringify({type:document.getElementById('tp-type').value,location:loc,loggedBy:document.getElementById('tp-by').value.trim(),dataUrl})});
  tempSelectedFile=null;btn.disabled=false;prog.style.display='none';
  await loadTemps();renderTemps();
}

async function deleteTemp(id){
  if(!confirm('Remove this item?'))return;
  await fetch('/api/temps?jobId='+encodeURIComponent(JOB_ID),{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({id})});
  await loadTemps();renderTemps();
}

function openTempLightbox(url,type,loc){

  document.getElementById('lb-cap').textContent=loc;
  document.getElementById('lb-meta').textContent='';

let hoursData=[];
let crewRows=[{name:'',hours:''}];

async function loadHours(){try{const r=await fetch('/api/hours?jobId='+encodeURIComponent(JOB_ID),{credentials:'same-origin'});if(r.ok)hoursData=await r.json();}catch(e){}}

function renderCrewRows(){
  const wrap=document.getElementById('crew-rows');
  if(!wrap)return;
  wrap.innerHTML=crewRows.map((row,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <input style="flex:2;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:#fafafa;color:var(--text)" 
        placeholder="Name e.g. Jake" value="${row.name}" oninput="crewRows[${i}].name=this.value">
      <input style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:#fafafa;color:var(--text)" 
        type="number" min="0" max="24" step="0.5" placeholder="Hours" value="${row.hours}" oninput="crewRows[${i}].hours=this.value">
      ${crewRows.length>1?`<button onclick="removeCrew(${i})" style="background:none;border:1px solid var(--red-bd);color:var(--red);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px">×</button>`:'<div style="width:34px"></div>'}
    </div>`).join('');
}

function addCrewRow(){crewRows.push({name:'',hours:''});renderCrewRows();}
function removeCrew(i){crewRows.splice(i,1);renderCrewRows();}

function renderHours(){
  const allCrew={};
  hoursData.forEach(day=>(day.crew||[]).forEach(c=>{if(c.name)allCrew[c.name]=(allCrew[c.name]||0)+c.hours;}));
  const totalHours=Object.values(allCrew).reduce((a,b)=>a+b,0);
  const now=new Date(),mon=new Date(now);mon.setDate(now.getDate()-now.getDay()+1);mon.setHours(0,0,0,0);
  const weekHours=hoursData.filter(h=>new Date(h.date)>=mon).reduce((a,day)=>a+(day.crew||[]).reduce((b,c)=>b+c.hours,0),0);

  let h=`<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
    <div class="kpi"><div class="kpi-l">This week</div><div class="kpi-v b">${weekHours.toFixed(1)}h</div></div>
    <div class="kpi"><div class="kpi-l">Total hours</div><div class="kpi-v b">${totalHours.toFixed(1)}h</div></div>
    <div class="kpi"><div class="kpi-l">Days logged</div><div class="kpi-v b">${hoursData.length}</div></div>
  </div>

  <div class="sform">
    <div class="sform-t navy">Log daily hours</div>
    <div class="fg" style="margin-bottom:10px">
      <div><label>Date</label><input id="hr-date" type="date" value="${new Date().toISOString().split('T')[0]}" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:#fafafa"></div>
      <div><label>Notes (optional)</label><input id="hr-notes" type="text" placeholder="e.g. Rough-in Units 1-5" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:#fafafa"></div>
    </div>
    <label style="display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Crew on site</label>
    <div id="crew-rows"></div>
    <button onclick="addCrewRow()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:10px;width:100%">+ Add person</button>
    <button class="sbtn" onclick="submitHours()" style="width:100%">Save day</button>
  </div>

  <div class="stitle">${hoursData.length} day${hoursData.length!==1?'s':''} logged</div>`;

  if(!hoursData.length){h+='<div class="empty">No hours logged yet</div>';}
  else{
    let currentWeek=null;
    hoursData.forEach(entry=>{
      const d=new Date(entry.date),wm=new Date(d);wm.setDate(d.getDate()-d.getDay()+1);
      const wk=wm.toISOString().split('T')[0];
      if(wk!==currentWeek){
        currentWeek=wk;
        const wt=hoursData.filter(e=>{const m=new Date(e.date),w2=new Date(m);w2.setDate(m.getDate()-m.getDay()+1);return w2.toISOString().split('T')[0]===wk;}).reduce((a,e)=>a+(e.crew||[]).reduce((b,c)=>b+c.hours,0),0);
        h+=`<div class="stitle">Week of ${wm.toLocaleDateString('en-AU',{day:'numeric',month:'short'})} <span style="font-weight:400;color:var(--muted)">${wt.toFixed(1)}h total</span></div>`;
      }
      const dayTotal=(entry.crew||[]).reduce((a,c)=>a+c.hours,0);
      const dn=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'short'});
      h+=`<div class="accent-card"><div class="accent-bar blue"></div><div class="accent-body">
        <div class="accent-top">
          <div class="accent-name">${dn}</div>
          <div style="font-size:18px;font-weight:700;color:var(--navy)">${dayTotal.toFixed(1)}h</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin:6px 0">
          ${(entry.crew||[]).map(c=>`<div style="display:flex;justify-content:space-between;font-size:13px">
            <span style="color:var(--text);font-weight:500">${c.name}</span>
            <span style="color:var(--muted)">${c.hours}h</span>
          </div>`).join('')}
        </div>
        ${entry.notes?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${entry.notes}</div>`:''}
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <button class="cbtn danger" onclick="deleteHours('${entry.id}')">Remove</button>
        </div>
      </div></div>`;
    });
  }

  document.getElementById('hours').innerHTML=h;
  renderCrewRows();
}

async function submitHours(){
  const date=document.getElementById('hr-date').value;
  const crew=crewRows.filter(r=>r.name.trim()&&r.hours).map(r=>({name:r.name.trim(),hours:parseFloat(r.hours)}));
  if(!date){alert('Please enter a date.');return;}
  if(!crew.length){alert('Please add at least one crew member.');return;}
  await fetch('/api/hours?jobId='+encodeURIComponent(JOB_ID),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
    body:JSON.stringify({date,crew,notes:document.getElementById('hr-notes').value})});
  crewRows=[{name:'',hours:''}];
  await loadHours();renderHours();
}

async function deleteHours(id){
  if(!confirm('Remove this day?'))return;
  await fetch('/api/hours?jobId='+encodeURIComponent(JOB_ID),{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({id})});
  await loadHours();renderHours();
}

// ── Materials ───────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtMoney(n){if(n==null||!isFinite(n))return '—';return '$'+Number(n).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(s){if(!s)return '';try{return new Date(s).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s;}}
const MAT_STATUS_LABEL={needed:'Needed',ordered:'Ordered',to_be_delivered:'To be delivered',delivered:'Delivered',onsite:'Onsite',used:'Used / installed',cancelled:'Cancelled'};
const MAT_STATUSES=['needed','ordered','to_be_delivered','delivered','onsite','used','cancelled'];
const MAT_SOURCE_LABEL={planned:'Planned',site_purchase:'Site purchase',variation:'Variation / extra',workshop_stock:'Workshop stock',supplier_order:'Supplier order',manual:'Manual'};
const MAT_SOURCES=['planned','site_purchase','variation','workshop_stock','supplier_order','manual'];
const INV_STATUS_LABEL={pending_review:'Pending review',approved:'Approved',needs_info:'Needs info',rejected:'Rejected'};
const FILTERS=[{k:'all',l:'All'},{k:'needed',l:'Needed'},{k:'ordered',l:'Ordered'},{k:'to_be_delivered',l:'To be delivered'},{k:'onsite',l:'Onsite'},{k:'used',l:'Used'},{k:'pending_invoices',l:'Pending invoices'},{k:'variations',l:'Variations'}];

function isAdmin(){return ME&&ME.role==='admin';}
function isTradie(){return ME&&ME.role==='tradie';}
function canSeeCosts(){return isAdmin();}

async function openMaterials(){
  const el=document.getElementById('materials');
  if(!MAT_LOADED){
    el.innerHTML='<div class="mat-empty">Loading materials…</div>';
    await fetchMaterials();
  }
  renderMaterials();
}

async function fetchMaterials(){
  try{
    const r=await fetch('/api/materials?jobId='+encodeURIComponent(JOB_ID)+'&t='+Date.now(),{credentials:'same-origin'});
    if(r.ok){MAT=await r.json();MAT_LOADED=true;}
    else if(r.status===403){MAT={materials:[],invoices:[],summary:{},_forbidden:true};MAT_LOADED=true;}
    else {MAT={materials:[],invoices:[],summary:{}};MAT_LOADED=true;}
  }catch(e){MAT={materials:[],invoices:[],summary:{}};MAT_LOADED=true;}
  MAT.materials=MAT.materials||[];MAT.invoices=MAT.invoices||[];MAT.summary=MAT.summary||{};
}

function renderMaterials(){
  const el=document.getElementById('materials');
  if(!ME||ME.role==='client'){el.innerHTML='<div class="mat-empty"><b>No access</b>Materials are not available for this account.</div>';return;}
  if(MAT&&MAT._forbidden){el.innerHTML='<div class="mat-empty"><b>No access</b>You don\'t have access to materials on this job.</div>';return;}
  const s=MAT.summary||{};
  const admin=isAdmin();
  let h='';

  if(admin){
    h+=`<div class="mat-sum">
      <div class="kpi"><div class="kpi-l">Approved actual</div><div class="kpi-v g">${fmtMoney(s.approvedActual||0)}</div></div>
      <div class="kpi"><div class="kpi-l">Pending review</div><div class="kpi-v a">${fmtMoney(s.pendingReview||0)}</div></div>
      <div class="kpi"><div class="kpi-l">Estimated</div><div class="kpi-v b">${fmtMoney(s.estimated||0)}</div></div>
      <div class="kpi"><div class="kpi-l">Onsite</div><div class="kpi-v b">${s.materialsOnsite||0}</div></div>
      <div class="kpi"><div class="kpi-l">To be delivered</div><div class="kpi-v a">${s.materialsToBeDelivered||0}</div></div>
    </div>`;
  }else{
    h+=`<div class="mat-sum">
      <div class="kpi"><div class="kpi-l">Needed</div><div class="kpi-v b">${s.materialsNeeded||0}</div></div>
      <div class="kpi"><div class="kpi-l">To be delivered</div><div class="kpi-v a">${s.materialsToBeDelivered||0}</div></div>
      <div class="kpi"><div class="kpi-l">Onsite</div><div class="kpi-v g">${s.materialsOnsite||0}</div></div>
      <div class="kpi"><div class="kpi-l">Used</div><div class="kpi-v g">${s.materialsUsed||0}</div></div>
      <div class="kpi"><div class="kpi-l">Pending invoices</div><div class="kpi-v a">${s.invoicesPending||0}</div></div>
    </div>`;
    if(!isAdmin())h+=`<div class="role-note">Field view — full costs visible to admin only. Upload invoices for admin review.</div>`;
  }

  // Toolbar
  h+=`<div class="mat-toolbar">
    <button class="mat-tb-btn" onclick="openAddMaterialModal()">+ Add material</button>
    <button class="mat-tb-btn alt" onclick="openUploadInvoiceModal()">Upload invoice</button>
  </div>`;

  // Needs attention (admin only)
  if(admin){
    const attn=needsAttentionList();
    if(attn.length){
      h+=`<div class="mat-attn">
        <div class="mat-attn-t">Needs attention · ${attn.length}</div>
        <div class="mat-attn-list">`;
      attn.forEach(a=>{h+=`<div class="mat-attn-row"><div class="l">${esc(a.label)}</div><button class="b ${a.tone||''}" onclick="${a.action}">${esc(a.btn)}</button></div>`;});
      h+=`</div></div>`;
    }
  }

  // Filters
  h+=`<div class="mat-filters">`;
  FILTERS.forEach(f=>{
    const ct=filterCount(f.k);
    h+=`<button class="mat-filter${MAT_FILTER===f.k?' active':''}" onclick="setMatFilter('${f.k}')">${esc(f.l)}${ct?`<span class="ct">${ct}</span>`:''}</button>`;
  });
  h+=`</div>`;

  // Materials list
  const filtered=applyFilter(MAT.materials);
  if(MAT_FILTER==='pending_invoices'){
    h+=renderInvoicesBlock(MAT.invoices.filter(i=>i.status==='pending_review'||i.status==='needs_info'),'Pending invoices');
    h+=renderInvoicesBlock(MAT.invoices.filter(i=>i.status==='approved'||i.status==='rejected'),'Reviewed');
  } else {
    h+=`<div class="mat-section">Materials <span class="ct">${filtered.length}</span></div>`;
    if(!filtered.length){
      h+=`<div class="mat-empty"><b>No materials</b>${MAT.materials.length?'Nothing matches this filter.':'Add planned materials, site purchases, or upload an invoice.'}</div>`;
    } else {
      filtered.forEach(m=>h+=materialCard(m));
    }
    // Invoices section
    h+=`<div class="mat-section">Invoices <span class="ct">${MAT.invoices.length}</span></div>`;
    if(!MAT.invoices.length){
      h+=`<div class="mat-empty"><b>No invoices uploaded yet</b>Leading hands can upload supplier receipts or invoices from site.</div>`;
    } else {
      MAT.invoices.slice().sort((a,b)=>(b.uploadedAt||'').localeCompare(a.uploadedAt||'')).forEach(i=>h+=invoiceCard(i));
    }
  }

  el.innerHTML=h;
}

function renderInvoicesBlock(list,title){
  let h=`<div class="mat-section">${esc(title)} <span class="ct">${list.length}</span></div>`;
  if(!list.length){h+=`<div class="mat-empty"><b>No invoices waiting for review</b></div>`;return h;}
  list.forEach(i=>h+=invoiceCard(i));
  return h;
}

function filterCount(k){
  if(k==='all')return MAT.materials.filter(m=>m.status!=='cancelled').length;
  if(k==='pending_invoices')return MAT.invoices.filter(i=>i.status==='pending_review'||i.status==='needs_info').length;
  if(k==='variations')return MAT.materials.filter(m=>m.status!=='cancelled'&&(m.isVariation||m.source==='variation')).length;
  return MAT.materials.filter(m=>m.status===k).length;
}
function applyFilter(list){
  const live=list.filter(m=>m.status!=='cancelled');
  if(MAT_FILTER==='all')return live;
  if(MAT_FILTER==='pending_invoices')return [];
  if(MAT_FILTER==='variations')return live.filter(m=>m.isVariation||m.source==='variation');
  return live.filter(m=>m.status===MAT_FILTER);
}
function setMatFilter(k){MAT_FILTER=k;renderMaterials();}

function needsAttentionList(){
  const out=[];
  MAT.invoices.forEach(i=>{
    if(i.status==='pending_review')out.push({label:`Invoice from ${i.supplier||'unknown supplier'} pending review`,btn:'Review',tone:'amber',action:`openReviewInvoiceModal('${i.id}')`});
    if(i.status==='needs_info')out.push({label:`Invoice ${i.invoiceNumber?'#'+esc(i.invoiceNumber):''} from ${i.supplier||'unknown'} needs info`,btn:'Open',tone:'red',action:`openReviewInvoiceModal('${i.id}')`});
  });
  MAT.materials.filter(m=>m.status==='to_be_delivered').forEach(m=>{
    out.push({label:`${m.name} — to be delivered`,btn:'Mark onsite',tone:'green',action:`quickMarkOnsite('${m.id}')`});
  });
  MAT.materials.filter(m=>m.status==='ordered'&&!m.supplier).forEach(m=>{
    out.push({label:`${m.name} — ordered without supplier`,btn:'Edit',action:`openEditMaterialModal('${m.id}')`});
  });
  MAT.materials.filter(m=>(m.isVariation||m.source==='variation')&&m.reviewStatus!=='approved'&&m.status!=='cancelled').forEach(m=>{
    out.push({label:`Variation: ${m.name} not reviewed`,btn:'Open',action:`openEditMaterialModal('${m.id}')`});
  });
  MAT.materials.filter(m=>m.actualTotalCost&&!(m.linkedInvoiceIds||[]).length).forEach(m=>{
    out.push({label:`${m.name} has cost but no invoice`,btn:'Open',action:`openEditMaterialModal('${m.id}')`});
  });
  return out.slice(0,12);
}

function materialCard(m){

  const linkedCount=(m.linkedInvoiceIds||[]).length;
  const adminCost=canSeeCosts()&&m.actualTotalCost!=null?fmtMoney(m.actualTotalCost):(canSeeCosts()&&m.estimatedTotalCost!=null?`est ${fmtMoney(m.estimatedTotalCost)}`:'');
  let actions='';
  // Status quick change
  const opts=MAT_STATUSES.map(s=>`<option value="${s}"${s===m.status?' selected':''}>${MAT_STATUS_LABEL[s]}</option>`).join('');
  actions+=`<label class="mat-action"><select onchange="quickStatus('${m.id}',this.value)">${opts}</select></label>`;
  if(m.status!=='onsite'&&m.status!=='used'&&m.status!=='cancelled')actions+=`<button class="mat-action green" onclick="quickMarkOnsite('${m.id}')">Mark onsite</button>`;

  return `<div class="mat-card${m.status==='cancelled'?' cancelled':''}">
    <div class="mat-card-top">
      <div class="mat-card-name">${esc(m.name)}</div>

      <span class="mat-status mat-s-${m.status}">${esc(MAT_STATUS_LABEL[m.status]||m.status)}</span>

      ${m.supplier?`<span><b>${esc(m.supplier)}</b></span>`:''}

function invoiceCard(i){
  const canShowAmount=canSeeCosts()||(ME&&i.uploadedBy===ME.id);
  let actions='';
  if(i.photoUrl)actions+=`<button class="mat-action" onclick="window.open('${esc(i.photoUrl)}','_blank')">Open file</button>`;
  if(isAdmin()){
    if(i.status!=='approved')actions+=`<button class="mat-action green" onclick="reviewInvoice('${i.id}','approved')">Approve</button>`;
    if(i.status!=='needs_info')actions+=`<button class="mat-action amber" onclick="reviewInvoice('${i.id}','needs_info')">Needs info</button>`;
    if(i.status!=='rejected')actions+=`<button class="mat-action red" onclick="reviewInvoice('${i.id}','rejected')">Reject</button>`;
    actions+=`<button class="mat-action" onclick="openReviewInvoiceModal('${i.id}')">Edit</button>`;
  } else {
    if(ME&&i.uploadedBy===ME.id&&i.status==='pending_review')actions+=`<button class="mat-action" onclick="openReviewInvoiceModal('${i.id}')">Edit</button>`;
  }
  return `<div class="inv-card">

      <div class="inv-sup">${esc(i.supplier||'(no supplier)')}${i.invoiceNumber?' · #'+esc(i.invoiceNumber):''}</div>
      <span class="mat-status inv-s-${i.status}">${esc(INV_STATUS_LABEL[i.status]||i.status)}</span>

      ${i.fileName?`<span>${esc(i.fileName)}</span>`:'<span style="color:#94a3b8">no file</span>'}

function handleInvFile(input){
  const f=input.files&&input.files[0];if(!f)return;
  MAT_FILE=f;
  const prev=document.getElementById('if-preview');
  const pick=document.getElementById('if-pick');
  pick.classList.add('has');
  if(f.type.startsWith('image/')){
    const reader=new FileReader();
    reader.onload=e=>{
      prev.innerHTML=`<img src="${e.target.result}" alt=""><button type="button" class="fp-clear" onclick="clearInvFile()">Remove</button>`;
      prev.classList.add('show');
    };
    reader.readAsDataURL(f);
  } else {
    prev.innerHTML=`<div class="fp-pdf">📄 ${esc(f.name)} <span style="margin-left:auto;color:var(--muted);font-size:12px">${(f.size/1024).toFixed(0)} KB</span></div><button type="button" class="fp-clear" onclick="clearInvFile()">Remove</button>`;
    prev.classList.add('show');
  }
}
function clearInvFile(){
  MAT_FILE=null;
  const inp=document.getElementById('if-file');if(inp)inp.value='';
  document.getElementById('if-preview').classList.remove('show');
  document.getElementById('if-preview').innerHTML='';
  document.getElementById('if-pick').classList.remove('has');
}

async function submitInvoiceUpload(confirmDup){
  const body={
    supplier:document.getElementById('if-supplier').value.trim(),
    totalAmount:document.getElementById('if-amount').value?Number(document.getElementById('if-amount').value):null,
    invoiceDate:document.getElementById('if-date').value||'',
    invoiceNumber:document.getElementById('if-num').value.trim(),
    notes:document.getElementById('if-notes').value.trim(),
  };
  if(confirmDup)body.confirmDuplicate=true;
  const err=document.getElementById('if-err');
  const btn=document.getElementById('if-save');
  err.textContent='';btn.disabled=true;btn.textContent='Saving…';
  try{
    let r,j;
    if(MAT_FILE){
      // Read as base64, send invoice-with-file action
      const dataUrl=await new Promise(res=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.readAsDataURL(MAT_FILE);});
      const b64=dataUrl.split(',')[1];
      body.filename=MAT_FILE.name;
      body.contentType=MAT_FILE.type||'application/octet-stream';
      body.data=b64;
      r=await fetch('/api/materials?action=invoice-with-file&jobId='+encodeURIComponent(JOB_ID),{
        method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)
      });
    } else {
      r=await fetch('/api/materials?action=invoice&jobId='+encodeURIComponent(JOB_ID),{
        method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)
      });
    }
    j=await r.json();
    if(r.status===409&&j.error==='duplicate invoice'){
      btn.disabled=false;btn.textContent='Save for admin review';
      if(confirm((j.message||'A similar invoice already exists.')+'\n\nSave anyway?')){return submitInvoiceUpload(true);}
      return;
    }
    if(!r.ok){err.textContent=j.error||'Upload failed';btn.disabled=false;btn.textContent='Save for admin review';return;}
    closeMatModal();await fetchMaterials();renderMaterials();
  }catch(e){
    err.textContent='Upload failed: '+(e.message||'network error');
    btn.disabled=false;btn.textContent='Save for admin review';
  }
}

// ── Assets ───────────────────────────────────────────────────
const ASSET_TYPE_LABEL={vehicle:'Vehicle',key:'Key',tool:'Tool',accessory:'Accessory',ppe:'PPE',other:'Other'};
const ASSET_TYPES_LIST=['vehicle','key','tool','accessory','ppe','other'];

async function openAssets(){
  const el=document.getElementById('assets');
  el.innerHTML='<div class="asset-empty"><b>Loading…</b></div>';
  if(!ASSETS_LOADED)await fetchAssets();
  renderAssets();
}

async function fetchAssets(){
  try{
    const r=await fetch('/api/assets',{credentials:'same-origin'});
    if(r.ok){ASSETS=await r.json();ASSETS_LOADED=true;}
    else if(r.status===403){ASSETS={assets:[],_forbidden:true};ASSETS_LOADED=true;}
    else{ASSETS={assets:[]};ASSETS_LOADED=true;}
  }catch(e){ASSETS={assets:[]};ASSETS_LOADED=true;}
  ASSETS.assets=ASSETS.assets||[];
}

function renderAssets(){
  const el=document.getElementById('assets');
  if(!ASSETS||ASSETS._forbidden){
    el.innerHTML='<div class="asset-empty"><b>No access</b>You don\'t have access to assets.</div>';return;
  }
  const admin=isAdmin();
  let h='';
  if(admin){
    h+=`<div class="asset-toolbar"><button class="asset-tb-btn" onclick="openNewAssetModal()">+ New Asset</button></div>`;
  }else{
    h+=`<div class="stitle">My Gear</div>`;
  }
  const list=ASSETS.assets||[];
  if(!list.length){
    h+=`<div class="asset-empty"><b>${admin?'No assets yet':'No gear assigned to you'}</b>${admin?'Add vehicles, keys, tools, and equipment.':'Assets assigned to you will appear here.'}</div>`;
  }else{
    list.forEach(a=>{h+=assetCard(a);});
  }
  el.innerHTML=h;
}

function assetCard(a){
  const tClass='asset-type asset-type-'+(a.type||'other');
  const tLabel=ASSET_TYPE_LABEL[a.type]||'Other';
  const holderHtml=assetHolderHtml(a);
  return`<div class="asset-card" onclick="openAssetDetail('${esc(a.id)}')">
    <div class="asset-card-top">
      <span class="${tClass}">${tLabel}</span>
      <span class="asset-card-name">${esc(a.name)}</span>
      ${a.identifier?`<span style="font-size:11px;color:var(--muted)">${esc(a.identifier)}</span>`:''}
    </div>
    <div class="asset-card-meta">
      ${isAdmin()?`<span>${holderHtml}</span>`:''}
      ${a.expectedReturn?`<span>Return by: <b>${a.expectedReturn.slice(0,10)}</b></span>`:''}
      ${a.notes?`<span>${esc(a.notes.slice(0,80))}${a.notes.length>80?'…':''}</span>`:''}
    </div>
  </div>`;
}

function assetHolderHtml(a){
  if(!a.currentHolderId)return'<span class="asset-holder-pill unassigned">In storage</span>';
  const users=(ASSETS_USERS&&ASSETS_USERS.users)||[];
  const u=users.find(x=>x.id===a.currentHolderId);
  return`<span class="asset-holder-pill">${esc(u?u.username:a.currentHolderId)}</span>`;
}

async function openAssetDetail(id){
  document.getElementById('asset-modal-inner').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">Loading…</div>';
  document.getElementById('asset-modal').classList.add('open');
  if(isAdmin())await loadUsersIfNeeded();
  try{
    const r=await fetch('/api/assets?id='+encodeURIComponent(id),{credentials:'same-origin'});
    if(!r.ok){document.getElementById('asset-modal-inner').innerHTML='<p style="padding:16px">Error loading asset.</p>';return;}
    const j=await r.json();
    renderAssetDetail(j.asset,j.history||[]);
  }catch(e){document.getElementById('asset-modal-inner').innerHTML='<p style="padding:16px">Network error.</p>';}
}

function renderAssetDetail(a,history){
  const admin=isAdmin();
  const tradie=ME&&ME.role==='tradie';
  const tLabel=ASSET_TYPE_LABEL[a.type]||a.type;
  const users=(ASSETS_USERS&&ASSETS_USERS.users)||[];
  const holder=a.currentHolderId?users.find(u=>u.id===a.currentHolderId):null;

  let h=`<div class="modal-h">
    <div class="modal-t">${esc(a.name)}</div>
    <button class="modal-x" onclick="closeAssetModal()">✕</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
    <span class="asset-type asset-type-${a.type||'other'}">${tLabel}</span>
    ${a.identifier?`<span style="font-size:12px;color:var(--muted)">${esc(a.identifier)}</span>`:''}
  </div>
  <div class="asset-card-meta" style="margin-bottom:14px">
    <span>Held by: ${a.currentHolderId?(holder?`<b>${esc(holder.username)}</b>`:a.currentHolderId):'<em>In storage</em>'}</span>
    ${a.assignedAt?`<span>Since: <b>${a.assignedAt.slice(0,10)}</b></span>`:''}
    ${a.expectedReturn?`<span>Return by: <b>${a.expectedReturn.slice(0,10)}</b></span>`:''}
    ${a.notes?`<span>Notes: ${esc(a.notes)}</span>`:''}
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">`;
  if(admin){
    h+=`<button class="mat-action primary" onclick="openEditAssetModal('${esc(a.id)}')">Edit</button>`;
    h+=`<button class="mat-action" onclick="openTransferModal('${esc(a.id)}')">Transfer</button>`;
    if(!a.archived)h+=`<button class="mat-action red" onclick="archiveAsset('${esc(a.id)}')">Archive</button>`;
  }
  h+=`</div>`;

  h+=`<div class="stitle">Transfer history</div>`;
  if(!history.length){
    h+=`<p style="font-size:12px;color:var(--muted);padding:4px 0">No transfers recorded.</p>`;
  }else{
    h+=`<div class="asset-history">`;
    history.slice().reverse().forEach(e=>{
      const fromUser=e.from?(users.find(u=>u.id===e.from)||{username:e.from}).username:'Storage';
      const toUser=e.to?(users.find(u=>u.id===e.to)||{username:e.to}).username:'Storage';
      h+=`<div class="asset-hist-row">
        <span class="at">${(e.at||'').slice(0,10)}</span>
        <span class="evt">${esc(fromUser)} → ${esc(toUser)}${e.note?` — ${esc(e.note)}`:''}</span>
      </div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('asset-modal-inner').innerHTML=h;
}

async function loadUsersIfNeeded(){
  if(ASSETS_USERS)return;
  try{
    const r=await fetch('/api/users',{credentials:'same-origin'});
    if(r.ok)ASSETS_USERS=await r.json();
    else ASSETS_USERS={users:[]};
  }catch(e){ASSETS_USERS={users:[]};}
}

function closeAssetModal(){document.getElementById('asset-modal').classList.remove('open');}
function openNewAssetModal(){openEditAssetModal(null);}

async function openEditAssetModal(id){
  const a=id?((ASSETS&&ASSETS.assets)||[]).find(x=>x.id===id)||null:null;
  const typeOpts=ASSET_TYPES_LIST.map(t=>`<option value="${t}"${(a?a.type===t:t==='other')?' selected':''}>${ASSET_TYPE_LABEL[t]}</option>`).join('');
  document.getElementById('asset-modal-inner').innerHTML=`
    <div class="modal-h">
      <div class="modal-t">${a?'Edit Asset':'New Asset'}</div>
      <button class="modal-x" onclick="closeAssetModal()">✕</button>
    </div>
    <label>Name *</label>
    <input id="af-name" value="${esc(a?a.name:'')}" placeholder="e.g. Ford Ranger">
    <label>Type</label>
    <select id="af-type">${typeOpts}</select>
    <label>Identifier (rego, serial, etc.)</label>
    <input id="af-ident" value="${esc(a&&a.identifier||'')}" placeholder="e.g. REG: 1AB 2CD">
    <label>Notes</label>
    <textarea id="af-notes">${esc(a&&a.notes||'')}</textarea>
    <div class="modal-err" id="af-err"></div>
    <div class="modal-foot">
      <button class="cancel" onclick="closeAssetModal()">Cancel</button>
      <button class="save" onclick="saveAsset('${id||''}')">Save</button>
    </div>`;
  document.getElementById('asset-modal').classList.add('open');
}

async function saveAsset(id){
  const body={
    name:document.getElementById('af-name').value.trim(),
    type:document.getElementById('af-type').value,
    identifier:document.getElementById('af-ident').value.trim()||null,
    notes:document.getElementById('af-notes').value.trim()||null,
  };
  const err=document.getElementById('af-err');
  if(!body.name){err.textContent='Name is required';return;}
  try{
    const url=id?`/api/assets?id=${encodeURIComponent(id)}`:'/api/assets';
    const r=await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)});
    const j=await r.json();
    if(!r.ok){err.textContent=j.error||'Failed to save';return;}
    closeAssetModal();ASSETS_LOADED=false;await fetchAssets();renderAssets();
  }catch(e){err.textContent='Network error';}
}

async function openTransferModal(assetId){
  await loadUsersIfNeeded();
  const tradies=((ASSETS_USERS&&ASSETS_USERS.users)||[]).filter(u=>u.role==='tradie');
  const userOpts=tradies.map(u=>`<option value="${u.id}">${esc(u.username)}</option>`).join('');
  document.getElementById('asset-modal-inner').innerHTML=`
    <div class="modal-h">
      <div class="modal-t">Transfer Asset</div>
      <button class="modal-x" onclick="closeAssetModal()">✕</button>
    </div>
    <label>Transfer to</label>
    <select id="tf-to">
      <option value="">— Return to storage —</option>
      ${userOpts}
    </select>
    <label>Expected return date (optional)</label>
    <input type="date" id="tf-return">
    <label>Note (optional)</label>
    <input id="tf-note" placeholder="e.g. Needed for site access">
    <div class="modal-err" id="tf-err"></div>
    <div class="modal-foot">
      <button class="cancel" onclick="closeAssetModal()">Cancel</button>
      <button class="save" onclick="doTransfer('${esc(assetId)}')">Transfer</button>
    </div>`;
  document.getElementById('asset-modal').classList.add('open');
}

async function doTransfer(assetId){
  const toUserId=document.getElementById('tf-to').value||null;
  const retVal=document.getElementById('tf-return').value;
  const body={
    assetId,
    toUserId,
    expectedReturn:retVal?retVal+'T00:00:00.000Z':null,
    note:document.getElementById('tf-note').value.trim()||null,
  };
  const err=document.getElementById('tf-err');
  try{
    const r=await fetch('/api/assets/transfer',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)});
    const j=await r.json();
    if(!r.ok){err.textContent=j.error||'Failed to transfer';return;}
    closeAssetModal();ASSETS_LOADED=false;await fetchAssets();renderAssets();
  }catch(e){err.textContent='Network error';}
}

async function archiveAsset(id){
  if(!confirm('Archive this asset? It will be hidden from the list.'))return;
  try{
    const r=await fetch('/api/assets?id='+encodeURIComponent(id),{method:'DELETE',credentials:'same-origin'});
    if(!r.ok){alert('Failed to archive');return;}
    closeAssetModal();ASSETS_LOADED=false;await fetchAssets();renderAssets();
  }catch(e){alert('Network error');}
}

// ── Contacts ─────────────────────────────────────────────────
async function openContacts(){
  const el=document.getElementById('contacts');
  el.innerHTML='<div class="contact-empty"><b>Loading…</b></div>';
  if(!CONTACTS_LOADED)await fetchContacts();
  renderContacts();
}

async function fetchContacts(){
  try{
    const r=await fetch('/api/contacts?jobId='+encodeURIComponent(JOB_ID),{credentials:'same-origin'});
    if(r.ok){CONTACTS=await r.json();CONTACTS_LOADED=true;}
    else if(r.status===403){CONTACTS={contacts:[],_forbidden:true};CONTACTS_LOADED=true;}
    else{CONTACTS={contacts:[]};CONTACTS_LOADED=true;}
  }catch(e){CONTACTS={contacts:[]};CONTACTS_LOADED=true;}
  CONTACTS.contacts=CONTACTS.contacts||[];
}

function renderContacts(){
  const el=document.getElementById('contacts');
  if(!CONTACTS||CONTACTS._forbidden){
    el.innerHTML='<div class="contact-empty"><b>No access</b>You don\'t have access to job contacts.</div>';return;
  }
  const admin=isAdmin();
  let h='';
  if(admin){
    h+=`<div class="contact-toolbar">
      <button class="contact-tb-btn" onclick="openNewContactModal('project')">+ Project Contact</button>
      <button class="contact-tb-btn alt" onclick="openNewContactModal('supplier')">+ Supplier</button>
    </div>`;
  }
  const all=CONTACTS.contacts||[];
  const project=all.filter(c=>c.category==='project');
  const suppliers=all.filter(c=>c.category==='supplier');
  if(!all.length){
    h+=`<div class="contact-empty"><b>No contacts yet</b>Add project contacts and suppliers for this job.</div>`;
  }else{
    if(project.length){
      h+=`<div class="stitle">Project contacts <span class="ct">${project.length}</span></div>`;
      project.forEach(c=>{h+=contactCard(c);});
    }
    if(suppliers.length){
      h+=`<div class="stitle">Suppliers <span class="ct">${suppliers.length}</span></div>`;
      suppliers.forEach(c=>{h+=contactCard(c);});
    }
  }
  el.innerHTML=h;
}

function contactCard(c){
  const admin=isAdmin();
  const catClass='contact-cat-'+c.category;
  const catLabel=c.category==='project'?'Project':'Supplier';
  let meta='';
  if(c.category==='project'){
    const role=[c.role,c.company].filter(Boolean).map(esc).join(' · ');
    if(role)meta+=`<span>${role}</span>`;
    if(c.phone)meta+=`<span><a href="tel:${esc(c.phone)}">📞 ${esc(c.phone)}</a></span>`;
    if(c.email)meta+=`<span><a href="mailto:${esc(c.email)}">✉ ${esc(c.email)}</a></span>`;
    if(c.notes)meta+=`<span>${esc(c.notes.slice(0,120))}${c.notes.length>120?'…':''}</span>`;
  }else{
    if(c.description)meta+=`<span>${esc(c.description.slice(0,120))}${c.description.length>120?'…':''}</span>`;
    if(c.contactPerson)meta+=`<span>Contact: ${esc(c.contactPerson)}</span>`;
    if(c.phone)meta+=`<span><a href="tel:${esc(c.phone)}">📞 ${esc(c.phone)}</a></span>`;
    if(c.email)meta+=`<span><a href="mailto:${esc(c.email)}">✉ ${esc(c.email)}</a></span>`;
  }
  return`<div class="contact-card">
    <div class="contact-card-top">
      <span class="contact-cat-badge ${catClass}">${catLabel}</span>
      <span class="contact-card-name">${esc(c.name)}</span>
    </div>
    <div class="contact-card-meta">${meta}</div>
    ${admin?`<div class="contact-card-actions">
      <button class="contact-action" onclick="openEditContactModal('${esc(c.id)}')">Edit</button>
      <button class="contact-action red" onclick="deleteContact('${esc(c.id)}',false)">Delete</button>
    </div>`:''}
  </div>`;
}

function closeContactModal(){document.getElementById('contact-modal').classList.remove('open');}
function openNewContactModal(cat){openEditContactModal(null,cat);}

function openEditContactModal(id,defaultCat){
  const c=id?((CONTACTS&&CONTACTS.contacts)||[]).find(x=>x.id===id)||null:null;
  const cat=c?c.category:(defaultCat||'project');
  const isSupplier=cat==='supplier';
  const title=c?`Edit ${isSupplier?'Supplier':'Contact'}`:`New ${isSupplier?'Supplier':'Contact'}`;
  let fields='';
  if(!isSupplier){
    fields=`<label>Name *</label><input id="cf-name" value="${esc(c?c.name:'')}">
      <div class="modal-row2">
        <div><label>Role / Title</label><input id="cf-role" value="${esc(c&&c.role||'')}"></div>
        <div><label>Company</label><input id="cf-company" value="${esc(c&&c.company||'')}"></div>
      </div>
      <div class="modal-row2">
        <div><label>Phone</label><input id="cf-phone" type="tel" value="${esc(c&&c.phone||'')}"></div>
        <div><label>Email</label><input id="cf-email" type="email" value="${esc(c&&c.email||'')}"></div>
      </div>
      <label>Notes</label><textarea id="cf-notes">${esc(c&&c.notes||'')}</textarea>`;
  }else{
    fields=`<label>Supplier Name *</label><input id="cf-name" value="${esc(c?c.name:'')}">
      <label>Description * (what do they supply?)</label><input id="cf-desc" value="${esc(c&&c.description||'')}">
      <label>Contact Person</label><input id="cf-contact-person" value="${esc(c&&c.contactPerson||'')}">
      <div class="modal-row2">
        <div><label>Phone</label><input id="cf-phone" type="tel" value="${esc(c&&c.phone||'')}"></div>
        <div><label>Email</label><input id="cf-email" type="email" value="${esc(c&&c.email||'')}"></div>
      </div>`;
  }
  document.getElementById('contact-modal-inner').innerHTML=`
    <div class="modal-h">
      <div class="modal-t">${title}</div>
      <button class="modal-x" onclick="closeContactModal()">✕</button>
    </div>
    <input type="hidden" id="cf-cat" value="${cat}">
    ${fields}
    <div class="modal-err" id="cf-err"></div>
    <div class="modal-foot">
      ${id?`<button class="cancel" style="background:#fef2f2;color:var(--red);flex:0 0 auto;padding:11px 14px" onclick="deleteContact('${esc(id)}',true)">Delete</button>`:''}
      <button class="cancel" onclick="closeContactModal()">Cancel</button>
      <button class="save" onclick="saveContact('${id||''}')">Save</button>
    </div>`;
  document.getElementById('contact-modal').classList.add('open');
}

async function saveContact(id){
  const cat=document.getElementById('cf-cat').value;
  const isSupplier=cat==='supplier';
  const body={category:cat};
  body.name=document.getElementById('cf-name').value.trim();
  body.phone=document.getElementById('cf-phone').value.trim()||null;
  body.email=document.getElementById('cf-email').value.trim()||null;
  if(isSupplier){
    body.description=document.getElementById('cf-desc').value.trim();
    body.contactPerson=document.getElementById('cf-contact-person').value.trim()||null;
  }else{
    body.role=document.getElementById('cf-role').value.trim()||null;
    body.company=document.getElementById('cf-company').value.trim()||null;
    body.notes=document.getElementById('cf-notes').value.trim()||null;
  }
  const err=document.getElementById('cf-err');
  if(!body.name){err.textContent='Name is required';return;}
  if(isSupplier&&!body.description){err.textContent='Description is required for suppliers';return;}
  try{
    const url=id
      ?`/api/contacts?id=${encodeURIComponent(id)}&jobId=${encodeURIComponent(JOB_ID)}`
      :`/api/contacts?jobId=${encodeURIComponent(JOB_ID)}`;
    const r=await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)});
    const j=await r.json();
    if(!r.ok){err.textContent=j.error||'Failed to save';return;}
    closeContactModal();CONTACTS_LOADED=false;await fetchContacts();renderContacts();
  }catch(e){err.textContent='Network error';}
}

async function deleteContact(id,fromModal){
  if(!confirm('Delete this contact?'))return;
  try{
    const r=await fetch(`/api/contacts?id=${encodeURIComponent(id)}&jobId=${encodeURIComponent(JOB_ID)}`,{method:'DELETE',credentials:'same-origin'});
    if(!r.ok){alert('Failed to delete');return;}
    if(fromModal)closeContactModal();
    CONTACTS_LOADED=false;await fetchContacts();renderContacts();
  }catch(e){alert('Network error');}
}
