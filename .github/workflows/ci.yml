name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ci-placeholder-session-secret-long-enough
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit and mocked-Blob API tests
        run: npm run test:unit
      - name: Build
        run: npm run build
      - name: Legacy production guards
        run: |
          npm run check:admin-shell
          npm run check:sw-cache-version
          npm run check:production-shell
          npm run check:route-ownership
          npm run smoke:admin-routes
